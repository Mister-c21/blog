<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoreSpace - Full App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #8a2be2;
            --bg-color: #f8f8ff;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.3);
        }
        body { background-color: var(--bg-color); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; padding-bottom: 180px; }
        .view { display: none; }
        .view.active { display: block; }

        /* Componentes de UI */
        .search-container { display: flex; align-items: center; padding: 10px 20px; background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 30px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .search-input { flex-grow: 1; background: transparent; border: none; padding: 10px; color: var(--primary-color); outline: none; }
        
        .carousel-list { display: flex; flex-direction: column; gap: 40px; }
        .carousel-section h2 { color: var(--primary-color); margin-bottom: 15px; font-size: 1.2rem; }
        .carousel-container { display: flex; overflow-x: auto; gap: 20px; padding: 10px; scrollbar-width: none; min-height: 250px; }
        
        .card { min-width: 180px; height: 250px; border-radius: 20px; background-size: cover; background-position: center; background-color: rgba(138, 43, 226, 0.1); transition: transform 0.3s ease; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid var(--glass-border); position: relative; display: flex; align-items: flex-end; overflow: hidden; }
        .card-title { width: 100%; background: rgba(138, 43, 226, 0.8); backdrop-filter: blur(10px); color: white; padding: 8px; font-size: 0.8rem; font-weight: 600; text-align: center; }

        .modal-full { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; overflow-y: auto; color: #202124; }
        .modal-header { padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #dfe1e5; background: white; position: sticky; top: 0; }
        .modal-tabbar { display: flex; gap: 25px; padding: 0 20px; background: white; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #eee; }
        .tab-item-modal { padding: 15px 0; cursor: pointer; color: #70757a; font-size: 1rem; position: relative; }
        .tab-item-modal.active { color: #000; font-weight: 700; border-bottom: 2px solid var(--primary-color); }
        
        .result-item { margin-bottom: 25px; padding: 15px; border-radius: 15px; background: #fdfdfd; border: 1px solid #eee; }
        .result-title { color: #1a0dab; font-size: 20px; font-weight: bold; cursor: pointer; text-decoration: underline; }
        
        .spotify-card { display: flex; align-items: center; padding: 10px; border-radius: 12px; margin-bottom: 8px; }
        .play-btn-round { background: var(--primary-color); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; cursor: pointer; }
        .track-img { width: 50px; height: 50px; border-radius: 6px; margin-right: 15px; object-fit: cover; }
        .share-icon { font-size: 1.2rem; color: var(--primary-color); cursor: pointer; padding: 10px; }

        .player-bar { position: fixed; bottom: 90px; left: 5%; width: 90%; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; display: none; align-items: center; padding: 10px; z-index: 1500; }
        .player-bar.active { display: flex; }

        .tabbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 65px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .tab-item { cursor: pointer; color: var(--primary-color); font-size: 1.3rem; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); z-index: 20000; align-items: center; justify-content: center; }
        .modal { width: 85%; max-width: 450px; background: white; padding: 25px; border-radius: 25px; text-align: center; color: var(--primary-color); }
        .edit-btn { background: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="view-feed" class="view active">
        <div class="search-container">
            <input type="text" id="main-search" placeholder="Buscar no LoreSpace..." class="search-input" onkeypress="handleSearch(event)">
            <i class="fas fa-search"></i>
        </div>
        <div class="carousel-list" id="main-content"></div>
    </div>

    <div id="detail-modal" class="modal-full">
        <div class="modal-header">
            <i class="fas fa-arrow-left" onclick="closeDetail()" style="font-size: 1.2rem; cursor: pointer; margin-right: 20px;"></i>
            <span>Resultados</span>
        </div>
        <div class="modal-tabbar">
            <div class="tab-item-modal active" onclick="changeTab('all', this)">Todos</div>
            <div class="tab-item-modal" onclick="changeTab('music', this)">Música</div>
        </div>
        <div id="modal-content" style="padding: 20px;"></div>
    </div>

    <div id="share-modal" class="modal-overlay">
        <div class="modal">
            <h3>Compartilhar LoreSpace</h3>
            <p id="share-text-display"></p>
            <button class="edit-btn" onclick="executeShare()">Compartilhar via...</button>
            <button class="edit-btn" style="background:#ccc;" onclick="document.getElementById('share-modal').style.display='none'">Fechar</button>
        </div>
    </div>

    <div id="player-bar" class="player-bar">
        <img id="player-img" src="" style="width:45px; height:45px; border-radius:10px; margin-right:15px;">
        <div style="flex:1;">
            <div id="player-name" style="font-weight:bold; font-size:0.9rem;"></div>
        </div>
        <i id="play-pause-icon" class="fas fa-pause" onclick="togglePlay()" style="color:var(--primary-color);"></i>
        <audio id="audio-element"></audio>
    </div>

    <nav class="tabbar">
        <div class="tab-item" onclick="showView('view-feed')"><i class="fas fa-house"></i></div>
        <div class="tab-item" onclick="showView('view-notif')"><i class="fas fa-bell"></i></div>
    </nav>

    <script>
        // Variáveis globais para Deep Linking e Share
        let currentTerm = '';
        let shareType = '';
        let shareTerm = '';

        // 1. Lógica de Compartilhamento
        function openShareModal(type, term) {
            shareType = type;
            shareTerm = term;
            document.getElementById('share-text-display').innerText = `Visualizar: ${term}`;
            document.getElementById('share-modal').style.display = 'flex';
        }

        async function executeShare() {
            const url = `${window.location.origin}${window.location.pathname}?type=${shareType}&term=${encodeURIComponent(shareTerm)}`;
            if (navigator.share) {
                try {
                    await navigator.share({ title: 'LoreSpace', text: 'Confira:', url: url });
                } catch (e) { console.log(e); }
            } else {
                navigator.clipboard.writeText(url);
                document.getElementById('share-text-display').innerText = "Link copiado!";
            }
            setTimeout(() => document.getElementById('share-modal').style.display = 'none', 1500);
        }

        // 2. Lógica de Deep Linking (Carregamento automático)
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const type = params.get('type');
            const term = params.get('term');
            if (type && term) {
                openDetail(term);
                if (type === 'music') {
                    setTimeout(() => {
                        const musicTab = document.querySelector('.tab-item-modal[onclick*="music"]');
                        if(musicTab) musicTab.click();
                    }, 800);
                }
            }
        });

        // 3. Funções de Busca (Wikipedia & Itunes)
        async function openDetail(term) {
            currentTerm = term;
            document.getElementById('detail-modal').style.display = 'block';
            document.getElementById('modal-content').innerHTML = "Pesquisando...";
            const url = `https://pt.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(term)}&format=json&origin=*`;
            const res = await fetch(url);
            const data = await res.json();
            const content = document.getElementById('modal-content');
            content.innerHTML = `<h3>Resultados para: ${term}</h3>`;
            data.query.search.forEach(item => {
                content.innerHTML += `
                    <div class="result-item">
                        <div class="result-title">${item.title}</div>
                        <i class="fas fa-share-nodes share-icon" onclick="openShareModal('wiki', '${item.title.replace(/'/g, "")}')"></i>
                    </div>`;
            });
        }

        async function searchMusic(term) {
            const content = document.getElementById('modal-content');
            content.innerHTML = "Buscando música...";
            const script = document.createElement('script');
            const cb = 'cb_' + Date.now();
            window[cb] = function(data) {
                content.innerHTML = `<h3>Músicas para: ${term}</h3>`;
                data.results.forEach((song, i) => {
                    content.innerHTML += `
                        <div class="spotify-card">
                            <div class="play-btn-round"><i class="fas fa-play"></i></div>
                            <div style="flex:1;">${song.trackName}</div>
                            <i class="fas fa-share-nodes share-icon" onclick="openShareModal('music', '${song.trackName.replace(/'/g, "")}')"></i>
                        </div>`;
                });
                document.body.removeChild(script);
            };
            script.src = `https://itunes.apple.com/search?term=${encodeURIComponent(term)}&media=music&limit=5&callback=${cb}`;
            document.body.appendChild(script);
        }

        function changeTab(type, el) {
            document.querySelectorAll('.tab-item-modal').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            type === 'music' ? searchMusic(currentTerm) : openDetail(currentTerm);
        }

        function closeDetail() { document.getElementById('detail-modal').style.display = 'none'; }
        function showView(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function handleSearch(e) { if (e.key === 'Enter') openDetail(document.getElementById('main-search').value); }
        function togglePlay() { const audio = document.getElementById('audio-element'); audio.paused ? audio.play() : audio.pause(); }
    </script>
</body>
</html>
