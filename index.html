<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoreSpace - Clean Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: blueviolet;
            --bg-color: ghostwhite;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-color: #333;
        }

        body { 
            background-color: var(--bg-color); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            padding-bottom: 120px;
            color: var(--text-color);
        }

        .view { display: none; }
        .view.active { display: block; }

        /* Search Section */
        .search-container { 
            display: flex; 
            align-items: center; 
            padding: 10px 20px; 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px); 
            border: 1px solid var(--glass-border); 
            border-radius: 30px; 
            margin-bottom: 30px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .search-input { 
            flex-grow: 1; 
            background: transparent; 
            border: none; 
            padding: 10px; 
            color: var(--primary-color); 
            outline: none; 
        }

        /* Carousel */
        .carousel-list { display: flex; flex-direction: column; gap: 40px; }
        .carousel-section h2 { color: var(--primary-color); margin-bottom: 15px; font-size: 1.2rem; }
        .carousel-container { display: flex; overflow-x: auto; gap: 20px; padding: 10px; scrollbar-width: none; min-height: 250px; }
        
        .card { 
            min-width: 180px; height: 250px; border-radius: 20px; background-size: cover; background-position: center; 
            background-color: rgba(138, 43, 226, 0.1); transition: transform 0.3s ease; cursor: pointer; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid var(--glass-border); 
            position: relative; display: flex; align-items: flex-end; overflow: hidden; 
        }
        .card:hover { transform: scale(1.05); }
        .card-title { 
            width: 100%; background: rgba(138, 43, 226, 0.8); backdrop-filter: blur(10px); 
            color: white; padding: 8px; font-size: 0.8rem; font-weight: 600; text-align: center; 
        }

        /* Modals */
        .modal-full { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; overflow-y: auto; }
        .modal-header { padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #dfe1e5; background: white; position: sticky; top: 0; }
        .modal-tabbar { display: flex; gap: 25px; padding: 0 20px; background: white; }
        .tab-item-modal { padding: 15px 0; cursor: pointer; color: #70757a; font-size: 1rem; }
        .tab-item-modal.active { color: var(--primary-color); font-weight: 700; border-bottom: 2px solid var(--primary-color); }
        
        .modal-content-body { padding: 20px; max-width: 700px; margin: 0 auto; }
        .result-item { margin-bottom: 25px; padding: 15px; border-radius: 15px; background: #fdfdfd; border: 1px solid #eee; }
        
        .spotify-card { display: flex; align-items: center; padding: 10px; border-radius: 12px; transition: background 0.3s; margin-bottom: 8px; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); }
        .play-btn-round { background: var(--primary-color); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; }

        /* Player Bar */
        .player-bar { 
            position: fixed; bottom: 90px; left: 5%; width: 90%; background: rgba(255,255,255,0.8); 
            backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; 
            display: none; align-items: center; padding: 10px; z-index: 1500; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        .player-bar.active { display: flex; }

        /* Tabbar */
        .tabbar { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; 
            height: 65px; background: var(--glass-bg); backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); border-radius: 35px; display: flex; 
            justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; 
        }
        .tab-item { cursor: pointer; color: var(--primary-color); font-size: 1.3rem; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); z-index: 20000; align-items: center; justify-content: center; }
        .modal { width: 85%; max-width: 350px; background: white; padding: 25px; border-radius: 25px; text-align: center; }
    </style>
</head>
<body>

    <div id="view-feed" class="view active">
        <div class="search-container">
            <input type="text" id="main-search" placeholder="Buscar..." class="search-input" onkeypress="if(event.key==='Enter') openDetail(document.getElementById('main-search').value)">
            <i class="fas fa-search"></i>
        </div>
        <div class="carousel-list" id="main-content"></div>
    </div>

    <div id="detail-modal" class="modal-full">
        <div class="modal-header">
            <i class="fas fa-arrow-left" onclick="closeDetail()" style="cursor: pointer; margin-right: 20px;"></i>
            <span>Resultados</span>
        </div>
        <div class="modal-tabbar">
            <div class="tab-item-modal active" onclick="switchModalTab('all', this)">Todos</div>
            <div class="tab-item-modal" onclick="switchModalTab('music', this)">Música</div>
        </div>
        <div id="modal-content" class="modal-content-body"></div>
    </div>

    <div id="streaming-modal" class="modal-overlay">
        <div class="modal">
            <h3>Ouvir em...</h3>
            <div onclick="redirectTo('itunes')" style="padding: 10px; border-bottom: 1px solid #eee;">iTunes</div>
            <div onclick="redirectTo('spotify')" style="padding: 10px; border-bottom: 1px solid #eee;">Spotify</div>
            <div onclick="redirectTo('youtube')" style="padding: 10px; border-bottom: 1px solid #eee;">YouTube Music</div>
            <button onclick="document.getElementById('streaming-modal').style.display='none'" style="margin-top:15px;">Fechar</button>
        </div>
    </div>

    <div id="player-bar" class="player-bar">
        <img id="player-img" src="" style="width:45px; height:45px; border-radius:10px;">
        <div style="flex:1; margin-left:15px;">
            <div id="player-name" style="font-size:0.9rem; font-weight:bold;"></div>
        </div>
        <i id="play-pause-icon" class="fas fa-pause" onclick="togglePlay()"></i>
        <audio id="audio-element"></audio>
    </div>

    <nav class="tabbar">
        <div class="tab-item" onclick="showView('view-feed')"><i class="fas fa-house"></i></div>
        <div class="tab-item" onclick="alert('Perfil em breve')"><i class="fas fa-user"></i></div>
    </nav>

    <script>
        let currentTerm = '';
        let activeTrackName = '';
        let activeArtistName = '';
        const audio = document.getElementById('audio-element');

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function closeDetail() { document.getElementById('detail-modal').style.display = 'none'; }

        async function openDetail(term) {
            currentTerm = term;
            document.getElementById('detail-modal').style.display = 'block';
            await searchWiki(term);
        }

        async function switchModalTab(type, el) {
            document.querySelectorAll('.tab-item-modal').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            if (type === 'music') await searchMusic(currentTerm);
            else await searchWiki(currentTerm);
        }

        async function searchWiki(term) {
            const content = document.getElementById('modal-content');
            content.innerHTML = "Carregando...";
            const url = `https://pt.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(term)}&format=json&origin=*`;
            const res = await fetch(url);
            const data = await res.json();
            content.innerHTML = `<h3>Wiki para: ${term}</h3>`;
            data.query.search.forEach(item => {
                content.innerHTML += `<div class="result-item"><strong>${item.title}</strong><p>${item.snippet.replace(/<[^>]*>/g, '')}...</p></div>`;
            });
        }

        async function searchMusic(term) {
            const content = document.getElementById('modal-content');
            content.innerHTML = "Buscando músicas...";
            const url = `https://itunes.apple.com/search?term=${encodeURIComponent(term)}&media=music&limit=10`;
            const res = await fetch(url);
            const data = await res.json();
            content.innerHTML = `<h3>Músicas para: ${term}</h3>`;
            
            data.results.forEach((song) => {
                content.innerHTML += `
                    <div class="spotify-card">
                        <div class="play-btn-round" onclick="playTrack('${song.previewUrl}', '${song.trackName.replace(/'/g, "\\'")}', '${song.artistName.replace(/'/g, "\\'")}', '${song.artworkUrl100}')">
                            <i class="fas fa-play"></i>
                        </div>
                        <div>
                            <div>${song.trackName}</div>
                            <div style="font-size:0.8rem">${song.artistName}</div>
                        </div>
                        <i class="fas fa-external-link-alt" style="margin-left:auto" onclick="openStreamingModal('${song.trackName}', '${song.artistName}')"></i>
                    </div>
                `;
            });
        }

        function playTrack(url, name, artist, img) {
            audio.src = url;
            document.getElementById('player-name').innerText = name;
            document.getElementById('player-img').src = img;
            document.getElementById('player-bar').classList.add('active');
            audio.play();
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); } else { audio.pause(); }
        }

        function openStreamingModal(track, artist) {
            activeTrackName = track;
            activeArtistName = artist;
            document.getElementById('streaming-modal').style.display = 'flex';
        }

        function redirectTo(platform) {
            const query = `${activeTrackName} ${activeArtistName}`;
            let url = '';
            if (platform === 'itunes') url = `https://music.apple.com/search?term=${encodeURIComponent(query)}`;
            else if (platform === 'spotify') url = `https://open.spotify.com/search/${encodeURIComponent(query)}`;
            else if (platform === 'youtube') url = `https://music.youtube.com/search?q=${encodeURIComponent(query)}`;
            window.open(url, '_blank');
            document.getElementById('streaming-modal').style.display = 'none';
        }

        // Init Carousel
        const themes = [{ title: "Pop", subs: ["Michael Jackson", "Beyoncé"] }];
        themes.forEach(theme => {
            const container = document.getElementById('main-content');
            container.innerHTML += `<h2>${theme.title}</h2><div id="sec-1" class="carousel-container"></div>`;
            theme.subs.forEach(sub => {
                document.getElementById('sec-1').innerHTML += `<div class="card" onclick="openDetail('${sub}')"><div class="card-title">${sub}</div></div>`;
            });
        });
    </script>
</body>
</html>
