<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoreSpace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #8a2be2;
            --bg-color: #f8f8ff;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body { background-color: var(--bg-color); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; padding-bottom: 180px; }

        .view { display: none; }
        .view.active { display: block; }

        .search-container { display: flex; align-items: center; padding: 10px 20px; background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 30px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .search-input { flex-grow: 1; background: transparent; border: none; padding: 10px; color: var(--primary-color); outline: none; }
        .mic-btn, .search-btn { cursor: pointer; color: var(--primary-color); margin-left: 10px; font-size: 1.2rem; padding: 5px; }

        .lang-container { display: flex; gap: 8px; padding: 10px 20px; overflow-x: auto; background: white; border-bottom: 1px solid #eee; }
        .lang-btn { background: #f0f0f0; border: none; padding: 6px 14px; border-radius: 15px; cursor: pointer; color: var(--primary-color); font-weight: bold; font-size: 0.75rem; transition: all 0.3s; }
        .lang-btn.active { background: var(--primary-color); color: white; }

        .carousel-list { display: flex; flex-direction: column; gap: 40px; }
        .carousel-section h2 { color: var(--primary-color); margin-bottom: 15px; font-size: 1.2rem; padding-left: 10px; }
        .carousel-container { display: flex; overflow-x: auto; gap: 20px; padding: 10px; scrollbar-width: none; min-height: 250px; }
        
        .card { min-width: 180px; height: 250px; border-radius: 20px; background-size: cover; background-position: center; background-color: rgba(138, 43, 226, 0.1); transition: transform 0.3s ease; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid var(--glass-border); position: relative; display: flex; align-items: flex-end; overflow: hidden; }
        .card:hover { transform: scale(1.05); }
        .card-title { width: 100%; background: rgba(138, 43, 226, 0.8); backdrop-filter: blur(10px); color: white; padding: 8px; font-size: 0.8rem; font-weight: 600; text-align: center; }

        .modal-full { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; overflow-y: auto; color: #202124; }
        .modal-header { padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #dfe1e5; background: white; position: sticky; top: 0; z-index: 10; }
        
        .modal-tabbar { display: flex; gap: 25px; padding: 0 20px; background: white; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #eee; }
        .tab-item-modal { padding: 15px 0; cursor: pointer; color: #70757a; font-size: 1rem; position: relative; transition: color 0.3s ease; }
        .tab-item-modal:hover { color: var(--primary-color); }
        .tab-item-modal.active { color: #000; font-weight: 700; }
        .tab-item-modal.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background-color: var(--primary-color); }

        .modal-content-body { padding: 20px; max-width: 700px; margin: 0 auto; }
        .result-item { margin-bottom: 25px; padding: 15px; border-radius: 15px; background: #fdfdfd; border: 1px solid #eee; }
        .result-title { color: #1a0dab; font-size: 20px; margin-bottom: 5px; cursor: pointer; display: block; font-weight: bold; text-decoration: underline; }
        .result-snippet { line-height: 1.5; color: #4d5156; font-size: 14px; }

        .spotify-card { display: flex; align-items: center; padding: 10px; border-radius: 12px; transition: background 0.3s; margin-bottom: 8px; cursor: pointer; }
        .spotify-card:hover { background: rgba(138, 43, 226, 0.05); }
        .play-btn-round { background: var(--primary-color); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-size: 14px; box-shadow: 0 4px 10px rgba(138, 43, 226, 0.3); }
        .track-img { width: 50px; height: 50px; border-radius: 6px; margin-right: 15px; object-fit: cover; }
        .track-info { flex: 1; }
        .track-name { font-weight: 600; font-size: 15px; color: #121212; }
        .track-artist { font-size: 13px; color: #6a6a6a; margin-top: 2px; }
        .stream-icon { font-size: 1.2rem; color: var(--primary-color); padding: 10px; }

        .player-bar { position: fixed; bottom: 90px; left: 5%; width: 90%; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; display: none; align-items: center; padding: 10px; z-index: 1500; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .player-bar.active { display: flex; }
        .player-thumb { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; margin-right: 15px; }
        .player-info { flex: 1; font-size: 0.9rem; overflow: hidden; }
        
        .progress-wrapper { position: relative; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .progress-wrapper svg { transform: rotate(-90deg); position: absolute; width: 100%; height: 100%; }
        .progress-circle-bg { fill: none; stroke: rgba(0,0,0,0.1); stroke-width: 3; }
        .progress-circle-fill { fill: none; stroke: var(--primary-color); stroke-width: 3; stroke-dasharray: 125.6; stroke-dashoffset: 125.6; transition: stroke-dashoffset 0.1s linear; stroke-linecap: round; }
        .player-controls { font-size: 1.2rem; color: var(--primary-color); z-index: 1; }

        .edit-btn { background: var(--primary-color); color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; }

        .list-container { display: flex; flex-direction: column; gap: 10px; }
        .list-item { text-decoration: none; display: flex; align-items: center; padding: 18px 20px; background: var(--glass-bg); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid var(--glass-border); cursor: pointer; color: var(--primary-color); }
        .list-item i { margin-right: 15px; font-size: 1.2rem; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); z-index: 2000; align-items: center; justify-content: center; }
        .modal { width: 85%; max-width: 350px; background: white; padding: 25px; border-radius: 25px; border: 1px solid var(--glass-border); text-align: center; color: var(--primary-color); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        .tabbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 65px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .tab-item { padding: 10px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--primary-color); font-size: 1.3rem; }
        
        /* Botão central elevado */
        .tab-item-heart {
            width: 55px;
            height: 55px;
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
            margin-top: -40px;
            border: 5px solid var(--bg-color);
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .tab-item-heart:hover { transform: scale(1.1); }

        .voice-pulse { width: 100px; height: 100px; background: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(138, 43, 226, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(138, 43, 226, 0); } 100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(138, 43, 226, 0); } }
    </style>
</head>
<body>

    <div id="view-feed" class="view active">
        <div class="search-container">
            <input type="text" id="main-search" placeholder="Buscar no LoreSpace..." class="search-input" onkeypress="handleSearch(event)">
            <i class="fas fa-microphone mic-btn" onclick="startVoiceSearch()"></i>
            <i class="fas fa-search search-btn" onclick="triggerSearch()"></i>
        </div>
        <div class="carousel-list" id="main-content"></div>
    </div>

    <div id="voice-overlay" class="modal-overlay" style="display: none; z-index: 30000;">
        <div class="voice-pulse"><i class="fas fa-microphone"></i></div>
        <div style="color: white; margin-top: 20px; font-weight: bold;">Ouvindo...</div>
    </div>

    <div id="detail-modal" class="modal-full">
        <div class="modal-header">
            <i class="fas fa-arrow-left" onclick="closeDetail()" style="font-size: 1.2rem; cursor: pointer; margin-right: 20px;"></i>
            <span style="font-weight: 500;">Resultados da Busca</span>
        </div>
        
        <div class="lang-container" id="lang-selector">
            <button class="lang-btn active" onclick="setLanguage('pt', this)">PT</button>
            <button class="lang-btn" onclick="setLanguage('en', this)">EN</button>
            <button class="lang-btn" onclick="setLanguage('es', this)">ES</button>
            <button class="lang-btn" onclick="setLanguage('ja', this)">JA</button>
            <button class="lang-btn" onclick="setLanguage('zh', this)">ZH</button>
        </div>

        <div class="modal-tabbar">
            <div class="tab-item-modal active" onclick="changeTab('all', this)">Todos</div>
            <div class="tab-item-modal" onclick="changeTab('music', this)">Música</div>
        </div>
        <div id="modal-content" class="modal-content-body"></div>
    </div>

    <div id="wiki-preview-modal" class="modal-overlay" style="z-index: 20005; padding: 0;">
        <div class="tiktok-profile" style="width: 100%; height: 100%; background: var(--bg-color); overflow-y: auto;">
            <div id="preview-image-container" style="width: 100%; height: 250px; background-size: cover; background-position: center; position: relative;">
                <div style="position: absolute; top:0; left:0; width: 100%; height: 100%; background: rgba(138, 43, 226, 0.4);"></div>
                <i class="fas fa-arrow-left" onclick="closeWikiPreview()" style="position: absolute; top: 20px; left: 20px; font-size: 1.5rem; color: white; cursor: pointer; z-index: 10; text-shadow: 0 0 5px rgba(0,0,0,0.5);"></i>
            </div>
            
            <div style="padding: 20px; background: white; border-radius: 30px 30px 0 0; margin-top: -30px; min-height: 400px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05);">
                <h2 id="preview-title" style="margin: 0 0 20px 0; color: #333; text-align: center;">Título</h2>
                <div id="preview-content" style="color: #444; line-height: 1.6; font-size: 1rem; margin-bottom: 20px;">Carregando...</div>
                <a id="preview-link" href="#" target="_blank" class="edit-btn" style="display:block; text-align:center; text-decoration:none;">Ler artigo completo</a>
            </div>
        </div>
    </div>

    <div id="streaming-modal" class="modal-overlay" style="z-index: 10005;">
        <div class="modal">
            <h3>Ouvir em...</h3>
            <div class="list-item" onclick="redirectTo('itunes')"><i class="fas fa-music"></i> iTunes</div>
            <div class="list-item" onclick="redirectTo('spotify')"><i class="fab fa-spotify"></i> Spotify</div>
            <div class="list-item" onclick="redirectTo('youtube')"><i class="fab fa-youtube"></i> YouTube Music</div>
            <button class="edit-btn" onclick="closeStreamingModal()">Fechar</button>
        </div>
    </div>

    <div id="player-bar" class="player-bar">
        <img id="player-img" src="" class="player-thumb">
        <div class="player-info">
            <div id="player-name" style="font-weight: bold; font-size: 0.9rem;"></div>
            <div id="player-artist" style="font-size: 0.8rem; opacity: 0.7;"></div>
        </div>
        <div class="player-controls">
            <div class="progress-wrapper" onclick="togglePlay()">
                <svg>
                    <circle class="progress-circle-bg" cx="22.5" cy="22.5" r="20" />
                    <circle id="progress-circle" class="progress-circle-fill" cx="22.5" cy="22.5" r="20" />
                </svg>
                <i id="play-pause-icon" class="fas fa-pause"></i>
            </div>
        </div>
        <audio id="audio-element"></audio>
    </div>

    <div id="view-menu" class="view">
        <div class="list-container" style="padding: 20px;">
            <a href="pages/Abaut.html" class="list-item"><i class="fas fa-info-circle"></i> <span>About Us</span></a>
            <a href="pages/More/Playgraud/RetroHub.html" class="list-item"><i class="fas fa-gamepad"></i> <span>Games</span></a>
        </div>
    </div>

    <nav class="tabbar">
        <div class="tab-item" onclick="showView('view-feed')"><i class="fas fa-house"></i></div>
        <div class="tab-item-heart" onclick="console.log('Favoritos clicado')"><i class="fas fa-heart"></i></div>
        <div class="tab-item" onclick="showView('view-menu')"><i class="fas fa-bars"></i></div>
    </nav>

    <script>
        let currentTerm = '';
        let currentLang = 'pt';
        let currentActiveIcon = null; 
        let activeTrackName = '';
        let activeArtistName = '';
        const audio = document.getElementById('audio-element');
        const playerBar = document.getElementById('player-bar');
        const progressCircle = document.getElementById('progress-circle');
        const circumference = 2 * Math.PI * 20;

        progressCircle.style.strokeDasharray = circumference;

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pt-BR';

        function startVoiceSearch() {
            document.getElementById('voice-overlay').style.display = 'flex';
            recognition.start();
        }

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            document.getElementById('main-search').value = transcript;
            closeVoice();
            openDetail(transcript);
        };

        recognition.onend = () => closeVoice();
        function closeVoice() { document.getElementById('voice-overlay').style.display = 'none'; }
        
        function triggerSearch() {
            const term = document.getElementById('main-search').value;
            if(term) openDetail(term);
        }

        function setLanguage(lang, element) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            if (currentTerm) openDetail(currentTerm);
        }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const percent = audio.currentTime / audio.duration;
                const offset = circumference - (percent * circumference);
                progressCircle.style.strokeDashoffset = offset;
            }
        });

        audio.addEventListener('ended', () => {
            document.getElementById('play-pause-icon').className = 'fas fa-play';
            if (currentActiveIcon) currentActiveIcon.className = 'fas fa-play';
            progressCircle.style.strokeDashoffset = circumference;
        });

        function playTrack(url, name, artist, img, iconId) {
            document.querySelectorAll('.spotify-card i.fa-play, .spotify-card i.fa-pause').forEach(i => i.className = 'fas fa-play');
            const icon = document.getElementById(iconId);
            if(icon) icon.className = 'fas fa-pause';
            currentActiveIcon = icon;
            audio.src = url;
            document.getElementById('player-name').innerText = name;
            document.getElementById('player-artist').innerText = artist;
            document.getElementById('player-img').src = img;
            playerBar.classList.add('active');
            audio.play();
            document.getElementById('play-pause-icon').className = 'fas fa-pause';
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                document.getElementById('play-pause-icon').className = 'fas fa-pause';
                if (currentActiveIcon) currentActiveIcon.className = 'fas fa-pause';
            } else {
                audio.pause();
                document.getElementById('play-pause-icon').className = 'fas fa-play';
                if (currentActiveIcon) currentActiveIcon.className = 'fas fa-play';
            }
        }

        async function previewWiki(title, pageid) {
            document.getElementById('wiki-preview-modal').style.display = 'flex';
            document.getElementById('preview-title').innerText = title;
            document.getElementById('preview-content').innerText = "Carregando...";
            const imgContainer = document.getElementById('preview-image-container');
            imgContainer.style.backgroundImage = 'none';

            document.getElementById('preview-link').href = `https://${currentLang}.wikipedia.org/?curid=${pageid}`;
            try {
                const url = `https://${currentLang}.wikipedia.org/w/api.php?action=query&prop=extracts|pageimages&exintro&explaintext&pithumbsize=500&pageids=${pageid}&format=json&origin=*`;
                const res = await fetch(url);
                const data = await res.json();
                const page = data.query.pages[pageid];
                
                document.getElementById('preview-content').innerText = page.extract || "Sem descrição disponível.";
                
                if (page.thumbnail && page.thumbnail.source) {
                    imgContainer.style.backgroundImage = `url(${page.thumbnail.source})`;
                } else {
                    imgContainer.style.backgroundImage = 'linear-gradient(to bottom, #8a2be2, #4b0082)';
                }
            } catch (e) { 
                document.getElementById('preview-content').innerText = "Erro ao carregar prévia."; 
            }
        }

        function closeWikiPreview() { document.getElementById('wiki-preview-modal').style.display = 'none'; }

        function openStreamingModal(track, artist) {
            activeTrackName = track;
            activeArtistName = artist;
            document.getElementById('streaming-modal').style.display = 'flex';
        }

        function closeStreamingModal() { document.getElementById('streaming-modal').style.display = 'none'; }

        function redirectTo(platform) {
            const query = `${activeTrackName} ${activeArtistName}`;
            let url = '';
            if (platform === 'itunes') url = `https://music.apple.com/search?term=${encodeURIComponent(query)}`;
            else if (platform === 'spotify') url = `https://open.spotify.com/search/${encodeURIComponent(query)}`;
            else if (platform === 'youtube') url = `https://music.youtube.com/search?q=${encodeURIComponent(query)}`;
            window.open(url, '_blank');
            closeStreamingModal();
        }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function closeDetail() { document.getElementById('detail-modal').style.display = 'none'; }

        async function changeTab(type, el) {
            document.querySelectorAll('.tab-item-modal').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            if (type === 'music') searchMusic(currentTerm);
            else openDetail(currentTerm);
        }

        async function searchMusic(term) {
            const content = document.getElementById('modal-content');
            content.innerHTML = "Buscando música...";
            try {
                const url = `https://itunes.apple.com/search?term=${encodeURIComponent(term)}&media=music&limit=10`;
                const res = await fetch(url);
                const data = await res.json();
                content.innerHTML = `<h3>Resultados musicais para: ${term}</h3>`;
                if (data.results && data.results.length > 0) {
                    data.results.forEach((song, index) => {
                        const btnId = `btn-icon-${index}`;
                        content.innerHTML += `
                            <div class="spotify-card">
                                <div class="play-btn-round" onclick="playTrack('${song.previewUrl}', '${song.trackName.replace(/'/g, "\\'")}', '${song.artistName.replace(/'/g, "\\'")}', '${song.artworkUrl100}', '${btnId}')">
                                    <i class="fas fa-play" id="${btnId}"></i>
                                </div>
                                <img src="${song.artworkUrl100}" class="track-img">
                                <div class="track-info">
                                    <div class="track-name">${song.trackName}</div>
                                    <div class="track-artist">${song.artistName}</div>
                                </div>
                                <i class="fas fa-external-link-alt stream-icon" onclick="openStreamingModal('${song.trackName.replace(/'/g, "\\'")}', '${song.artistName.replace(/'/g, "\\'")}')"></i>
                            </div>
                        `;
                    });
                } else { content.innerHTML += `<p>Nenhuma música encontrada para: ${term}</p>`; }
            } catch (e) { content.innerHTML = "Erro ao carregar músicas."; }
        }

        async function openDetail(term) {
            currentTerm = term;
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('modal-content');
            modal.style.display = 'block';

            const isMusicTab = document.querySelectorAll('.tab-item-modal')[1].classList.contains('active');
            if (isMusicTab) {
                searchMusic(term);
                return;
            }

            content.innerHTML = "Pesquisando...";
            try {
                const url = `https://${currentLang}.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(term)}&format=json&origin=*`;
                const res = await fetch(url);
                const data = await res.json();
                content.innerHTML = `<h3>Resultados em ${currentLang.toUpperCase()} para: ${term}</h3>`;
                if(data.query.search && data.query.search.length > 0) {
                    data.query.search.forEach(item => {
                        content.innerHTML += `
                            <div class="result-item">
                                <div class="result-title" onclick="previewWiki('${item.title.replace(/'/g, "\\'")}', '${item.pageid}')">${item.title}</div>
                                <div class="result-snippet">${item.snippet}...</div>
                            </div>
                        `;
                    });
                } else { content.innerHTML = "Nenhum resultado encontrado."; }
            } catch (e) { content.innerHTML = "Erro ao buscar resultados."; }
        }

        function handleSearch(event) {
            if (event.key === 'Enter') {
                const term = document.getElementById('main-search').value;
                if(term) openDetail(term);
            }
        }

        // --- ESTRUTURA MANUAL DE CARDS ---
        const themes = [
            { 
                title: "Pop", 
                subs: [
                    { name: "Michael Jackson", img: "https://upload.wikimedia.org/wikipedia/commons/b/b9/Michael_Jackson_1983_%283x4_cropped%29_%28contrast%29.jpg" },
                    { name: "Madonna", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSUbJ6k-NIhWWGjGtFBEIPHmE5qQrG1AxLrFVzvciM90JQ8LccpehGckJMO&s=10" },
                    { name: "Beyoncé", img: "https://daqui.opopular.com.br/image/policy:1.3355363:1767054099/image.jpg" },
                    { name: "Taylor Swift", img: "https://m.media-amazon.com/images/M/MV5BYWYwYzYzMjUtNWE0MS00NmJlLTljNGMtNzliYjg5NzQ1OWY5XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg" },
                    { name: "Lady Gaga", img: "https://goldenglobes.com/wp-content/uploads/2023/10/lady_gaga_and_bradley_cooper_hfpa_venice_2018_00004_0.jpg?w=1155" },

            secDiv.innerHTML = `<h2>${theme.title}</h2><div class="carousel-container" id="sec-${index}"></div>`;
            mainContent.appendChild(secDiv);
            
            const container = document.getElementById(`sec-${index}`);
            theme.subs.forEach(sub => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.backgroundImage = `url('${sub.img}')`;
                card.innerHTML = `<div class="card-title">${sub.name}</div>`;
                card.onclick = () => openDetail(sub.name);
                container.appendChild(card);
