
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoreSpace | Music & Discovery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #8a2be2;
            --ghost-white: #f8f8ff;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body { 
            background-color: var(--ghost-white); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 20px; padding-bottom: 180px; 
            color: #333;
        }

        .view { display: none; }
        .view.active { display: block; }

        /* Estilo Glassmorphism para Search */
        .search-container { 
            display: flex; align-items: center; padding: 10px 20px; 
            background: var(--glass-bg); backdrop-filter: blur(15px); 
            border: 1px solid var(--glass-border); border-radius: 30px; 
            margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .search-input { 
            flex-grow: 1; background: transparent; border: none; 
            padding: 10px; color: var(--primary-color); outline: none; 
        }

        /* Carousel */
        .carousel-list { display: flex; flex-direction: column; gap: 40px; }
        .carousel-section h2 { color: var(--primary-color); margin-bottom: 15px; font-size: 1.2rem; }
        .carousel-container { display: flex; overflow-x: auto; gap: 20px; padding: 10px; scrollbar-width: none; min-height: 250px; }
        
        .card { 
            min-width: 180px; height: 250px; border-radius: 20px; 
            background-size: cover; background-position: center; 
            background-color: rgba(138, 43, 226, 0.1); 
            transition: transform 0.3s ease; cursor: pointer; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid var(--glass-border); 
            display: flex; align-items: flex-end; overflow: hidden; 
        }
        .card:hover { transform: scale(1.05); }
        .card-title { 
            width: 100%; background: rgba(138, 43, 226, 0.8); 
            backdrop-filter: blur(10px); color: white; padding: 8px; 
            font-size: 0.8rem; font-weight: 600; text-align: center; 
        }

        /* Modals e Resultados */
        .modal-full { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; overflow-y: auto; }
        .modal-header { padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #dfe1e5; position: sticky; top: 0; background: white; }
        .modal-tabbar { display: flex; gap: 25px; padding: 0 20px; border-bottom: 1px solid #eee; }
        .tab-item-modal { padding: 15px 0; cursor: pointer; color: #70757a; }
        .tab-item-modal.active { color: var(--primary-color); font-weight: 700; border-bottom: 2px solid var(--primary-color); }
        .modal-content-body { padding: 20px; max-width: 700px; margin: 0 auto; }
        
        /* Lista de Músicas */
        .spotify-card { display: flex; align-items: center; padding: 10px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; border: 1px solid #eee; }
        .play-btn-round { background: var(--primary-color); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; }
        .track-img { width: 50px; height: 50px; border-radius: 6px; margin-right: 15px; }
        
        /* Player */
        .player-bar { 
            position: fixed; bottom: 90px; left: 5%; width: 90%; 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); border-radius: 20px; 
            display: none; align-items: center; padding: 10px; z-index: 1500; 
        }
        .player-bar.active { display: flex; }
        .player-thumb { width: 45px; height: 45px; border-radius: 10px; margin-right: 15px; }

        /* Navigation */
        .tabbar { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 400px; height: 65px; 
            background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); border-radius: 35px; 
            display: flex; justify-content: space-around; align-items: center; z-index: 1000; 
        }
        .tab-item { cursor: pointer; color: var(--primary-color); font-size: 1.3rem; }
    </style>
</head>
<body>

    <div id="view-feed" class="view active">
        <div class="search-container">
            <input type="text" id="main-search" placeholder="Buscar no LoreSpace..." class="search-input" onkeypress="handleSearch(event)">
            <i class="fas fa-search"></i>
        </div>
        <div class="carousel-list" id="main-content"></div>
    </div>

    <div id="detail-modal" class="modal-full">
        <div class="modal-header">
            <i class="fas fa-arrow-left" onclick="closeDetail()" style="margin-right: 20px; cursor: pointer;"></i>
            <span>Resultados</span>
        </div>
        <div class="modal-tabbar">
            <div class="tab-item-modal active" onclick="changeTab('all', this)">Geral</div>
            <div class="tab-item-modal" onclick="changeTab('music', this)">Música</div>
        </div>
        <div id="modal-content" class="modal-content-body"></div>
    </div>

    <div id="player-bar" class="player-bar">
        <img id="player-img" src="" class="player-thumb">
        <div style="flex: 1;">
            <div id="player-name" style="font-weight: bold;"></div>
            <div id="player-artist" style="font-size: 0.8rem;"></div>
        </div>
        <div class="player-controls" onclick="togglePlay()">
            <i id="play-pause-icon" class="fas fa-pause"></i>
        </div>
        <audio id="audio-element"></audio>
    </div>

    <nav class="tabbar">
        <div class="tab-item" onclick="showView('view-feed')"><i class="fas fa-house"></i></div>
        <div class="tab-item" onclick="showView('view-notif')"><i class="fas fa-user"></i></div>
        <div class="tab-item" onclick="showView('view-menu')"><i class="fas fa-bars"></i></div>
    </nav>

    <div id="view-notif" class="view" style="padding: 20px;"><h3>Perfil</h3></div>
    <div id="view-menu" class="view" style="padding: 20px;"><h3>Menu</h3></div>

    <script>
        let currentTerm = '';
        const audio = document.getElementById('audio-element');

        function togglePlay() {
            if (audio.paused) { audio.play(); document.getElementById('play-pause-icon').className = 'fas fa-pause'; }
            else { audio.pause(); document.getElementById('play-pause-icon').className = 'fas fa-play'; }
        }

        function playTrack(url, name, artist, img) {
            audio.src = url;
            document.getElementById('player-name').innerText = name;
            document.getElementById('player-artist').innerText = artist;
            document.getElementById('player-img').src = img;
            document.getElementById('player-bar').classList.add('active');
            audio.play();
        }

        // --- JSONP Implementation para GitHub Pages ---
        async function searchMusic(term) {
            const content = document.getElementById('modal-content');
            content.innerHTML = "Buscando...";
            const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
            
            window[callbackName] = function(data) {
                content.innerHTML = `<h3>Música: ${term}</h3>`;
                if (data.results && data.results.length > 0) {
                    data.results.forEach(s => {
                        const trackName = (s.trackName || "Desconhecido").replace(/'/g, "\\'");
                        const artistName = (s.artistName || "Artista Desconhecido").replace(/'/g, "\\'");
                        content.innerHTML += `
                            <div class="spotify-card" onclick="playTrack('${s.previewUrl}', '${trackName}', '${artistName}', '${s.artworkUrl100}')">
                                <div class="play-btn-round"><i class="fas fa-play"></i></div>
                                <img src="${s.artworkUrl100}" class="track-img">
                                <div>
                                    <div class="track-name">${s.trackName}</div>
                                    <div class="track-artist">${s.artistName}</div>
                                </div>
                            </div>
                        `;
                    });
                } else { content.innerHTML += `<p>Nenhum resultado.</p>`; }
                document.body.removeChild(script);
                delete window[callbackName];
            };

            const script = document.createElement('script');
            script.src = `https://itunes.apple.com/search?term=${encodeURIComponent(term)}&media=music&limit=10&callback=${callbackName}`;
            document.body.appendChild(script);
        }

        async function openDetail(term) {
            currentTerm = term;
            document.getElementById('detail-modal').style.display = 'block';
            const content = document.getElementById('modal-content');
            content.innerHTML = "Buscando Wiki...";
            try {
                const res = await fetch(`https://pt.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(term)}&format=json&origin=*`);
                const data = await res.json();
                content.innerHTML = `<h3>Wiki: ${term}</h3>`;
                data.query.search.forEach(item => {
                    content.innerHTML += `<div class="result-item"><strong>${item.title}</strong><p>${item.snippet}...</p></div>`;
                });
            } catch (e) { content.innerHTML = "Erro ao buscar."; }
        }

        function closeDetail() { document.getElementById('detail-modal').style.display = 'none'; }
        function showView(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function handleSearch(e) { if (e.key === 'Enter') openDetail(e.target.value); }
        function changeTab(type, el) {
            document.querySelectorAll('.tab-item-modal').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            if (type === 'music') searchMusic(currentTerm);
            else openDetail(currentTerm);
        }

        // Init Carousel (Exemplos iniciais)
        const themes = [{title: "Pop", subs: ["Beyoncé", "Taylor Swift"]}, {title: "Rock", subs: ["Queen", "Nirvana"]}];
        themes.forEach((t, i) => {
            const container = document.createElement('section');
            container.innerHTML = `<h2>${t.title}</h2><div class="carousel-container" id="sec-${i}"></div>`;
            document.getElementById('main-content').appendChild(container);
            const target = document.getElementById(`sec-${i}`);
            t.subs.forEach(s => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="card-title">${s}</div>`;
                card.onclick = () => openDetail(s);
                target.appendChild(card);
            });
        });
    </script>
</body>
</html>
