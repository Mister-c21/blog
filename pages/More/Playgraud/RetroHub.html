<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>retroHub</title>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PV154KH2JQ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

       gtag('config', 'G-PV154KH2JQ');
   </script>
    
    <style>
        :root {
            --primary: #8a2be2;
            --primary-light: #a052ee;
            --text: #f8f8ff;
            --text-dim: #b0b0b0;
            --glass: rgba(138, 43, 226, 0.12);
            --glass-border: rgba(248, 248, 255, 0.08);
            --bg: #0a0a0c;
            --card-radius: 16px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden; user-select: none;
        }

        header {
            position: sticky; top: 0; background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(20px); z-index: 1000; padding: 15px 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .header-top { display: flex; align-items: center; justify-content: space-between; max-width: 1200px; margin: 0 auto; }
        
        /* Botão de navegação solicitado */
        .nav-btn { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            font-size: 1rem; font-weight: 600; color: var(--text); 
            display: flex; align-items: center; gap: 8px; 
            cursor: pointer; padding: 8px 16px; border-radius: 12px;
            transition: all 0.3s ease;
        }
        .nav-btn:hover { background: var(--primary); color: white; }

        .search-bar { flex: 1; max-width: 600px; margin: 0 20px; position: relative; display: flex; align-items: center; }
        .search-input {
            width: 100%; padding: 12px 20px 12px 45px; background: var(--glass);
            border: 1px solid transparent; border-radius: 12px; color: var(--text); outline: none;
        }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); opacity: 0.5; width: 18px; }
        
        /* Botão de voz e feedback */
        .voice-btn { cursor: pointer; background: none; border: none; color: var(--text); padding: 5px; position: absolute; right: 10px; }
        .voice-btn:hover { color: var(--primary); }

        #voiceOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 12, 0.95); z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .pulse { width: 100px; height: 100px; background: var(--primary); border-radius: 50%; animation: pulse-anim 1.5s infinite; }
        @keyframes pulse-anim { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 0.8; } 100% { transform: scale(0.8); opacity: 0.5; } }

        main { max-width: 1200px; margin: 0 auto; padding: 20px 0; }
        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; margin-bottom: 12px; }
        
        .carousel-container { position: relative; margin-bottom: 30px; }
        .carousel-track { display: flex; gap: 16px; overflow-x: auto; padding: 10px 20px 20px; scrollbar-width: none; }
        .carousel-track::-webkit-scrollbar { display: none; }

        .game-card { min-width: 140px; width: 140px; cursor: pointer; }
        .card-image-wrapper { width: 100%; aspect-ratio: 1/1; border-radius: var(--card-radius); overflow: hidden; background: var(--glass); margin-bottom: 8px; }
        .game-card img { width: 100%; height: 100%; object-fit: cover; }
        .title { font-size: 0.85rem; font-weight: 500; margin: 0; }
        .category { font-size: 0.75rem; color: var(--text-dim); }

        .list-mode .carousel-track { flex-direction: column; overflow-x: hidden; }
        .list-mode .game-card { display: flex; width: 100%; min-width: 100%; align-items: center; gap: 15px; padding: 10px 0; border-bottom: 1px solid var(--glass-border); }
        .list-mode .card-image-wrapper { width: 60px; height: 60px; min-width: 60px; margin-bottom: 0; }
        
        .btn-return { display: none; color: var(--primary); cursor: pointer; align-items: center; gap: 5px; font-weight: 600; margin-left: 20px; margin-bottom: 15px; }
        .list-mode-active .btn-return { display: flex; }
        .hidden-section { display: none !important; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: none; }
        .close-btn { position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 3001; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <a class="nav-btn" href="../../../../index.html">
                <i data-lucide="arrow-left"></i>
            </a>
            <div class="search-bar">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="gameSearch" class="search-input" placeholder="Pesquisar..." oninput="handleSearch()">
                <button class="voice-btn" onclick="startVoiceSearch()"><i data-lucide="mic"></i></button>
            </div>
        </div>
    </header>

    <div id="voiceOverlay"><div class="pulse"></div><p style="margin-top:20px;">Ouvindo...</p></div>

    <main id="mainContainerWrapper">
        <div id="btnReturn" class="btn-return" onclick="resetView()"><i data-lucide="chevron-left"></i> Voltar</div>
        <div id="mainContainer"></div>
    </main>

    <div id="gameModal" class="modal-overlay">
        <div class="close-btn" onclick="closeModal()"><i data-lucide="x"></i></div>
        <iframe id="gameEmbed" src="" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
    </div>

    <script>
        // Sistema de busca por voz com feedback
        function startVoiceSearch() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'pt-BR';
            const overlay = document.getElementById('voiceOverlay');
            
            // Feedback sonoro de início
            const startSpeech = new SpeechSynthesisUtterance("Estou a ouvir");
            startSpeech.lang = 'pt-BR';
            window.speechSynthesis.speak(startSpeech);
            
            overlay.style.display = 'flex';
            recognition.start();
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('gameSearch').value = transcript;
                handleSearch();
                overlay.style.display = 'none';
            };
            
            recognition.onend = () => overlay.style.display = 'none';
            recognition.onerror = () => overlay.style.display = 'none';
        }

        // --- Lógica original mantida ---
        const consoles = {
            "Populares no GBA": { key: "GBA", games: [
                { title: "Sonic Advance", url: "https://www.retrogames.cc/embed/28783-sonic-advance-j-independent.html" },
                { title: "Sonic Advance 2", url: "https://www.retrogames.cc/embed/28169-sonic-advance-2-j-eurasia.html" },
                { title: "Sonic Advance 3", url: "https://www.retrogames.cc/embed/19452-sonic-advance-3-e-trashman.html" },
                { title: "Sonic Battle", url: "https://www.retrogames.cc/embed/26763-sonic-battle-j-eurasia.html" },
                { title: "Mega Man Zero", url: "https://www.retrogames.cc/embed/19499-megaman-zero-u-venom.html" },
                { title: "Mega Man Zero 2", url: "https://www.retrogames.cc/embed/26254-megaman-zero-2-e-patience.html" },
                { title: "Mega Man Zero 3", url: "https://www.retrogames.cc/embed/19493-megaman-zero-3-e-rising-sun.html" },
                { title: "Mega Man Zero 4", url: "https://www.retrogames.cc/embed/28027-megaman-zero-4-e-supplex.html" }
            ]},
            "Ação no Nintendo DS": { key: "NDS", games: [
                { title: "Ben 10: Protector of Earth", url: "https://www.retrogames.cc/embed/36951-ben-10-protector-of-earth-europe-en-fr-de-es-it.html" },
                { title: "Ben 10: Alien Force", url: "https://www.retrogames.cc/embed/38112-ben-10-alien-force-usa-en-fr-de-es-it-rev-1.html" },
                { title: "Ben 10: Alien Force - Vilgax Attacks", url: "https://www.retrogames.cc/embed/39567-ben-10-alien-force-vilgax-attacks-europe-en-fr-de-es-it.html" },
                { title: "Ben 10 Ultimate Alien: Cosmic Destruction", url: "https://www.retrogames.cc/embed/42018-ben-10-ultimate-alien-cosmic-destruction-usa-en-fr-de-es-it.html"},
                { title: "Ben 10: Galactic Racing", url: "https://www.retrogames.cc/embed/46431-ben-10-galactic-racing-usa-en-fr-de-es-it.html" },
                { title: "Ben 10: Omniverse", url: "https://www.retrogames.cc/embed/42019-ben-10-omniverse-usa-en-fr-es.html" }
            ]},
            "Clássicos do SNES": { key: "SNES", games: [
                { title: "Mega Man X", url: "https://www.retrogames.cc/embed/18705-megaman-x-usa-rev-a.html" },
                { title: "Mega Man X2", url: "https://www.retrogames.cc/embed/19996-megaman-x2-usa.html" },
                { title: "Mega Man X3", url: "https://www.retrogames.cc/embed/22454-megaman-x3-europe.html" },
                { title: "Mega Man 7", url: "https://www.retrogames.cc/embed/16692-megaman-vii-usa.html" },
                { title: "Mega Man Soccer", url: "https://www.retrogames.cc/embed/22454-megaman-x3-europe.html" },
                { title: "Mega Man & Bass", url: "https://www.retrogames.cc/embed/43955-megaman-bass.html" }
            ]}
        };

        function renderSections(searchTerm = "") {
            const container = document.getElementById('mainContainer');
            container.innerHTML = "";
            Object.entries(consoles).forEach(([sectionTitle, data]) => {
                const filtered = data.games.filter(g => g.title.toLowerCase().includes(searchTerm.toLowerCase()));
                const displayList = filtered.slice(0, 5);
                if (displayList.length === 0) return;
                const section = document.createElement('section');
                section.className = 'carousel-container';
                section.id = `sec-${data.key}`;
                section.innerHTML = `
                    <div class="section-header">
                        <h2>${sectionTitle}</h2>
                        ${filtered.length > 5 ? `<span class="see-more" onclick="activateList('${data.key}')"><i data-lucide="chevron-right"></i></span>` : ''}
                    </div>
                    <div class="carousel-track" id="track-${data.key}"></div>
                `;
                container.appendChild(section);
                displayList.forEach((game, index) => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.onclick = () => openModal(game.url);
                    card.innerHTML = `<div class="card-image-wrapper"><img id="img-${data.key}-${index}" src="https://via.placeholder.com/180"></div><p class="title">${game.title}</p><p class="category">${data.key}</p>`;
                    document.getElementById(`track-${data.key}`).appendChild(card);
                    loadThumbnail(game.title, `img-${data.key}-${index}`);
                });
            });
            lucide.createIcons();
        }

        function activateList(key) {
            document.getElementById('mainContainerWrapper').classList.add('list-mode-active');
            document.querySelectorAll('.carousel-container').forEach(s => {
                if (s.id === `sec-${key}`) {
                    s.classList.add('list-mode');
                    s.querySelector('.see-more').style.display = 'none';
                    const track = s.querySelector('.carousel-track');
                    track.innerHTML = "";
                    const fullGameList = consoles[Object.keys(consoles).find(k => consoles[k].key === key)].games;
                    fullGameList.forEach((game, index) => {
                        const card = document.createElement('div');
                        card.className = 'game-card';
                        card.onclick = () => openModal(game.url);
                        card.innerHTML = `<div class="card-image-wrapper"><img id="list-img-${key}-${index}" src="https://via.placeholder.com/180"></div><p class="title">${game.title}</p><p class="category">${key}</p>`;
                        track.appendChild(card);
                        loadThumbnail(game.title, `list-img-${key}-${index}`);
                    });
                } else { s.classList.add('hidden-section'); }
            });
            window.scrollTo(0,0);
            lucide.createIcons();
        }

        function resetView() {
            document.getElementById('mainContainerWrapper').classList.remove('list-mode-active');
            renderSections(document.getElementById('gameSearch').value);
        }

        async function loadThumbnail(title, id) {
            try {
                const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
                const data = await res.json();
                if(data.originalimage) document.getElementById(id).src = data.originalimage.source;
            } catch(e) {}
        }

        function handleSearch() { 
            document.getElementById('mainContainerWrapper').classList.remove('list-mode-active');
            renderSections(document.getElementById('gameSearch').value); 
        }

        function openModal(url) { document.getElementById('gameEmbed').src = url; document.getElementById('gameModal').style.display = 'block'; }
        function closeModal() { document.getElementById('gameModal').style.display = 'none'; document.getElementById('gameEmbed').src = ""; }

        window.onload = () => { renderSections(); };
    </script>
</body>
</html>
