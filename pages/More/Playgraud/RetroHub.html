<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>retroHub</title>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PV154KH2JQ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PV154KH2JQ');
    </script>
    
    <style>
        :root {
            --primary: #8a2be2; 
            --primary-light: #a052ee;
            --text: #2d2d2d;
            --text-dim: #666666;
            --bg: #f8f8ff; 
            --glass: rgba(138, 43, 226, 0.1); 
            --glass-border: rgba(138, 43, 226, 0.2);
            --card-radius: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden; user-select: none;
        }

        header {
            position: sticky; top: 0; background: rgba(248, 248, 255, 0.85);
            backdrop-filter: blur(20px); z-index: 1000; padding: 15px 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .header-top { display: flex; align-items: center; justify-content: center; max-width: 1200px; margin: 0 auto; }
        
        .nav-btn { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            color: var(--text); display: flex; align-items: center; gap: 8px; 
            cursor: pointer; padding: 8px 16px; border-radius: 12px;
            transition: all 0.3s ease; text-decoration: none;
            flex-shrink: 0;
        }

        .search-bar { flex: 1; max-width: 600px; position: relative; display: flex; align-items: center; }
        .search-input {
            width: 100%; padding: 12px 20px 12px 45px; background: var(--glass);
            border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text); outline: none;
            backdrop-filter: blur(10px);
        }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); opacity: 0.5; width: 18px; }
        .voice-btn { cursor: pointer; background: none; border: none; color: var(--text); padding: 5px; position: absolute; right: 10px; }

        #voiceOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(248, 248, 255, 0.95); z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .pulse { width: 100px; height: 100px; background: var(--primary); border-radius: 50%; animation: pulse-anim 1.5s infinite; }
        @keyframes pulse-anim { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 0.8; } 100% { transform: scale(0.8); opacity: 0.5; } }

        main { max-width: 1200px; margin: 0 auto; padding: 20px 0; }
        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; margin-bottom: 12px; }
        
        .carousel-container { position: relative; margin-bottom: 30px; }
        .carousel-track { display: flex; gap: 16px; overflow-x: auto; padding: 10px 20px 20px; scrollbar-width: none; }
        .carousel-track::-webkit-scrollbar { display: none; }

        .game-card { min-width: 120px; width: 120px; cursor: pointer; transition: transform 0.2s; }
        .game-card:hover { transform: translateY(-5px); }
        
        .card-image-wrapper { 
            width: 100%; aspect-ratio: 2/3; border-radius: var(--card-radius); 
            overflow: hidden; background: var(--glass); margin-bottom: 8px;
            border: 1px solid var(--glass-border);
        }
        .game-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .title { font-size: 0.85rem; font-weight: 500; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .category { font-size: 0.75rem; color: var(--text-dim); }

        .list-modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 2500; display: none; flex-direction: column;
            overflow-x: hidden;
        }
        .list-modal-header { 
            padding: 15px; border-bottom: 1px solid var(--glass-border); 
            display: flex; align-items: center; gap: 10px; 
            background: rgba(248, 248, 255, 0.8); backdrop-filter: blur(10px); 
            width: 100%;
        }
        .list-modal-body { 
            flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px 20px; 
            width: 100%;
        }
        
        .vertical-item { 
            display: flex; align-items: center; gap: 15px; padding: 12px 0; 
            border-bottom: 1px solid var(--glass-border); cursor: pointer; 
            width: 100%;
        }
        .vertical-img { width: 50px; aspect-ratio: 2/3; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
        .vertical-info { flex: 1; min-width: 0; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; display: none; }
        .close-btn { position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 3001; cursor: pointer; color: var(--text); }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="search-bar">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="gameSearch" class="search-input" placeholder="Pesquisar..." onfocus="showListModal()" oninput="syncSearch(this.value)">
                <button class="voice-btn" onclick="startVoiceSearch('gameSearch')"><i data-lucide="mic"></i></button>
            </div>
        </div>
    </header>

    <div id="listModal" class="list-modal-overlay">
        <div class="list-modal-header">
            <div class="nav-btn" onclick="hideListModal()" style="padding: 8px 12px;"><i data-lucide="chevron-left"></i></div>
            <div class="search-bar" style="margin: 0; flex: 1;">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="modalSearchInput" class="search-input" placeholder="Buscar na lista..." oninput="syncSearch(this.value)">
                <button class="voice-btn" onclick="startVoiceSearch('modalSearchInput')"><i data-lucide="mic"></i></button>
            </div>
        </div>
        <div class="list-modal-body" id="listModalContent"></div>
    </div>

    <div id="voiceOverlay"><div class="pulse"></div><p style="margin-top:20px;">Ouvindo...</p></div>

    <main id="mainContainer"></main>

    <div id="gameModal" class="modal-overlay">
        <div class="close-btn" onclick="closeModal()"><i data-lucide="x"></i></div>
        <iframe id="gameEmbed" src="" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
    </div>

    <script type="module">
        import { consoles } from './games.js';

        let currentFilterKey = null;

        window.startVoiceSearch = function(targetId) {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'pt-BR';
            const overlay = document.getElementById('voiceOverlay');
            overlay.style.display = 'flex';
            recognition.start();
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                syncSearch(transcript);
                if (targetId === 'gameSearch') showListModal();
                overlay.style.display = 'none';
            };
            recognition.onend = () => overlay.style.display = 'none';
            recognition.onerror = () => overlay.style.display = 'none';
        }

        window.syncSearch = function(value) {
            document.getElementById('gameSearch').value = value;
            document.getElementById('modalSearchInput').value = value;
            window.updateListSearch(value, currentFilterKey);
        }

        window.showListModal = function(specificKey = null) {
            currentFilterKey = specificKey;
            document.getElementById('listModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            const term = specificKey ? "" : document.getElementById('gameSearch').value;
            syncSearch(term);
        }

        window.hideListModal = function() {
            document.getElementById('listModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            currentFilterKey = null;
            syncSearch("");
        }

        window.updateListSearch = function(term = "", keyFilter = null) {
            const content = document.getElementById('listModalContent');
            content.innerHTML = "";
            Object.entries(consoles).forEach(([sectionTitle, data]) => {
                if (keyFilter && data.key !== keyFilter) return;
                const filtered = data.games.filter(g => g.title.toLowerCase().includes(term.toLowerCase()));
                filtered.forEach(game => {
                    const item = document.createElement('div');
                    item.className = 'vertical-item';
                    item.onclick = () => window.openModal(game.url);
                    const img = (game.image && game.image.trim() !== "") ? game.image : "https://via.placeholder.com/150x225";
                    item.innerHTML = `
                        <img src="${img}" class="vertical-img">
                        <div class="vertical-info">
                            <p class="title">${game.title}</p>
                            <p class="category">${data.key}</p>
                        </div>
                    `;
                    content.appendChild(item);
                });
            });
        }

        window.renderSections = function() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = "";
            Object.entries(consoles).forEach(([sectionTitle, data]) => {
                const section = document.createElement('section');
                section.className = 'carousel-container';
                section.innerHTML = `
                    <div class="section-header">
                        <h2>${sectionTitle}</h2>
                        <span style="cursor:pointer" onclick="showListModal('${data.key}')"><i data-lucide="chevron-right"></i></span>
                    </div>
                    <div class="carousel-track" id="track-${data.key}"></div>
                `;
                container.appendChild(section);
                data.games.slice(0, 10).forEach((game) => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.onclick = () => window.openModal(game.url);
                    const img = (game.image && game.image.trim() !== "") ? game.image : "https://via.placeholder.com/150x225";
                    card.innerHTML = `<div class="card-image-wrapper"><img src="${img}" alt="${game.title}"></div><p class="title">${game.title}</p><p class="category">${data.key}</p>`;
                    document.getElementById(`track-${data.key}`).appendChild(card);
                });
            });
            lucide.createIcons();
        }

        window.openModal = function(url) { 
            document.getElementById('gameEmbed').src = url; 
            document.getElementById('gameModal').style.display = 'block'; 
        }
        window.closeModal = function() { 
            document.getElementById('gameModal').style.display = 'none'; 
            document.getElementById('gameEmbed').src = ""; 
        }

        window.addEventListener('load', () => { window.renderSections(); });
    </script>
</body>
</html>
