<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Puzzles - Orion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --primary-color: #8a2be2; 
            --ghost: #f8f8ff;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--ghost); padding: 20px; }

        .gx-mod-card {
            height: 120px;
            position: relative;
            cursor: pointer;
            overflow: hidden; 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), filter 0.3s ease;
            clip-path: polygon(15px 0%, 100% 0%, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0% 100%, 0% 15px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            outline: none;
            background-color: var(--primary-color);
        }
        
        .gx-mod-card:hover, .gx-mod-card:focus { transform: scale(1.05); filter: brightness(1.2); z-index: 10; }
        .gx-mod-card span, .gx-mod-card i { position: relative; z-index: 2; pointer-events: none; }
        .gx-mod-card i { font-size: 1.2rem; margin-bottom: 5px; }

        .promo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 800px;
            margin: 0 auto;
        }

        @media (min-width: 768px) { .promo-grid { grid-template-columns: repeat(4, 1fr); } }

        #modalContainer {
            position: fixed;
            top: 100%; left: 0; width: 100vw; height: 100vh;
            background: rgba(248, 248, 255, 0.95);
            backdrop-filter: blur(15px);
            z-index: 100;
            transition: top 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        #modalContainer.open { top: 0; }
    </style>
</head>
<body>

    <main class="py-10">
        <h1 class="text-center text-2xl font-bold text-[var(--primary-color)] mb-8">Escolha seu Puzzle</h1>
        
        <div class="promo-grid">
            <div class="gx-mod-card" tabindex="0" onclick="openModal('quebra-cabeca.html')">
                <i class="fas fa-puzzle-piece"></i> <span>QUEBRA-CABEÇA</span>
            </div>
            <div class="gx-mod-card" tabindex="0" onclick="openModal('memoria.html')">
                <i class="fas fa-th-large"></i> <span>MEMÓRIA</span>
            </div>
            <div class="gx-mod-card" tabindex="0" onclick="openModal('blocks.html')">
                <i class="fas fa-cubes"></i> <span>BLOCKS</span>
            </div>
            <div class="gx-mod-card" tabindex="0" onclick="openModal('arrows.html')">
                <i class="fas fa-arrows-alt"></i> <span>ARROWS</span>
            </div>
        </div>
    </main>

    <div id="modalContainer">
        <i class="fas fa-times absolute top-8 right-8 text-3xl text-[var(--primary-color)] cursor-pointer z-[101]" onclick="closeModal()"></i>
        <iframe id="modalIframe" class="w-full h-full border-none" src=""></iframe>
    </div>

    <script>
        function openModal(url) {
            const modal = document.getElementById('modalContainer');
            const iframe = document.getElementById('modalIframe');
            iframe.src = url;
            modal.classList.add('open');
        }

        function closeModal() {
            const modal = document.getElementById('modalContainer');
            modal.classList.remove('open');
            setTimeout(() => {
                document.getElementById('modalIframe').src = '';
            }, 500);
        }
    </script>
</body>
</html>
