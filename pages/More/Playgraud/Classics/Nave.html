<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Void Shooter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0;
            overflow: hidden;
            background: #050505;
            font-family: 'Segoe UI', Arial, sans-serif;
            touch-action: none;
            user-select: none;
        }
        canvas {
            display: block;
            background: rgba(15, 15, 25, 0.95);
            backdrop-filter: blur(12px);
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            font-size: 20px;
            z-index: 100;
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.9);
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 110;
        }
        button {
            background: rgba(138, 43, 226, 0.25);
            color: white;
            border: 2px solid rgba(138, 43, 226, 0.6);
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff3366;
            font-size: 52px;
            font-weight: bold;
            text-align: center;
            display: none;
            text-shadow: 0 0 25px #ff3366;
            z-index: 200;
        }
    </style>
</head>
<body>
    <div id="ui">Pontos: <span id="score">0</span></div>
    
    <canvas id="gameCanvas"></canvas>

    <!-- Controles Mobile -->
    <div id="controls">
        <button id="btnFire">🔥 ATIRAR</button>
    </div>

    <div id="gameOver">
        GAME OVER<br>
        <span style="font-size: 28px; color: #ddd;">Pontuação: <span id="finalScore">0</span></span><br><br>
        <span style="font-size: 22px; color: #aaa;">Toque na tela ou pressione R para jogar novamente</span>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const gameOverScreen = document.getElementById("gameOver");
        const finalScoreEl = document.getElementById("finalScore");
        const controls = document.getElementById("controls");
        const btnFire = document.getElementById("btnFire");

        let WIDTH, HEIGHT;

        function resize() {
            WIDTH = canvas.width = window.innerWidth;
            HEIGHT = canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        // Game variables
        const player = { x: WIDTH/2, y: HEIGHT - 90, size: 28, speed: 10 };
        let bullets = [], enemies = [], particles = [], stars = [];
        let score = 0;
        let gameRunning = true;
        let lastShot = 0;
        const shootCooldown = 160;

        const keys = {};
        let touchX = null;

        // Detectar mobile
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || 
                        (navigator.maxTouchPoints && navigator.maxTouchPoints > 2);

        if (isMobile) controls.style.display = "flex";

        // ====================== BACKGROUND ======================
        function createStars(n) {
            stars = [];
            for (let i = 0; i < n; i++) {
                stars.push({
                    x: Math.random() * WIDTH,
                    y: Math.random() * HEIGHT,
                    size: Math.random() * 2.2 + 0.7,
                    speed: Math.random() * 2.5 + 0.8
                });
            }
        }

        function createExplosion(x, y, count = 28, hue = 330) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const vel = Math.random() * 7 + 2;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * vel,
                    vy: Math.sin(angle) * vel,
                    life: 50 + Math.random() * 30,
                    size: Math.random() * 5 + 3,
                    color: `hsl(${hue}, 100%, 65%)`
                });
            }
        }

        // ====================== INPUT ======================
        window.addEventListener("keydown", e => {
            keys[e.key] = true;
            if ((e.key === "r" || e.key === "R") && !gameRunning) resetGame();
        });
        window.addEventListener("keyup", e => keys[e.key] = false);

        // Touch movement
        canvas.addEventListener("touchmove", e => {
            if (!gameRunning) return;
            touchX = e.touches[0].clientX;
            e.preventDefault();
        }, { passive: false });

        // Tap to shoot (anywhere on screen)
        canvas.addEventListener("touchstart", e => {
            if (!gameRunning) {
                resetGame();
                return;
            }
            shoot();
            e.preventDefault();
        });

        // Fire button (mobile)
        btnFire.addEventListener("touchstart", e => {
            e.preventDefault();
            shoot();
        });
        btnFire.addEventListener("mousedown", () => shoot());

        function shoot() {
            const now = Date.now();
            if (now - lastShot > shootCooldown) {
                bullets.push({
                    x: player.x,
                    y: player.y - 25,
                    speed: 15
                });
                lastShot = now;
            }
        }

        // ====================== GAME LOGIC ======================
        function update() {
            if (!gameRunning) return;

            // Keyboard
            if (keys["ArrowLeft"] || keys["a"] || keys["A"]) player.x -= player.speed;
            if (keys["ArrowRight"] || keys["d"] || keys["D"]) player.x += player.speed;

            // Touch movement
            if (touchX !== null) player.x = touchX;

            // Boundaries
            player.x = Math.max(player.size * 1.2, Math.min(WIDTH - player.size * 1.2, player.x));

            // Spawn enemies
            if (Math.random() < 0.028 + score * 0.00008) {
                enemies.push({
                    x: Math.random() * (WIDTH - 50) + 25,
                    y: -40,
                    size: 24,
                    speed: 2.8 + score / 7000
                });
            }

            // Update bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < -30) bullets.splice(i, 1);
            }

            // Update enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.y += e.speed;

                // Collision with player
                if (Math.hypot(e.x - player.x, e.y - player.y) < player.size + e.size - 5) {
                    createExplosion(player.x, player.y, 45, 0);
                    gameOver();
                    return;
                }

                // Off screen
                if (e.y > HEIGHT + 50) {
                    enemies.splice(i, 1);
                    continue;
                }

                // Collision with bullets
                for (let j = bullets.length - 1; j >= 0; j--) {
                    const b = bullets[j];
                    if (Math.hypot(b.x - e.x, b.y - e.y) < e.size + 8) {
                        createExplosion(e.x, e.y, 26, 160);
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        score += 10;
                        scoreEl.textContent = score;
                        break;
                    }
                }
            }

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.25;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        // ====================== DRAW ======================
        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            // Stars
            ctx.fillStyle = "#ffffff";
            for (let s of stars) {
                ctx.globalAlpha = s.y / HEIGHT * 0.9 + 0.3;
                ctx.fillRect(s.x, s.y, s.size, s.size);
                s.y += s.speed;
                if (s.y > HEIGHT) s.y = 0;
            }
            ctx.globalAlpha = 1;

            // Player
            ctx.shadowBlur = 30;
            ctx.shadowColor = "#8a2be2";
            ctx.fillStyle = "#8a2be2";
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - player.size);
            ctx.lineTo(player.x - player.size * 0.95, player.y + player.size * 0.85);
            ctx.lineTo(player.x + player.size * 0.95, player.y + player.size * 0.85);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;

            // Bullets
            ctx.shadowBlur = 18;
            ctx.shadowColor = "#77ffff";
            ctx.fillStyle = "#ccffff";
            for (let b of bullets) {
                ctx.fillRect(b.x - 3.5, b.y - 12, 7, 26);
            }
            ctx.shadowBlur = 0;

            // Enemies
            ctx.fillStyle = "#ff3366";
            for (let e of enemies) {
                ctx.save();
                ctx.translate(e.x, e.y);
                ctx.rotate(Math.sin(Date.now()/120) * 0.25);
                ctx.fillRect(-e.size*0.9, -e.size*0.75, e.size*1.8, e.size*1.5);
                ctx.restore();
            }

            // Particles
            for (let p of particles) {
                ctx.globalAlpha = p.life / 55;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
            }
            ctx.globalAlpha = 1;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            finalScoreEl.textContent = score;
            gameOverScreen.style.display = "block";
        }

        function resetGame() {
            bullets = [];
            enemies = [];
            particles = [];
            score = 0;
            player.x = WIDTH / 2;
            scoreEl.textContent = "0";
            gameOverScreen.style.display = "none";
            gameRunning = true;
            lastShot = 0;
        }

        // Init
        createStars(200);
        gameLoop();
    </script>
</body>
</html>
