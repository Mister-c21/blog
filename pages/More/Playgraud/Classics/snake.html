<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cobrinha</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Segoe UI', Arial, sans-serif;
            touch-action: none;
            user-select: none;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: #111;
            box-shadow: 0 0 30px rgba(0, 255, 100, 0.2);
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #0f0;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #0f0;
            z-index: 100;
            pointer-events: none;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff3366;
            font-size: 48px;
            text-align: center;
            display: none;
            z-index: 200;
            text-shadow: 0 0 20px #ff3366;
        }
        button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 20px;
            background: #0f0;
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ui">Pontos: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <div id="gameOver">
        GAME OVER<br>
        <span style="font-size: 28px; color: #ddd;">Pontuação: <span id="finalScore">0</span></span><br><br>
        <button onclick="resetGame()">JOGAR NOVAMENTE</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const gameOverScreen = document.getElementById("gameOver");
        const finalScoreEl = document.getElementById("finalScore");

        let grid = 20;
        let count = 0;
        let score = 0;

        let snake = [
            {x: 160, y: 160},
            {x: 140, y: 160},
            {x: 120, y: 160}
        ];

        let dx = grid;
        let dy = 0;

        let food = { x: 300, y: 300 };
        let gameRunning = true;
        let speed = 8; // quanto menor, mais rápido

        let WIDTH, HEIGHT;

        function resize() {
            WIDTH = canvas.width = Math.floor(window.innerWidth / grid) * grid;
            HEIGHT = canvas.height = Math.floor(window.innerHeight / grid) * grid;
        }
        window.addEventListener("resize", resize);
        resize();

        // Controles teclado
        document.addEventListener("keydown", e => {
            if (!gameRunning) {
                if (e.key === "r" || e.key === "R") resetGame();
                return;
            }

            switch (e.key) {
                case "ArrowUp":
                case "w":
                case "W":
                    if (dy === 0) { dx = 0; dy = -grid; }
                    break;
                case "ArrowDown":
                case "s":
                case "S":
                    if (dy === 0) { dx = 0; dy = grid; }
                    break;
                case "ArrowLeft":
                case "a":
                case "A":
                    if (dx === 0) { dx = -grid; dy = 0; }
                    break;
                case "ArrowRight":
                case "d":
                case "D":
                    if (dx === 0) { dx = grid; dy = 0; }
                    break;
            }
        });

        // Controles Swipe (Mobile)
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener("touchstart", e => {
            if (!gameRunning) {
                resetGame();
                return;
            }
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        });

        canvas.addEventListener("touchend", e => {
            if (!gameRunning) return;
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;

            let diffX = touchEndX - touchStartX;
            let diffY = touchEndY - touchStartY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                // Movimento horizontal
                if (diffX > 30 && dx === 0) { dx = grid; dy = 0; }
                else if (diffX < -30 && dx === 0) { dx = -grid; dy = 0; }
            } else {
                // Movimento vertical
                if (diffY > 30 && dy === 0) { dx = 0; dy = grid; }
                else if (diffY < -30 && dy === 0) { dx = 0; dy = -grid; }
            }
        });

        function randomFood() {
            food.x = Math.floor(Math.random() * (WIDTH / grid)) * grid;
            food.y = Math.floor(Math.random() * (HEIGHT / grid)) * grid;

            // Evita spawnar em cima da cobra
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    return randomFood();
                }
            }
        }

        function update() {
            if (!gameRunning) return;

            count++;
            if (count < speed) return;
            count = 0;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Colisão com parede
            if (head.x < 0 || head.x >= WIDTH || head.y < 0 || head.y >= HEIGHT) {
                gameOver();
                return;
            }

            // Colisão com o próprio corpo
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // Comeu a comida?
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                randomFood();

                // Aumenta velocidade a cada 50 pontos
                if (score % 50 === 0 && speed > 3) speed--;
            } else {
                snake.pop();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            // Grid sutil
            ctx.strokeStyle = "rgba(0, 255, 100, 0.05)";
            for (let x = 0; x < WIDTH; x += grid) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, HEIGHT);
                ctx.stroke();
            }
            for (let y = 0; y < HEIGHT; y += grid) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(WIDTH, y);
                ctx.stroke();
            }

            // Cobra
            snake.forEach((segment, i) => {
                ctx.fillStyle = i === 0 ? "#0f0" : "#0a0";
                ctx.fillRect(segment.x + 1, segment.y + 1, grid - 2, grid - 2);
                
                // Brilho na cabeça
                if (i === 0) {
                    ctx.fillStyle = "rgba(255,255,255,0.4)";
                    ctx.fillRect(segment.x + 5, segment.y + 5, 6, 6);
                }
            });

            // Comida
            ctx.fillStyle = "#f33";
            ctx.beginPath();
            ctx.arc(food.x + grid/2, food.y + grid/2, grid/2 - 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            finalScoreEl.textContent = score;
            gameOverScreen.style.display = "block";
        }

        function resetGame() {
            snake = [
                {x: 160, y: 160},
                {x: 140, y: 160},
                {x: 120, y: 160}
            ];
            dx = grid;
            dy = 0;
            score = 0;
            speed = 8;
            scoreEl.textContent = "0";
            gameOverScreen.style.display = "none";
            gameRunning = true;
            randomFood();
        }

        // Iniciar
        randomFood();
        gameLoop();
    </script>
</body>
</html>
