<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Breve</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a102f, #080314);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        .container {
            padding: 20px;
            z-index: 10;
        }

        /* Animação do Título */
        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ffffff, #b388ff, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        /* Animação do Subtítulo */
        p {
            font-size: 1.2rem;
            color: #d1c4e9;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 0.5s forwards;
        }

        /* Barra de Carregamento Animada */
        .loader-container {
            width: 250px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
        }

        .loader-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #b388ff, #ffffff);
            position: absolute;
            left: -100%;
            animation: loading 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* Definições das Animações */
        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes loading {
            0% {
                left: -100%;
            }
            50% {
                left: 0;
            }
            100% {
                left: 100%;
            }
        }

        /* Elementos flutuantes de fundo */
        .orbs {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 1;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            background: rgba(179, 136, 255, 0.08);
            filter: blur(80px);
            animation: float 8s ease-in-out infinite alternate;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            top: -50px;
            left: -50px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -100px;
            background: rgba(255, 255, 255, 0.03);
            animation-duration: 12s;
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="container">
        <h1>Em Breve</h1>
        <p>Estamos preparando algo incrível para você.</p>
        
        <div class="loader-container">
            <div class="loader-bar"></div>
        </div>
    </div>

</body>
</html>
