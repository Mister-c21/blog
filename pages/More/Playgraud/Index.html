<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoreSpace - Hub</title>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary-white: #FFFFFF;
            --violet-main: #8A2BE2;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(138, 43, 226, 0.2);
        }

        body {
            background: linear-gradient(135deg, #FFFFFF 0%, #F0F0F0 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow: hidden; /* Evita rolagem dupla com o iframe */
        }

        /* --- HEADER --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
            padding: 10px 0;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            margin-bottom: 10px;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--violet-main);
            margin: 0;
            text-transform: uppercase;
        }

        .nav-button {
            background: var(--violet-main);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(138, 43, 226, 0.3);
        }

        /* --- TOP TAB BAR --- */
        .top-tab-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .tab-item {
            font-size: 0.95rem;
            font-weight: 700;
            color: #888;
            cursor: pointer;
            position: relative;
            padding-bottom: 8px;
            transition: color 0.3s ease;
        }

        .tab-item.active {
            color: #000;
        }

        .tab-item.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 3px;
            background: var(--violet-main);
            border-radius: 10px;
        }

        /* --- CONTAINER DOS IFRAMES --- */
        #content-container {
            margin-top: 105px; /* Altura do header */
            height: calc(100vh - 105px);
            width: 100%;
            position: relative;
        }

        .tab-content {
            display: none;
            width: 100%;
            height: 100%;
            border: none;
        }

        .tab-content.active {
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <h1 class="page-title">LoreSpace</h1>
            <a href="index.html" class="nav-button">
                <i class="fas fa-house"></i>
            </a>
        </div>

        <div class="top-tab-bar">
            <div class="tab-item active" onclick="switchTab(this, 'retro-frame')">Retro</div>
            <div class="tab-item" onclick="switchTab(this, 'minigames-frame')">Mini-games</div>
        </div>
    </header>

    <main id="content-container">
        <!-- Iframe da Sessão Retro -->
        <div id="retro-frame" class="tab-content active">
            <iframe src="retro.html" title="Conteúdo Retro"></iframe>
        </div>

        <!-- Iframe da Sessão Mini-games -->
        <div id="minigames-frame" class="tab-content">
            <iframe src="minigames.html" title="Conteúdo Mini-games"></iframe>
        </div>
    </main>

    <script>
        function switchTab(element, frameId) {
            // Atualiza as abas visuais
            const tabs = document.querySelectorAll('.tab-item');
            tabs.forEach(tab => tab.classList.remove('active'));
            element.classList.add('active');

            // Atualiza a exibição dos containers de iframe
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(content => content.classList.remove('active'));
            document.getElementById(frameId).classList.add('active');
        }
    </script>

</body>
</html>
