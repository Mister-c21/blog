<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoreSpace Emulação</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #121212;
            padding-bottom: 20px;
            transition: background-color 0.5s ease, padding-left 0.5s ease, padding-bottom 0.5s ease;
        }

        body.modal-open {
            overflow: hidden !important;
            height: 100vh !important;
        }

        body.emulation-mode-active {
            background-color: #1a1a1a;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #ffffff;
            transition: background-image 1s ease-in-out, background-color 0.5s ease;
            padding-bottom: 80px; /* Dá espaço à barra inferior no mobile apenas no modo emulação */
        }

        /* ==========================================================================
           HEADER E BARRA DE PESQUISA
           ========================================================================== */
        .app-header {
            padding: 20px 16px 4px 16px;
            background-color: #ffffff;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.5s ease, border-color 0.5s ease, backdrop-filter 0.5s ease, left 0.5s ease;
        }

        body.emulation-mode-active .app-header {
            background-color: rgba(26, 26, 26, 0.6) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            position: relative;
            min-height: 32px;
        }

        .app-title {
            font-size: 24px;
            font-weight: 700;
            color: #121212;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            transition: opacity 0.2s ease-in-out, color 0.5s ease;
        }

        body.emulation-mode-active .app-title {
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        .nav-back-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #7b2cbf;
            cursor: pointer;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .nav-back-btn:hover {
            color: #9d4edd;
            background-color: #f8f5fc;
        }

        body.emulation-mode-active .nav-back-btn {
            color: #e0aaff;
        }
        body.emulation-mode-active .nav-back-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .search-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            width: 100%;
            max-height: 50px;
            opacity: 1;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), 
                        opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), 
                        margin-bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-row.hide-search {
            max-height: 0 !important;
            opacity: 0 !important;
            margin-bottom: 0 !important;
            pointer-events: none;
        }

        .search-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-input {
            width: 100%;
            padding: 10px 40px 10px 16px;
            font-size: 15px;
            border: 1.5px solid #e0aaff;
            border-radius: 24px;
            background-color: #f8f5fc;
            color: #121212;
            outline: none;
            transition: border-color 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease, color 0.3s ease;
        }

        .search-input:hover {
            border-color: #9d4edd;
            background-color: #f3e5f5;
        }

        .search-input:focus {
            border-color: #7b2cbf;
            background-color: #ffffff;
            box-shadow: 0 0 12px rgba(123, 44, 191, 0.4);
        }

        body.emulation-mode-active .search-input {
            border-color: rgba(224, 170, 255, 0.2);
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            backdrop-filter: blur(5px);
        }
        body.emulation-mode-active .search-input:focus {
            background-color: rgba(255, 255, 255, 0.2);
            border-color: rgba(224, 170, 255, 0.6);
            box-shadow: 0 0 12px rgba(224, 170, 255, 0.3);
        }
        body.emulation-mode-active .search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-input::placeholder {
            color: #a29bfe;
            opacity: 1;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s ease;
        }

        .search-input.fade-placeholder::placeholder {
            opacity: 0;
        }

        .clear-search-btn {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: #a29bfe;
            font-size: 16px;
            cursor: pointer;
            display: none;
            padding: 4px;
            outline: none;
        }

        .clear-search-btn:hover {
            color: #7b2cbf;
        }

        body.emulation-mode-active .clear-search-btn {
            color: rgba(255, 255, 255, 0.5);
        }
        body.emulation-mode-active .clear-search-btn:hover {
            color: #ffffff;
        }

        .vertical-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #7b2cbf;
            padding: 16px 16px 8px 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ==========================================================================
           ESTILO TIKTOK: TOP TAB BAR HORIZONTAL
           ========================================================================== */
        .tiktok-tab-container {
            display: flex;
            gap: 24px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 8px;
            background-color: transparent;
        }

        .tiktok-tab-container::-webkit-scrollbar {
            display: none;
        }

        .tiktok-tab {
            font-size: 16px;
            font-weight: 600;
            color: #757575;
            cursor: pointer;
            white-space: nowrap;
            position: relative;
            padding: 4px 0 8px 0;
            transition: color 0.3s ease;
            background: none;
            border: none;
            outline: none;
        }

        .tiktok-tab.active {
            color: #121212;
            font-weight: 700;
        }

        .tiktok-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 3px;
            background-color: #7b2cbf;
            border-radius: 2px;
            transition: background-color 0.3s ease;
        }

        body.emulation-mode-active .tiktok-tab {
            color: rgba(255, 255, 255, 0.6);
        }
        body.emulation-mode-active .tiktok-tab.active {
            color: #ffffff;
        }
        body.emulation-mode-active .tiktok-tab.active::after {
            background-color: #e0aaff;
        }

        /* ==========================================================================
           CONTAINER DE BOTÕES ARREDONDADOS DA EMULAÇÃO
           ========================================================================== */
        .horizontal-buttons-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 0 4px 4px 4px;
        }

        .horizontal-buttons-container::-webkit-scrollbar {
            display: none;
        }

        .rounded-filter-btn {
            background-color: #f8f5fc;
            color: #7b2cbf;
            border: 1px solid #e0aaff;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            outline: none;
            transition: all 0.3s ease;
        }

        .rounded-filter-btn:hover {
            background-color: #f3e5f5;
            border-color: #9d4edd;
        }

        .rounded-filter-btn.active {
            background-color: #7b2cbf;
            color: #ffffff;
            border-color: #7b2cbf;
        }

        body.emulation-mode-active .rounded-filter-btn {
            background-color: rgba(255, 255, 255, 0.08);
            color: #e0aaff;
            border: 1px solid rgba(224, 170, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        body.emulation-mode-active .rounded-filter-btn:hover {
            background-color: rgba(255, 255, 255, 0.15);
            border-color: rgba(224, 170, 255, 0.4);
            color: #ffffff;
        }
        body.emulation-mode-active .rounded-filter-btn.active {
            background-color: #7b2cbf;
            color: #ffffff;
            border-color: #7b2cbf;
            box-shadow: 0 0 10px rgba(123, 44, 191, 0.4);
        }

        /* ==========================================================================
           ESTADO VAZIO / SEM EMULADORES
           ========================================================================== */
        .empty-friends-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            text-align: center;
        }

        .empty-friends-state i.fa-gamepad {
            font-size: 56px;
            color: #9d4edd;
            margin-bottom: 16px;
        }

        .empty-friends-text {
            font-size: 15px;
            color: #757575;
            line-height: 1.5;
            max-width: 260px;
            font-weight: 500;
        }

        body.emulation-mode-active .empty-friends-state i.fa-gamepad {
            color: #e0aaff;
        }
        body.emulation-mode-active .empty-friends-text {
            color: rgba(255, 255, 255, 0.7);
        }

        /* ==========================================================================
           LISTA VERTICAL DE COMUNIDADES E CARDS DO LORESPACE
           ========================================================================== */
        .tiktok-vertical-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 4px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Container de grid para os jogos de emulação */
        .emulation-grid {
            display: grid !important;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 16px;
            width: 100%;
        }

        .vertical-community-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 12px;
            margin: 0 8px;
            transition: background-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
        }

        .vertical-community-item:hover {
            background-color: rgba(253, 251, 255, 0.9);
            box-shadow: 0 4px 12px rgba(157, 78, 221, 0.15);
            transform: translateY(-1px);
        }

        .vertical-community-item.hidden {
            display: none !important;
        }

        /* Novo estilo para os cards verticais de jogos (Emulação) */
        .emulation-game-card {
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 3 / 4; /* Proporção vertical de capa de jogo */
            cursor: pointer;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .emulation-game-card.hidden {
            display: none !important;
        }

        .emulation-game-card:hover {
            transform: translateY(-5px);
            border-color: rgba(224, 170, 255, 0.4);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4), 0 0 15px rgba(224, 170, 255, 0.2);
        }

        .emulation-card-media {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .emulation-cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .emulation-game-card:hover .emulation-cover-img {
            transform: scale(1.05);
        }

        /* Overlay escuro na base para legibilidade do título */
        .emulation-card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 24px 12px 12px 12px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.4) 60%, rgba(0, 0, 0, 0) 100%);
            z-index: 2;
        }

        .emulation-card-title {
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Lorespace Cards normais permanecem em lista horizontal estilo card */
        .vertical-community-item.lorespace-card {
            display: block;
            position: relative;
            height: 180px;
            border-radius: 16px;
            overflow: hidden;
            margin: 12px 16px;
            padding: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .vertical-community-item.lorespace-card .lorespace-bg-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .vertical-community-item.lorespace-card:hover .lorespace-bg-img {
            transform: scale(1.05);
        }

        .vertical-community-item.lorespace-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.2) 60%, rgba(0, 0, 0, 0) 100%);
            z-index: 1;
        }

        .vertical-community-item.lorespace-card .lorespace-title {
            position: absolute;
            bottom: 16px;
            left: 16px;
            right: 16px;
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            z-index: 2;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* ==========================================================================
           FAB (FLOATING ACTION BUTTON) VOLTAR AO TOPO
           ========================================================================== */
        .scroll-top-btn {
            position: fixed;
            bottom: 24px; 
            right: 24px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #7b2cbf;
            color: #ffffff;
            border: none;
            outline: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(123, 44, 191, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            z-index: 90;
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s ease, bottom 0.5s ease;
        }

        body.emulation-mode-active .scroll-top-btn {
            bottom: 80px; /* Evita sobreposição do Bottom Bar móvel */
        }

        .scroll-top-btn.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .scroll-top-btn:hover {
            background-color: #9d4edd;
        }

        /* ==========================================================================
           SESSÃO EXCLUSIVA DE EMULAÇÃO: BOTÕES DE PLATAFORMA
           ========================================================================== */
        .emulation-platforms-bar {
            display: none;
            padding: 10px 16px;
            border-bottom: 1px solid #f0f0f0;
            transition: border-color 0.5s ease, background-color 0.5s ease;
        }
        
        .emulation-platforms-bar.show-bar {
            display: block;
        }

        body.emulation-mode-active .emulation-platforms-bar {
            background-color: rgba(26, 26, 26, 0.6) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ==========================================================================
           MODAL DE IFRAME TELA CHEIA
           ========================================================================== */
        #iframeModal {
            position: fixed; 
            inset: 0; 
            z-index: 9999; 
            background-color: black;
            display: none; 
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateY(100%);
            border-radius: 0;
        }

        #iframeModal.active { 
            display: flex; 
            transform: translateY(0); 
        }

        #modal-drag-handle { 
            height: 25px; 
            max-width: 600px; 
            margin: 0 auto;   
            width: 100%;      
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: grab; 
            touch-action: none; 
            flex-shrink: 0; 
            background-color: #121212;
            border-bottom: 1px solid #222;
            position: relative;
        }

        .drag-pill { 
            width: 48px; 
            height: 6px; 
            background: rgba(255, 255, 255, 0.3); 
            border-radius: 9999px; 
        }

        .close-modal-btn {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            color: #ffffff;
            font-size: 20px;
            cursor: pointer;
            outline: none;
            display: none; 
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            transition: background-color 0.2s;
        }

        .close-modal-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .modal-iframe {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff;
        }

        /* ==========================================================================
           BOTTOM NAVIGATION BAR (MOBILE) -> SIDEBAR (DESKTOP)
           ========================================================================== */
        .app-navigation {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background-color: rgba(26, 26, 26, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: none; /* Oculto por padrão no LoreSpace */
            justify-content: space-around;
            align-items: center;
            z-index: 999;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all 0.5s ease;
        }

        /* Aparece apenas quando o modo emulação estiver ativo */
        body.emulation-mode-active .app-navigation {
            display: flex;
        }

        .nav-item {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            gap: 4px;
            transition: color 0.3s ease;
        }

        .nav-item i {
            font-size: 20px;
            transition: transform 0.2s ease;
        }

        .nav-item:hover i {
            transform: scale(1.08);
        }

        .nav-item:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        .nav-item.active {
            color: #e0aaff;
            font-weight: 700;
        }

        @media (min-width: 768px) {
            /* No desktop, o grid de emulação passa a ter 3 colunas */
            .emulation-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
                padding: 24px;
            }

            /* Garante que o estado vazio também se expanda para ocupar as 3 colunas */
            .empty-friends-state {
                grid-column: span 3 !important;
            }

            /* No desktop, se torna Sidebar apenas no modo emulação */
            body.emulation-mode-active .app-navigation {
                width: 70px;
                height: 100vh;
                top: 0;
                left: 0;
                bottom: auto;
                border-top: none;
                border-right: 1px solid rgba(255, 255, 255, 0.08);
                flex-direction: column;
                justify-content: flex-start;
                padding-top: 40px;
                gap: 32px;
                display: flex;
            }

            /* Desloca a tela para a direita apenas no modo emulação */
            body.emulation-mode-active {
                padding-left: 70px;
                padding-bottom: 20px;
            }

            body.emulation-mode-active .app-header {
                left: 70px; 
            }

            body.emulation-mode-active .scroll-top-btn {
                bottom: 24px;
            }

            .nav-item {
                flex: none;
                width: 100%;
                height: auto;
                padding: 12px 0;
            }

            .close-modal-btn {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <nav class="app-navigation">
        <a href="#" class="nav-item active">
            <i class="fas fa-gamepad"></i>
            <span>Emulação</span>
        </a>
        <a href="web.html" class="nav-item">
            <i class="fas fa-globe"></i>
            <span>Web</span>
        </a>
    </nav>

    <header class="app-header">
        <div class="title-row">
            <button class="nav-back-btn" onclick="window.location.href='../../../../index.html'">
                <i class="fas fa-chevron-left"></i>
            </button>
            <h1 class="app-title" id="appMainTitle">LoreSpace</h1>
        </div>
        
        <div class="search-row" id="searchRow">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Buscar comunidade">
                <button id="clearSearchBtn" class="clear-search-btn"><i class="fas fa-xmark"></i></button>
            </div>
        </div>
        
        <div class="tiktok-tab-container" id="tabContainer">
            <button class="tiktok-tab" data-filter="emulacao">Emulação</button>
            <button class="tiktok-tab active" data-filter="all">LoreSpace</button>
        </div>
    </header>

    <div id="emulationPlatformsBar" class="emulation-platforms-bar">
        <div class="horizontal-buttons-container" id="platformButtonsContainer"></div>
    </div>

    <h2 class="vertical-section-title" id="sectionTitle"></h2>
    
    <div class="tiktok-vertical-container" id="communitiesContainer"></div>

    <button id="scrollTopBtn" class="scroll-top-btn" onclick="scrollToTop()">
        <i class="fas fa-arrow-up"></i>
    </button>

    <div id="iframeModal">
        <div id="modal-drag-handle">
            <div class="drag-pill"></div>
            <button class="close-modal-btn" onclick="closeIframeModal()">
                <i class="fas fa-xmark"></i>
            </button>
        </div>
        <iframe id="modalIframe" class="modal-iframe" src="about:blank"></iframe>
    </div>

    <script type="module">
        import { consoles } from './games.js';

        const lorespaceCards = [
            {
                title: "Puzzle",
                image: "https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=600",
                url: "./Puzzle/Index.html"
            },
            {
                title: "Classics",
                image: "https://images.unsplash.com/photo-1605846840748-18c224a7cfd8?q=80&w=600",
                url: "./Classics/Index.html"
            },
            {
                title: "ClaudGamming",
                image: "https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=600",
                url: "esports.html"
            }
        ];

        // ARRAY ÚNICO E GLOBAL DE IMAGENS DE FUNDO PARA A SESSÃO EMULAÇÃO
        const emulationBackgrounds = [
            'https://static.wikia.nocookie.net/megaman/images/b/b0/MMXLCMain.jpg/revision/latest?cb=20251212225334',
            'https://cdn.shopify.com/s/files/1/1226/8792/files/Sleeve-3.jpg?v=1766420571',
            'https://static.wikia.nocookie.net/megaman/images/d/df/Mega_Man_ZX_complete_promo_art.jpg/revision/latest?cb=20200305034959',
            'https://images3.alphacoders.com/140/thumb-1920-1402545.png',
            'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEghSfHMpAl-3vP0dobSCO0k3-yqsiTYhHiLk1tjmo13HW7GITLRGQghv-PyFFlTxMnnORmdglTFGP9ZTCqsImmNMiETSaPX0dvupFETFKvzIrjMMGkJfn9vtrd9AXRk3caAsU8wHftl1qQ/s1600/megamanzx.jpg',
            'https://www.europanet.com.br/superposter/images/vejapordentro/107147/107147.jpg',
            'https://i.etsystatic.com/46045656/r/il/802057/5187468494/il_fullxfull.5187468494_7ebx.jpg',
            'https://images3.alphacoders.com/140/thumb-1920-1402545.png',
            'https://i.pinimg.com/736x/c2/95/84/c29584be3cc13f27c07d1614c3b8ebb6.jpg',
        ];

        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const communitiesContainer = document.getElementById('communitiesContainer');
        const sectionTitle = document.getElementById('sectionTitle');
        const searchRow = document.getElementById('searchRow');
        const appMainTitle = document.getElementById('appMainTitle');
        const tabs = document.querySelectorAll('.tiktok-tab');
        const scrollTopBtn = document.getElementById('scrollTopBtn');
        const emulationPlatformsBar = document.getElementById('emulationPlatformsBar');
        const platformButtonsContainer = document.getElementById('platformButtonsContainer');
        
        const iframeModal = document.getElementById('iframeModal');
        const modalIframe = document.getElementById('modalIframe');
        const handle = document.getElementById('modal-drag-handle');

        let currentFilter = 'all';
        let currentPlatform = Object.keys(consoles)[0] || 'todos'; 
        let touchStartY = 0;
        let isDragging = false;
        let emulacaoList = [];
        let platformFilters = [];

        // Controle da transição do fundo global
        let backgroundInterval = null;
        let currentBgIndex = 0;

        function initEmulationData() {
            if (typeof consoles === 'undefined') {
                console.warn("Aviso: Objeto 'consoles' não encontrado no arquivo games.js.");
                return;
            }

            emulacaoList = [];
            platformFilters = [];

            Object.keys(consoles).forEach(platformKey => {
                const consoleObj = consoles[platformKey];
                
                consoleObj.games.forEach(game => {
                    emulacaoList.push({
                        name: game.title,
                        platform: platformKey,
                        img: game.image,
                        url: game.url,
                        hasBadge: false
                    });
                });

                platformFilters.push({
                    id: platformKey,
                    label: platformKey
                });
            });

            if (platformFilters.length > 0 && currentPlatform === 'todos') {
                currentPlatform = platformFilters[0].id;
            }
        }

        window.openIframeModal = function(url) {
            modalIframe.src = url;
            iframeModal.style.display = 'flex';
            setTimeout(() => {
                iframeModal.classList.add('active');
            }, 10);
            document.body.classList.add('modal-open');
        }

        window.closeIframeModal = function() {
            iframeModal.style.transform = 'translateY(100%)';
            setTimeout(() => { 
                iframeModal.classList.remove('active'); 
                iframeModal.style.transform = ''; 
                iframeModal.style.display = 'none';
                document.body.classList.remove('modal-open'); 
                modalIframe.src = 'about:blank'; 
            }, 400);
        }

        handle.addEventListener('touchstart', (e) => { 
            touchStartY = e.touches[0].clientY; 
            isDragging = true; 
        }, { passive: true });

        handle.addEventListener('touchmove', (e) => { 
            if (!isDragging) return; 
            const diff = e.touches[0].clientY - touchStartY; 
            if (diff > 0) {
                iframeModal.style.transform = `translateY(${diff}px)`; 
            }
        }, { passive: true });

        handle.addEventListener('touchend', (e) => { 
            isDragging = false; 
            const diff = e.changedTouches[0].clientY - touchStartY; 
            if (diff > 100) {
                closeIframeModal();
            } else {
                iframeModal.style.transform = 'translateY(0)'; 
            }
        }, { passive: true });

        function renderPlatformButtons() {
            platformButtonsContainer.innerHTML = '';
            platformFilters.forEach(platform => {
                const btn = document.createElement('button');
                btn.className = `rounded-filter-btn ${platform.id === currentPlatform ? 'active' : ''}`;
                btn.textContent = platform.label;
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#platformButtonsContainer .rounded-filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentPlatform = platform.id;
                    
                    applyTabFilterOnly();
                });
                platformButtonsContainer.appendChild(btn);
            });
        }

        // CONTROLADOR DE ROTATIVIDADE COM ARRAY GLOBAL ÚNICO
        function updateEmulationBackground() {
            clearInterval(backgroundInterval);

            if (currentFilter === 'emulacao' && emulationBackgrounds.length > 0) {
                document.body.classList.add('emulation-mode-active');

                const changeBackground = () => {
                    const imgUrl = emulationBackgrounds[currentBgIndex];
                    document.body.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)), url('${imgUrl}')`;
                    currentBgIndex = (currentBgIndex + 1) % emulationBackgrounds.length;
                };

                changeBackground();
                backgroundInterval = setInterval(changeBackground, 7000);
            } else {
                document.body.classList.remove('emulation-mode-active');
                document.body.style.backgroundImage = 'none';
            }
        }

        window.addEventListener('scroll', () => {
            if (window.scrollY > 150) {
                scrollTopBtn.classList.add('show');
            } else {
                scrollTopBtn.classList.remove('show');
            }
        });

        window.scrollToTop = function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function fetchCommunities(query = '') {
            try {
                communitiesContainer.innerHTML = ''; 

                emulacaoList.forEach(item => {
                    createCommunityElement(item.name, item.img, 'emulacao', item.hasBadge, item.url, item.platform);
                });

                if (currentFilter !== 'emulacao') {
                    const filteredCards = lorespaceCards.filter(card => 
                        card.title.toLowerCase().includes(query.toLowerCase())
                    );

                    filteredCards.forEach(card => {
                        createCommunityElement(card.title, card.image, '', false, card.url);
                    });
                }

                applyTabFilterOnly();

            } catch (error) {
                console.error("Erro ao carregar dados: ", error);
                communitiesContainer.innerHTML = '<p style="padding: 16px; color: red;">Erro ao carregar sugestões.</p>';
            }
        }

        function createCommunityElement(name, imgUrl, category, hasBadge, targetUrl = null, platform = 'todos') {
            const item = document.createElement('div');
            item.setAttribute('data-category', category);
            item.setAttribute('data-platform', platform);

            if (category !== 'emulacao') {
                item.className = 'vertical-community-item lorespace-card';
                item.innerHTML = `
                    <img class="lorespace-bg-img" src="${imgUrl}" alt="${name}">
                    <span class="lorespace-title">${name}</span>
                `;
                item.addEventListener('click', () => { openIframeModal(targetUrl); });
            } else {
                // Estrutura em formato de Card Vertical com Capa Completa e Bordas Arredondadas
                item.className = 'emulation-game-card';
                item.innerHTML = `
                    <div class="emulation-card-media">
                        <img class="emulation-cover-img" src="${imgUrl}" alt="${name}">
                        <div class="emulation-card-overlay">
                            <span class="emulation-card-title">${name}</span>
                        </div>
                    </div>
                `;
                item.addEventListener('click', () => { openIframeModal(targetUrl); });
            }
            communitiesContainer.appendChild(item);
        }

        function filterEmulacaoLocal(query) {
            const communityItems = document.querySelectorAll('.emulation-game-card[data-category="emulacao"]');
            let visibleCount = 0;

            communityItems.forEach(item => {
                const name = item.querySelector('.emulation-card-title').textContent.toLowerCase();
                const itemPlatform = item.getAttribute('data-platform');
                
                const matchesQuery = name.includes(query.toLowerCase());
                const matchesPlatform = (currentPlatform === 'todos' || itemPlatform === currentPlatform);

                if (matchesQuery && matchesPlatform) {
                    item.classList.remove('hidden');
                    visibleCount++;
                } else {
                    item.classList.add('hidden');
                }
            });

            const existingEmptyState = communitiesContainer.querySelector('.empty-friends-state');
            if (visibleCount === 0 && (query.trim() !== '' || currentPlatform !== 'todos')) {
                if (!existingEmptyState) {
                    const emptyState = document.createElement('div');
                    emptyState.className = 'empty-friends-state';
                    emptyState.style.gridColumn = 'span 2'; // Garante centralização ideal no grid (no desktop isso se adaptará ao grid span 3 devido ao css)
                    emptyState.innerHTML = `
                        <i class="fas fa-gamepad"></i>
                        <p class="empty-friends-text">Nenhum emulador encontrado aqui.</p>
                    `;
                    communitiesContainer.appendChild(emptyState);
                }
            } else if (existingEmptyState) {
                existingEmptyState.remove();
            }
        }

        function applyTabFilterOnly() {
            const normalItems = document.querySelectorAll('.vertical-community-item');
            const gameCards = document.querySelectorAll('.emulation-game-card');
            
            if (currentFilter === 'emulacao') {
                sectionTitle.textContent = "";
                searchRow.classList.remove('hide-search');
                emulationPlatformsBar.classList.add('show-bar');
                
                // Transforma o container em Grid
                communitiesContainer.classList.add('emulation-grid');
                updateEmulationBackground();

                if (appMainTitle.textContent !== "Emulação") {
                    appMainTitle.style.opacity = 0;
                    setTimeout(() => { appMainTitle.textContent = "Emulação"; appMainTitle.style.opacity = 1; }, 150);
                }

                if (searchInput.placeholder !== "Buscar emulador") {
                    searchInput.classList.add('fade-placeholder');
                    setTimeout(() => { searchInput.placeholder = "Buscar emulador"; searchInput.classList.remove('fade-placeholder'); }, 150);
                }
                
                if (emulacaoList.length === 0) {
                    communitiesContainer.innerHTML = `<div class="empty-friends-state" style="grid-column: span 2;"><i class="fas fa-gamepad"></i><p class="empty-friends-text">Nenhum emulador disponível.</p></div>`;
                    return;
                }

                normalItems.forEach(item => item.classList.add('hidden'));
                gameCards.forEach(item => item.classList.remove('hidden'));

                filterEmulacaoLocal(searchInput.value.trim());
                return;
            } else {
                // Restaura o formato original em lista do LoreSpace
                communitiesContainer.classList.remove('emulation-grid');
                emulationPlatformsBar.classList.remove('show-bar');
                updateEmulationBackground();
                searchRow.classList.add('hide-search');
                sectionTitle.textContent = "";

                if (appMainTitle.textContent !== "LoreSpace") {
                    appMainTitle.style.opacity = 0;
                    setTimeout(() => { appMainTitle.textContent = "LoreSpace"; appMainTitle.style.opacity = 1; }, 150);
                }
            }

            const tempEmptyState = communitiesContainer.querySelector('.empty-friends-state');
            if (tempEmptyState) tempEmptyState.remove();

            gameCards.forEach(item => item.classList.add('hidden'));

            normalItems.forEach(item => {
                const communityCategory = item.getAttribute('data-category');
                if (currentFilter === 'all') {
                    if (communityCategory !== 'emulacao') item.classList.remove('hidden');
                    else item.classList.add('hidden');
                } else if (communityCategory === currentFilter) {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });
        }

        searchInput.addEventListener('input', () => {
            clearSearchBtn.style.display = searchInput.value.length > 0 ? 'block' : 'none';
            if (currentFilter === 'emulacao') filterEmulacaoLocal(searchInput.value.trim());
        });

        clearSearchBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearSearchBtn.style.display = 'none';
            if (currentFilter === 'emulacao') filterEmulacaoLocal('');
            else fetchCommunities('');
            searchInput.focus();
        });

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.getAttribute('data-filter');
                if (currentFilter !== 'emulacao') fetchCommunities(searchInput.value.trim());
                else applyTabFilterOnly();
            });
        });

        initEmulationData();
        renderPlatformButtons();
        fetchCommunities();
    </script>
</body>
</html>
