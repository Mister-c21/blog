<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playgraud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary-white: #FFFFFF;
            --violet-main: #8A2BE2;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(138, 43, 226, 0.2);
            --header-height: 105px;
        }

        body {
            background: linear-gradient(135deg, #FFFFFF 0%, #F0F0F0 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow: hidden; 
            transition: background 0.3s ease;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
            padding: 10px 0;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            margin-bottom: 10px;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--violet-main);
            margin: 0;
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .nav-button {
            background: var(--violet-main);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(138, 43, 226, 0.3);
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s ease;
        }

        .nav-button:hover {
            transform: scale(1.05);
        }

        .top-tab-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .tab-item {
            font-size: 0.95rem;
            font-weight: 700;
            color: #888;
            cursor: pointer;
            position: relative;
            padding-bottom: 8px;
            transition: color 0.3s ease;
        }

        .tab-item.active {
            color: #000;
        }

        .tab-item.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 3px;
            background: var(--violet-main);
            border-radius: 10px;
        }

        #content-container {
            margin-top: var(--header-height);
            height: calc(100vh - var(--header-height));
            width: 100%;
            position: relative;
            transition: margin-top 0.4s cubic-bezier(0.4, 0, 0.2, 1), height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: margin-top, height;
        }

        .tab-content {
            display: none;
            width: 100%;
            height: 100%;
            border: none;
        }

        .tab-content.active {
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .missions-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 2500;
            display: none;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(138, 43, 226, 0.15);
        }

        .missions-modal.active {
            display: block;
        }

        .modal-container {
            padding: 30px;
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* --- LAYOUT HEADER MODAL --- */
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
            position: relative;
            width: 100%;
            gap: 20px;
        }

        .modal-left-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-start;
            flex-shrink: 0;
            flex: 1;
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--violet-main);
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .modal-right-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
            max-width: 70%;
            justify-content: flex-end;
        }

        .user-status-container-right {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 16px;
            flex-wrap: wrap;
        }

        /* ESTILO INTERNO DAS TOPTABBARS DO MODAL (ESTILO TIKTOK) */
        .modal-tab-bar {
            display: flex;
            gap: 24px;
            margin-top: 5px;
        }

        .modal-tab-item {
            font-size: 1rem;
            font-weight: 700;
            color: rgba(22, 24, 35, 0.6);
            cursor: pointer;
            position: relative;
            padding-bottom: 6px;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .modal-tab-item:hover {
            color: rgba(22, 24, 35, 0.9);
        }

        .modal-tab-item.active {
            color: #161823;
            transform: scale(1.04);
        }

        .modal-tab-item.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #161823;
            border-radius: 2px;
        }

        .status-badge {
            font-size: 1.1rem;
            font-weight: 800;
            color: #161823;
            display: flex;
            flex-direction: column;
            gap: 1px;
            width: 100%;
        }

        .resource-badge {
            font-size: 0.95rem;
            font-weight: 800;
            color: #161823;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.03);
            padding: 6px 12px;
            border-radius: 20px;
            transition: background 0.2s ease;
            white-space: nowrap;
        }

        .resource-badge i {
            font-size: 0.95rem;
        }

        .label-text {
            font-size: 0.75rem;
            font-weight: 500;
            color: #73757c;
        }

        .level-progress-wrapper {
            width: 90%;
            max-width: 320px;
            height: 20px;
            background: #e0e0e0;
            border-radius: 12px;
            margin-top: 4px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
        }

        .progress-bar {
            height: 100%;
            background: var(--violet-main);
            width: 65%;
            border-radius: 12px;
        }

        .resource-badge i.fa-coins { color: #ffcc00; }
        .resource-badge i.fa-gem.crystal { color: #a200ff; }
        .resource-badge i.fa-gem.diamond { color: #00e5ff; }
        .resource-badge i.fa-gem.ruby { color: #ff1744; }
        .resource-badge i.fa-cube.lapis { color: #2979ff; }

        .close-modal-btn {
            background: rgba(138, 43, 226, 0.1);
            color: var(--violet-main);
            border: 1px solid rgba(138, 43, 226, 0.2);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .close-modal-btn:hover {
            background: var(--violet-main);
            color: white;
            transform: rotate(90deg);
        }

        @media (max-width: 1024px) {
            .modal-header {
                margin-top: 10px;
                flex-direction: column;
                align-items: stretch;
                gap: 15px;
            }
            .modal-right-section {
                max-width: 100%;
                justify-content: flex-start;
                align-items: flex-start;
            }
            .user-status-container-right {
                justify-content: flex-start;
                width: 100%;
                gap: 10px;
            }
            .level-progress-wrapper {
                width: 90%;
            }
            .close-modal-btn {
                position: absolute;
                top: 0;
                right: 0;
            }
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            color: #333;
        }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="header-top">
            <h1 class="page-title">Playgraud</h1>
            <div class="header-actions">
                <button class="nav-button" title="Missões" onclick="toggleMissionsModal(true)">
                    <i class="fas fa-gamepad"></i>
                </button>
                <a href="../../../../index.html" class="nav-button" title="Home">
                    <i class="fas fa-house"></i>
                </a>
            </div>
        </div>

        <div class="top-tab-bar">
            <div class="tab-item active" onclick="switchTab(this, 'retro-frame')">Retro</div>
            <div class="tab-item" onclick="switchTab(this, 'minigames-frame')">Mini-games</div>
            <div class="tab-item" onclick="switchTab(this, 'pet-frame')">Pet</div>
        </div>
    </header>

    <main id="content-container">
        <div id="retro-frame" class="tab-content active">
            <iframe src="RetroHub.html" title="Conteúdo Retro"></iframe>
        </div>
        <div id="minigames-frame" class="tab-content">
            <iframe src="Mini_games.html" title="Conteúdo Mini-games"></iframe>
        </div>
        <div id="pet-frame" class="tab-content">
            <iframe src="Pet.html" title="Conteúdo Pet"></iframe>
        </div>
    </main>

    <div class="missions-modal" id="missions-fullscreen-modal">
        <div class="modal-container">
            <div class="modal-header">
                <div class="modal-left-section">
                    <h2 class="modal-title"><i class="fas fa-trophy"></i> Missões</h2>
                    <div class="status-badge" title="Nível Atual">
                        <span style="display: flex; align-items: center; gap: 5px;">
                            <i class="fas fa-ranking-star"></i> 5
                        </span>
                        <span class="label-text">Nível</span>
                        <div class="level-progress-wrapper">
                            <div class="progress-bar"></div>
                        </div>
                    </div>
                </div>

                <div class="modal-right-section">
                    <div class="user-status-container-right">
                        <div class="resource-badge" title="Moedas">
                            <span style="display: flex; align-items: center; gap: 5px;">
                                <i class="fas fa-coins"></i> 350
                            </span>
                        </div>
                        <div class="resource-badge" title="Cristais">
                            <span style="display: flex; align-items: center; gap: 5px;">
                                <i class="fas fa-gem crystal"></i> 80
                            </span>
                        </div>
                        <div class="resource-badge" title="Diamantes">
                            <span style="display: flex; align-items: center; gap: 5px;">
                                <i class="fas fa-gem diamond"></i> 25
                            </span>
                        </div>
                        <div class="resource-badge" title="Rubis">
                            <span style="display: flex; align-items: center; gap: 5px;">
                                <i class="fas fa-gem ruby"></i> 12
                            </span>
                        </div>
                        <div class="resource-badge" title="Lápis-lazúli">
                            <span style="display: flex; align-items: center; gap: 5px;">
                                <i class="fas fa-cube lapis"></i> 150
                            </span>
                        </div>
                    </div>
                    
                    <div class="modal-tab-bar">
                        <div class="modal-tab-item active" onclick="switchModalTab(this)">Missões</div>
                        <div class="modal-tab-item" onclick="switchModalTab(this)">Loja</div>
                    </div>

                    <button class="close-modal-btn" onclick="toggleMissionsModal(false)">
                        <i class="fas fa-xmark"></i>
                    </button>
                </div>
            </div>
            <div class="modal-body"></div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('missions-fullscreen-modal');

        function toggleMissionsModal(open) {
            if (open) {
                modal.classList.add('active');
            } else {
                modal.classList.remove('active');
            }
        }

        function switchTab(el, id) {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function switchModalTab(el) {
            document.querySelectorAll('.modal-tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
