<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LoreSpace Snake Fullscreen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a051b;
            --blueviolet: #8a2be2;
            --blueviolet-glow: rgba(138, 43, 226, 0.5);
            --ghost: #f8f8ff;
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(12px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body {
            background: radial-gradient(circle at center, #1a0b36 0%, var(--bg-color) 100%);
            color: var(--ghost);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            padding: 10px;
        }

        /* Container expandido para ocupar quase toda a tela */
        .game-container {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            height: 100%;
            max-width: 500px;
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .canvas-area {
            position: relative;
            width: 100%;
            flex-grow: 1; /* Ocupa todo espaço restante */
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 20px var(--blueviolet-glow);
            border: 2px solid rgba(138, 43, 226, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            background: rgba(10, 5, 27, 0.85);
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 5, 27, 0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 20px; z-index: 10;
        }

        .overlay.hidden { opacity: 0; pointer-events: none; }

        .btn {
            background: var(--blueviolet);
            color: var(--ghost);
            border: none; padding: 15px 30px;
            border-radius: 12px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px var(--blueviolet-glow);
        }

        .controls {
            display: grid;
            grid-template-areas: ". up ." "left . right" ". down .";
            gap: 10px;
            margin-bottom: 10px;
        }

        .ctrl-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--ghost);
            width: 70px; height: 70px;
            border-radius: 16px; font-size: 1.5rem;
            display: flex; align-items: center; justify-content: center;
        }

        .ctrl-btn:active { background: var(--blueviolet); }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="scoreboard">
            <span><i class="fa-solid fa-trophy"></i> <span id="high-score">0</span></span>
            <span><i class="fa-solid fa-gamepad"></i> <span id="current-score">0</span></span>
        </div>

        <div class="canvas-area">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div id="gameOverlay" class="overlay">
                <h2>LoreSpace Snake</h2>
                <button id="startBtn" class="btn"><i class="fa-solid fa-play"></i> INICIAR</button>
            </div>
        </div>

        <div class="controls">
            <button class="ctrl-btn" style="grid-area: up;" data-dir="up"><i class="fa-solid fa-chevron-up"></i></button>
            <button class="ctrl-btn" style="grid-area: left;" data-dir="left"><i class="fa-solid fa-chevron-left"></i></button>
            <button class="ctrl-btn" style="grid-area: right;" data-dir="right"><i class="fa-solid fa-chevron-right"></i></button>
            <button class="ctrl-btn" style="grid-area: down;" data-dir="down"><i class="fa-solid fa-chevron-down"></i></button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const currentScoreEl = document.getElementById('current-score');
        const highScoreEl = document.getElementById('high-score');
        const overlay = document.getElementById('gameOverlay');
        const startBtn = document.getElementById('startBtn');

        const gridSize = 20;
        const tileCount = 20; // 400/20
        let snake = [], food = {x:0,y:0}, dx = gridSize, dy = 0, score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        highScoreEl.innerText = highScore;

        function initGame() {
            snake = [{x: 200, y: 200}, {x: 180, y: 200}, {x: 160, y: 200}];
            score = 0; dx = gridSize; dy = 0;
            currentScoreEl.innerText = score;
            generateFood();
            overlay.classList.add('hidden');
            clearInterval(window.gameInterval);
            window.gameInterval = setInterval(update, 100);
        }

        function update() {
            // Lógica de colisão
            if (snake[0].x < 0 || snake[0].x >= 400 || snake[0].y < 0 || snake[0].y >= 400) return gameOver();
            for(let i=1; i<snake.length; i++) if(snake[i].x === snake[0].x && snake[i].y === snake[0].y) return gameOver();

            ctx.fillStyle = "#0a051b"; ctx.fillRect(0,0,400,400);
            
            // Comida
            ctx.fillStyle = "#ff3366"; ctx.fillRect(food.x, food.y, gridSize-2, gridSize-2);

            // Cobra
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if(head.x === food.x && head.y === food.y) {
                score += 10; currentScoreEl.innerText = score;
                if(score > highScore) { highScore = score; localStorage.setItem('snakeHighScore', highScore); highScoreEl.innerText = highScore; }
                generateFood();
            } else snake.pop();

            ctx.fillStyle = "#8a2be2";
            snake.forEach(part => ctx.fillRect(part.x, part.y, gridSize-2, gridSize-2));
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount) * gridSize;
            food.y = Math.floor(Math.random() * tileCount) * gridSize;
        }

        function gameOver() { clearInterval(window.gameInterval); overlay.classList.remove('hidden'); }

        document.querySelectorAll('.ctrl-btn').forEach(b => b.addEventListener('pointerdown', (e) => {
            const dir = b.getAttribute('data-dir');
            if(dir === 'up' && dy === 0) { dx=0; dy=-gridSize; }
            if(dir === 'down' && dy === 0) { dx=0; dy=gridSize; }
            if(dir === 'left' && dx === 0) { dx=-gridSize; dy=0; }
            if(dir === 'right' && dx === 0) { dx=gridSize; dy=0; }
        }));

        startBtn.addEventListener('click', initGame);
    </script>
</body>
</html>
