<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Attack Mobile</title>
    <style>
        body { background: #0a0512; color: #F8F8FF; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; }
        #game-container { position: relative; width: 100%; max-width: 480px; height: 100vh; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }

        /* Estilo Vidro para Controles */
        .controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-around; padding: 0 20px; }
        .btn-control { 
            width: 70px; height: 70px; background: rgba(138, 43, 226, 0.3); 
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            color: white; font-weight: bold; font-size: 24px; user-select: none;
        }

        .ui-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(138, 43, 226, 0.2); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Controles Mobile -->
        <div id="touch-controls" class="controls hidden">
            <div class="btn-control" id="left-btn">◀</div>
            <div class="btn-control" id="shoot-btn">▲</div>
            <div class="btn-control" id="right-btn">▶</div>
        </div>

        <div id="start-menu" class="ui-overlay">
            <h1>SPACE ATTACK</h1>
            <button id="start-btn" style="padding:15px 30px; background:#8A2BE2; border:none; color:white; border-radius:10px;">JOGAR</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 480; canvas.height = 640;

        let gameActive = false, player = { x: 220, y: 550, w: 40, h: 40 }, bullets = [], enemies = [];
        let keys = { left: false, right: false };

        // Lógica de Controles
        const leftBtn = document.getElementById('left-btn');
        const rightBtn = document.getElementById('right-btn');
        const shootBtn = document.getElementById('shoot-btn');

        const setKey = (key, val) => keys[key] = val;
        
        leftBtn.onpointerdown = () => setKey('left', true);
        leftBtn.onpointerup = () => setKey('left', false);
        rightBtn.onpointerdown = () => setKey('right', true);
        rightBtn.onpointerup = () => setKey('right', false);
        shootBtn.onpointerdown = () => { if(gameActive) bullets.push({ x: player.x + 17, y: player.y }); };

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('start-menu').classList.add('hidden');
            document.getElementById('touch-controls').classList.remove('hidden');
            gameActive = true;
            gameLoop();
        };

        function gameLoop() {
            if (!gameActive) return;
            
            // Movimentação
            if (keys.left && player.x > 0) player.x -= 5;
            if (keys.right && player.x < canvas.width - player.w) player.x += 5;

            // Renderização simplificada
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Nave (Blueviolet)
            ctx.fillStyle = '#8A2BE2';
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Tiros (Ghost White)
            ctx.fillStyle = '#F8F8FF';
            bullets.forEach((b, i) => {
                b.y -= 7;
                ctx.fillRect(b.x, b.y, 6, 12);
                if (b.y < 0) bullets.splice(i, 1);
            });

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
