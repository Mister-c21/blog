<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Moderno</title>
    <style>
        :root {
            --bg-ghost: #f8f8ff; /* Ghost White */
            --primary-violet: #8a2be2; /* Blueviolet */
            --primary-light: #a450e6;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: rgba(138, 43, 226, 0.15);
            --text-dark: #2c2c35;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-ghost);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
            padding: 20px;
        }

        h1 {
            color: var(--primary-violet);
            margin-bottom: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Container estilo Vidro Semitransparente */
        .game-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 var(--glass-shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Tabuleiro do Sudoku */
        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            border: 3px solid var(--primary-violet);
            background-color: var(--text-dark);
            gap: 1px;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 1 / 1;
        }

        .cell {
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-dark);
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .cell input {
            width: 100%;
            height: 100%;
            border: none;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary-violet);
            background: transparent;
            outline: none;
        }

        /* Remove as setas padrão do input number */
        .cell input::-webkit-outer-spin-button,
        .cell input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .cell.initial {
            background-color: rgba(138, 43, 226, 0.08);
            color: var(--text-dark);
        }

        /* Bordas mais grossas para os blocos 3x3 */
        .sudoku-grid .cell:nth-child(3n) {
            border-right: 2px solid var(--primary-violet);
        }
        .sudoku-grid .cell:nth-child(9n) {
            border-right: none;
        }
        .sudoku-grid .cell:nth-child(n+19):nth-child(-n+27),
        .sudoku-grid .cell:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 2px solid var(--primary-violet);
        }

        /* Controles */
        .controls {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background-color: var(--primary-violet);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--primary-light);
        }

        button:active {
            transform: scale(0.98);
        }

        .message {
            font-weight: 600;
            height: 24px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Sudoku</h1>

    <div class="game-container">
        <div id="grid" class="sudoku-grid"></div>
        <div id="message" class="message"></div>
        <div class="controls">
            <button onclick="checkGame()">Verificar Resposta</button>
            <button onclick="resetGame()" style="background-color: #6c757d;">Reiniciar</button>
        </div>
    </div>

    <script>
        // Um tabuleiro estático simples para fins de demonstração (0 representa células vazias)
        const initialBoard = [
            [5, 3, 0, 0, 7, 0, 0, 0, 0],
            [6, 0, 0, 1, 9, 5, 0, 0, 0],
            [0, 9, 8, 0, 0, 0, 0, 6, 0],
            [8, 0, 0, 0, 6, 0, 0, 0, 3],
            [4, 0, 0, 8, 0, 3, 0, 0, 1],
            [7, 0, 0, 0, 2, 0, 0, 0, 6],
            [0, 6, 0, 0, 0, 0, 2, 8, 0],
            [0, 0, 0, 4, 1, 9, 0, 0, 5],
            [0, 0, 0, 0, 8, 0, 0, 7, 9]
        ];

        // Solução correspondente para validação rápida
        const solutionBoard = [
            [5, 3, 4, 6, 7, 8, 9, 1, 2],
            [6, 7, 2, 1, 9, 5, 3, 4, 8],
            [1, 9, 8, 3, 4, 2, 5, 6, 7],
            [8, 5, 9, 7, 6, 1, 4, 2, 3],
            [4, 2, 6, 8, 5, 3, 7, 9, 1],
            [7, 1, 3, 9, 2, 4, 8, 5, 6],
            [9, 6, 5, 4, 3, 7, 2, 8, 1],
            [2, 8, 7, 4, 1, 9, 6, 3, 5],
            [3, 4, 1, 2, 8, 6, 5, 7, 9]
        ];

        const gridElement = document.getElementById('grid');
        const messageElement = document.getElementById('message');

        function createGrid() {
            gridElement.innerHTML = '';
            messageElement.innerText = '';
            
            for (let row = 0; row < 9; row++) {
                for (let col = 0; col < 9; col++) {
                    const cellValue = initialBoard[row][col];
                    const cell = document.createElement('div');
                    cell.classList.add('cell');

                    if (cellValue !== 0) {
                        cell.innerText = cellValue;
                        cell.classList.add('initial');
                    } else {
                        const input = document.createElement('input');
                        input.type = 'number';
                        input.min = 1;
                        input.max = 9;
                        input.dataset.row = row;
                        input.dataset.col = col;
                        
                        // Garante que apenas um dígito de 1 a 9 seja digitado
                        input.addEventListener('input', function() {
                            if (this.value.length > 1) this.value = this.value.slice(0, 1);
                            if (this.value < 1 || this.value > 9) this.value = '';
                        });

                        cell.appendChild(input);
                    }
                    gridElement.appendChild(cell);
                }
            }
        }

        function checkGame() {
            const inputs = gridElement.querySelectorAll('input');
            let isComplete = true;
            let isCorrect = true;

            inputs.forEach(input => {
                const row = parseInt(input.dataset.row);
                const col = parseInt(input.dataset.col);
                const value = parseInt(input.value);

                if (isNaN(value)) {
                    isComplete = false;
                } else if (value !== solutionBoard[row][col]) {
                    isCorrect = false;
                }
            });

            if (!isComplete) {
                messageElement.style.color = '#e63946';
                messageElement.innerText = 'Ainda existem espaços em branco!';
            } else if (!isCorrect) {
                messageElement.style.color = '#e63946';
                messageElement.innerText = 'Alguns números estão incorretos. Tente de novo!';
            } else {
                messageElement.style.color = '#2a9d8f';
                messageElement.innerText = 'Parabéns! Você resolveu o Sudoku!';
            }
        }

        function resetGame() {
            createGrid();
        }

        // Inicializa o jogo ao carregar a página
        createGrid();
    </script>
</body>
</html>
