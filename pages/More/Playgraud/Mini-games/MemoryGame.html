<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Glow Memory</title>
    <style>
        :root {
            --bg-color: #0d081b;
            --violet-main: #8a2be2; /* blueviolet */
            --violet-glow: #9400d3;
            --ghost-white: rgba(248, 248, 255, 0.15);
            --ghost-border: rgba(248, 248, 255, 0.25);
            --glass-bg: rgba(138, 43, 226, 0.12);
            --glass-border: rgba(138, 43, 226, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #1e1233 0%, #0d081b 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #f8f8ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
            padding: 0;
        }

        .game-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            width: 100%;
            height: 100vh;
        }

        header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2vh;
            flex-shrink: 0;
        }

        h1 {
            font-size: clamp(20px, 4vw, 32px);
            font-weight: bold;
            text-shadow: 0 0 10px var(--violet-glow);
        }

        .btn-ghost {
            background: transparent;
            border: 2px solid var(--ghost-border);
            color: #f8f8ff;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: clamp(14px, 2vw, 18px);
        }

        .btn-ghost:hover {
            background: var(--ghost-white);
            border-color: #f8f8ff;
        }

        #memory-canvas {
            background: rgba(13, 8, 27, 0.6);
            border-radius: 0;
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
            display: block;
        }

        .win-message {
            margin-top: 2vh;
            font-size: clamp(16px, 3vw, 24px);
            color: #00ff7f;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,255,127,0.4);
            display: none;
            flex-shrink: 0;
        }

        /* --- Modal Estilo Pinterest Cobertura Total --- */
        .modal-theme {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(13, 8, 27, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
            overflow-y: auto;
            opacity: 1;
            pointer-events: all;
            transition: opacity 0.4s ease;
        }

        .modal-theme.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .modal-title {
            font-size: clamp(22px, 5vw, 36px);
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
            text-shadow: 0 0 15px var(--violet-glow);
        }

        .modal-subtitle {
            font-size: clamp(14px, 2.5vw, 18px);
            color: rgba(248, 248, 255, 0.6);
            margin-bottom: 24px;
            text-align: center;
        }

        /* Grid de 3 Colunas Vertical Estilo Pinterest */
        .pinterest-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            width: 100%;
            max-width: 800px;
            padding-bottom: 40px;
        }

        /* Card de Escolha */
        .theme-card {
            background: rgba(248, 248, 255, 0.05);
            border: 1px solid var(--glass-border);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Alturas variáveis simulando o feed assíncrono do Pinterest */
        .pinterest-grid .theme-card:nth-child(3n+1) { min-height: 170px; height: 24vh; }
        .pinterest-grid .theme-card:nth-child(3n+2) { min-height: 210px; height: 29vh; }
        .pinterest-grid .theme-card:nth-child(3n+3) { min-height: 140px; height: 19vh; }

        .theme-card:hover {
            transform: translateY(-5px);
            border-color: var(--violet-main);
            box-shadow: 0 10px 20px rgba(138, 43, 226, 0.3);
            background: rgba(248, 248, 255, 0.1);
        }

        .theme-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            flex-grow: 1;
            pointer-events: none;
            filter: grayscale(15%);
            transition: filter 0.3s ease;
        }

        .theme-card:hover img {
            filter: grayscale(0%);
        }

        .theme-card-title {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(13, 8, 27, 0.95));
            padding: 12px 8px 6px 8px;
            font-size: clamp(11px, 1.8vw, 14px);
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loading-text {
            grid-column: span 3;
            text-align: center;
            font-size: 18px;
            color: var(--violet-main);
            margin-top: 50px;
            text-shadow: 0 0 8px var(--violet-glow);
        }
    </style>
</head>
<body>

    <!-- Modal Inicial de Escolha de Temas -->
    <div class="modal-theme" id="theme-modal">
        <h2 class="modal-title">Escolha um Tema</h2>
        <p class="modal-subtitle">Selecione um anime para estampar e gerar as cartas do tabuleiro</p>
        <div class="pinterest-grid" id="grid-content">
            <div class="loading-text">Buscando animes na API...</div>
        </div>
    </div>

    <div class="game-container" id="container">
        <header id="game-header">
            <h1>Glow Memory</h1>
            <button class="btn-ghost" id="reset-btn">Temas</button>
        </header>

        <canvas id="memory-canvas"></canvas>
        
        <div class="win-message" id="win-txt">Você Venceu! 🎉</div>
    </div>

    <script>
        const container = document.getElementById('container');
        const header = document.getElementById('game-header');
        const canvas = document.getElementById('memory-canvas');
        const ctx = canvas.getContext('2d');
        const resetBtn = document.getElementById('reset-btn');
        const winTxt = document.getElementById('win-txt');
        
        const themeModal = document.getElementById('theme-modal');
        const gridContent = document.getElementById('grid-content');

        const COLS = 4;
        const ROWS = 4;
        const totalCards = COLS * ROWS;
        let cardWidth, cardHeight;

        let themeImages = [];
        let cards = [];
        let selectedCards = [];
        let lockBoard = false;
        let isWon = false;

        // Gerenciamento de Áudio do iTunes
        let bgMusic = null;

        async function fetchAudioFromITunes(animeTitle) {
            // Interrompe a faixa antiga se ela existir
            if (bgMusic) {
                bgMusic.pause();
                bgMusic = null;
            }

            // Limpa o termo limpando caracteres especiais comuns e foca na trilha sonora
            const cleanTitle = animeTitle.replace(/[^a-zA-Z0-9 ]/g, '');
            const url = `https://itunes.apple.com/search?term=${encodeURIComponent(cleanTitle + ' soundtrack')}&media=music&limit=5`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    // Seleciona o primeiro resultado válido com prévia de áudio
                    const track = data.results[0];
                    if (track.previewUrl) {
                        bgMusic = new Audio(track.previewUrl);
                        bgMusic.loop = true;
                        bgMusic.volume = 0.4; // Ajusta o som para não estourar
                        
                        // Executa o áudio tratando restrições de reprodução automática do navegador
                        bgMusic.play().catch(err => {
                            console.log("Aguardando clique do usuário para iniciar música tema.");
                        });
                    }
                }
            } catch (error) {
                console.log("Não foi possível carregar a música tema do iTunes:", error);
            }
        }

        // Requisição para a API AniList (GraphQL estável e rápido para navegadores)
        async function fetchThemes() {
            const query = `
            query {
                Page(page: 1, perPage: 12) {
                    media(sort: POPULARITY_DESC, type: ANIME) {
                        id
                        title { english romaji }
                        coverImage { large }
                        characters(perPage: 8, sort: ROLE) {
                            nodes {
                                image { large }
                            }
                        }
                    }
                }
            }`;

            try {
                const response = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ query: query })
                });
                const result = await response.json();
                renderThemeGrid(result.data.Page.media);
            } catch (error) {
                gridContent.innerHTML = `<div class="loading-text" style="color: #ff4500;">Erro ao conectar à API do catálogo. Verifique sua conexão.</div>`;
            }
        }

        function renderThemeGrid(animeList) {
            gridContent.innerHTML = "";
            animeList.forEach(anime => {
                // Filtra apenas animes que possuem quantidade suficiente de imagens de personagens para o jogo
                if (!anime.characters || anime.characters.nodes.length < 8) return;

                const card = document.createElement('div');
                card.className = 'theme-card';
                const titleStr = anime.title.english || anime.title.romaji;
                
                card.innerHTML = `
                    <img src="${anime.coverImage.large}" alt="${titleStr}">
                    <div class="theme-card-title">${titleStr}</div>
                `;
                
                card.addEventListener('click', () => selectTheme(anime.characters.nodes, titleStr));
                gridContent.appendChild(card);
            });
        }

        function selectTheme(characterNodes, animeTitle) {
            gridContent.innerHTML = `<div class="loading-text">Construindo cartas e buscando trilha de ${animeTitle}...</div>`;
            
            // Dispara a busca asincrônica da música no iTunes sem travar o tabuleiro
            fetchAudioFromITunes(animeTitle);

            themeImages = [];
            let loadedCount = 0;

            characterNodes.forEach((node) => {
                const img = new Image();
                img.crossOrigin = "anonymous"; // Evita problemas de segurança ao desenhar no Canvas
                img.src = node.image.large;
                img.onload = () => {
                    loadedCount++;
                    if (loadedCount === 8) {
                        themeModal.classList.add('hidden');
                        initGame();
                    }
                };
                themeImages.push(img);
            });
        }

        function resizeCanvas() {
            const paddingConst = 48; 
            const headerHeight = header.offsetHeight + parseFloat(window.getComputedStyle(header).marginBottom);
            const winTxtHeight = isWon ? winTxt.offsetHeight + parseFloat(window.getComputedStyle(winTxt).marginTop) : 0;
            
            const availableWidth = container.clientWidth - 48;
            const availableHeight = container.clientHeight - paddingConst - headerHeight - winTxtHeight;

            const size = Math.min(availableWidth, availableHeight);

            canvas.width = size;
            canvas.height = size;

            cardWidth = canvas.width / COLS;
            cardHeight = canvas.height / ROWS;

            draw();
        }

        function initGame() {
            isWon = false;
            winTxt.style.display = 'none';
            selectedCards = [];
            lockBoard = false;
            
            generateCards();
            resizeCanvas();
        }

        function generateCards() {
            cards = [];
            const indexes = [0, 1, 2, 3, 4, 5, 6, 7, 0, 1, 2, 3, 4, 5, 6, 7];
            
            for (let i = indexes.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indexes[i], indexes[j]] = [indexes[j], indexes[i]];
            }

            for (let i = 0; i < totalCards; i++) {
                cards.push({
                    id: i,
                    imageIndex: indexes[i],
                    isFlipped: false,
                    isMatched: false
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const cardPadding = canvas.width * 0.018; 
            const borderRadius = 0; 

            for (let i = 0; i < totalCards; i++) {
                const card = cards[i];
                const col = i % COLS;
                const row = Math.floor(i / COLS);
                const x = col * cardWidth;
                const y = row * cardHeight;

                const cx = x + cardPadding;
                const cy = y + cardPadding;
                const cw = cardWidth - cardPadding * 2;
                const ch = cardHeight - cardPadding * 2;

                if (card.isFlipped || card.isMatched) {
                    ctx.fillStyle = 'rgba(248, 248, 255, 0.08)';
                    ctx.beginPath();
                    ctx.roundRect(cx, cy, cw, ch, borderRadius);
                    ctx.fill();

                    const img = themeImages[card.imageIndex];
                    if (img && img.complete) {
                        ctx.save();
                        ctx.beginPath();
                        ctx.roundRect(cx, cy, cw, ch, borderRadius);
                        ctx.clip(); 
                        ctx.drawImage(img, cx, cy, cw, ch);
                        ctx.restore();
                    }

                    ctx.strokeStyle = card.isMatched ? '#00ff7f' : 'rgba(248, 248, 255, 0.4)';
                    ctx.lineWidth = Math.max(1.5, canvas.width * 0.006);
                    ctx.stroke();

                } else {
                    ctx.fillStyle = '#8a2be2'; 
                    ctx.beginPath();
                    ctx.roundRect(cx, cy, cw, ch, borderRadius);
                    ctx.fill();

                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
                    ctx.lineWidth = Math.max(1, canvas.width * 0.003);
                    ctx.stroke();

                    ctx.shadowColor = '#9400d3';
                    ctx.shadowBlur = 2;
                    ctx.shadowBlur = 0;
                }
            }
        }

        function handleInput(clientX, clientY) {
            // Garante que o áudio tente rodar caso tenha sido bloqueado pelo navegador inicialmente
            if (bgMusic && bgMusic.paused) {
                bgMusic.play().catch(() => {});
            }

            if (lockBoard || isWon) return;

            const rect = canvas.getBoundingClientRect();
            const canvasX = (clientX - rect.left) * (canvas.width / rect.width);
            const canvasY = (clientY - rect.top) * (canvas.height / rect.height);

            const col = Math.floor(canvasX / cardWidth);
            const row = Math.floor(canvasY / cardHeight);
            
            if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
                const clickedIndex = row * COLS + col;
                const card = cards[clickedIndex];

                if (card.isFlipped || card.isMatched) return;

                card.isFlipped = true;
                selectedCards.push(card);
                draw();

                if (selectedCards.length === 2) {
                    checkMatch();
                }
            }
        }

        function checkMatch() {
            lockBoard = true;
            const [card1, card2] = selectedCards;

            if (card1.imageIndex === card2.imageIndex) {
                card1.isMatched = true;
                card2.isMatched = true;
                resetTurn();
                checkWin();
            } else {
                setTimeout(() => {
                    card1.isFlipped = false;
                    card2.isFlipped = false;
                    resetTurn();
                }, 1000);
            }
        }

        function resetTurn() {
            selectedCards = [];
            lockBoard = false;
            draw();
        }

        function checkWin() {
            const allMatched = cards.every(card => card.isMatched);
            if (allMatched) {
                isWon = true;
                winTxt.style.display = 'block';
                resizeCanvas(); 
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            handleInput(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleInput(touch.clientX, touch.clientY);
        }, { passive: false });

        resetBtn.addEventListener('click', () => {
            themeModal.classList.remove('hidden');
            fetchThemes();
        });
        
        window.addEventListener('resize', resizeCanvas);

        // Inicialização primária disparando busca estruturada
        fetchThemes();
    </script>
</body>
</html>
