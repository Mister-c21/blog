<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Glow Memory</title>
    <style>
        :root {
            --bg-color: #0b071e;
            --violet-main: #8a2be2; /* blueviolet-color */
            --violet-glow: rgba(138, 43, 226, 0.65);
            --ghost-white: rgba(248, 248, 255, 0.15); /* ghost */
            --ghost-border: rgba(248, 248, 255, 0.25);
            --glass-bg: rgba(138, 43, 226, 0.12); /* vidro semitransparente */
            --glass-border: rgba(248, 248, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #150a2e 0%, #0b071e 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #f8f8ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
            padding: 0;
        }

        .game-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            width: 100%;
            height: 100vh;
        }

        header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2vh;
            flex-shrink: 0;
        }

        h1 {
            font-size: clamp(20px, 4vw, 32px);
            font-weight: bold;
            text-shadow: 0 0 10px var(--violet-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .timer-badge {
            font-size: clamp(14px, 2vw, 18px);
            font-weight: bold;
            background: rgba(248, 248, 255, 0.08);
            border: 1px solid var(--ghost-border);
            padding: 6px 12px;
            border-radius: 12px;
            text-shadow: 0 0 5px var(--violet-main);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-ghost {
            background: rgba(248, 248, 255, 0.05);
            border: 2px solid var(--ghost-border);
            color: #f8f8ff;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: clamp(14px, 2vw, 18px);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-ghost:hover {
            background: var(--ghost-white);
            border-color: #f8f8ff;
            box-shadow: 0 0 12px rgba(248, 248, 255, 0.2);
        }

        #memory-canvas {
            background: rgba(11, 7, 30, 0.8);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 0 25px rgba(0,0,0,0.8), 0 0 20px rgba(138, 43, 226, 0.15);
            display: block;
        }

        .win-message {
            margin-top: 2vh;
            font-size: clamp(16px, 3vw, 24px);
            color: #00ff7f;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0,255,127,0.5);
            display: none;
            flex-shrink: 0;
            align-items: center;
            gap: 16px;
        }

        .win-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- Modal Estilo Pinterest Cobertura Total --- */
        .modal-theme {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(11, 7, 30, 0.94);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
            overflow-y: auto;
            opacity: 1;
            pointer-events: all;
            transition: opacity 0.4s ease;
        }

        .modal-theme.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .modal-title {
            font-size: clamp(22px, 5vw, 36px);
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
            text-shadow: 0 0 15px var(--violet-main);
        }

        .modal-subtitle {
            font-size: clamp(14px, 2.5vw, 18px);
            color: rgba(248, 248, 255, 0.6);
            margin-bottom: 20px;
            text-align: center;
        }

        /* --- Estilização da Barra de Busca --- */
        .search-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 16px;
            position: relative;
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            padding: 14px 50px 14px 20px;
            background: rgba(248, 248, 255, 0.06);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: #f8f8ff;
            font-family: inherit;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            user-select: text;
            -webkit-user-select: text;
        }

        .search-input:focus {
            background: rgba(138, 43, 226, 0.15);
            border-color: var(--violet-main);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
        }

        .search-input::placeholder {
            color: rgba(248, 248, 255, 0.4);
        }

        .voice-btn {
            position: absolute;
            right: 15px;
            background: transparent;
            border: none;
            color: rgba(248, 248, 255, 0.6);
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border-radius: 50%;
        }

        .voice-btn:hover {
            color: #f8f8ff;
            transform: scale(1.1);
        }

        .voice-btn.listening {
            color: #ff4500;
            animation: pulse-mic 1.2s infinite ease-in-out;
            text-shadow: 0 0 10px #ff4500;
        }

        @keyframes pulse-mic {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 69, 0, 0.4); }
            70% { transform: scale(1.15); box-shadow: 0 0 0 10px rgba(255, 69, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 69, 0, 0); }
        }

        /* --- Container Horizontal de Opções de Dificuldade --- */
        .difficulty-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 30px;
            flex-shrink: 0;
        }

        .difficulty-btn {
            flex: 1;
            padding: 10px 16px;
            background: rgba(248, 248, 255, 0.04);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            color: rgba(248, 248, 255, 0.6);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            text-align: center;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .difficulty-btn:hover {
            background: rgba(248, 248, 255, 0.08);
            color: #f8f8ff;
            border-color: rgba(248, 248, 255, 0.4);
        }

        .difficulty-btn.active {
            background: rgba(138, 43, 226, 0.25);
            border-color: var(--violet-main);
            color: #f8f8ff;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
            text-shadow: 0 0 5px var(--violet-main);
        }

        /* Grid de 3 Colunas Vertical Estilo Pinterest */
        .pinterest-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            width: 100%;
            max-width: 800px;
            padding-bottom: 40px;
        }

        .theme-card {
            background: rgba(248, 248, 255, 0.04);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            border-radius: 8px;
        }

        .pinterest-grid .theme-card:nth-child(3n+1) { min-height: 170px; height: 24vh; }
        .pinterest-grid .theme-card:nth-child(3n+2) { min-height: 210px; height: 29vh; }
        .pinterest-grid .theme-card:nth-child(3n+3) { min-height: 140px; height: 19vh; }

        .theme-card:hover {
            transform: translateY(-5px);
            border-color: var(--violet-main);
            box-shadow: 0 10px 25px rgba(138, 43, 226, 0.4);
            background: rgba(248, 248, 255, 0.1);
        }

        .theme-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            flex-grow: 1;
            pointer-events: none;
            filter: grayscale(15%);
            transition: filter 0.3s ease;
        }

        .theme-card:hover img {
            filter: grayscale(0%);
        }

        .theme-card-title {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(11, 7, 30, 0.95));
            padding: 12px 8px 6px 8px;
            font-size: clamp(11px, 1.8vw, 14px);
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loading-text {
            grid-column: span 3;
            text-align: center;
            font-size: 18px;
            color: var(--violet-main);
            margin-top: 50px;
            text-shadow: 0 0 8px var(--violet-main);
        }

        .inline-icon {
            display: inline-block;
            vertical-align: middle;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <!-- Modal Inicial de Escolha de Temas -->
    <div class="modal-theme" id="theme-modal">
        <h2 class="modal-title">Escolha um Tema</h2>
        <p class="modal-subtitle">Selecione um anime para estampar e gerar as cartas do tabuleiro</p>
        
        <!-- Barra de busca com opção de voz -->
        <div class="search-container">
            <input type="text" id="anime-search" class="search-input" placeholder="Pesquisar anime de sua escolha..." autocomplete="off">
            <button id="voice-search-btn" class="voice-btn" title="Pesquisar por voz">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                    <path d="M19 10v1a7 7 0 0 1-14 0v-1"></path>
                    <line x1="12" x2="12" y1="19" y2="22"></line>
                </svg>
            </button>
        </div>

        <!-- Container Horizontal de Dificuldade -->
        <div class="difficulty-container">
            <button class="difficulty-btn active" data-mode="easy">Fácil (4x4)</button>
            <button class="difficulty-btn" data-mode="medium">Médio (6x4)</button>
            <button class="difficulty-btn" data-mode="hard">Difícil (6x6)</button>
        </div>

        <div class="pinterest-grid" id="grid-content">
            <div class="loading-text">Buscando animes na API...</div>
        </div>
    </div>

    <div class="game-container" id="container">
        <header id="game-header">
            <h1>
                <svg class="inline-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                    <polyline points="2 17 12 22 22 17"></polyline>
                    <polyline points="2 12 12 17 22 12"></polyline>
                </svg>
                Glow Memory
            </h1>
            <div class="header-controls">
                <div class="timer-badge" id="timer-display">
                    <svg class="inline-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <span id="timer-text">60s</span>
                </div>
                <button class="btn-ghost" id="reset-btn">
                    <svg class="inline-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    Temas
                </button>
            </div>
        </header>

        <canvas id="memory-canvas"></canvas>
        
        <div class="win-message" id="win-txt">
            <div class="win-controls">
                <svg class="inline-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path>
                    <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path>
                    <path d="M4 22h16"></path>
                    <path d="M10 14.66V17c0 .55-.45 1-1 1H4v2h16v-2h-5c-.55 0-1-.45-1-1v-2.34"></path>
                    <path d="M12 2a6.45 6.45 0 0 1 6 6.5c0 3.55-2.61 5.5-6 5.5s-6-1.95-6-5.5A6.45 6.45 0 0 1 12 2Z"></path>
                </svg>
                <span id="win-message-text">Você Venceu!</span>
            </div>
            <button class="btn-ghost" id="share-btn" style="border-color: #00ff7f; color: #00ff7f;">
                <svg class="inline-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="18" cy="5" r="3"></circle>
                    <circle cx="6" cy="12" r="3"></circle>
                    <circle cx="18" cy="19" r="3"></circle>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                </svg>
                Compartilhar Time
            </button>
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        const header = document.getElementById('game-header');
        const canvas = document.getElementById('memory-canvas');
        const ctx = canvas.getContext('2d');
        const resetBtn = document.getElementById('reset-btn');
        const shareBtn = document.getElementById('share-btn');
        const winTxt = document.getElementById('win-txt');
        const winMessageText = document.getElementById('win-message-text');
        const timerDisplay = document.getElementById('timer-display');
        const timerText = document.getElementById('timer-text');
        
        const themeModal = document.getElementById('theme-modal');
        const gridContent = document.getElementById('grid-content');
        const animeSearch = document.getElementById('anime-search');
        const voiceSearchBtn = document.getElementById('voice-search-btn');
        const difficultyButtons = document.querySelectorAll('.difficulty-btn');

        // Configurações padrão de Dificuldade (Fácil)
        let COLS = 4;
        let ROWS = 4;
        let initialTime = 60;
        let totalCards = COLS * ROWS;
        let cardWidth, cardHeight;

        let themeImages = [];
        let cards = [];
        let selectedCards = [];
        let lockBoard = false;
        let isWon = false;

        let activeThemeCoverUrl = "";
        let activeThemeTitle = "";

        let timer = 60;
        let timerInterval = null;
        let isTimeOut = false;

        let particles = [];
        let mouseX = -1000;
        let mouseY = -1000;

        let bgMusic = null;
        let searchTimeout = null;

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.radius = Math.random() * 4 + 2;
                this.color = color;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.015;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function spawnParticles(x, y, color) {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // Event Listeners das Opções de Dificuldade
        difficultyButtons.forEach(button => {
            button.addEventListener('click', () => {
                difficultyButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                
                const mode = button.getAttribute('data-mode');
                if (mode === 'easy') {
                    COLS = 4; ROWS = 4; initialTime = 60;
                } else if (mode === 'medium') {
                    COLS = 6; ROWS = 4; initialTime = 50;
                } else if (mode === 'hard') {
                    COLS = 6; ROWS = 6; initialTime = 40;
                }
                totalCards = COLS * ROWS;
            });
        });

        function startTimer() {
            clearInterval(timerInterval);
            timer = initialTime;
            isTimeOut = false;
            timerText.textContent = timer + 's';
            timerDisplay.style.color = '#f8f8ff';
            timerDisplay.style.textShadow = '0 0 5px var(--violet-main)';
            
            timerInterval = setInterval(() => {
                if (isWon || lockBoard || isTimeOut) return;
                timer--;
                timerText.textContent = timer + 's';
                
                if (timer <= 10) {
                    timerDisplay.style.color = '#ff4500';
                    timerDisplay.style.textShadow = '0 0 10px #ff4500';
                }
                
                if (timer <= 0) {
                    clearInterval(timerInterval);
                    handleTimeOut();
                }
            }, 1000);
        }

        function handleTimeOut() {
            isTimeOut = true;
            lockBoard = true;
            winMessageText.textContent = "Tempo Esgotado!";
            winTxt.style.color = "#ff4500";
            winTxt.style.textShadow = "0 0 10px rgba(255, 69, 0, 0.4)";
            shareBtn.style.display = 'none'; 
            winTxt.style.display = 'flex';
            
            cards.forEach(card => {
                if (!card.isMatched) {
                    card.isFlipped = true;
                }
            });
            resizeCanvas();
        }

        async function fetchAudioFromITunes(animeTitle) {
            if (bgMusic) {
                bgMusic.pause();
                bgMusic = null;
            }

            const cleanTitle = animeTitle.replace(/[^a-zA-Z0-9 ]/g, '');
            const url = `https://itunes.apple.com/search?term=${encodeURIComponent(cleanTitle + ' soundtrack')}&media=music&limit=5`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    const track = data.results[0];
                    if (track.previewUrl) {
                        bgMusic = new Audio(track.previewUrl);
                        bgMusic.loop = true;
                        bgMusic.volume = 0.4;
                        
                        bgMusic.play().catch(err => {
                            console.log("Aguardando clique do usuário para iniciar música tema.");
                        });
                    }
                }
            } catch (error) {
                console.log("Não foi possível carregar a música tema do iTunes:", error);
            }
        }

        async function fetchThemes(searchQuery = '') {
            gridContent.innerHTML = `<div class="loading-text">Buscando animes na API...</div>`;
            
            const hasFilter = searchQuery.trim().length > 0;
            const variables = hasFilter ? `, search: "${searchQuery.replace(/"/g, '\\"')}"` : '';

            // Busca até 18 nós caso o usuário mude para o modo difícil (6x6 = 18 pares)
            const query = `
            query {
                Page(page: 1, perPage: 15) {
                    media(sort: POPULARITY_DESC, type: ANIME ${variables}) {
                        id
                        title { english romaji }
                        coverImage { large }
                        characters(perPage: 18, sort: ROLE) {
                            nodes {
                                image { large }
                            }
                        }
                    }
                }
            }`;

            try {
                const response = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ query: query })
                });
                const result = await response.json();
                
                if(result.data && result.data.Page && result.data.Page.media.length > 0) {
                    renderThemeGrid(result.data.Page.media);
                } else {
                    gridContent.innerHTML = `<div class="loading-text" style="color: rgba(248, 248, 255, 0.6);">Nenhum anime encontrado com esse nome ou sem pacotes de personagens suficientes.</div>`;
                }
            } catch (error) {
                gridContent.innerHTML = `<div class="loading-text" style="color: #ff4500;">Erro ao conectar à API do catálogo. Verifique sua conexão.</div>`;
            }
        }

        function renderThemeGrid(animeList) {
            gridContent.innerHTML = "";
            let validAnimesRendered = 0;
            const requiredPairs = totalCards / 2;

            animeList.forEach(anime => {
                if (!anime.characters || anime.characters.nodes.length < requiredPairs) return;

                validAnimesRendered++;
                const card = document.createElement('div');
                card.className = 'theme-card';
                const titleStr = anime.title.english || anime.title.romaji;
                
                card.innerHTML = `
                    <img src="${anime.coverImage.large}" alt="${titleStr}">
                    <div class="theme-card-title">${titleStr}</div>
                `;
                
                card.addEventListener('click', () => {
                    animeSearch.value = ""; 
                    activeThemeCoverUrl = anime.coverImage.large;
                    activeThemeTitle = titleStr;
                    selectTheme(anime.characters.nodes.slice(0, requiredPairs), titleStr);
                });
                gridContent.appendChild(card);
            });

            if(validAnimesRendered === 0) {
                gridContent.innerHTML = `<div class="loading-text" style="color: rgba(248, 248, 255, 0.6);">Os animes encontrados não possuem imagens suficientes para a dificuldade atual (${requiredPairs} personagens necessários). Tente outro termo ou reduza a dificuldade!</div>`;
            }
        }

        function selectTheme(characterNodes, animeTitle) {
            gridContent.innerHTML = `<div class="loading-text">Construindo cartas e buscando trilha de ${animeTitle}...</div>`;
            
            fetchAudioFromITunes(animeTitle);

            themeImages = [];
            let loadedCount = 0;
            const requiredPairs = totalCards / 2;

            characterNodes.forEach((node) => {
                const img = new Image();
                img.crossOrigin = "anonymous"; 
                img.src = node.image.large;
                img.onload = () => {
                    loadedCount++;
                    if (loadedCount === requiredPairs) {
                        themeModal.classList.add('hidden');
                        initGame();
                    }
                };
                themeImages.push(img);
            });
        }

        function resizeCanvas() {
            const paddingConst = 48; 
            const headerHeight = header.offsetHeight + parseFloat(window.getComputedStyle(header).marginBottom);
            const winTxtHeight = (isWon || isTimeOut) ? winTxt.offsetHeight + parseFloat(window.getComputedStyle(winTxt).marginTop) : 0;
            
            const availableWidth = container.clientWidth - 48;
            const availableHeight = container.clientHeight - paddingConst - headerHeight - winTxtHeight;

            let sizeWidth = availableWidth;
            let sizeHeight = (availableWidth / COLS) * ROWS;

            if (sizeHeight > availableHeight) {
                sizeHeight = availableHeight;
                sizeWidth = (availableHeight / ROWS) * COLS;
            }

            canvas.width = sizeWidth;
            canvas.height = sizeHeight;

            cardWidth = canvas.width / COLS;
            cardHeight = canvas.height / ROWS;

            draw();
        }

        function initGame() {
            isWon = false;
            winMessageText.textContent = "Você Venceu!";
            winTxt.style.color = "#00ff7f";
            winTxt.style.textShadow = "0 0 10px rgba(0,255,127,0.4)";
            shareBtn.style.display = 'flex'; 
            winTxt.style.display = 'none';
            selectedCards = [];
            lockBoard = false;
            particles = [];
            
            generateCards();
            resizeCanvas();
            startTimer();
        }

        function generateCards() {
            cards = [];
            const requiredPairs = totalCards / 2;
            let indexes = [];
            
            for (let i = 0; i < requiredPairs; i++) {
                indexes.push(i, i);
            }
            
            for (let i = indexes.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indexes[i], indexes[j]] = [indexes[j], indexes[i]];
            }

            for (let i = 0; i < totalCards; i++) {
                cards.push({
                    id: i,
                    imageIndex: indexes[i],
                    isFlipped: false,
                    isMatched: false
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const cardPadding = Math.min(canvas.width / COLS, canvas.height / ROWS) * 0.06; 
            const borderRadius = 12;

            for (let i = 0; i < totalCards; i++) {
                const card = cards[i];
                const col = i % COLS;
                const row = Math.floor(i / COLS);
                const x = col * cardWidth;
                const y = row * cardHeight;

                const cx = x + cardPadding;
                const cy = y + cardPadding;
                const cw = cardWidth - cardPadding * 2;
                const ch = cardHeight - cardPadding * 2;

                const isHovered = (mouseX >= x && mouseX < x + cardWidth && mouseY >= y && mouseY < y + cardHeight) && !lockBoard && !isWon && !isTimeOut;

                if (card.isFlipped || card.isMatched) {
                    ctx.fillStyle = 'rgba(248, 248, 255, 0.08)';
                    ctx.beginPath();
                    ctx.roundRect(cx, cy, cw, ch, borderRadius);
                    ctx.fill();

                    const img = themeImages[card.imageIndex];
                    if (img && img.complete) {
                        ctx.save();
                        ctx.beginPath();
                        ctx.roundRect(cx, cy, cw, ch, borderRadius);
                        ctx.clip(); 
                        ctx.drawImage(img, cx, cy, cw, ch);
                        ctx.restore();
                    }

                    ctx.save();
                    ctx.strokeStyle = card.isMatched ? '#00ff7f' : 'rgba(248, 248, 255, 0.4)';
                    ctx.lineWidth = Math.max(1.5, Math.min(canvas.width, canvas.height) * 0.006);
                    if (card.isMatched) {
                        ctx.shadowColor = '#00ff7f';
                        ctx.shadowBlur = 10;
                    }
                    ctx.beginPath();
                    ctx.roundRect(cx, cy, cw, ch, borderRadius);
                    ctx.stroke();
                    ctx.restore();

                } else {
                    ctx.save();
                    ctx.fillStyle = isHovered ? '#9d4edf' : '#8a2be2'; 
                    
                    if (isHovered) {
                        ctx.shadowColor = '#8a2be2';
                        ctx.shadowBlur = 15;
                    }

                    ctx.beginPath();
                    ctx.roundRect(cx, cy, cw, ch, borderRadius);
                    ctx.fill();

                    ctx.strokeStyle = isHovered ? 'rgba(248, 248, 255, 0.6)' : 'rgba(248, 248, 255, 0.25)';
                    ctx.lineWidth = Math.max(1, Math.min(canvas.width, canvas.height) * 0.003);
                    ctx.stroke();
                    ctx.restore();
                }
            }
        }

        function loop() {
            draw();

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    particles[i].draw();
                }
            }
            requestAnimationFrame(loop);
        }

        function handleInput(clientX, clientY) {
            if (bgMusic && bgMusic.paused) {
                bgMusic.play().catch(() => {});
            }

            if (lockBoard || isWon || isTimeOut) return;

            const rect = canvas.getBoundingClientRect();
            const canvasX = (clientX - rect.left) * (canvas.width / rect.width);
            const canvasY = (clientY - rect.top) * (canvas.height / rect.height);

            const col = Math.floor(canvasX / cardWidth);
            const row = Math.floor(canvasY / cardHeight);
            
            if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
                const clickedIndex = row * COLS + col;
                const card = cards[clickedIndex];

                if (card.isFlipped || card.isMatched) return;

                card.isFlipped = true;
                selectedCards.push(card);
                draw();

                if (selectedCards.length === 2) {
                    checkMatch();
                }
            }
        }

        function checkMatch() {
            lockBoard = true;
            const [card1, card2] = selectedCards;

            const getCardCenter = (card) => {
                const idx = cards.indexOf(card);
                const col = idx % COLS;
                const row = Math.floor(idx / COLS);
                return {
                    x: col * cardWidth + cardWidth / 2,
                    y: row * cardHeight + cardHeight / 2
                };
            };

            const center1 = getCardCenter(card1);
            const center2 = getCardCenter(card2);

            if (card1.imageIndex === card2.imageIndex) {
                card1.isMatched = true;
                card2.isMatched = true;

                spawnParticles(center1.x, center1.y, '#00ff7f');
                spawnParticles(center2.x, center2.y, '#00ff7f');

                resetTurn();
                checkWin();
            } else {
                spawnParticles(center1.x, center1.y, '#ff4500');
                spawnParticles(center2.x, center2.y, '#ff4500');

                setTimeout(() => {
                    card1.isFlipped = false;
                    card2.isFlipped = false;
                    resetTurn();
                }, 1000);
            }
        }

        function resetTurn() {
            selectedCards = [];
            lockBoard = false;
            draw();
        }

        function checkWin() {
            const allMatched = cards.every(card => card.isMatched);
            if (allMatched) {
                isWon = true;
                clearInterval(timerInterval);
                winTxt.style.display = 'flex';
                resizeCanvas(); 
            }
        }

        function shareScoreCard() {
            const shareCanvas = document.createElement('canvas');
            const sCtx = shareCanvas.getContext('2d');
            
            shareCanvas.width = 600;
            shareCanvas.height = 700;

            const gradientBg = sCtx.createLinearGradient(0, 0, shareCanvas.width, shareCanvas.height);
            gradientBg.addColorStop(0, '#0b071e'); 
            gradientBg.addColorStop(0.5, '#4c1a8a'); 
            gradientBg.addColorStop(1, '#8a2be2'); 
            
            sCtx.fillStyle = gradientBg;
            sCtx.fillRect(0, 0, shareCanvas.width, shareCanvas.height);

            sCtx.save();
            sCtx.fillStyle = "rgba(248, 248, 255, 0.03)";
            sCtx.fillRect(0, 0, shareCanvas.width, shareCanvas.height);
            sCtx.restore();

            sCtx.fillStyle = "#f8f8ff";
            sCtx.textAlign = "center";
            sCtx.font = "bold 38px 'Segoe UI', Roboto, sans-serif";
            sCtx.shadowBlur = 15;
            sCtx.shadowColor = "#8a2be2";
            sCtx.fillText("GLOW MEMORY", shareCanvas.width / 2, 120);
            sCtx.shadowBlur = 0;

            sCtx.font = "600 20px 'Segoe UI', Roboto, sans-serif";
            sCtx.fillStyle = "rgba(248, 248, 255, 0.8)";
            sCtx.fillText(`Tema: ${activeThemeTitle}`, shareCanvas.width / 2, 170);

            sCtx.fillStyle = "rgba(138, 43, 226, 0.12)";
            sCtx.strokeStyle = "rgba(248, 248, 255, 0.25)";
            sCtx.lineWidth = 2;
            sCtx.beginPath();
            sCtx.roundRect(100, 240, 400, 180, 16);
            sCtx.fill();
            sCtx.stroke();

            sCtx.fillStyle = "#00ff7f";
            sCtx.font = "bold 24px 'Segoe UI', Roboto, sans-serif";
            
            let diffLabel = "FÁCIL";
            if(COLS === 6 && ROWS === 4) diffLabel = "MÉDIO";
            if(COLS === 6 && ROWS === 6) diffLabel = "DIFÍCIL";
            
            sCtx.fillText(`TABULEIRO COMPLETADO! (${diffLabel})`, shareCanvas.width / 2, 295);

            sCtx.fillStyle = "#f8f8ff";
            sCtx.font = "bold 46px 'Segoe UI', Roboto, sans-serif";
            sCtx.fillText(`${initialTime - timer}s`, shareCanvas.width / 2, 370);
            sCtx.font = "14px 'Segoe UI', Roboto, sans-serif";
            sCtx.fillStyle = "rgba(248, 248, 255, 0.7)";
            sCtx.fillText("Tempo de Resolução", shareCanvas.width / 2, 395);

            sCtx.fillStyle = "#f8f8ff";
            sCtx.font = "bold 24px 'Segoe UI', Roboto, sans-serif";
            sCtx.shadowBlur = 10;
            sCtx.shadowColor = "rgba(138, 43, 226, 0.6)";
            sCtx.fillText("Jogue em LoreSpace.com.br", shareCanvas.width / 2, shareCanvas.height - 60);
            sCtx.shadowBlur = 0;

            shareCanvas.toBlob((blob) => {
                if (!blob) return;
                const file = new File([blob], "glow-memory-score.png", { type: "image/png" });
                
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    navigator.share({
                        files: [file],
                        title: 'Meu tempo no Glow Memory!',
                        text: `Consegui fechar o tabuleiro de ${activeThemeTitle} no modo ${diffLabel} em ${initialTime - timer} segundos! Desafie-me no LoreSpace!`,
                    }).catch((err) => console.log("Partilha cancelada."));
                } else {
                    const link = document.createElement('a');
                    link.download = 'glow-memory-score.png';
                    link.href = shareCanvas.toDataURL();
                    link.click();
                }
            }, "image/png");
        }

        animeSearch.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value;
            searchTimeout = setTimeout(() => {
                fetchThemes(query);
            }, 500);
        });

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            voiceSearchBtn.addEventListener('click', () => {
                if (voiceSearchBtn.classList.contains('listening')) {
                    recognition.stop();
                    return;
                }
                recognition.start();
            });

            recognition.onstart = () => {
                voiceSearchBtn.classList.add('listening');
                animeSearch.placeholder = "Ouvindo...";
            };

            recognition.onresult = (event) => {
                const speechResult = event.results[0][0].transcript;
                animeSearch.value = speechResult;
                fetchThemes(speechResult);
            };

            recognition.onerror = (event) => {
                console.log('Erro no reconhecimento de voz: ' + event.error);
                voiceSearchBtn.classList.remove('listening');
                animeSearch.placeholder = "Pesquisar anime de sua escolha...";
            };

            recognition.onend = () => {
                voiceSearchBtn.classList.remove('listening');
                if (animeSearch.value === "") {
                    animeSearch.placeholder = "Pesquisar anime de sua escolha...";
                }
            };
        } else {
            voiceSearchBtn.style.display = 'none';
        }

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        });

        canvas.addEventListener('mouseleave', () => {
            mouseX = -1000;
            mouseY = -1000;
        });

        canvas.addEventListener('mousedown', (e) => {
            if(e.target === animeSearch || e.target.closest('#voice-search-btn') || e.target.closest('.difficulty-container')) return;
            handleInput(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            if(e.target === animeSearch || e.target.closest('#voice-search-btn') || e.target.closest('.difficulty-container')) return;
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            mouseX = (touch.clientX - rect.left) * (canvas.width / rect.width);
            mouseY = (touch.clientY - rect.top) * (canvas.height / rect.height);
            handleInput(touch.clientX, touch.clientY);
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if(e.target === animeSearch || e.target.closest('#voice-search-btn') || e.target.closest('.difficulty-container')) return;
            mouseX = -1000;
            mouseY = -1000;
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(timerInterval);
            themeModal.classList.remove('hidden');
            fetchThemes();
        });

        shareBtn.addEventListener('click', shareScoreCard);
        
        window.addEventListener('resize', resizeCanvas);

        fetchThemes();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
