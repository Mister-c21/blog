<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter - Arcade</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #0a0512;
            color: #F8F8FF; /* Ghost White */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.3);
            border-radius: 8px;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: #11091c;
        }
        /* Interface de Vidro Semi-transparente */
        .ui-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(138, 43, 226, 0.15); /* Blueviolet com transparência */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(248, 248, 255, 0.2);
            padding: 30px 50px;
            text-align: center;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 80%;
            max-width: 400px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #F8F8FF;
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.8);
        }
        p {
            margin-bottom: 25px;
            color: rgba(248, 248, 255, 0.8);
        }
        button {
            background: #8A2BE2; /* Blueviolet */
            color: #F8F8FF;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.5);
        }
        button:hover {
            background: #a04ef6;
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.8);
            transform: scale(1.05);
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Canvas do Jogo -->
        <canvas id="gameCanvas" width="480" height="640"></canvas>

        <!-- Menu Inicial -->
        <div id="start-menu" class="ui-overlay">
            <h1>SPACE ATTACK</h1>
            <p>Use as Setas para mover e Espaço para atirar.</p>
            <button id="start-btn">JOGAR</button>
        </div>

        <!-- Tela de Game Over -->
        <div id="game-over-menu" class="ui-overlay hidden">
            <h1>GAME OVER</h1>
            <p id="final-score">Pontuação: 0</p>
            <button id="restart-btn">REINICIAR</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Elementos da Interface
        const startMenu = document.getElementById('start-menu');
        const gameOverMenu = document.getElementById('game-over-menu');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const finalScoreText = document.getElementById('final-score');

        // Estado do Jogo
        let gameActive = false;
        let score = 0;
        let keys = {};

        // Configurações dos Objetos
        const player = {
            x: canvas.width / 2 - 20,
            y: canvas.height - 60,
            width: 40,
            height: 40,
            speed: 6,
            color: '#8A2BE2' // Blueviolet
        };

        let bullets = [];
        let enemies = [];
        let stars = [];

        // Inicializa as estrelas de fundo
        for (let i = 0; i < 50; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 2 + 0.5
            });
        }

        // Event Listeners de Teclado
        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        // Disparo de tiros
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && gameActive) {
                bullets.push({
                    x: player.x + player.width / 2 - 3,
                    y: player.y,
                    width: 6,
                    height: 15,
                    speed: 8,
                    color: '#F8F8FF' // Ghost White
                });
            }
        });

        // Controles de Botões
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        function startGame() {
            startMenu.classList.add('hidden');
            gameOverMenu.classList.add('hidden');
            score = 0;
            bullets = [];
            enemies = [];
            player.x = canvas.width / 2 - 20;
            gameActive = true;
            animate();
        }

        function spawnEnemy() {
            if (Math.random() < 0.03 && gameActive) {
                const size = Math.random() * 20 + 20;
                enemies.push({
                    x: Math.random() * (canvas.width - size),
                    y: -size,
                    width: size,
                    height: size,
                    speed: Math.random() * 2 + 2,
                    color: `rgba(138, 43, 226, ${Math.random() * 0.5 + 0.5})`
                });
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function update() {
            // Mover jogador
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) player.x += player.speed;

            // Atualizar Fundo (Estrelas)
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) star.y = 0;
            });

            // Atualizar Tiros
            bullets.forEach((bullet, bIndex) => {
                bullet.y -= bullet.speed;
                if (bullet.y < 0) bullets.splice(bIndex, 1);
            });

            // Criar e Atualizar Inimigos
            spawnEnemy();
            enemies.forEach((enemy, eIndex) => {
                enemy.y += enemy.speed;

                // Colisão com o jogador
                if (checkCollision(player, enemy)) {
                    endGame();
                }

                // Passou da tela
                if (enemy.y > canvas.height) {
                    enemies.splice(eIndex, 1);
                }

                // Colisão com tiros
                bullets.forEach((bullet, bIndex) => {
                    if (checkCollision(bullet, enemy)) {
                        enemies.splice(eIndex, 1);
                        bullets.splice(bIndex, 1);
                        score += 10;
                    }
                });
            });
        }

        function draw() {
            // Limpar canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenhar Estrelas
            ctx.fillStyle = 'rgba(248, 248, 255, 0.3)';
            stars.forEach(star => {
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });

            // Desenhar Jogador (Nave em formato estilizado)
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.closePath();
            ctx.fill();

            // Brilho na nave do jogador
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#8A2BE2';

            // Desenhar Tiros
            ctx.fillStyle = '#F8F8FF';
            ctx.shadowColor = '#F8F8FF';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
            });

            // Desenhar Inimigos
            ctx.shadowBlur = 0; // Remove o brilho pesado para otimizar os inimigos
            enemies.forEach(enemy => {
                ctx.fillStyle = enemy.color;
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
            });

            // Desenhar HUD de Pontuação
            ctx.fillStyle = '#F8F8FF';
            ctx.font = 'bold 18px sans-serif';
            ctx.shadowBlur = 5;
            ctx.shadowColor = 'black';
            ctx.fillText(`SCORE: ${score}`, 20, 35);
            ctx.shadowBlur = 0;
        }

        function endGame() {
            gameActive = false;
            finalScoreText.innerText = `Pontuação: ${score}`;
            gameOverMenu.classList.remove('hidden');
        }

        function animate() {
            if (!gameActive) return;
            update();
            draw();
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
