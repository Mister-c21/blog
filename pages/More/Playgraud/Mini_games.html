<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Games - LoreSpace</title>
    <style>
        :root {
            --primary-white: #FFFFFF;
            --ghost-white: #F8F8FF;
            --violet-main: #8A2BE2; /* BlueViolet */
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(138, 43, 226, 0.3); /* Borda com toque violeta */
        }

        body {
            /* Fundo branco primordial com um gradiente suave */
            background: linear-gradient(135deg, #FFFFFF 0%, #F0F0F0 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .minigame-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 450px;
        }

        .game-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid var(--glass-border);
            border-radius: 25px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(138, 43, 226, 0.1);
        }

        .game-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.6);
            border-color: var(--violet-main);
            box-shadow: 0 15px 35px rgba(138, 43, 226, 0.2);
        }

        .icon-container {
            width: 55px;
            height: 55px;
            background: var(--violet-main); /* Violeta como base do ícone */
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.4);
        }

        .icon-container span {
            font-size: 26px;
            color: var(--primary-white);
        }

        .game-info {
            flex-grow: 1;
        }

        .game-info h3 {
            margin: 0;
            color: #2a2a2a; 
            font-size: 1.15rem;
            font-weight: 800;
        }

        .game-info p {
            margin: 4px 0 0;
            color: #555;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .play-button {
            background: var(--primary-white);
            color: var(--violet-main);
            border: 2px solid var(--violet-main);
            border-radius: 15px;
            padding: 10px 15px;
            font-weight: 900;
            font-size: 0.7rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .play-button:hover {
            background: var(--violet-main);
            color: var(--primary-white);
            box-shadow: 0 0 15px var(--violet-main);
        }

    </style>
</head>
<body>

    <div class="minigame-list">
        
        <div class="game-card">
            <div class="icon-container">
                <span>🕹️</span>
            </div>
            <div class="game-info">
                <h3>Retro Adventure</h3>
                <p>O clássico purista.</p>
            </div>
            <button class="play-button">Jogar</button>
        </div>

        <div class="game-card">
            <div class="icon-container">
                <span>⚔️</span>
            </div>
            <div class="game-info">
                <h3>Anime Arena</h3>
                <p>Estética minimalista.</p>
            </div>
            <button class="play-button">Jogar</button>
        </div>

        <div class="game-card">
            <div class="icon-container">
                <span>🧩</span>
            </div>
            <div class="game-info">
                <h3>Logic Mind</h3>
                <p>Foco e clareza.</p>
            </div>
            <button class="play-button">Jogar</button>
        </div>

    </div>

</body>
</html>
