<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #f7f7fc;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #1a1a1a;
        }

        /* ANIMAÇÕES DE OCULTAÇÃO */
        .header, .nav-container {
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease;
        }

        .header.hidden-nav {
            transform: translateY(-100%);
            opacity: 0;
            height: 0;
            overflow: hidden;
        }

        /* Ocultação da barra no mobile (Desliza para cima) */
        @media (max-width: 767px) {
            .nav-container.hidden-nav {
                transform: translateY(-100%);
                opacity: 0;
                padding: 0;
                height: 0;
                overflow: hidden;
                border-bottom: none;
            }
        }

        /* Ocultação da sidebar no desktop (Desliza para a esquerda) */
        @media (min-width: 768px) {
            .nav-container.hidden-nav {
                transform: translateX(-100%);
                opacity: 0;
                width: 0;
                overflow: hidden;
                border-right: none;
            }
        }

        /* CABEÇALHO */
        .header {
            height: 40px;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            width: 100%;
            z-index: 1001;
            order: 1; /* Cabeçalho sempre no topo (primeiro elemento) */
        }

        .header h1 {
            font-size: 18px;
            color: #8a2be2;
            flex: 1;
            text-align: center;
        }

        .header a {
            text-decoration: none;
            color: #8a2be2;
            font-size: 24px;
            width: 24px;
            display: flex;
            align-items: center;
        }

        /* NAVEGAÇÃO MOBILE (TOP BAR COMPACTA ABAIXO DO HEADER) */
        .nav-container { 
            width: 100%; 
            padding: 6px 0; /* Altura menor reduzindo o preenchimento */
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05); 
            z-index: 1000; 
            order: 2; /* Fica logo abaixo do header */
        }

        .tab-list {
            display: flex;
            align-items: center;
            justify-content: space-around;
            list-style: none;
            position: relative;
        }

        .tab-item {
            font-size: 14px; /* Texto menor e mais sutil no mobile */
            font-weight: 600;
            color: rgba(138, 43, 226, 0.6);
            cursor: pointer;
            transition: color 0.25s ease, transform 0.2s ease;
            position: relative;
            padding: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tab-item.active {
            color: #8a2be2;
            transform: scale(1.03);
        }
        
        /* Ajustes específicos para esconder elementos no mobile */
        @media (max-width: 767px) {
            .tab-item i {
                display: none; /* Esconde os ícones completamente no mobile */
            }
            .tab-item span {
                display: inline; /* Garante que o texto seja exibido */
            }
        }
        
        /* Indicador deslizante */
        .tab-indicator {
            position: absolute;
            bottom: -6px; /* Ajustado para a nova altura menor */
            height: 2px;
            background-color: #8a2be2;
            border-radius: 1px;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* ÁREA DE CONTEÚDO (VIEWPAGER) */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            order: 3; /* Conteúdo principal renderizado por último */
        }

        .window-wrapper {
            flex: 1;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .tabs-view-pager {
            display: flex;
            width: 400%;
            height: 100%;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .tab-page {
            width: calc(100% / 4);
            height: 100%;
        }

        .content-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* BOTÃO FLUTUANTE DE RETORNO */
        #show-nav-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            color: #8a2be2;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            z-index: 1005;
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        #show-nav-btn.active {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* LAYOUT DESKTOP (SIDEBAR - VOLTA COM OS ÍCONES) */
        @media (min-width: 768px) {
            body {
                flex-direction: row;
            }

            .nav-container { 
                width: 240px; 
                height: 100vh; 
                border-bottom: none;
                border-right: 1px solid rgba(0, 0, 0, 0.05); 
                padding: 40px 0;
                order: 1; /* Mantém a sidebar alinhada à esquerda no desktop */
            }

            .tab-list {
                flex-direction: column;
                align-items: flex-start;
                justify-content: flex-start;
                gap: 20px;
                padding: 0 20px;
            }

            .tab-item {
                flex-direction: row;
                gap: 12px;
                width: 100%;
                padding: 12px 16px;
                border-radius: 8px;
                font-size: 16px;
            }

            .tab-item i {
                display: inline-block; /* Reexibe os ícones no desktop */
            }

            .tab-item.active {
                background: rgba(138, 43, 226, 0.1);
            }
            
            .tab-indicator {
                display: none;
            }

            #show-nav-btn {
                bottom: auto;
                top: 20px;
                left: 20px;
                transform: translateX(-100px);
            }

            #show-nav-btn.active {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>

    <header class="header" id="app-header">
        <a href="../../../index.html"><i class="fas fa-arrow-left"></i></a>
        <h1>Feed</h1>
        <div style="width: 24px;"></div>
    </header>

    <nav class="nav-container" id="app-nav">
        <ul class="tab-list">
            <li class="tab-item active" onclick="switchTab(0)"><i class="fas fa-play"></i> <span>Posts</span></li>
            <li class="tab-item" onclick="switchTab(1)"><i class="far fa-plus-square"></i> <span>Criar</span></li>
            <li class="tab-item" onclick="switchTab(2)"><i class="fas fa-star"></i> <span>Comunidades</span></li>
            <li class="tab-item" onclick="switchTab(3)"><i class="fas fa-user"></i> <span>Perfil</span></li>
            <div class="tab-indicator" id="indicator"></div>
        </ul>
    </nav>

    <div class="main-container">
        
        <button id="show-nav-btn" onclick="restoreNavigation()"><i class="fas fa-chevron-up"></i></button>

        <div class="window-wrapper" id="gesture-zone">
            <div class="tabs-view-pager" id="view-pager">
                <div class="tab-page"><iframe class="content-iframe" src="./Options/Post.html"></iframe></div>
                <div class="tab-page"><iframe class="content-iframe" src="./Options/Criar.html"></iframe></div>
                <div class="tab-page"><iframe class="content-iframe" src="./Options/Comunidade.html"></iframe></div>
                <div class="tab-page"><iframe class="content-iframe" src="./Options/Perfil.html"></iframe></div>
            </div>
        </div>

    </div>

    <script>
        const pager = document.getElementById('view-pager');
        const tabs = Array.from(document.querySelectorAll('.tab-item'));
        const appHeader = document.getElementById('app-header');
        const appNav = document.getElementById('app-nav');
        const showNavBtn = document.getElementById('show-nav-btn');
        const indicator = document.getElementById('indicator');
        
        function switchTab(index) {
            tabs.forEach((item, i) => { item.classList.toggle('active', i === index); });
            
            // Atualiza linha indicadora no Mobile
            if (window.innerWidth < 768 && indicator) {
                indicator.style.width = `${tabs[index].offsetWidth}px`;
                indicator.style.left = `${tabs[index].offsetLeft}px`;
            }
            
            // Transiciona o Viewpager lateralmente
            pager.style.transform = `translateX(-${index * (100 / tabs.length)}%)`;

            // Oculta Cabeçalho e Barra de Abas se não estiver na página principal (0)
            if (index > 0) {
                appHeader.classList.add('hidden-nav');
                appNav.classList.add('hidden-nav');
                showNavBtn.classList.add('active');
            } else {
                appHeader.classList.remove('hidden-nav');
                appNav.classList.remove('hidden-nav');
                showNavBtn.classList.remove('active');
                
                // Reconstrói a posição do indicador após a re-exibição
                if (window.innerWidth < 768 && indicator) {
                    setTimeout(() => {
                        indicator.style.width = `${tabs[index].offsetWidth}px`;
                        indicator.style.left = `${tabs[index].offsetLeft}px`;
                    }, 400);
                }
            }
        }

        function restoreNavigation() {
            switchTab(0);
        }
        
        // Inicializa na aba padrão
        window.addEventListener('DOMContentLoaded', () => { switchTab(0); });
        
        // Adaptação caso mude a orientação ou tamanho da janela
        window.addEventListener('resize', () => {
            const activeIndex = tabs.findIndex(tab => tab.classList.contains('active'));
            switchTab(activeIndex >= 0 ? activeIndex : 0);
        });
    </script>
</body>
</html>
