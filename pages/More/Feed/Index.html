<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body { background-color: #f7f7fc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: #1a1a1a; }

        /* ANIMAÇÕES DE OCULTAÇÃO */
        .header, .nav-container {
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease;
        }

        .header.hidden-nav {
            transform: translateY(-100%);
            opacity: 0;
            height: 0;
            overflow: hidden;
            border-bottom: none;
        }

        /* Ocultação da barra no mobile */
        @media (max-width: 767px) {
            .nav-container.hidden-nav {
                transform: translateY(100%);
                opacity: 0;
                padding: 0;
                height: 0;
                overflow: hidden;
                border-top: none;
            }
        }

        /* Ocultação da sidebar no desktop */
        @media (min-width: 768px) {
            .nav-container.hidden-nav {
                transform: translateX(-100%);
                opacity: 0;
                width: 0;
                overflow: hidden;
                border-right: none;
            }
        }

        .header { height: 30px; background: rgba(255, 255, 255, 0.8); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid rgba(0, 0, 0, 0.05); width: 100%; z-index: 1001; }
        .header h1 { font-size: 18px; color: #8a2be2; flex: 1; text-align: center; }
        .header a { text-decoration: none; color: #8a2be2; font-size: 24px; width: 24px; display: flex; align-items: center; }

        /* UI PADRÃO - MOBILE FIRST (BOTTOM TABBAR) */
        .nav-container { 
            width: 100%; 
            padding: 10px 0; 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(16px); 
            border-top: 1px solid rgba(0, 0, 0, 0.05); 
            z-index: 1000; 
            order: 3;
        }
        .tab-list { display: flex; align-items: center; justify-content: space-around; gap: 0; padding: 0; list-style: none; position: relative; }
        .tab-item { font-size: 20px; font-weight: 600; color: rgba(138, 43, 226, 0.6); cursor: pointer; transition: color 0.25s ease, transform 0.2s ease; position: relative; padding: 8px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tab-item.active { color: #8a2be2; transform: scale(1.05); }
        
        /* ESCONDE O TEXTO DAS ABAS NO MOBILE */
        @media (max-width: 767px) {
            .tab-item span {
                display: none;
            }
        }
        
        /* Indicador adaptado para a base do item no mobile */
        .tab-indicator { position: absolute; bottom: -10px; height: 3px; background-color: #8a2be2; border-radius: 2px; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); }

        /* BOTÃO FLUTUANTE DE SETA */
        #show-nav-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            color: #8a2be2;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            z-index: 1005;
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        #show-nav-btn.active {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* AJUSTADO O WIDTH DA VIEWPORT PARA COMPORTAR 4 PÁGINAS */
        .window-wrapper { flex: 1; width: 100%; overflow: hidden; position: relative; order: 2; }
        .tabs-view-pager { display: flex; width: 400%; height: 100%; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
        .tab-page { width: calc(100% / 4); height: 100%; }
        .content-iframe { width: 100%; height: 100%; border: none; }

        /* ADAPTAÇÃO PARA DESKTOP (SIDEBAR) */
        @media (min-width: 768px) {
            body { flex-direction: row; }
            
            .main-container { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

            .nav-container { 
                width: 240px; 
                height: 100vh; 
                border-top: none; 
                border-right: 1px solid rgba(0, 0, 0, 0.05); 
                padding: 40px 0;
                order: 1;
            }

            .tab-list { flex-direction: column; align-items: flex-start; justify-content: flex-start; gap: 20px; padding: 0 20px; }
            .tab-item { flex-direction: row; gap: 12px; width: 100%; padding: 12px 16px; border-radius: 8px; font-size: 16px; }
            .tab-item.active { background: rgba(138, 43, 226, 0.1); }
            
            /* Garante que o texto volte a aparecer no desktop */
            .tab-item span {
                display: inline;
            }
            
            .tab-indicator { display: none; }

            #show-nav-btn { bottom: auto; top: 20px; left: 20px; transform: translateX(-100px); }
            #show-nav-btn.active { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <nav class="nav-container" id="app-nav">
        <ul class="tab-list">
            <li class="tab-item active" onclick="switchTab(0)"><i class="fas fa-play"></i> <span>Posts</span></li>
            <li class="tab-item" onclick="switchTab(1)"><i class="far fa-plus-square"></i> <span>Criar</span></li>
            <li class="tab-item" onclick="switchTab(2)"><i class="fas fa-star"></i> <span>Comunidades</span></li>
            <li class="tab-item" onclick="switchTab(3)"><i class="fas fa-user"></i> <span>Perfil</span></li>
            
            <div class="tab-indicator" id="indicator"></div>
        </ul>
    </nav>

    <div class="main-container" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
        
        <button id="show-nav-btn" onclick="restoreNavigation()"><i class="fas fa-chevron-up"></i></button>

        <header class="header" id="app-header">
            <a href="../../../index.html"><i class="fas fa-arrow-left"></i></a>
            <h1>Feed</h1>
            <div style="width: 24px;"></div>
        </header>

        <div class="window-wrapper" id="gesture-zone">
            <div class="tabs-view-pager" id="view-pager">
                <div class="tab-page"><iframe class="content-iframe" src="./Options/Post.html"></iframe></div>
                <div class="tab-page"><iframe class="content-iframe" src="./Options/Criar.html"></iframe></div>
                <div class="tab-page"><iframe class="content-iframe" src="./Options/Comunidade.html"></iframe></div>
                <div class="tab-page"><iframe class="content-iframe" src="./Options/Perfil.html"></iframe></div>
            </div>
        </div>

    </div>

    <script>
        const pager = document.getElementById('view-pager');
        const tabs = Array.from(document.querySelectorAll('.tab-item'));
        
        const appHeader = document.getElementById('app-header');
        const appNav = document.getElementById('app-nav');
        const showNavBtn = document.getElementById('show-nav-btn');
        
        function switchTab(index) {
            tabs.forEach((item, i) => { item.classList.toggle('active', i === index); });
            const indicator = document.getElementById('indicator');
            
            if (window.innerWidth < 768 && indicator) {
                indicator.style.width = `${tabs[index].offsetWidth}px`;
                indicator.style.left = `${tabs[index].offsetLeft}px`;
            }
            
            pager.style.transform = `translateX(-${index * (100 / tabs.length)}%)`;

            if (index > 0) {
                appHeader.classList.add('hidden-nav');
                appNav.classList.add('hidden-nav');
                showNavBtn.classList.add('active');
            } else {
                appHeader.classList.remove('hidden-nav');
                appNav.classList.remove('hidden-nav');
                showNavBtn.classList.remove('active');
                
                if (window.innerWidth < 768 && indicator) {
                    setTimeout(() => {
                        indicator.style.width = `${tabs[index].offsetWidth}px`;
                        indicator.style.left = `${tabs[index].offsetLeft}px`;
                    }, 400);
                }
            }
        }

        function restoreNavigation() {
            switchTab(0);
        }
        
        window.addEventListener('DOMContentLoaded', () => { switchTab(0); });
        
        window.addEventListener('resize', () => {
            const activeIndex = tabs.findIndex(tab => tab.classList.contains('active'));
            switchTab(activeIndex >= 0 ? activeIndex : 0);
        });
    </script>
</body>
</html>
