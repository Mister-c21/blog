<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #f7f7fc;
            height: 100vh;
            overflow: hidden;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
        }

        /* CABEÇALHO - Só aparece na aba Posts */
        .header {
            height: 40px;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            z-index: 1001;
            flex-shrink: 0;
            transition: all 0.4s ease;
        }

        .header.hidden {
            transform: translateY(-100%);
            opacity: 0;
            height: 0;
            padding: 0;
            overflow: hidden;
        }

        .header h1 {
            font-size: 18px;
            color: #8a2be2;
            flex: 1;
            text-align: center;
        }

        /* ESTILO DOS BOTÕES NO HEADER */
        .header a, .header .header-search-btn, .header .header-dating-btn {
            color: #8a2be2;
            text-decoration: none;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }

        /* Container para agrupar os botões da direita no header */
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* NAVEGAÇÃO */
        .nav-container { 
            width: 100%; 
            padding: 6px 0;
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05); 
            z-index: 1000;
            flex-shrink: 0;
        }

        .tab-list {
            display: flex;
            align-items: center;
            justify-content: space-around;
            list-style: none;
            position: relative;
        }

        .tab-item {
            font-size: 14px;
            font-weight: 600;
            color: rgba(138, 43, 226, 0.6);
            cursor: pointer;
            padding: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tab-item.active {
            color: #8a2be2;
        }

        @media (max-width: 767px) {
            .tab-item i { display: none; }
        }

        /* CONTEÚDO */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }

        .window-wrapper {
            flex: 1;
            overflow: hidden;
            position: relative;
            min-height: 0;
        }

        .tabs-view-pager {
            display: flex;
            width: 400%;
            height: 100%;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .tab-page {
            width: 25%;
            height: 100%;
        }

        .content-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ====================== DESKTOP ====================== */
        @media (min-width: 768px) {
            body {
                flex-direction: row;
            }

            .header {
                position: absolute;
                top: 0;
                left: 240px;
                right: 0;
                z-index: 1002;
            }

            .nav-container { 
                width: 240px; 
                height: 100vh;
                border-right: 1px solid rgba(0, 0, 0, 0.05); 
                padding: 60px 0 20px;
                flex-shrink: 0;
            }

            /* Margens baseadas no estado oculto do Header */
            .main-container {
                margin-top: 40px;
                transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            }

            /* Se o header estiver escondido (.hidden), zera o topo para ocupar o espaço */
            body:has(.header.hidden) .main-container {
                margin-top: 0px;
            }

            .tab-list {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
                padding: 0 16px;
            }

            .tab-item {
                flex-direction: row;
                gap: 12px;
                width: 100%;
                padding: 12px 16px;
                border-radius: 8px;
                font-size: 16px;
            }

            .tab-item i { display: inline-block; }

            .tab-item.active {
                background: rgba(138, 43, 226, 0.1);
            }
        }

        #show-nav-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            color: #8a2be2;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1005;
            opacity: 0;
            transition: all 0.4s;
        }

        #show-nav-btn.active {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <header class="header" id="app-header">
        <a href="../../../index.html"><i class="fas fa-arrow-left"></i></a>
        <h1>Feed</h1>
        <div class="header-actions">
            <button class="header-dating-btn" onclick="switchTheme(this, './Options/Posts/Namoro.html')">
                <i class="fas fa-heart"></i>
            </button>
            <button class="header-search-btn" onclick="switchTheme(this, './Options/Pesquisar.html')">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </header>

    <nav class="nav-container" id="app-nav">
        <ul class="tab-list">
            <li class="tab-item active" onclick="switchTab(0)"><i class="fas fa-play"></i> <span>Posts</span></li>
            <li class="tab-item" onclick="switchTab(1)"><i class="far fa-plus-square"></i> <span>Criar</span></li>
            <li class="tab-item" onclick="switchTab(2)"><i class="fas fa-star"></i> <span>Comunidades</span></li>
            <li class="tab-item" onclick="switchTab(3)"><i class="fas fa-user"></i> <span>Perfil</span></li>
        </ul>
    </nav>

    <div class="main-container">
        <div class="window-wrapper">
            <div class="tabs-view-pager" id="view-pager">
                <div class="tab-page"><iframe id="posts-iframe" class="content-iframe" src="./Options/Post.html"></iframe></div>
                <div class="tab-page"><iframe class="content-iframe" src="./Options/Criar.html"></iframe></div>
                <div class="tab-page"><iframe class="content-iframe" src="./Options/Comunidade.html"></iframe></div>
                <div class="tab-page"><iframe class="content-iframe" src="./Options/Perfil.html"></iframe></div>
            </div>
        </div>
    </div>

    <button id="show-nav-btn" onclick="restoreNavigation()"><i class="fas fa-chevron-up"></i></button>

    <script>
        const pager = document.getElementById('view-pager');
        const header = document.getElementById('app-header');
        const postsIframe = document.getElementById('posts-iframe');
        const tabs = Array.from(document.querySelectorAll('.tab-item'));
        const showNavBtn = document.getElementById('show-nav-btn');

        function switchTheme(clickedButton, pageUrl) {
            if(postsIframe && pageUrl) {
                postsIframe.src = pageUrl;
            }
        }

        function switchTab(index) {
            tabs.forEach((item, i) => item.classList.toggle('active', i === index));
            
            pager.style.transform = `translateX(-${index * 25}%)`;

            if (index === 0) {
                header.classList.remove('hidden');
                showNavBtn.classList.remove('active');
                // Força o iframe da aba Posts a voltar para o conteúdo original do feed
                if (postsIframe) {
                    postsIframe.src = "./Options/Post.html";
                }
            } else {
                header.classList.add('hidden');
                showNavBtn.classList.add('active');
            }
        }

        function restoreNavigation() {
            switchTab(0);
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            switchTab(0);
        });

        window.addEventListener('resize', () => {
            const activeIndex = tabs.findIndex(tab => tab.classList.contains('active'));
            switchTab(activeIndex >= 0 ? activeIndex : 0);
        });
    </script>
</body>
</html>
