<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #f7f7fc;
            height: 100vh;
            overflow: hidden;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
        }

        /* CABEÇALHO - Só aparece na aba Posts */
        .header {
            height: 40px;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            z-index: 1001;
            flex-shrink: 0;
            transition: all 0.4s ease;
        }

        .header.hidden {
            transform: translateY(-100%);
            opacity: 0;
            height: 0;
            padding: 0;
            overflow: hidden;
        }

        .header h1 {
            font-size: 18px;
            color: #8a2be2;
            flex: 1;
            text-align: center;
        }

        /* NAVEGAÇÃO */
        .nav-container { 
            width: 100%; 
            padding: 6px 0;
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05); 
            z-index: 1000;
            flex-shrink: 0;
        }

        .tab-list {
            display: flex;
            align-items: center;
            justify-content: space-around;
            list-style: none;
            position: relative;
        }

        .tab-item {
            font-size: 14px;
            font-weight: 600;
            color: rgba(138, 43, 226, 0.6);
            cursor: pointer;
            padding: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tab-item.active {
            color: #8a2be2;
        }

        @media (max-width: 767px) {
            .tab-item i { display: none; }
        }

        /* --- BOTÕES REDONDOS (SUB-NAV) --- */
        .sub-nav-container {
            width: 100%;
            padding: 8px 16px;
            background: #f7f7fc;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            flex-shrink: 0;
            z-index: 999;
            scrollbar-width: none;
            transition: all 0.3s ease;
        }
        
        .sub-nav-container::-webkit-scrollbar {
            display: none;
        }

        .sub-nav-container.hidden {
            display: none;
        }

        .btn-theme {
            background: #ffffff;
            color: #8a2be2;
            border: 1px solid rgba(138, 43, 226, 0.2);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-theme:hover, .btn-theme:active, .btn-theme.active {
            background: #8a2be2;
            color: #ffffff;
        }

        /* CONTEÚDO */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }

        .window-wrapper {
            flex: 1;
            overflow: hidden;
            position: relative;
            min-height: 0;
        }

        .tabs-view-pager {
            display: flex;
            width: 400%;
            height: 100%;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .tab-page {
            width: 25%;
            height: 100%;
        }

        .content-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ====================== DESKTOP ====================== */
        @media (min-width: 768px) {
            body {
                flex-direction: row;
            }

            .header {
                position: absolute;
                top: 0;
                left: 240px;
                right: 0;
                z-index: 1002;
            }

            .nav-container { 
                width: 240px; 
                height: 100vh;
                border-right: 1px solid rgba(0, 0, 0, 0.05); 
                padding: 60px 0 20px;
                flex-shrink: 0;
            }

            .sub-nav-container {
                position: absolute;
                top: 40px;
                right: 0;
                left: auto;
                width: max-content;
                height: calc(100vh - 40px);
                background: #f7f7fc;
                border-left: 1px solid rgba(0, 0, 0, 0.05);
                padding: 20px 16px;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                align-items: stretch;
                gap: 12px;
                overflow-y: auto;
            }

            .sub-nav-container .btn-theme {
                justify-content: flex-start;
                padding: 10px 16px;
            }

            .main-container {
                margin-top: 40px;
                margin-right: 145px;
                transition: all 0.3s ease;
            }

            body:has(.sub-nav-container.hidden) .main-container {
                margin-right: 0px;
            }

            .tab-list {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
                padding: 0 16px;
            }

            .tab-item {
                flex-direction: row;
                gap: 12px;
                width: 100%;
                padding: 12px 16px;
                border-radius: 8px;
                font-size: 16px;
            }

            .tab-item i { display: inline-block; }

            .tab-item.active {
                background: rgba(138, 43, 226, 0.1);
            }
        }

        #show-nav-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            color: #8a2be2;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1005;
            opacity: 0;
            transition: all 0.4s;
        }

        #show-nav-btn.active {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <header class="header" id="app-header">
        <a href="../../../index.html"><i class="fas fa-arrow-left"></i></a>
        <h1>Feed</h1>
        <div style="width: 24px;"></div>
    </header>

    <nav class="nav-container" id="app-nav">
        <ul class="tab-list">
            <li class="tab-item active" onclick="switchTab(0)"><i class="fas fa-play"></i> <span>Posts</span></li>
            <li class="tab-item" onclick="switchTab(1)"><i class="far fa-plus-square"></i> <span>Criar</span></li>
            <li class="tab-item" onclick="switchTab(2)"><i class="fas fa-star"></i> <span>Comunidades</span></li>
            <li class="tab-item" onclick="switchTab(3)"><i class="fas fa-user"></i> <span>Perfil</span></li>
        </ul>
    </nav>

    <div class="sub-nav-container" id="sub-nav-buttons">
        <button class="btn-theme active" onclick="switchTheme(this, './Options/Post.html')"><i class="fas fa-file-alt"></i> Blog</button>
        <button class="btn-theme" onclick="switchTheme(this, './Options/Galeria.html')"><i class="fas fa-images"></i> Galeria</button>
        <button class="btn-theme" onclick="switchTheme(this, './Options/Links.html')"><i class="fas fa-link"></i> Links</button>
        <button class="btn-theme" onclick="switchTheme(this, './Options/Videos.html')"><i class="fas fa-video"></i> Vídeos</button>
        <button class="btn-theme" onclick="switchTheme(this, './Options/Namoro.html')"><i class="fas fa-heart"></i> Namoro</button>
    </div>

    <div class="main-container">
        <div class="window-wrapper">
            <div class="tabs-view-pager" id="view-pager">
                <div class="tab-page"><iframe id="posts-iframe" class="content-iframe" src="./Options/Post.html"></iframe></div>
                <div class="tab-page"><iframe class="content-iframe" src="./Options/Criar.html"></iframe></div>
                <div class="tab-page"><iframe class="content-iframe" src="./Options/Comunidade.html"></iframe></div>
                <div class="tab-page"><iframe class="content-iframe" src="./Options/Perfil.html"></iframe></div>
            </div>
        </div>
    </div>

    <button id="show-nav-btn" onclick="restoreNavigation()"><i class="fas fa-chevron-up"></i></button>

    <script>
        const pager = document.getElementById('view-pager');
        const header = document.getElementById('app-header');
        const subNav = document.getElementById('sub-nav-buttons');
        const postsIframe = document.getElementById('posts-iframe'); // Mapeia o iframe de posts
        const tabs = Array.from(document.querySelectorAll('.tab-item'));
        const showNavBtn = document.getElementById('show-nav-btn');

        // ATUALIZADO: Agora recebe a URL da página e altera o src do iframe correspondente
        function switchTheme(clickedButton, pageUrl) {
            const themeButtons = document.querySelectorAll('.btn-theme');
            themeButtons.forEach(btn => btn.classList.remove('active'));
            clickedButton.classList.add('active');
            
            // Altera dinamicamente a página renderizada dentro do iframe de posts
            if(postsIframe && pageUrl) {
                postsIframe.src = pageUrl;
            }
        }

        function switchTab(index) {
            tabs.forEach((item, i) => item.classList.toggle('active', i === index));
            
            pager.style.transform = `translateX(-${index * 25}%)`;

            if (index === 0) {
                header.classList.remove('hidden');
                subNav.classList.remove('hidden');
                showNavBtn.classList.remove('active');
            } else {
                header.classList.add('hidden');
                subNav.classList.add('hidden');
                showNavBtn.classList.add('active');
            }
        }

        function restoreNavigation() {
            switchTab(0);
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            switchTab(0);
        });

        window.addEventListener('resize', () => {
            const activeIndex = tabs.findIndex(tab => tab.classList.contains('active'));
            switchTab(activeIndex >= 0 ? activeIndex : 0);
        });
    </script>
</body>
</html>
