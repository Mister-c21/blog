<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoreSpace Comunidades</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff; /* Fundo Branco */
            color: #121212; /* Texto principal escuro */
            padding-bottom: 20px;
        }

        /* ==========================================================================
           HEADER E BARRA DE PESQUISA
           ========================================================================== */
        .app-header {
            padding: 20px 16px 4px 16px;
            background-color: #ffffff;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #f0f0f0;
        }

        .app-title {
            font-size: 24px;
            font-weight: 700;
            color: #121212;
            margin-bottom: 12px;
        }

        .search-container {
            width: 100%;
            position: relative;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            padding: 10px 40px 10px 16px; /* Padding direito para o botão de apagar */
            font-size: 15px;
            border: 1.5px solid #e0aaff;
            border-radius: 24px;
            background-color: #f8f5fc;
            color: #121212;
            outline: none;
            /* Transição suave para hover, focus e o efeito glow */
            transition: border-color 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* EFEITO HOVER NA BARRA DE BUSCA */
        .search-input:hover {
            border-color: #9d4edd;
            background-color: #f3e5f5;
        }

        /* EFEITO FOCUS E GLOW NA BARRA DE BUSCA */
        .search-input:focus {
            border-color: #7b2cbf;
            background-color: #ffffff;
            box-shadow: 0 0 12px rgba(123, 44, 191, 0.4); /* Glow roxo */
        }

        .search-input::placeholder {
            color: #a29bfe;
        }

        .clear-search-btn {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: #a29bfe;
            font-size: 16px;
            cursor: pointer;
            display: none;
            padding: 4px;
            outline: none;
        }

        .clear-search-btn:hover {
            color: #7b2cbf;
        }

        /* ==========================================================================
           ESTILO TIKTOK: TOP TAB BAR HORIZONTAL
           ========================================================================== */
        .tiktok-tab-container {
            display: flex;
            gap: 24px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 8px;
        }

        .tiktok-tab-container::-webkit-scrollbar {
            display: none;
        }

        .tiktok-tab {
            font-size: 16px;
            font-weight: 600;
            color: #757575;
            cursor: pointer;
            white-space: nowrap;
            position: relative;
            padding: 4px 0 8px 0;
            transition: color 0.2s ease;
            background: none;
            border: none;
            outline: none;
        }

        .tiktok-tab.active {
            color: #121212;
            font-weight: 700;
        }

        .tiktok-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 3px;
            background-color: #7b2cbf;
            border-radius: 2px;
        }

        .vertical-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #7b2cbf;
            padding: 16px 16px 8px 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ==========================================================================
           LISTA VERTICAL DE COMUNIDADES
           ========================================================================== */
        .tiktok-vertical-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 4px; /* Pequeno espaço para valorizar o contorno do glow */
        }

        .vertical-community-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 12px; /* Arredondamento sutil para o card */
            margin: 0 8px;
            /* Transição para hover, glow e clique */
            transition: background-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
        }

        /* EFEITO HOVER E GLOW NOS ITENS DA LISTA */
        .vertical-community-item:hover {
            background-color: #fdfbff;
            box-shadow: 0 4px 12px rgba(157, 78, 221, 0.15); /* Sutil glow roxo */
            transform: translateY(-1px); /* Leve efeito de elevação */
        }

        .vertical-community-item.hidden {
            display: none !important;
        }

        .vertical-community-item:active {
            background-color: #f3e5f5;
        }

        .vertical-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .vertical-avatar-wrapper {
            position: relative;
            width: 48px;
            height: 48px;
            flex-shrink: 0;
        }

        .vertical-avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .vertical-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .vertical-name {
            font-size: 15px;
            font-weight: 600;
            color: #121212;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background-color: #9d4edd;
            border: 2px solid #ffffff;
            border-radius: 50%;
        }

        /* ==========================================================================
           NOVO: MODAL DE CHAT (ESTILO SNAPCHAT)
           ========================================================================== */
        .chat-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .chat-modal.open {
            opacity: 1;
            pointer-events: auto;
        }

        .chat-bg-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.4);
            transform: scale(1.1);
            z-index: -1;
        }

        .chat-header {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .chat-close-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 24px;
            cursor: pointer;
            padding-right: 16px;
        }

        .chat-header-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .chat-header-name {
            font-size: 16px;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 12px;
        }

        .snap-message {
            max-width: 85%;
            color: #ffffff;
            font-size: 15px;
            line-height: 1.4;
            padding-left: 8px;
            border-left: 3px solid #9d4edd;
        }

        .snap-message .sender {
            font-size: 11px;
            font-weight: 700;
            color: #e0aaff;
            text-transform: uppercase;
            display: block;
            margin-bottom: 2px;
        }

        .chat-footer {
            padding: 12px 16px 24px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-input-wrapper {
            flex: 1;
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2px 16px;
            display: flex;
            align-items: center;
        }

        .chat-input {
            width: 100%;
            height: 40px;
            background: none;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 15px;
        }

        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .chat-send-btn {
            background: none;
            border: none;
            color: #e0aaff;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <h1 class="app-title">Comunidades</h1>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar comunidade">
            <button id="clearSearchBtn" class="clear-search-btn">✕</button>
        </div>
        
        <div class="tiktok-tab-container" id="tabContainer">
            <button class="tiktok-tab active" data-filter="all">Para você</button>
            <button class="tiktok-tab" data-filter="series">Séries</button>
            <button class="tiktok-tab" data-filter="animes_filmes">Animes & Filmes</button>
            <button class="tiktok-tab" data-filter="mundo_pop">Mundo Pop</button>
        </div>
    </header>

    <h2 class="vertical-section-title">Sugestões</h2>
    
    <div class="tiktok-vertical-container" id="communitiesContainer"></div>

    <div id="chatModal" class="chat-modal">
        <div id="chatBgBlur" class="chat-bg-blur"></div>
        
        <div class="chat-header">
            <button id="closeChatBtn" class="chat-close-btn">✕</button>
            <img id="chatHeaderAvatar" class="chat-header-avatar" src="" alt="">
            <span id="chatHeaderName" class="chat-header-name">Nome</span>
        </div>

        <div id="chatMessages" class="chat-messages">
            <div class="snap-message">
                <span class="sender">Sistema</span>
                Bem-vindo ao chat da comunidade! As mensagens enviadas desaparecem por padrão após visualizadas.
            </div>
        </div>

        <div class="chat-footer">
            <div class="chat-input-wrapper">
                <input type="text" id="chatInput" class="chat-input" placeholder="Enviar chat...">
            </div>
            <button id="chatSendBtn" class="chat-send-btn">Enviar</button>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const communitiesContainer = document.getElementById('communitiesContainer');
        const tabs = document.querySelectorAll('.tiktok-tab');
        let currentFilter = 'all';

        // ==========================================================================
        // BUSCA E CARREGAMENTO DE DADOS DIRETAMENTE VIA API
        // ==========================================================================
        async function fetchCommunities(query = '') {
            try {
                // Define termos padrões se o campo estiver vazio para não iniciar a tela sem nada
                const termSeries = query ? query : 'breaking';
                const termPop = query ? query : 'music';
                
                // 1. Puxa Séries da TVMaze API
                const responseSeries = await fetch(`https://api.tvmaze.com/search/shows?q=${encodeURIComponent(termSeries)}`);
                const dataSeries = await responseSeries.json();
                
                // 2. Puxa Animes da Jikan API (Se houver busca, filtra por ela, senão pega os principais)
                const animeUrl = query 
                    ? `https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&limit=3`
                    : 'https://api.jikan.moe/v4/top/anime?limit=3';
                const responseAnimes = await fetch(animeUrl);
                const dataAnimes = await responseAnimes.json();

                // 3. Puxa Pop da TVMaze API
                const responsePop = await fetch(`https://api.tvmaze.com/search/shows?q=${encodeURIComponent(termPop)}`);
                const dataPop = await responsePop.json();

                communitiesContainer.innerHTML = ''; // Reseta container

                // Injeta Séries encontradas
                dataSeries.slice(0, 3).forEach(item => {
                    createCommunityElement(
                        item.show.name, 
                        item.show.image ? item.show.image.medium : 'https://images.unsplash.com/photo-1574375927938-d5a98e8edd86?w=150', 
                        'series',
                        true
                    );
                });

                // Injeta Animes encontrados
                const animeList = dataAnimes.data || [];
                animeList.slice(0, 3).forEach(item => {
                    createCommunityElement(
                        item.title, 
                        item.images.jpg.image_url, 
                        'animes_filmes',
                        false
                    );
                });

                // Injeta Mundo Pop encontrado
                dataPop.slice(0, 3).forEach(item => {
                    createCommunityElement(
                        item.show.name, 
                        item.show.image ? item.show.image.medium : 'https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=150', 
                        'mundo_pop',
                        true
                    );
                });

                // Re-aplica o filtro da barra de abas atual sobre os novos resultados retornados da API
                applyTabFilterOnly();
                setupChatEvents();

            } catch (error) {
                console.error("Erro ao carregar dados das APIs: ", error);
                communitiesContainer.innerHTML = '<p style="padding: 16px; color: red;">Nenhum resultado ou erro na API.</p>';
            }
        }

        function createCommunityElement(name, imgUrl, category, hasBadge) {
            const item = document.createElement('div');
            item.className = 'vertical-community-item';
            item.setAttribute('data-category', category);

            item.innerHTML = `
                <div class="vertical-item-left">
                    <div class="vertical-avatar-wrapper">
                        <img class="vertical-avatar-img" src="${imgUrl}" alt="${name}">
                        ${hasBadge ? '<div class="status-badge"></div>' : ''}
                    </div>
                    <div class="vertical-info">
                        <span class="vertical-name">${name}</span>
                    </div>
                </div>
            `;
            communitiesContainer.appendChild(item);
        }

        // ==========================================================================
        // LÓGICA DE FILTRAGEM E EVENTOS DE ENTRADA
        // ==========================================================================
        
        // Filtra os itens em tela baseado apenas na categoria da Top Tab Bar activa
        function applyTabFilterOnly() {
            const communityItems = document.querySelectorAll('.vertical-community-item');
            communityItems.forEach(item => {
                const communityCategory = item.getAttribute('data-category');
                if (currentFilter === 'all' || communityCategory === currentFilter) {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });
        }

        // Controla exibição do botão limpar baseado no texto digitado
        searchInput.addEventListener('input', () => {
            if (searchInput.value.length > 0) {
                clearSearchBtn.style.display = 'block';
            } else {
                clearSearchBtn.style.display = 'none';
            }
        });

        // Dispara a busca real na API quando o usuário pressiona "Enter"
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                fetchCommunities(searchInput.value.trim());
            }
        });

        // Evento para o botão de apagar campo de busca (Reseta para a API padrão)
        clearSearchBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearSearchBtn.style.display = 'none';
            fetchCommunities(''); // Recarrega os dados padrão iniciais da API
            searchInput.focus();
        });

        // Evento de alteração de Abas do TikTok
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.getAttribute('data-filter');
                applyTabFilterOnly();
            });
        });

        // ==========================================================================
        // MODAL DE CHAT (ESTILO SNAPCHAT)
        // ==========================================================================
        const chatModal = document.getElementById('chatModal');
        const chatBgBlur = document.getElementById('chatBgBlur');
        const chatHeaderAvatar = document.getElementById('chatHeaderAvatar');
        const chatHeaderName = document.getElementById('chatHeaderName');
        const closeChatBtn = document.getElementById('closeChatBtn');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');
        const chatMessages = document.getElementById('chatMessages');

        function setupChatEvents() {
            const communityItems = document.querySelectorAll('.vertical-community-item');
            communityItems.forEach(item => {
                item.addEventListener('click', () => {
                    const name = item.querySelector('.vertical-name').textContent;
                    const imgSrc = item.querySelector('.vertical-avatar-img').src;

                    chatHeaderName.textContent = name;
                    chatHeaderAvatar.src = imgSrc;
                    chatBgBlur.style.backgroundImage = `url('${imgSrc}')`;

                    chatModal.classList.add('open');
                });
            });
        }

        closeChatBtn.addEventListener('click', () => {
            chatModal.classList.remove('open');
            chatInput.value = '';
            chatSendBtn.style.display = 'none';
        });

        chatInput.addEventListener('input', (e) => {
            if (e.target.value.trim().length > 0) {
                chatSendBtn.style.display = 'block';
            } else {
                chatSendBtn.style.display = 'none';
            }
        });

        function sendMessage() {
            const text = chatInput.value.trim();
            if (text.length === 0) return;

            const msgDiv = document.createElement('div');
            msgDiv.className = 'snap-message';
            msgDiv.innerHTML = `<span class="sender">Você</span>${text}`;
            
            chatMessages.appendChild(msgDiv);
            chatInput.value = '';
            chatSendBtn.style.display = 'none';
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatSendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Executa a primeira chamada de carregamento da API ao abrir a tela
        fetchCommunities();
    </script>

</body>
</html>
