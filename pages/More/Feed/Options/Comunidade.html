<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoreSpace Comunidades</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff; /* Fundo Branco */
            color: #121212; /* Texto principal escuro */
            padding-bottom: 20px;
        }

        /* ==========================================================================
           HEADER E BARRA DE PESQUISA (COM ANIMAÇÃO DE EXPANSÃO)
           ========================================================================== */
        .app-header {
            padding: 20px 16px 4px 16px;
            background-color: #ffffff;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #f0f0f0;
        }

        .app-title {
            font-size: 24px;
            font-weight: 700;
            color: #121212;
            margin-bottom: 12px;
            /* Transição suave adicionada para a troca de texto do título */
            transition: opacity 0.2s ease-in-out;
        }

        .search-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            width: 100%;
        }

        .search-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-input {
            width: 100%;
            padding: 10px 40px 10px 16px; /* Padding direito para o botão de apagar */
            font-size: 15px;
            border: 1.5px solid #e0aaff;
            border-radius: 24px;
            background-color: #f8f5fc;
            color: #121212;
            outline: none;
            /* Transição suave para hover, focus, efeito glow e mudança de placeholder */
            transition: border-color 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* EFEITO HOVER NA BARRA DE BUSCA */
        .search-input:hover {
            border-color: #9d4edd;
            background-color: #f3e5f5;
        }

        /* EFEITO FOCUS E GLOW NA BARRA DE BUSCA */
        .search-input:focus {
            border-color: #7b2cbf;
            background-color: #ffffff;
            box-shadow: 0 0 12px rgba(123, 44, 191, 0.4); /* Glow roxo */
        }

        /* ANIMAÇÃO SUAVE PARA A MUDANÇA DO TEXTO DO PLACEHOLDER */
        .search-input::placeholder {
            color: #a29bfe;
            opacity: 1;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s ease;
        }

        .search-input.fade-placeholder::placeholder {
            opacity: 0;
        }

        .clear-search-btn {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: #a29bfe;
            font-size: 16px;
            cursor: pointer;
            display: none;
            padding: 4px;
            outline: none;
        }

        .clear-search-btn:hover {
            color: #7b2cbf;
        }

        /* Ajuste harmônico para o container da busca quando o botão some */
        .search-row.expanded-search .search-container {
            flex: 1 1 100%;
        }

        /* ==========================================================================
           ESTILO TIKTOK: TOP TAB BAR HORIZONTAL
           ========================================================================== */
        .tiktok-tab-container {
            display: flex;
            gap: 24px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 8px;
        }

        .tiktok-tab-container::-webkit-scrollbar {
            display: none;
        }

        .tiktok-tab {
            font-size: 16px;
            font-weight: 600;
            color: #757575;
            cursor: pointer;
            white-space: nowrap;
            position: relative;
            padding: 4px 0 8px 0;
            transition: color 0.2s ease;
            background: none;
            border: none;
            outline: none;
        }

        .tiktok-tab.active {
            color: #121212;
            font-weight: 700;
        }

        .tiktok-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 3px;
            background-color: #7b2cbf;
            border-radius: 2px;
        }

        .vertical-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #7b2cbf;
            padding: 16px 16px 8px 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ==========================================================================
           CONTÊINER DE STORIES COM ANIMAÇÃO DE RECOLHIMENTO
           ========================================================================== */
        .moments-wrapper {
            max-height: 200px;
            opacity: 0;
            display: none; /* Começa oculto */
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }

        .moments-wrapper.show-moments {
            display: block;
            opacity: 1;
        }

        .moments-wrapper.collapse {
            max-height: 0 !important;
            opacity: 0 !important;
            padding-bottom: 0 !important;
            display: none;
        }

        .stories-container {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding: 0 16px 16px 16px;
            scrollbar-width: none;
        }

        .stories-container::-webkit-scrollbar {
            display: none;
        }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            flex-shrink: 0;
            width: 72px;
        }

        .story-avatar-wrapper {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            padding: 2.5px;
            background: linear-gradient(45deg, #e0aaff, #9d4edd, #7b2cbf);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
        }

        .story-item:hover .story-avatar-wrapper {
            transform: scale(1.04);
            box-shadow: 0 0 10px rgba(123, 44, 191, 0.3);
        }

        .story-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ffffff;
        }

        .story-name {
            font-size: 11px;
            font-weight: 500;
            color: #121212;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ==========================================================================
           CONTÊINER EXCLUSIVO DE GERENCIAMENTO DE AMIGOS
           ========================================================================== */
        .friends-management-bar {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            margin-bottom: 8px;
        }

        .friends-management-bar.show {
            display: flex;
        }

        .invite-btn {
            background-color: #7b2cbf;
            color: #ffffff;
            border: 1.5px solid #7b2cbf;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
        }

        .invite-btn:hover {
            background-color: #9d4edd;
            border-color: #9d4edd;
            transform: translateY(-1px);
        }

        .invite-btn:focus {
            background-color: #ffffff;
            color: #7b2cbf;
            border-color: #7b2cbf;
            box-shadow: 0 0 12px rgba(123, 44, 191, 0.5);
        }

        .add-friend-icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #7b2cbf;
            font-size: 18px;
            transition: background-color 0.2s;
        }

        .add-friend-icon-btn:hover {
            background-color: #f8f5fc;
        }

        /* ==========================================================================
           ESTADO VAZIO / SEM AMIGOS
           ========================================================================== */
        .empty-friends-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            text-align: center;
        }

        .empty-friends-state i.fa-face-smile, .empty-friends-state i.fa-star {
            font-size: 56px;
            color: #9d4edd;
            margin-bottom: 16px;
        }

        .empty-friends-text {
            font-size: 15px;
            color: #757575;
            line-height: 1.5;
            max-width: 260px;
            font-weight: 500;
        }

        /* ==========================================================================
           LISTA VERTICAL DE COMUNIDADES E ICONE DE LIXEIRA VERMELHA
           ========================================================================== */
        .tiktok-vertical-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 4px;
        }

        .vertical-community-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 12px;
            margin: 0 8px;
            transition: background-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
        }

        .vertical-community-item:hover {
            background-color: #fdfbff;
            box-shadow: 0 4px 12px rgba(157, 78, 221, 0.15);
            transform: translateY(-1px);
        }

        .vertical-community-item.hidden {
            display: none !important;
        }

        .vertical-community-item:active {
            background-color: #f3e5f5;
        }

        .vertical-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .vertical-avatar-wrapper {
            position: relative;
            width: 48px;
            height: 48px;
            flex-shrink: 0;
        }

        .vertical-avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .vertical-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .vertical-name {
            font-size: 15px;
            font-weight: 600;
            color: #121212;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background-color: #9d4edd;
            border: 2px solid #ffffff;
            border-radius: 50%;
        }

        /* BOTÃO DA LIXEIRA EXCLUSIVO COM ICONE DO FONT AWESOME COLORIDO */
        .delete-friend-btn, .remove-favorite-btn {
            background: none;
            border: none;
            width: 36px;
            height: 36px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: background-color 0.2s, transform 0.2s;
            z-index: 5;
        }

        .delete-friend-btn {
            color: #ff4d4d;
        }

        .delete-friend-btn:hover {
            background-color: #ffe6e6;
            transform: scale(1.1);
        }

        .remove-favorite-btn {
            color: #ffb703;
        }

        .remove-favorite-btn:hover {
            background-color: #fff2cc;
            transform: scale(1.1);
        }

        /* ==========================================================================
           MODAL DE CHAT (ESTILO SNAPCHAT)
           ========================================================================== */
        .chat-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .chat-modal.open {
            opacity: 1;
            pointer-events: auto;
        }

        .chat-bg-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.4);
            transform: scale(1.1);
            z-index: -1;
        }

        .chat-header {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .chat-close-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 20px;
            cursor: pointer;
            padding-right: 16px;
        }

        .chat-header-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .chat-header-name {
            font-size: 16px;
            font-weight: 600;
            flex: 1;
        }

        /* Botão de Estrela de Favoritar dentro do Modal de Chat */
        .chat-favorite-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            transition: color 0.2s, transform 0.2s;
        }

        .chat-favorite-btn.favorited {
            color: #ffb703;
        }

        .chat-favorite-btn:active {
            transform: scale(1.2);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 12px;
        }

        .snap-message {
            max-width: 85%;
            color: #ffffff;
            font-size: 15px;
            line-height: 1.4;
            padding-left: 8px;
            border-left: 3px solid #9d4edd;
        }

        .snap-message .sender {
            font-size: 11px;
            font-weight: 700;
            color: #e0aaff;
            text-transform: uppercase;
            display: block;
            margin-bottom: 2px;
        }

        .chat-footer {
            padding: 12px 16px 24px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-input-wrapper {
            flex: 1;
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2px 16px;
            display: flex;
            align-items: center;
        }

        .chat-input {
            width: 100%;
            height: 40px;
            background: none;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 15px;
        }

        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .chat-send-btn {
            background: none;
            border: none;
            color: #e0aaff;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <h1 class="app-title" id="appMainTitle">Comunidades</h1>
        
        <div class="search-row" id="searchRow">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Buscar comunidade">
                <button id="clearSearchBtn" class="clear-search-btn"><i class="fas fa-xmark"></i></button>
            </div>
        </div>
        
        <div class="tiktok-tab-container" id="tabContainer">
            <button class="tiktok-tab active" data-filter="amigos">Amigos</button>
            <button class="tiktok-tab" data-filter="all">Comunidades</button>
            <button class="tiktok-tab" data-filter="series">Preferidas</button>
        </div>
    </header>

    <div id="momentsWrapper" class="moments-wrapper">
        <h2 class="vertical-section-title">Momentos</h2>
        <div class="stories-container">
            <div class="story-item">
                <div class="story-avatar-wrapper">
                    <img class="story-img" src="https://images.unsplash.com/photo-1534527741775-53994a69daeb?w=150" alt="Story 1">
                </div>
                <span class="story-name">Seu Momento</span>
            </div>
            <div class="story-item">
                <div class="story-avatar-wrapper">
                    <img class="story-img" src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150" alt="Story 2">
                </div>
                <span class="story-name">Lucas</span>
            </div>
            <div class="story-item">
                <div class="story-avatar-wrapper">
                    <img class="story-img" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150" alt="Story 3">
                </div>
                <span class="story-name">Animes_BR</span>
            </div>
            <div class="story-item">
                <div class="story-avatar-wrapper">
                    <img class="story-img" src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=150" alt="Story 4">
                </div>
                <span class="story-name">PopCentral</span>
            </div>
            <div class="story-item">
                <div class="story-avatar-wrapper">
                    <img class="story-img" src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=150" alt="Story 5">
                </div>
                <span class="story-name">Mari_G</span>
            </div>
            <div class="story-item">
                <div class="story-avatar-wrapper">
                    <img class="story-img" src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=150" alt="Story 6">
                </div>
                <span class="story-name">CineClub</span>
            </div>
        </div>
    </div>

    <div id="friendsManagementBar" class="friends-management-bar">
        <button class="invite-btn">Convidar</button>
        <button class="add-friend-icon-btn" onclick="window.location.href='adicionar-amigo.html'">
            <i class="fas fa-user-plus"></i>
        </button>
    </div>

    <h2 class="vertical-section-title" id="sectionTitle">Sugestões</h2>
    
    <div class="tiktok-vertical-container" id="communitiesContainer"></div>

    <div id="chatModal" class="chat-modal">
        <div id="chatBgBlur" class="chat-bg-blur"></div>
        
        <div class="chat-header">
            <button id="closeChatBtn" class="chat-close-btn"><i class="fas fa-xmark"></i></button>
            <img id="chatHeaderAvatar" class="chat-header-avatar" src="" alt="">
            <span id="chatHeaderName" class="chat-header-name">Nome</span>
            <button id="chatFavoriteBtn" class="chat-favorite-btn"><i class="fa-solid fa-star"></i></button>
        </div>

        <div id="chatMessages" class="chat-messages"></div>

        <div class="chat-footer">
            <div class="chat-input-wrapper">
                <input type="text" id="chatInput" class="chat-input" placeholder="Enviar chat...">
            </div>
            <button id="chatSendBtn" class="chat-send-btn">Enviar</button>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const communitiesContainer = document.getElementById('communitiesContainer');
        const sectionTitle = document.getElementById('sectionTitle');
        const momentsWrapper = document.getElementById('momentsWrapper');
        const friendsManagementBar = document.getElementById('friendsManagementBar');
        const searchRow = document.getElementById('searchRow');
        const appMainTitle = document.getElementById('appMainTitle');
        const tabs = document.querySelectorAll('.tiktok-tab');
        let currentFilter = 'amigos'; // Modificado para iniciar na aba de Amigos, já que é a primeira agora

        // Variável auxiliar para rastrear o item ativo que está aberto no modal de chat
        let activeChatData = null;

        // Array dinâmico que guarda os itens favoritados (comunidades ou amigos)
        let favoriteList = [];

        // ==========================================================================
        // LISTA DINÂMICA DE AMIGOS
        // ==========================================================================
        let myFriends = [
            { id: 1, name: "Lucas (Amigo)", img: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150", hasBadge: true },
            { id: 2, name: "Mari_G (Amiga)", img: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=150", hasBadge: false }
        ];

        // ==========================================================================
        // BUSCA E CARREGAMENTO DE DADOS DIRETAMENTE VIA API
        // ==========================================================================
        async function fetchCommunities(query = '') {
            try {
                const termSeries = query ? query : 'breaking';
                const termPop = query ? query : 'music';
                
                const responseSeries = await fetch(`https://api.tvmaze.com/search/shows?q=${encodeURIComponent(termSeries)}`);
                const dataSeries = await responseSeries.json();
                
                const animeUrl = query 
                    ? `https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&limit=3`
                    : 'https://api.jikan.moe/v4/top/anime?limit=3';
                const responseAnimes = await fetch(animeUrl);
                const dataAnimes = await responseAnimes.json();

                const responsePop = await fetch(`https://api.tvmaze.com/search/shows?q=${encodeURIComponent(termPop)}`);
                const dataPop = await responsePop.json();

                communitiesContainer.innerHTML = ''; 

                // Injeta Amigos Ativos
                myFriends.forEach(friend => {
                    createCommunityElement(friend.name, friend.img, 'amigos', friend.hasBadge, friend.id);
                });

                // Injeta Séries
                dataSeries.slice(0, 3).forEach(item => {
                    createCommunityElement(
                        item.show.name, 
                        item.show.image ? item.show.image.medium : 'https://images.unsplash.com/photo-1574375927938-d5a98e8edd86?w=150', 
                        'series',
                        true
                    );
                });

                // Injeta Animes
                const animeList = dataAnimes.data || [];
                animeList.slice(0, 3).forEach(item => {
                    createCommunityElement(
                        item.title, 
                        item.images.jpg.image_url, 
                        'animes_filmes',
                        false
                    );
                });

                // Injeta Mundo Pop
                dataPop.slice(0, 3).forEach(item => {
                    createCommunityElement(
                        item.show.name, 
                        item.show.image ? item.show.image.medium : 'https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=150', 
                        'mundo_pop',
                        true
                    );
                });

                applyTabFilterOnly();
                setupChatEvents();

            } catch (error) {
                console.error("Erro ao carregar dados das APIs: ", error);
                communitiesContainer.innerHTML = '<p style="padding: 16px; color: red;">Nenhum resultado ou erro na API.</p>';
            }
        }

        function createCommunityElement(name, imgUrl, category, hasBadge, id = null) {
            const item = document.createElement('div');
            item.className = 'vertical-community-item';
            item.setAttribute('data-category', category);
            item.setAttribute('data-name', name);
            item.setAttribute('data-img', imgUrl);
            item.setAttribute('data-badge', hasBadge);
            if(id) item.setAttribute('data-friend-id', id);

            item.innerHTML = `
                <div class="vertical-item-left">
                    <div class="vertical-avatar-wrapper">
                        <img class="vertical-avatar-img" src="${imgUrl}" alt="${name}">
                        ${hasBadge ? '<div class="status-badge"></div>' : ''}
                    </div>
                    <div class="vertical-info">
                        <span class="vertical-name">${name}</span>
                    </div>
                </div>
                ${category === 'amigos' ? `<button class="delete-friend-btn" data-id="${id}"><i class="fas fa-trash-can"></i></button>` : ''}
            `;
            communitiesContainer.appendChild(item);
        }

        function filterFriendsLocal(query) {
            const communityItems = document.querySelectorAll('.vertical-community-item[data-category="amigos"]');
            let visibleCount = 0;

            communityItems.forEach(item => {
                const name = item.querySelector('.vertical-name').textContent.toLowerCase();
                if (name.includes(query.toLowerCase())) {
                    item.classList.remove('hidden');
                    visibleCount++;
                } else {
                    item.classList.add('hidden');
                }
            });

            const existingEmptyState = communitiesContainer.querySelector('.empty-friends-state');
            if (visibleCount === 0 && query.trim() !== '') {
                if (!existingEmptyState) {
                    const emptyState = document.createElement('div');
                    emptyState.className = 'empty-friends-state';
                    emptyState.innerHTML = `
                        <i class="fas fa-face-smile"></i>
                        <p class="empty-friends-text">Nenhum amigo encontrado com esse nome.</p>
                    `;
                    communitiesContainer.appendChild(emptyState);
                } else {
                    existingEmptyState.querySelector('.empty-friends-text').textContent = "Nenhum amigo encontrado com esse nome.";
                }
            } else if (existingEmptyState && myFriends.length > 0) {
                existingEmptyState.remove();
            }
        }

        // ==========================================================================
        // EXIBE APENAS A LISTA DE AMIGOS E OCULTA O RESTO QUANDO ATIVO
        // ==========================================================================
        function applyTabFilterOnly() {
            const communityItems = document.querySelectorAll('.vertical-community-item');
            
            // Remove estados vazios anteriores antes de aplicar filtros
            const existingEmptyState = communitiesContainer.querySelector('.empty-friends-state');
            if (existingEmptyState) existingEmptyState.remove();

            if (currentFilter === 'amigos') {
                sectionTitle.textContent = "Meus Amigos";
                
                // Mostra momentos apenas na aba Amigos
                momentsWrapper.classList.remove('collapse');
                momentsWrapper.classList.add('show-moments');
                
                friendsManagementBar.classList.add('show'); 
                searchRow.classList.add('expanded-search');
                
                if (appMainTitle.textContent !== "Amigos") {
                    appMainTitle.style.opacity = 0;
                    setTimeout(() => {
                        appMainTitle.textContent = "Amigos";
                        appMainTitle.style.opacity = 1;
                    }, 150);
                }

                if (searchInput.placeholder !== "Buscar amigo") {
                    searchInput.classList.add('fade-placeholder');
                    setTimeout(() => {
                        searchInput.placeholder = "Buscar amigo";
                        searchInput.classList.remove('fade-placeholder');
                    }, 150);
                }
                
                if (myFriends.length === 0) {
                    communitiesContainer.innerHTML = `
                        <div class="empty-friends-state">
                            <i class="fas fa-face-smile"></i>
                            <p class="empty-friends-text">Tudo bem ser antissocial, mas que tal fazermos alguns amigos em?</p>
                        </div>
                    `;
                    return;
                }

                // Esconde rigorosamente qualquer item que não pertença à categoria 'amigos'
                communityItems.forEach(item => {
                    if (item.getAttribute('data-category') === 'amigos') {
                        item.classList.remove('hidden');
                    } else {
                        item.classList.add('hidden');
                    }
                });

                filterFriendsLocal(searchInput.value.trim());
                return;
            } else if (currentFilter === 'series') {
                // SEÇÃO DE PREFERIDAS
                sectionTitle.textContent = "Minhas Preferidas";
                momentsWrapper.classList.add('collapse'); 
                momentsWrapper.classList.remove('show-moments');
                friendsManagementBar.classList.remove('show'); 
                searchRow.classList.remove('expanded-search');

                if (appMainTitle.textContent !== "Preferidas") {
                    appMainTitle.style.opacity = 0;
                    setTimeout(() => {
                        appMainTitle.textContent = "Preferidas";
                        appMainTitle.style.opacity = 1;
                    }, 150);
                }

                if (searchInput.placeholder !== "Buscar comunidade") {
                    searchInput.classList.add('fade-placeholder');
                    setTimeout(() => {
                        searchInput.placeholder = "Buscar comunidade";
                        searchInput.classList.remove('fade-placeholder');
                    }, 150);
                }

                // Oculta todos os elementos normais
                communityItems.forEach(item => item.classList.add('hidden'));

                // Se não houver preferidos, renderiza a mensagem humorada
                if (favoriteList.length === 0) {
                    communitiesContainer.innerHTML = `
                        <div class="empty-friends-state">
                            <i class="fa-solid fa-star" style="color: #ffb703;"></i>
                            <p class="empty-friends-text">Sua lista de preferidas está mais vazia que a geladeira de um universitário no fim do mês! Que tal favoritar algo?</p>
                        </div>
                    `;
                    return;
                }

                // Renderiza itens favoritos salvos dinamicamente
                favoriteList.forEach(fav => {
                    const favEl = document.createElement('div');
                    favEl.className = 'vertical-community-item';
                    favEl.setAttribute('data-category', 'temporary-favorite');
                    favEl.setAttribute('data-name', fav.name);
                    favEl.setAttribute('data-img', fav.img);
                    favEl.setAttribute('data-badge', fav.badge);

                    favEl.innerHTML = `
                        <div class="vertical-item-left">
                            <div class="vertical-avatar-wrapper">
                                <img class="vertical-avatar-img" src="${fav.img}" alt="${fav.name}">
                                ${fav.badge === 'true' ? '<div class="status-badge"></div>' : ''}
                            </div>
                            <div class="vertical-info">
                                <span class="vertical-name">${fav.name}</span>
                            </div>
                        </div>
                        <button class="remove-favorite-btn" data-fav-name="${fav.name}"><i class="fa-solid fa-star"></i></button>
                    `;
                    communitiesContainer.appendChild(favEl);
                });

                setupChatEvents();
                return;
            } else {
                sectionTitle.textContent = "Sugestões";
                
                // Esconde momentos fora da aba Amigos
                momentsWrapper.classList.add('collapse'); 
                momentsWrapper.classList.remove('show-moments');
                
                friendsManagementBar.classList.remove('show'); 
                searchRow.classList.remove('expanded-search');
                
                if (appMainTitle.textContent !== "Comunidades") {
                    appMainTitle.style.opacity = 0;
                    setTimeout(() => {
                        appMainTitle.textContent = "Comunidades";
                        appMainTitle.style.opacity = 1;
                    }, 150);
                }

                if (searchInput.placeholder !== "Buscar comunidade") {
                    searchInput.classList.add('fade-placeholder');
                    setTimeout(() => {
                        searchInput.placeholder = "Buscar comunidade";
                        searchInput.classList.remove('fade-placeholder');
                    }, 150);
                }
            }

            // Remove os cards favoritados temporários ao sair da aba Preferidas
            document.querySelectorAll('[data-category="temporary-favorite"]').forEach(el => el.remove());

            const tempEmptyState = communitiesContainer.querySelector('.empty-friends-state');
            if (tempEmptyState) tempEmptyState.remove();

            communityItems.forEach(item => {
                const communityCategory = item.getAttribute('data-category');
                
                if (currentFilter === 'all') {
                    if (communityCategory !== 'amigos') {
                        item.classList.remove('hidden');
                    } else {
                        item.classList.add('hidden');
                    }
                } else if (communityCategory === currentFilter) {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });
        }

        // Listener global de interações na lista
        communitiesContainer.addEventListener('click', (e) => {
            const deleteBtn = e.target.closest('.delete-friend-btn');
            const removeFavBtn = e.target.closest('.remove-favorite-btn');

            if (deleteBtn) {
                e.stopPropagation(); 
                const friendId = parseInt(deleteBtn.getAttribute('data-id'));
                
                myFriends = myFriends.filter(f => f.id !== friendId);
                
                const itemToRemove = communitiesContainer.querySelector(`[data-friend-id="${friendId}"]`);
                if(itemToRemove) {
                    itemToRemove.remove();
                }
                
                if(myFriends.length === 0 && currentFilter === 'amigos') {
                    applyTabFilterOnly();
                }
            }

            // Permite remover diretamente da lista de preferidos através do botão de Estrela
            if (removeFavBtn) {
                e.stopPropagation();
                const favName = removeFavBtn.getAttribute('data-fav-name');
                favoriteList = favoriteList.filter(fav => fav.name !== favName);
                
                // Remove o elemento visualmente
                removeFavBtn.closest('.vertical-community-item').remove();

                if (favoriteList.length === 0) {
                    applyTabFilterOnly();
                }
            }
        });

        searchInput.addEventListener('input', () => {
            const query = searchInput.value;
            if (query.length > 0) {
                clearSearchBtn.style.display = 'block';
            } else {
                clearSearchBtn.style.display = 'none';
            }

            if (currentFilter === 'amigos') {
                filterFriendsLocal(query.trim());
            }
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (currentFilter !== 'amigos') {
                    fetchCommunities(searchInput.value.trim());
                }
            }
        });

        clearSearchBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearSearchBtn.style.display = 'none';
            
            if (currentFilter === 'amigos') {
                filterFriendsLocal('');
            } else {
                fetchCommunities('');
            }
            searchInput.focus();
        });

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.getAttribute('data-filter');
                
                // Limpa favoritos visuais injetados temporariamente ao alternar de aba
                if (currentFilter !== 'series') {
                    document.querySelectorAll('[data-category="temporary-favorite"]').forEach(el => el.remove());
                }

                if (currentFilter !== 'amigos' && currentFilter !== 'series' && myFriends.length === 0) {
                     fetchCommunities(searchInput.value.trim());
                } else {
                     applyTabFilterOnly();
                }
            });
        });

        // ==========================================================================
        // MODAL DE CHAT (ESTILO SNAPCHAT)
        // ==========================================================================
        const chatModal = document.getElementById('chatModal');
        const chatBgBlur = document.getElementById('chatBgBlur');
        const chatHeaderAvatar = document.getElementById('chatHeaderAvatar');
        const chatHeaderName = document.getElementById('chatHeaderName');
        const closeChatBtn = document.getElementById('closeChatBtn');
        const chatFavoriteBtn = document.getElementById('chatFavoriteBtn');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');
        const chatMessages = document.getElementById('chatMessages');

        function setupChatEvents() {
            const communityItems = document.querySelectorAll('.vertical-community-item');
            communityItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    if(e.target.closest('.delete-friend-btn') || e.target.closest('.remove-favorite-btn')) return;

                    const name = item.getAttribute('data-name') || item.querySelector('.vertical-name').textContent;
                    const imgSrc = item.getAttribute('data-img') || item.querySelector('.vertical-avatar-img').src;
                    const category = item.getAttribute('data-category');
                    const badge = item.getAttribute('data-badge');

                    // Armazena os dados ativos no modal
                    activeChatData = { name, img: imgSrc, badge };

                    chatHeaderName.textContent = name;
                    chatHeaderAvatar.src = imgSrc;
                    chatBgBlur.style.backgroundImage = `url('${imgSrc}')`;

                    // Pinta a estrela se o item já for favorito
                    const isFav = favoriteList.some(fav => fav.name === name);
                    if (isFav) {
                        chatFavoriteBtn.classList.add('favorited');
                    } else {
                        chatFavoriteBtn.classList.remove('favorited');
                    }

                    chatMessages.innerHTML = '';

                    if (category !== 'amigos') {
                        chatMessages.innerHTML = `
                            <div class="snap-message">
                                <span class="sender">Sistema</span>
                                Bem-vindo ao chat da comunidade! As mensagens enviadas desaparecem por padrão após visualizadas.
                            </div>
                        `;
                    }

                    chatModal.classList.add('open');
                });
            });
        }

        // Lógica do botão de Favoritar no topo do Chat
        chatFavoriteBtn.addEventListener('click', () => {
            if (!activeChatData) return;

            const idx = favoriteList.findIndex(fav => fav.name === activeChatData.name);
            if (idx > -1) {
                // Já é favorito, então remove
                favoriteList.splice(idx, 1);
                chatFavoriteBtn.classList.remove('favorited');
            } else {
                // Adiciona nos favoritos
                favoriteList.push({
                    name: activeChatData.name,
                    img: activeChatData.img,
                    badge: activeChatData.badge
                });
                chatFavoriteBtn.classList.add('favorited');
            }

            // Atualiza a visualização caso estejamos na aba correspondente
            applyTabFilterOnly();
        });

        closeChatBtn.addEventListener('click', () => {
            chatModal.classList.remove('open');
            chatInput.value = '';
            chatSendBtn.style.display = 'none';
            activeChatData = null;
        });

        chatInput.addEventListener('input', (e) => {
            if (e.target.value.trim().length > 0) {
                chatSendBtn.style.display = 'block';
            } else {
                chatSendBtn.style.display = 'none';
            }
        });

        function sendMessage() {
            const text = chatInput.value.trim();
            if (text.length === 0) return;

            const msgDiv = document.createElement('div');
            msgDiv.className = 'snap-message';
            msgDiv.innerHTML = `<span class="sender">Você</span>${text}`;
            
            chatMessages.appendChild(msgDiv);
            chatInput.value = '';
            chatSendBtn.style.display = 'none';
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatSendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        fetchCommunities();
    </script>

</body>
</html>
