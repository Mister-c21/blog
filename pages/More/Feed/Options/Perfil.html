<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil</title>
  <style>
    /* RESET BÁSICO - Garante que o body use toda a tela sem margens */
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    /* Escopo global do componente */
    .tiktok-profile-wrapper {
      --tt-bg: #ffffff;
      --tt-text: #6200ee; /* Alterado para Violeta para os textos principais */
      --tt-text-secondary: #8a8b91;
      --tt-btn-bg: #f1f1f2;
      --tt-btn-hover: #e3e3e4;
      --tt-border: rgba(22, 24, 35, 0.12);
      /* Cores alteradas para Violeta */
      --tt-glow-color: rgba(138, 43, 226, 0.25);
      --tt-focus-outline: #8a2be2;
      
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 24px;
      background-color: var(--tt-bg); /* Alinhado com o fundo do tema */
      
      /* MODIFICAÇÃO: Garante que o wrapper ocupe toda a tela */
      width: 100%;
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* Suporte a Modo Escuro automático */
    @media (prefers-color-scheme: dark) {
      .tiktok-profile-wrapper {
        --tt-bg: #1a0f2e; /* Violeta de Fundo Escuro */
        --tt-text: #b388ff; /* Violeta claro para melhor leitura de texto no modo escuro */
        --tt-text-secondary: #8a8b91;
        --tt-btn-bg: #24153f; /* Violeta de Botão Escuro */
        --tt-btn-hover: #331e59; /* Violeta de Hover Escuro */
        --tt-border: rgba(255, 255, 255, 0.12);
        /* Violeta mais visível no modo escuro */
        --tt-glow-color: rgba(157, 78, 221, 0.45);
        --tt-focus-outline: #9d4edd;
      }
    }

    .tiktok-profile-container {
      position: relative; /* Permite posicionamento absoluto dos ícones de topo */
      background-color: var(--tt-bg);
      color: var(--tt-text);
      width: 100%;
      /* MODIFICAÇÃO: Aumentada a largura máxima para permitir que os posts cresçam */
      max-width: 935px; 
      padding: 16px;
      border-radius: 8px;
      box-sizing: border-box;
    }

    /* Barra de Ícones Superior (Notificações, Configurações e Edição) */
    .profile-top-bar {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none; /* Garante que não interfira no layout abaixo */
    }

    /* Agrupador para os botões do lado direito */
    .top-bar-right-actions {
      display: flex;
      gap: 8px; /* Espaço entre o botão de configurações e o de editar */
    }

    .top-bar-btn {
      background: none;
      border: none;
      padding: 8px;
      cursor: pointer;
      color: var(--tt-text);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.2s ease-in-out;
      pointer-events: auto; /* Reativa cliques nos botões */
      outline: none;
    }

    .top-bar-btn svg {
      width: 22px;
      height: 22px;
    }

    .top-bar-btn:hover {
      background-color: var(--tt-btn-bg);
      box-shadow: 0 0 10px var(--tt-glow-color);
    }

    .top-bar-btn:focus-visible {
      border-color: var(--tt-focus-outline);
      box-shadow: 0 0 0 2px var(--tt-bg), 0 0 0 4px var(--tt-focus-outline);
    }

    /* Cabeçalho - MODIFICADO para alinhar em coluna e centralizar */
    .profile-header {
      display: flex;
      flex-direction: column; /* Coloca a foto acima dos textos */
      align-items: center;    /* Centraliza os elementos horizontalmente */
      gap: 16px;              /* Espaçamento sutil entre foto e info */
      margin-bottom: 24px;
      margin-top: 24px;       /* Espaço extra para evitar sobreposição dos ícones de topo */
    }

    .profile-avatar-container {
      position: relative;
      width: 96px;
      height: 96px;
    }

    .profile-avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    /* Informações do Perfil - MODIFICADO para centralizar textos */
    .profile-info {
      display: flex;
      flex-direction: column;
      align-items: center; /* Centraliza o apelido */
      flex: 1;
      width: 100%;
    }

    .profile-username {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 12px 0;
      letter-spacing: -0.6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
      text-align: center; /* Garante que o texto fique centralizado */
    }

    /* Container Horizontal de Informações Detalhadas */
    .profile-details-bar {
      display: flex;
      flex-wrap: nowrap; /* Garante que as informações fiquem estritamente uma do lado da outra */
      justify-content: flex-start;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
      width: 100%;
      max-width: 100%;
      overflow-x: auto; /* Permite rolagem horizontal se a tela for menor que o conteúdo */
      padding: 4px 8px;
      box-sizing: border-box;
      
      /* Esconde a barra de rolagem padrão em navegadores modernos para manter o visual limpo */
      scrollbar-width: none; /* Firefox */
    }

    /* Esconde a barra de rolagem no Chrome/Safari */
    .profile-details-bar::-webkit-scrollbar {
      display: none;
    }

    /* Media query para centralizar os itens se sobra espaço na tela */
    @media (min-width: 480px) {
      .profile-details-bar {
        justify-content: center;
      }
    }

    .detail-tag {
      background-color: var(--tt-btn-bg);
      color: var(--tt-text);
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 16px;
      border: 1px solid var(--tt-border);
      white-space: nowrap;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px; /* Espaço entre o ícone e o texto fictício */
      flex-shrink: 0; /* Impede que as tags amassem para caber na tela */
    }

    .detail-tag svg {
      width: 14px;
      height: 14px;
      stroke-width: 2.2px;
    }

    .detail-tag:hover {
      box-shadow: 0 0 8px var(--tt-glow-color);
      transform: translateY(-1px);
    }

    /* Grade de Posts Estilo Instagram - MODIFICADA para maximizar o tamanho dos posts */
    .instagram-posts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px; /* MODIFICADO: Espaço reduzido de 8px para 4px de modo a maximizar a área útil do card */
      margin-top: 24px;
      width: 100%;
      box-sizing: border-box;
    }

    /* Item do Post Individual */
    .post-item {
      position: relative;
      width: 100%;
      padding-top: 100%; /* Truque clássico CSS para manter proporção 1:1 (quadrado) */
      overflow: hidden;
      border-radius: 4px;
      background-color: var(--tt-btn-bg);
      cursor: pointer;
      border: 1px solid var(--tt-border);
    }

    /* Conteúdo dentro do quadrado do Post */
    .post-content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .post-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    /* Iframe do YouTube ocupando todo o espaço quadrado de forma responsiva */
    .post-youtube-iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Estilização para o Card de Prévia de Link */
    .link-preview-card {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      text-decoration: none;
      color: inherit;
      background-color: var(--tt-bg);
    }

    .link-preview-header {
      height: 40%;
      width: 100%;
      overflow: hidden;
      border-bottom: 1px solid var(--tt-border);
    }

    .link-preview-header svg {
      width: 100%;
      height: 100%;
    }

    .link-preview-body {
      padding: 6px 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 60%;
      box-sizing: border-box;
    }

    .link-preview-title {
      font-size: 11px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--tt-text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin: 0;
    }

    .link-preview-domain {
      font-size: 9px;
      color: var(--tt-text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin: 2px 0;
    }

    .link-preview-button {
      align-self: flex-start;
      font-size: 9px;
      font-weight: 600;
      color: #ffffff;
      background-color: var(--tt-text); /* Herda a cor violeta principal */
      padding: 3px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      transition: background-color 0.2s;
    }

    .post-item:hover .link-preview-button {
      filter: brightness(1.1);
    }

    /* Efeito de overlay escuro e zoom ao passar o mouse nas imagens */
    .post-item:not(.youtube-post):not(.link-post):hover .post-image {
      transform: scale(1.05);
    }

    .post-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.4);
      opacity: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #ffffff;
      transition: opacity 0.2s ease;
      pointer-events: none; /* Garante que não bloqueie interações */
    }

    .post-item:not(.youtube-post):not(.link-post):hover .post-overlay {
      opacity: 1;
    }

    .post-stat {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      font-weight: 600;
    }

    .post-stat svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Ajuste responsivo de texto para o card de link em telas muito pequenas */
    @media (max-width: 360px) {
      .link-preview-title {
        font-size: 9px;
      }
      .link-preview-domain, .link-preview-button {
        font-size: 8px;
      }
    }

    /* Media queries para ajustar espaçamentos e tamanhos em telas maiores */
    @media (min-width: 768px) {
      .instagram-posts-grid {
        gap: 8px; /* MODIFICADO: Mantido um gap equilibrado e limpo de 8px */
      }
      .link-preview-title {
        font-size: 14px;
      }
      .link-preview-domain, .link-preview-button {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>

<div class="tiktok-profile-wrapper">
  <div class="tiktok-profile-container">
    
    <div class="profile-top-bar">
      <button class="top-bar-btn" id="tiktokNotificationBtn" title="Notificações">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
      </button>
      
      <div class="top-bar-right-actions">
        <button class="top-bar-btn" id="tiktokConfigBtn" title="Configurações">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>

        <button class="top-bar-btn" id="tiktokEditBtn" title="Editar Perfil">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
        </button>
      </div>
    </div>
    
    <div class="profile-header">
      <div class="profile-avatar-container">
        <svg class="profile-avatar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
      </div>
      <div class="profile-info">
        <h2 class="profile-username">Apelido</h2>
        
        <div class="profile-details-bar">
          <span class="detail-tag">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
              <path d="M2 12h20"></path>
            </svg>
            Masculino
          </span>

          <span class="detail-tag">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            25 anos
          </span>

          <span class="detail-tag">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 22s1-1 1-4V5s0-1-1-1h13s2 3 5 3 4-3 4-3v12s-1 1-4 1-5-3-5-3H3z"></path>
            </svg>
            Brasileiro
          </span>

          <span class="detail-tag">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
            Solteiro
          </span>
        </div>
      </div>
    </div>

    <div class="instagram-posts-grid">
      <div class="post-item">
        <div class="post-content">
          <svg class="post-image" viewBox="0 0 100 100" preserveAspectRatio="none">
            <defs>
              <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#8a2be2;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#4a00e0;stop-opacity:1" />
              </linearGradient>
            </defs>
            <rect width="100" height="100" fill="url(#grad1)" />
          </svg>
          <div class="post-overlay">
            <span class="post-stat">
              <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
              128
            </span>
          </div>
        </div>
      </div>

      <div class="post-item youtube-post">
        <div class="post-content">
          <iframe class="post-youtube-iframe" 
                  src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                  title="YouTube video player" 
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                  allowfullscreen>
          </iframe>
        </div>
      </div>

      <div class="post-item link-post">
        <div class="post-content">
          <a href="https://example.com" target="_blank" class="link-preview-card">
            <div class="link-preview-header">
              <svg viewBox="0 0 100 40" preserveAspectRatio="none">
                <defs>
                  <linearGradient id="gradLink" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#9d4edd;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#24153f;stop-opacity:1" />
                  </linearGradient>
                </defs>
                <rect width="100" height="40" fill="url(#gradLink)" />
              </svg>
            </div>
            <div class="link-preview-body">
              <h4 class="link-preview-title">Desenvolvimento Web Moderno e Performance</h4>
              <span class="link-preview-domain">example.com</span>
              <span class="link-preview-button">Acessar</span>
            </div>
          </a>
        </div>
      </div>

      <div class="post-item">
        <div class="post-content">
          <svg class="post-image" viewBox="0 0 100 100" preserveAspectRatio="none">
            <defs>
              <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#3c096c;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#7b2cbf;stop-opacity:1" />
              </linearGradient>
            </defs>
            <rect width="100" height="100" fill="url(#grad3)" />
          </svg>
          <div class="post-overlay">
            <span class="post-stat">
              <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
              95
            </span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const editBtn = document.getElementById('tiktokEditBtn');
    if (editBtn) {
      editBtn.addEventListener('click', () => {
        console.log('Botão Editar Perfil clicado');
      });
    }

    const notificationBtn = document.getElementById('tiktokNotificationBtn');
    if (notificationBtn) {
      notificationBtn.addEventListener('click', () => {
        console.log('Botão Notificações clicado');
      });
    }

    const configBtn = document.getElementById('tiktokConfigBtn');
    if (configBtn) {
      configBtn.addEventListener('click', () => {
        console.log('Botão Configurações clicado');
      });
    }
  });
</script>

</body>
</html>
