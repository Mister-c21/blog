<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil</title>
  <style>
    /* RESET BÁSICO - Garante que o body use toda a tela sem margens */
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    /* Escopo global do componente */
    .tiktok-profile-wrapper {
      --tt-bg: #ffffff;
      --tt-text: #6200ee; /* Alterado para Violeta para os textos principais */
      --tt-text-secondary: #8a8b91;
      --tt-btn-bg: #f1f1f2;
      --tt-btn-hover: #e3e3e4;
      --tt-border: rgba(22, 24, 35, 0.12);
      /* Cores alteradas para Violeta */
      --tt-glow-color: rgba(138, 43, 226, 0.25);
      --tt-focus-outline: #8a2be2;
      
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 24px;
      background-color: var(--tt-bg); /* Alinhado com o fundo do tema */
      
      /* MODIFICAÇÃO: Garante que o wrapper ocupe toda a tela */
      width: 100%;
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* Suporte a Modo Escuro automático */
    @media (prefers-color-scheme: dark) {
      .tiktok-profile-wrapper {
        --tt-bg: #1a0f2e; /* Violeta de Fundo Escuro */
        --tt-text: #b388ff; /* Violeta claro para melhor leitura de texto no modo escuro */
        --tt-text-secondary: #8a8b91;
        --tt-btn-bg: #24153f; /* Violeta de Botão Escuro */
        --tt-btn-hover: #331e59; /* Violeta de Hover Escuro */
        --tt-border: rgba(255, 255, 255, 0.12);
        /* Violeta mais visível no modo escuro */
        --tt-glow-color: rgba(157, 78, 221, 0.45);
        --tt-focus-outline: #9d4edd;
      }
    }

    .tiktok-profile-container {
      background-color: var(--tt-bg);
      color: var(--tt-text);
      width: 100%;
      /* MODIFICAÇÃO: Removido o max-width para ocupar toda a largura */
      max-width: 100%; 
      padding: 16px;
      border-radius: 8px;
      box-sizing: border-box;
    }

    /* Cabeçalho */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .profile-avatar-container {
      position: relative;
      width: 96px;
      height: 96px;
    }

    .profile-avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .profile-info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      flex: 1;
    }

    .profile-username {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 12px 0;
      letter-spacing: -0.6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }

    /* Botão Editar Perfil + Interações */
    .edit-profile-btn {
      background-color: var(--tt-btn-bg);
      color: var(--tt-text);
      border: 1px solid var(--tt-border);
      border-radius: 20px; /* MODIFICAÇÃO: Bordas mais circulares */
      padding: 0 24px;
      height: 36px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease-in-out;
      width: 100%;
      max-width: 164px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      outline: none;
    }

    /* Hover e Glow Violeta no botão */
    .edit-profile-btn:hover {
      background-color: var(--tt-btn-hover);
      box-shadow: 0 0 12px var(--tt-glow-color);
      transform: translateY(-1px);
    }

    /* Focus no botão */
    .edit-profile-btn:focus-visible {
      border-color: var(--tt-focus-outline);
      box-shadow: 0 0 0 2px var(--tt-bg), 0 0 0 4px var(--tt-focus-outline);
    }

    /* Lista Vertical de Opções */
    .profile-options-list {
      list-style: none;
      padding: 0;
      margin: 0;
      border-top: 1px solid var(--tt-border);
    }

    /* Itens da lista + Interações */
    .option-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 12px;
      margin: 2px 0;
      border-bottom: 1px solid var(--tt-border);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      outline: none;
    }

    /* Hover e Glow Violeta nas opções */
    .option-item:hover {
      background-color: rgba(22, 24, 35, 0.03);
      box-shadow: 0 0 12px var(--tt-glow-color);
    }

    @media (prefers-color-scheme: dark) {
      .option-item:hover {
        background-color: rgba(255, 255, 255, 0.03);
        box-shadow: 0 0 12px var(--tt-glow-color);
      }
    }

    /* Focus nas opções */
    .option-item:focus-visible {
      background-color: rgba(22, 24, 35, 0.05);
      box-shadow: inset 0 0 0 1.5px var(--tt-focus-outline);
    }

    @media (prefers-color-scheme: dark) {
      .option-item:focus-visible {
        background-color: rgba(255, 255, 255, 0.05);
      }
    }

    .option-content {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Container do Ícone SVG */
    .option-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      color: var(--tt-text);
    }

    .option-icon svg {
      width: 100%;
      height: 100%;
    }

    .option-text {
      font-size: 16px;
      font-weight: 500;
    }

    .option-arrow {
      color: var(--tt-text-secondary);
      font-size: 20px;
      line-height: 1;
    }
  </style>
</head>
<body>

<div class="tiktok-profile-wrapper">
  <div class="tiktok-profile-container">
    
    <div class="profile-header">
      <div class="profile-avatar-container">
        <svg class="profile-avatar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
      </div>
      <div class="profile-info">
        <h2 class="profile-username">Apelido</h2>
        <button class="edit-profile-btn" id="tiktokEditBtn">Editar perfil</button>
      </div>
    </div>

    <ul class="profile-options-list">
      <li class="option-item" id="opt-config" tabindex="0">
        <div class="option-content">
          <span class="option-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          </span>
          <span class="option-text">Configurações</span>
        </div>
        <span class="option-arrow">›</span>
      </li>
      <li class="option-item" id="opt-networks" tabindex="0">
        <div class="option-content">
          <span class="option-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
          </span>
          <span class="option-text">Redes sociais</span>
        </div>
        <span class="option-arrow">›</span>
      </li>
      <li class="option-item" id="opt-feed-preference" tabindex="0">
        <div class="option-content">
          <span class="option-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21l-8.228-5.254a2 2 0 0 1-.972-1.704V4.958a2 2 0 0 1 2.972-1.737L12 6.945l6.228-3.724a2 2 0 0 1 2.972 1.737v9.084a2 2 0 0 1-.972 1.704z"></path><path d="M12 6.945V21"></path></svg>
          </span>
          <span class="option-text">Preferência de feed</span>
        </div>
        <span class="option-arrow">›</span>
      </li>
      <li class="option-item" id="opt-logout" tabindex="0">
        <div class="option-content">
          <span class="option-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          </span>
          <span class="option-text">Deslogar</span>
        </div>
        <span class="option-arrow">›</span>
      </li>
      <li class="option-item" id="opt-delete" tabindex="0">
        <div class="option-content">
          <span class="option-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
          </span>
          <span class="option-text">Excluir a conta</span>
        </div>
        <span class="option-arrow">›</span>
      </li>
    </ul>

  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const editBtn = document.getElementById('tiktokEditBtn');
    if (editBtn) {
      editBtn.addEventListener('click', () => {
        console.log('Botão Editar Perfil clicado');
      });
    }
  });
</script>

</body>
</html>
