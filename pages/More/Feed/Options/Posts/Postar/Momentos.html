<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Câmera estilo Instagram</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .camera-container {
      position: relative;
      width: 100%;
      max-width: 420px;
      height: 100vh;
      height: 100dvh;
      background-color: #121212;
      border-radius: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background-color 0.3s ease;
    }

    /* Tema Claro */
    .camera-container.light-mode {
      background-color: #f0f0f0;
    }

    /* Efeito de Flash na Tela */
    .flash-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #fff;
      opacity: 0;
      z-index: 50;
      pointer-events: none;
      transition: opacity 0.05s ease-out;
    }

    .flash-overlay.active {
      opacity: 1;
    }

    /* Feed de Vídeo */
    #webcam {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: filter 0.3s ease, transform 0.2s ease-out;
    }

    /* Contagem Regressiva na Tela */
    .timer-countdown {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 96px;
      font-weight: bold;
      color: white;
      text-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
      z-index: 20;
      pointer-events: none;
      display: none;
    }

    /* Camada de Controles */
    .camera-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 20%, rgba(0,0,0,0) 70%, rgba(0,0,0,0.6) 100%);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .icon-btn {
      background: rgba(0, 0, 0, 0.3);
      border: none;
      color: white;
      font-size: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      backdrop-filter: blur(5px);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      transition: all 0.2s ease;
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
      transition: fill 0.2s ease;
    }

    /* Estados do Flash */
    .icon-btn.flash-on {
      background: rgba(255, 255, 255, 0.3);
    }

    .icon-btn.flash-on svg {
      fill: #ffd700; /* Amarelo aceso */
    }

    .flash-badge {
      position: absolute;
      bottom: -2px;
      right: -2px;
      background: #ffd700;
      color: #000;
      font-size: 9px;
      font-weight: bold;
      padding: 1px 3px;
      border-radius: 6px;
      display: none;
    }

    .timer-badge {
      position: absolute;
      bottom: -2px;
      right: -2px;
      background: #fff;
      color: #000;
      font-size: 10px;
      font-weight: bold;
      padding: 2px 4px;
      border-radius: 8px;
      display: none;
    }

    /* Container Inferior (Zoom + Filtros + Barra de Captura) */
    .bottom-controls-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 10;
    }

    /* Controle de Zoom */
    .zoom-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 10px;
    }

    .zoom-text {
      color: white;
      font-size: 12px;
      font-weight: bold;
      min-width: 32px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      text-align: center;
    }

    .zoom-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      max-width: 200px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.4);
      outline: none;
      backdrop-filter: blur(5px);
    }

    .zoom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
      box-shadow: 0 0 5px rgba(0,0,0,0.5);
    }

    .zoom-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 5px rgba(0,0,0,0.5);
    }

    /* Seleção de Filtros */
    .filter-bar {
      display: flex;
      justify-content: flex-start;
      gap: 12px;
      overflow-x: auto;
      padding: 5px 0;
      scrollbar-width: none;
    }

    .filter-bar::-webkit-scrollbar {
      display: none;
    }

    .filter-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid transparent;
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      backdrop-filter: blur(5px);
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: white;
      color: black;
      border-color: #fff;
    }

    /* Controles Inferiores */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .shutter-button {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 4px solid white;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .shutter-button:active {
      transform: scale(0.92);
    }

    .shutter-inner {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: white;
    }
  </style>
</head>
<body>

  <div class="camera-container" id="camera-container">
    <div id="flash-overlay" class="flash-overlay"></div>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="photo-canvas" style="display: none;"></canvas>

    <div id="timer-countdown" class="timer-countdown"></div>

    <div class="camera-overlay">
      
      <div class="top-bar">
        <button id="theme-btn" class="icon-btn" aria-label="Modo Noturno">
          <svg id="theme-icon" viewBox="0 0 24 24">
            <path d="M12.3 2a10 10 0 0 0 9.7 11.5 10 10 0 1 1-11.2-11.4 8.2 8.2 0 0 0 1.5-.1z"/>
          </svg>
        </button>

        <button id="switch-btn" class="icon-btn" aria-label="Alternar Câmera">
          <svg viewBox="0 0 24 24">
            <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
          </svg>
        </button>
      </div>

      <div class="bottom-controls-container">
        
        <div class="zoom-container">
          <input type="range" id="zoom-slider" class="zoom-slider" min="1" max="3" step="0.1" value="1">
          <span id="zoom-value" class="zoom-text">1x</span>
        </div>

        <div class="filter-bar">
          <button class="filter-btn active" data-filter="none">Normal</button>
          <button class="filter-btn" data-filter="grayscale(100%)">P&B</button>
          <button class="filter-btn" data-filter="sepia(80%)">Sépia</button>
          <button class="filter-btn" data-filter="contrast(150%) hue-rotate(180deg)">Vibe</button>
          <button class="filter-btn" data-filter="saturate(200%)">Vibrante</button>
        </div>

        <div class="bottom-bar">
          <button id="flash-btn" class="icon-btn" aria-label="Flash">
            <svg viewBox="0 0 24 24">
              <path d="M7 2v11h3v9l7-12h-4l4-8z"/>
            </svg>
            <span id="flash-badge" class="flash-badge"></span>
          </button>

          <button id="capture-btn" class="shutter-button">
            <div class="shutter-inner"></div>
          </button>

          <button id="timer-btn" class="icon-btn" aria-label="Temporizador">
            <svg viewBox="0 0 24 24">
              <path d="M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8.03-6.61l1.42-1.42c-.43-.51-.9-.99-1.41-1.41l-1.42 1.42A8.962 8.962 0 0012 4c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-2.12-.74-4.07-1.97-5.61zM12 20c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
            </svg>
            <span id="timer-badge" class="timer-badge"></span>
          </button>
        </div>
      </div>

    </div>
  </div>

  <script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('photo-canvas');
    const captureBtn = document.getElementById('capture-btn');
    const switchBtn = document.getElementById('switch-btn');
    const timerBtn = document.getElementById('timer-btn');
    const timerBadge = document.getElementById('timer-badge');
    const timerCountdown = document.getElementById('timer-countdown');
    const themeBtn = document.getElementById('theme-btn');
    const themeIcon = document.getElementById('theme-icon');
    const cameraContainer = document.getElementById('camera-container');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const zoomSlider = document.getElementById('zoom-slider');
    const zoomValue = document.getElementById('zoom-value');
    const flashBtn = document.getElementById('flash-btn');
    const flashBadge = document.getElementById('flash-badge');
    const flashOverlay = document.getElementById('flash-overlay');

    let currentStream = null;
    let currentFacingMode = 'user'; // 'user' para frontal, 'environment' para traseira
    let activeFilter = 'none';
    let isDarkMode = true;
    let currentZoom = 1;

    // Modos de Flash: 'off', 'on', 'auto'
    const flashModes = ['off', 'on', 'auto'];
    let flashIndex = 0;
    let currentFlashMode = 'off';

    // Alternar modos do Flash
    flashBtn.addEventListener('click', () => {
      flashIndex = (flashIndex + 1) % flashModes.length;
      currentFlashMode = flashModes[flashIndex];

      if (currentFlashMode === 'on') {
        flashBtn.classList.add('flash-on');
        flashBadge.style.display = 'none';
      } else if (currentFlashMode === 'auto') {
        flashBtn.classList.remove('flash-on');
        flashBadge.textContent = 'A';
        flashBadge.style.display = 'block';
      } else {
        flashBtn.classList.remove('flash-on');
        flashBadge.style.display = 'none';
      }

      // Tenta aplicar lanterna/torch se suportado no dispositivo (Câmera traseira)
      if (currentStream) {
        const track = currentStream.getVideoTracks()[0];
        const capabilities = track.getCapabilities ? track.getCapabilities() : {};
        if (capabilities.torch) {
          track.applyConstraints({
            advanced: [{ torch: currentFlashMode === 'on' }]
          }).catch(err => console.log('Torch não suportado:', err));
        }
      }
    });

    // Alternar Modo Noturno / Claro
    const sunPath = "M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zM7.05 18.36l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41s-1.02-.39-1.41 0z";
    const moonPath = "M12.3 2a10 10 0 0 0 9.7 11.5 10 10 0 1 1-11.2-11.4 8.2 8.2 0 0 0 1.5-.1z";

    themeBtn.addEventListener('click', () => {
      isDarkMode = !isDarkMode;
      if (isDarkMode) {
        cameraContainer.classList.remove('light-mode');
        themeIcon.innerHTML = `<path d="${moonPath}"/>`;
      } else {
        cameraContainer.classList.add('light-mode');
        themeIcon.innerHTML = `<path d="${sunPath}"/>`;
      }
    });

    // Controle de Zoom
    zoomSlider.addEventListener('input', (e) => {
      currentZoom = parseFloat(e.target.value);
      zoomValue.textContent = currentZoom.toFixed(1) + 'x';
      
      if (currentStream) {
        const videoTrack = currentStream.getVideoTracks()[0];
        const capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
        
        if (capabilities.zoom) {
          videoTrack.applyConstraints({
            advanced: [{ zoom: currentZoom }]
          }).catch(err => console.log('Zoom nativo não suportado:', err));
        } else {
          video.style.transform = `scale(${currentZoom})`;
        }
      }
    });

    // Opções de Temporizador: 0s (desligado), 3s, 5s, 10s
    const timerOptions = [0, 3, 5, 10];
    let timerIndex = 0;
    let selectedTimer = 0;
    let isCountingDown = false;

    // Alterna o tempo do temporizador
    timerBtn.addEventListener('click', () => {
      timerIndex = (timerIndex + 1) % timerOptions.length;
      selectedTimer = timerOptions[timerIndex];

      if (selectedTimer > 0) {
        timerBadge.textContent = selectedTimer + 's';
        timerBadge.style.display = 'block';
      } else {
        timerBadge.style.display = 'none';
      }
    });

    // Inicializa a câmera
    async function initCamera() {
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
      }

      try {
        const constraints = {
          video: {
            facingMode: currentFacingMode,
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        };

        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = currentStream;

        zoomSlider.value = 1;
        currentZoom = 1;
        zoomValue.textContent = '1x';
        video.style.transform = 'scale(1)';

      } catch (error) {
        console.error('Erro ao acessar a câmera:', error);
        alert('Não foi possível acessar a câmera. Verifique as permissões.');
      }
    }

    // Alternar entre câmera frontal e traseira
    switchBtn.addEventListener('click', () => {
      currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
      initCamera();
    });

    // Aplicar Filtros
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        activeFilter = btn.getAttribute('data-filter');
        video.style.filter = activeFilter;
      });
    });

    // Função interna que realiza o disparo da foto
    function takePicture() {
      // Disparo do Efeito Flash (Screen Flash) se ativado ou auto
      if (currentFlashMode === 'on' || currentFlashMode === 'auto') {
        flashOverlay.classList.add('active');
        setTimeout(() => {
          flashOverlay.classList.remove('active');
        }, 150);
      }

      const context = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      context.filter = activeFilter;
      context.save();

      if (currentZoom > 1) {
        const zoomedWidth = canvas.width / currentZoom;
        const zoomedHeight = canvas.height / currentZoom;
        const startX = (canvas.width - zoomedWidth) / 2;
        const startY = (canvas.height - zoomedHeight) / 2;

        if (currentFacingMode === 'user') {
          context.translate(canvas.width, 0);
          context.scale(-1, 1);
        }

        context.drawImage(video, startX, startY, zoomedWidth, zoomedHeight, 0, 0, canvas.width, canvas.height);
      } else {
        if (currentFacingMode === 'user') {
          context.translate(canvas.width, 0);
          context.scale(-1, 1);
        }
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
      }

      context.restore();
    }

    // Capturar Foto com tratamento de Temporizador
    captureBtn.addEventListener('click', () => {
      if (isCountingDown) return;

      if (selectedTimer > 0) {
        isCountingDown = true;
        let timeLeft = selectedTimer;
        
        timerCountdown.textContent = timeLeft;
        timerCountdown.style.display = 'block';

        const interval = setInterval(() => {
          timeLeft--;
          if (timeLeft > 0) {
            timerCountdown.textContent = timeLeft;
          } else {
            clearInterval(interval);
            timerCountdown.style.display = 'none';
            isCountingDown = false;
            takePicture();
          }
        }, 1000);
      } else {
        takePicture();
      }
    });

    // Iniciar ao carregar a página
    initCamera();
  </script>
</body>
</html>
