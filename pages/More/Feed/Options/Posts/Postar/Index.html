<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página com iFrame e Botão Violeta</title>
  <style>
    /* Reset básico */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* Iframe em tela cheia */
    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
    }

    /* --- ESTILO DO BOTÃO FLUTUANTE (VIOLETA E BRANCO) --- */
    .theme-toggle-wrapper {
      position: fixed;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: block; /* Visível por padrão */
    }

    /* Oculta o seletor em telas Desktop (largura maior que 768px) */
    @media (min-width: 769px) {
      .theme-toggle-wrapper {
        display: none;
      }
    }

    .theme-switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 30px;
    }

    /* Esconde o checkbox real */
    .theme-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    /* Fundo do botão em Violeta */
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #8a2be2; /* Violeta */
      border: 2px solid #ffffff; /* Borda Branca */
      transition: 0.3s;
      border-radius: 30px;
      box-shadow: 0 4px 10px rgba(138, 43, 226, 0.4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5px;
    }

    /* Estilização dos ícones SVG em Branco */
    .slider .icon {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: #ffffff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    /* Círculo deslizante Branco */
    .slider::before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: #ffffff; /* Branco */
      transition: 0.3s;
      border-radius: 50%;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      z-index: 2;
    }

    /* Estado quando alternado */
    input:checked + .slider {
      background-color: #6a1b9a; /* Tom de violeta mais escuro */
    }

    input:checked + .slider::before {
      transform: translateX(30px);
    }
  </style>
</head>
<body>

  <div class="theme-toggle-wrapper">
    <label class="theme-switch" for="checkbox">
      <input type="checkbox" id="checkbox" />
      <div class="slider">
        <span class="icon" title="Posts">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="3" y1="9" x2="21" y2="9"></line>
            <line x1="9" y1="21" x2="9" y2="9"></line>
          </svg>
        </span>
        <span class="icon" title="Stories">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="8" stroke-dasharray="4 2"></circle>
            <circle cx="12" cy="12" r="3" fill="#ffffff"></circle>
          </svg>
        </span>
      </div>
    </label>
  </div>

  <iframe id="myIframe" src="posts.html" title="Página Renderizada"></iframe>

  <script>
    const checkbox = document.getElementById('checkbox');
    const iframe = document.getElementById('myIframe');

    // Verifica se a tela é mobile (largura de até 768px)
    const isMobile = window.innerWidth <= 768;

    if (isMobile) {
      // No Mobile: Inicia com Stories (marcado)
      checkbox.checked = true;
      iframe.src = 'stories.html';
    } else {
      // No Desktop: Inicia com Posts (desmarcado)
      checkbox.checked = false;
      iframe.src = 'posts.html';
    }

    // Escuta a troca manual do switch (no mobile)
    checkbox.addEventListener('change', () => {
      if (checkbox.checked) {
        iframe.src = 'stories.html';
      } else {
        iframe.src = 'posts.html';
      }
    });
  </script>

</body>
</html>
