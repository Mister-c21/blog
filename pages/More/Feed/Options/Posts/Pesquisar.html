<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar - Rede Social</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        /* Configurações Gerais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff; /* Fundo Branco */
            color: #262626;
        }

        /* Barra de Pesquisa */
        .search-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #ffffff;
            padding: 10px 16px;
            border-bottom: 1px solid #f3e8ff; /* Violeta bem claro */
            z-index: 100;
        }

        .search-container {
            display: flex;
            align-items: center;
            background-color: #f5f0fa; /* Fundo violeta suave para o input */
            padding: 8px 16px; /* Ajustado o padding lateral para combinar com o visual circular */
            border-radius: 24px; /* Deixa a barra totalmente circular nas pontas */
            border: 1px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* Transição mais suave para o glow */
        }

        /* Efeito Hover (Passar o mouse) */
        .search-container:hover {
            border-color: #c4b5fd; /* Borda violeta clara */
            background-color: #f0e8f8;
            box-shadow: 0 0 8px rgba(196, 181, 253, 0.4); /* Leve brilho ao passar o mouse */
        }

        /* Efeito Focus e Glow (Clicar/Focar no campo) */
        .search-container:focus-within {
            border-color: #7c3aed; /* Borda violeta ao focar */
            background-color: #ffffff;
            /* Efeito de super glow expansivo usando múltiplas camadas de sombra */
            box-shadow: 0 0 0 1px #7c3aed, 0 0 14px rgba(124, 58, 237, 0.4); 
        }

        .search-icon {
            color: #a78bfa; /* Ícone violeta médio */
            margin-right: 8px;
            font-size: 20px;
        }

        .search-input {
            border: none;
            background: transparent;
            width: 100%;
            outline: none;
            font-size: 16px;
            color: #4c1d95; /* Texto violeta escuro */
        }

        .search-input::placeholder {
            color: #c4b5fd;
        }

        /* Botão de Limpar (X) */
        .clear-button {
            background: none;
            border: none;
            color: #a78bfa;
            cursor: pointer;
            display: none; /* Escondido por padrão */
            align-items: center;
            justify-content: center;
            padding: 0;
            margin-left: 8px;
            transition: color 0.2s ease;
        }

        .clear-button:hover {
            color: #7c3aed; /* Fica mais escuro no hover */
        }

        .clear-button .material-symbols-outlined {
            font-size: 20px;
        }

        /* Classe utilitária para mostrar o botão via JS */
        .clear-button.visible {
            display: flex;
        }

        /* Grade de Fotos (Estilo Instagram) */
        .explore-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            padding: 4px;
            margin-top: 60px; /* Afasta o conteúdo da barra fixa */
            max-width: 935px;
            margin-left: auto;
            margin-right: auto;
        }

        .grid-item {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background-color: #f3e8ff;
            cursor: pointer;
        }

        /* Efeito para criar uma foto vertical em destaque */
        .grid-item.tall {
            grid-row: span 2;
            aspect-ratio: auto;
        }

        /* Aplica as mesmas propriedades de tamanho tanto para imagens quanto para vídeos embedados */
        .grid-item img, 
        .grid-item iframe {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
            transition: transform 0.3s ease;
        }

        .grid-item:hover img,
        .grid-item:hover iframe {
            transform: scale(1.03);
            filter: brightness(0.9);
        }

        /* Ajuste para telas maiores (Desktop) */
        @media (min-width: 768px) {
            .explore-grid {
                gap: 28px;
                padding: 28px 0;
            }
            .search-header {
                padding: 20px;
            }
            .search-container {
                max-width: 600px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>

    <header class="search-header">
        <div class="search-container">
            <span class="material-symbols-outlined search-icon">search</span>
            <input type="text" id="searchInput" placeholder="Pesquisar interesses, @usuarios, #hashtags..." class="search-input">
            <button type="button" id="clearBtn" class="clear-button" title="Limpar busca">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
    </header>

    <main class="explore-grid">
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=1" alt="Post"></div>
        
        <div class="grid-item">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        
        <div class="grid-item tall">
            <iframe src="https://www.youtube.com/embed/9bZkp7q19f0" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=4" alt="Post"></div>
        
        <div class="grid-item">
            <iframe src="https://www.youtube.com/embed/kJQP7kiw5Fk" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=6" alt="Post"></div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=7" alt="Post"></div>
        
        <div class="grid-item">
            <iframe src="https://www.youtube.com/embed/jfKfPfyJRdk" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        
        <div class="grid-item"><img src="https://picsum.photos/300/300?random=9" alt="Post"></div>
    </main>

    <script>
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');

        // Escuta o evento de digitação no input
        searchInput.addEventListener('input', () => {
            if (searchInput.value.trim().length > 0) {
                clearBtn.classList.add('visible'); // Mostra o botão se houver texto
            } else {
                clearBtn.classList.remove('visible'); // Esconde se estiver vazio
            }
        });

        // Evento de clique para limpar o input
        clearBtn.addEventListener('click', () => {
            searchInput.value = ''; // Limpa o texto
            clearBtn.classList.remove('visible'); // Esconde o botão
            searchInput.focus(); // Devolve o foco para o campo de digitação
        });
    </script>

</body>
</html>
