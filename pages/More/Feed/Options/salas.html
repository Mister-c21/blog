<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Salas</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --card-bg: transparent;
      --violet-primary: #9d4edd;
      --violet-glow: #7b2cbf;
      --text-white: #1a1a1a;
      --text-muted: #666666;
      --bg-image: none;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      font-family: 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
    }

    /* Efeito de imagem desfocada ao fundo no hover/focus */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: var(--bg-image);
      background-size: cover;
      background-position: center;
      filter: blur(25px) brightness(0.8);
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: -1;
      transform: scale(1.1);
    }

    body.has-hover::before {
      opacity: 1;
    }

    /* Cabeçalho */
    .header {
      width: 100%;
      max-width: 450px;
      display: flex;
      align-items: center;
      position: relative;
      margin-bottom: 30px;
      padding: 10px 0;
    }

    .header-title {
      width: 100%;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-white);
    }

    /* Container dos 3 Cards */
    .card-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
      width: 100%;
      max-width: 450px;
    }

    /* Cards Estilizados */
    .card {
      background-color: var(--card-bg);
      border: 2px solid rgba(157, 78, 221, 0.4);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      color: var(--text-white);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      outline: none;
      position: relative;
      height: 180px;
      display: block;
      text-decoration: none;
    }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .card-content {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 20px;
      background: linear-gradient(to top, rgba(255, 255, 255, 0.95) 0%, transparent 100%);
      pointer-events: none;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-white);
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
    }

    /* Hover e Focus com efeito Glow */
    .card:hover,
    .card:focus-visible {
      transform: translateY(-6px);
      border-color: var(--violet-primary);
      box-shadow: 0 0 20px rgba(157, 78, 221, 0.4),
                  0 0 10px rgba(157, 78, 221, 0.2);
    }

    .card:hover .card-image,
    .card:focus-visible .card-image {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <header class="header">
    <h1 class="header-title">Salas</h1>
  </header>

  <div class="card-list">
    
    <a href="video.html" class="card">
      <img class="card-image" src="src/video.png" alt="Vídeo">
      <div class="card-content">
        <h3 class="card-title">Vídeo</h3>
      </div>
    </a>

    <a href="audio.html" class="card">
      <img class="card-image" src="src/audio.png" alt="Áudio">
      <div class="card-content">
        <h3 class="card-title">Áudio</h3>
      </div>
    </a>

    <a href="texto.html" class="card">
      <img class="card-image" src="src/text.png" alt="Texto">
      <div class="card-content">
        <h3 class="card-title">Texto</h3>
      </div>
    </a>

  </div>

  <script>
    const cards = document.querySelectorAll('.card');
    const body = document.body;

    cards.forEach(card => {
      const img = card.querySelector('.card-image');
      if (!img) return;

      const handleEnter = () => {
        body.style.setProperty('--bg-image', `url("${img.src}")`);
        body.classList.add('has-hover');
      };

      const handleLeave = () => {
        body.classList.remove('has-hover');
      };

      card.addEventListener('mouseenter', handleEnter);
      card.addEventListener('mouseleave', handleLeave);
      card.addEventListener('focus', handleEnter);
      card.addEventListener('blur', handleLeave);
    });
  </script>

</body>
</html>
