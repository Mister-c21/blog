<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil DO CRIADOR REAL</title>
    <script src="https://unpkg.com/lucide"></script>
    <style>
        :root {
            --blueviolet: #8a2be2;
            --ghost: #f8f8ff;
        }

        body {
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 1s ease-in-out;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 2rem;
            width: 90%;
            max-width: 800px;
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .avatar {
            width: 120px;
            height: 120px;
            background: var(--blueviolet);
            border-radius: 50%;
            margin: 0 auto 1rem;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        h1 { color: var(--blueviolet); margin-bottom: 0.5rem; }

        .btn {
            background: var(--blueviolet);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
            cursor: pointer;
            border: none;
        }

        .section-title {
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 10px 0;
            width: 90%;
            max-width: 800px;
            text-align: left;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .feed-container {
            width: 90%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            box-sizing: border-box;
        }

        .feed-item {
            height: 200px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; }
        #video-modal { overflow-y: scroll; scroll-snap-type: y mandatory; background-size: cover; background-position: center; }
        .shorts-container { width: 100%; max-width: 400px; margin: 0 auto; }
        .short-wrapper { height: 100vh; width: 100%; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: fixed; top: 20px; right: 20px; color: white; cursor: pointer; font-size: 3rem; z-index: 1001; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="avatar">
            <img src="./20260629_220402.jpg" alt="Foto de perfil">
        </div>
        <h1>Caio</h1>
        <button class="btn" onclick="document.getElementById('ngl-modal').style.display='block'">
            <i data-lucide="mail-question"></i> Enviar mensagem anônima
        </button>
    </div>

    <p class="section-title">AMO</p>

    <div class="feed-container">
        <div class="feed-item" data-vids="lFzVJEksoDY,c3mEHmjZBQY,nNg6qC-CerM" style="background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEijPDi8Ho72PTs7H62YyiH5X_qpuGIMWBVV0MtupLyD2WiecL_i4Lh-ii3EKoLlRWLjsOAiu_DKd3F0TQTyk62fJ7S6eCrKQ6UnxezTMJlTXfTbvhmxRZIjdU9E8FcfvyLjlYkcXbtiXYLT/s640/tumblr_ogjjs5naME1rnx2kbo1_500.gif')">Filmes</div>
        <div class="feed-item" data-vids="tC0N5fm9RuE,3k3hcdRy2R8,aCv-yOBV6bQ,jkt49o-iV_Y,4N9HmMNf7EU" style="background-image: url('https://cdn-images.dzcdn.net/images/cover/b689a07c27832782bba1f13494825797/1900x1900-000000-80-0-0.jpg')">Músicas</div>
        <div class="feed-item" data-vids="TyuQw33kqcU,VMVLCv6fUVQ,YGJmfLvzK0Q,tdA_phvdI9Y,gZS_FHxMpIs,EU9Cxak8_UA,qnKFCqaIFZE,9_9yXWh5ZtQ,-lYsgPxj4e4,X7FAWLPmgVU" style="background-image: url('https://i.pinimg.com/originals/99/b8/bc/99b8bcfa5d9b12a930670f805c3132e5.gif')">Seres</div>
        <div class="feed-item" data-vids="I9xuplTZ_dg,opj-XQRChyk,7hywb5yvEU8,iHqt8SBUMSY,g_C1CIPG3MM" style="background-image: url('https://64.media.tumblr.com/47a769a6ec924484c57bc6340d3c8865/7307e41ae7e569e2-e6/s540x810/eabf7b0cc574c3562be2ec3b2152966b723e51b7.gifv')">personagens</div>
        <div class="feed-item" data-vids="9wOlr-3BvIE,cF5xKQ1igJM" style="background-image: url('https://i.pinimg.com/originals/50/65/a3/5065a3884d8a858b2a915ee72586cef6.gif')">Literatura</div>
        <div class="feed-item" data-vids="8PNPZKa-WaY,m-14q7k16RU,ojnWUXkcywQ,EFa-N6iHdbk,hZarJ34HNn8" style="background-image: url('https://i.pinimg.com/originals/92/3f/0c/923f0c9c8c8faf1db48236aa2c394c69.gif')">Outros</div>
    </div>

    <div id="video-modal" class="modal">
        <span class="close-btn" onclick="this.parentElement.style.display='none'; document.getElementById('shorts-list').innerHTML=''">&times;</span>
        <div class="shorts-container" id="shorts-list"></div>
    </div>

    <div id="ngl-modal" class="modal">
        <span class="close-btn" onclick="this.parentElement.style.display='none'">&times;</span>
        <iframe src="https://ngl.link/caio84685"></iframe>
    </div>

    <script>
        lucide.createIcons();

        const backgrounds = ['https://wallpapercave.com/wp/wp8992889.jpg', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTNz63rW0jHWGpn6bxBm1okdatfAHGjeH34EbZrTCuVEbXZ4oW2HHMfzI09&s=10', 'https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/e331c4fd-865b-4520-9943-e597b4072af1/d1vygvc-3cf52026-119d-4c64-abac-9fc82051f0c7.jpg/v1/fill/w_900,h_720,q_75,strp/lost_canvas_wallpaper_by_acssofiati_d1vygvc-fullview.jpg?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7ImhlaWdodCI6Ijw9NzIwIiwicGF0aCI6Ii9mL2UzMzFjNGZkLTg2NWItNDUyMC05OTQzLWU1OTdiNDA3MmFmMS9kMXZ5Z3ZjLTNjZjUyMDI2LTExOWQtNGM2NC1hYmFjLTlmYzgyMDUxZjBjNy5qcGciLCJ3aWR0aCI6Ijw9OTAwIn1dXSwiYXVkIjpbInVybjpzZXJ2aWNlOmltYWdlLm9wZXJhdGlvbnMiXX0.Oewo2GfvyCElh6cF_hB3EAR5mifQ9UOnNBuN62B4Hek'];
        let idx = 0;
        setInterval(() => {
            document.body.style.backgroundImage = `url('${backgrounds[idx]}')`;
            idx = (idx + 1) % backgrounds.length;
        }, 5000);

        document.querySelectorAll('.feed-item').forEach(item => {
            item.onclick = () => {
                const modal = document.getElementById('video-modal');
                modal.style.backgroundImage = item.style.backgroundImage;
                const videos = item.getAttribute('data-vids').split(',');
                document.getElementById('shorts-list').innerHTML = videos.map(id => `
                    <div class="short-wrapper"><iframe src="https://www.youtube.com/embed/${id}"></iframe></div>
                `).join('');
                modal.style.display = 'block';
            }
        });
    </script>
</body>
</html>
