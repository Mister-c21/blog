<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface TikTok Style</title>
    <style>
        /* Paleta de cores do código exemplo */
        :root {
            --primary: #8a2be2;
            --bg-glass: rgba(138, 43, 226, 0.08);
            --border-glass: rgba(138, 43, 226, 0.15);
            --text-inactive: rgba(138, 43, 226, 0.6);
            --bg-page: #f7f7fc;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-page);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Container das Abas */
        .tab-container {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-glass);
            position: relative;
            gap: 28px;
        }

        .tab-item {
            font-size: 16px; font-weight: 600; cursor: pointer;
            color: var(--text-inactive);
            transition: color 0.25s ease, transform 0.2s ease;
            padding: 6px 4px;
        }

        .tab-item.active { color: var(--primary); transform: scale(1.05); }

        .tab-indicator {
            position: absolute; bottom: 10px; height: 3px;
            background-color: var(--primary);
            border-radius: 2px; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Sistema de Paginação Animada */
        .window-wrapper { flex: 1; width: 100%; height: calc(100vh - 58px); overflow: hidden; position: relative; }
        .tabs-view-pager { display: flex; width: 200%; height: 100%; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
        .tab-page { width: 50%; height: 100%; }
        .content-iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <nav class="tab-container" id="tab-container">
        <div class="tab-item" onclick="window.location.href='../../../Index.html'">Home</div>
        <div class="tab-item active" onclick="switchTab(0)">Criador</div>
        <div class="tab-item" onclick="switchTab(1)">Termos</div>
        <div class="tab-indicator" id="indicator"></div>
    </nav>

    <div class="window-wrapper">
        <div class="tabs-view-pager" id="view-pager">
            <div class="tab-page"><iframe class="content-iframe" src="criador.html"></iframe></div>
            <div class="tab-page"><iframe class="content-iframe" src="termos.html"></iframe></div>
        </div>
    </div>

    <script>
        const pager = document.getElementById('view-pager');
        const indicator = document.getElementById('indicator');
        const tabs = Array.from(document.querySelectorAll('.tab-item:not(:first-child)'));

        function switchTab(index) {
            tabs.forEach((item, i) => item.classList.toggle('active', i === index));
            
            indicator.style.width = `${tabs[index].offsetWidth}px`;
            indicator.style.left = `${tabs[index].offsetLeft}px`;
            
            pager.style.transform = `translateX(-${index * 50}%)`;
        }

        window.addEventListener('DOMContentLoaded', () => switchTab(0));
    </script>
</body>
</html>
