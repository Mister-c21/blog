<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Mídias - Orion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --primary-color: #8a2be2; 
            --glass-bg: rgba(255, 255, 255, 0.2);
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f8ff; padding: 20px; }

        .glass-effect {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 43, 226, 0.3);
        }

        .modal-bg { background: rgba(248, 248, 255, 0.95); backdrop-filter: blur(15px); }

        .gx-mods-carousel {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 5px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .gx-mods-carousel::-webkit-scrollbar { display: none; }

        .gx-mod-card {
            flex: 0 0 180px;
            height: 110px;
            position: relative;
            cursor: pointer;
            overflow: hidden; 
            transition: transform 0.2s ease, filter 0.2s ease;
            clip-path: polygon(15px 0%, 100% 0%, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0% 100%, 0% 15px);
        }
        
        .gx-mod-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .gx-mod-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(138, 43, 226, 0.15);
            pointer-events: none;
        }
        
        .gx-mod-card:hover { transform: scale(1.03); filter: brightness(1.1); }

        .tab-active { color: var(--primary-color) !important; border-bottom: 2px solid var(--primary-color); }

        #playerModal {
            background: rgba(248, 248, 255, 0.95);
            backdrop-filter: blur(15px);
        }
    </style>
</head>
<body>

    <main class="max-w-3xl w-full mx-auto py-8">
        <div class="mb-8 flex items-center gap-4">
            <a href="#" class="text-[var(--primary-color)] hover:opacity-70 transition-all text-xl">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="relative flex items-center flex-grow group">
                <input type="text" placeholder="Buscar filmes, séries ou cartoons..." 
                    class="w-full py-3.5 pl-6 pr-12 rounded-full glass-effect text-slate-800 placeholder-slate-500 border border-purple-300/30 focus:outline-none focus:ring-2 focus:ring-[var(--primary-color)]/50 focus:border-[var(--primary-color)] transition-all shadow-lg shadow-purple-500/10">
                <i class="fas fa-search absolute right-5 text-[var(--primary-color)] transition-transform group-hover:scale-110"></i>
            </div>
            <i class="fas fa-bars text-[var(--primary-color)] text-2xl cursor-pointer hover:opacity-80 transition" onclick="toggleModal(true)"></i>
        </div>

        <div class="flex flex-col gap-8">
            <section>
                <div class="flex items-center justify-between w-full mb-3 px-1">
                    <h2 class="text-lg font-bold text-slate-800">Filmes</h2>
                </div>
                <div class="gx-mods-carousel">
                    <div class="gx-mod-card" onclick="openPlayer('url-do-seu-arquivo.html')"><img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=600" alt="Filme"></div>
                    <div class="gx-mod-card" onclick="openPlayer('url-do-seu-arquivo.html')"><img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=600" alt="Filme"></div>
                </div>
            </section>
            <section>
                <div class="flex items-center justify-between w-full mb-3 px-1">
                    <h2 class="text-lg font-bold text-slate-800">Séries</h2>
                </div>
                <div class="gx-mods-carousel">
                    <div class="gx-mod-card" onclick="openPlayer('url-do-seu-arquivo.html')"><img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=600" alt="Série"></div>
                    <div class="gx-mod-card" onclick="openPlayer('url-do-seu-arquivo.html')"><img src="https://images.unsplash.com/photo-1542382257-8091763a8634?q=80&w=600" alt="Série"></div>
                </div>
            </section>
            <section>
                <div class="flex items-center justify-between w-full mb-3 px-1">
                    <h2 class="text-lg font-bold text-slate-800">Cartoons</h2>
                </div>
                <div class="gx-mods-carousel">
                    <div class="gx-mod-card" onclick="openPlayer('url-do-seu-arquivo.html')"><img src="https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=600" alt="Cartoon"></div>
                    <div class="gx-mod-card" onclick="openPlayer('url-do-seu-arquivo.html')"><img src="https://images.unsplash.com/photo-1618336753974-a84e09d1e740?q=80&w=600" alt="Cartoon"></div>
                </div>
            </section>
            <section>
                <div class="flex items-center justify-between w-full mb-3 px-1">
                    <h2 class="text-lg font-bold text-slate-800">Documentários</h2>
                </div>
                <div class="gx-mods-carousel">
                    <div class="gx-mod-card" onclick="openPlayer('url-do-seu-arquivo.html')"><img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?q=80&w=600" alt="Documentário"></div>
                    <div class="gx-mod-card" onclick="openPlayer('url-do-seu-arquivo.html')"><img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=600" alt="Documentário"></div>
                </div>
            </section>
            <section>
                <div class="flex items-center justify-between w-full mb-3 px-1">
                    <h2 class="text-lg font-bold text-slate-800">Animes</h2>
                </div>
                <div class="gx-mods-carousel">
                    <div class="gx-mod-card" onclick="openPlayer('url-do-seu-arquivo.html')"><img src="https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=600" alt="Anime"></div>
                    <div class="gx-mod-card" onclick="openPlayer('url-do-seu-arquivo.html')"><img src="https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=600" alt="Anime"></div>
                </div>
            </section>
        </div>
    </main>

    <div id="modalMenu" class="fixed inset-0 z-50 hidden flex flex-col p-8 modal-bg">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-[var(--primary-color)]">Mais Títulos</h2>
            <i class="fas fa-times text-2xl text-[var(--primary-color)] cursor-pointer" onclick="toggleModal(false)"></i>
        </div>
        <div class="relative flex items-center mb-6 group">
            <input type="text" placeholder="Filtrar por nome..." class="w-full py-3 pl-5 pr-12 rounded-full glass-effect text-slate-800 placeholder-slate-500 border border-purple-300/30 focus:outline-none focus:ring-2 focus:ring-[var(--primary-color)]/50 focus:border-[var(--primary-color)] transition-all">
            <i class="fas fa-search absolute right-5 text-[var(--primary-color)] transition-transform group-hover:scale-110"></i>
        </div>
        <div class="flex gap-6 overflow-x-auto mb-6 pb-2 text-slate-500 font-medium whitespace-nowrap">
            <span class="tab-item tab-active pb-1 cursor-pointer" onclick="selectTab(this, 'tab-filmes')">Filmes</span>
            <span class="tab-item pb-1 cursor-pointer" onclick="selectTab(this, 'tab-series')">Séries</span>
            <span class="tab-item pb-1 cursor-pointer" onclick="selectTab(this, 'tab-cartoons')">Cartoons</span>
            <span class="tab-item pb-1 cursor-pointer" onclick="selectTab(this, 'tab-documentarios')">Documentários</span>
            <span class="tab-item pb-1 cursor-pointer" onclick="selectTab(this, 'tab-animes')">Animes</span>
        </div>
        <div id="modal-content-area" class="flex-grow overflow-y-auto">
            <div id="tab-filmes" class="tab-content grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="gx-mod-card" onclick="openPlayer('url-do-seu-arquivo.html')"><img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=600" alt="Filmes"></div>
            </div>
            <div id="tab-series" class="tab-content hidden grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="gx-mod-card" onclick="openPlayer('url-do-seu-arquivo.html')"><img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=600" alt="Séries"></div>
            </div>
            <div id="tab-cartoons" class="tab-content hidden grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="gx-mod-card" onclick="openPlayer('url-do-seu-arquivo.html')"><img src="https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=600" alt="Cartoons"></div>
            </div>
            <div id="tab-documentarios" class="tab-content hidden grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="gx-mod-card" onclick="openPlayer('url-do-seu-arquivo.html')"><img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?q=80&w=600" alt="Documentários"></div>
            </div>
            <div id="tab-animes" class="tab-content hidden grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="gx-mod-card" onclick="openPlayer('url-do-seu-arquivo.html')"><img src="https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=600" alt="Animes"></div>
            </div>
        </div>
    </div>

    <div id="playerModal" class="fixed inset-0 z-[100] hidden">
        <i class="fas fa-times absolute top-8 right-8 text-3xl text-[var(--primary-color)] cursor-pointer z-[101]" onclick="closePlayer()"></i>
        <iframe id="playerIframe" src="" class="w-full h-full border-none" allowfullscreen></iframe>
    </div>

    <script>
        function toggleModal(show) {
            document.getElementById('modalMenu').classList.toggle('hidden', !show);
        }

        function openPlayer(url) {
            const modal = document.getElementById('playerModal');
            const iframe = document.getElementById('playerIframe');
            iframe.src = url;
            modal.classList.remove('hidden');
        }

        function closePlayer() {
            const modal = document.getElementById('playerModal');
            const iframe = document.getElementById('playerIframe');
            iframe.src = "";
            modal.classList.add('hidden');
        }

        function selectTab(element, targetId) {
            document.querySelectorAll('.tab-item').forEach(tab => tab.classList.remove('tab-active'));
            element.classList.add('tab-active');
            document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));
            document.getElementById(targetId).classList.remove('hidden');
        }
    </script>
</body>
</html>
