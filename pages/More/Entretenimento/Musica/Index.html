<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
  :root {
    --blueviolet-color: #8a2be2;
    --ghost: #f8f8ff;
    --glass: rgba(255, 255, 255, 0.7);
  }

  body { 
    background-image: url('https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?q=80&w=2070'); 
    background-size: cover; 
    background-position: center; 
    background-attachment: fixed; 
    font-family: sans-serif; 
    margin: 0; 
    padding: 20px; 
  }

  .track-list { max-width: 500px; margin: auto; }

  .search-container { margin-bottom: 15px; position: relative; display: flex; align-items: center; }
  .search-bar { 
    width: 100%; padding: 12px 75px 12px 20px; border: 1px solid rgba(255, 255, 255, 0.3); 
    border-radius: 50px; background: var(--glass); backdrop-filter: blur(15px); 
    outline: none; font-size: 1em; color: #333; box-sizing: border-box; transition: all 0.3s ease; 
  }
  .search-bar:hover { box-shadow: 0 0 10px rgba(138, 43, 226, 0.2); }
  .search-bar:focus { box-shadow: 0 0 15px rgba(138, 43, 226, 0.4); border-color: var(--blueviolet-color); }

  .track-item { 
    display: flex; align-items: center; padding: 10px; margin-bottom: 12px; 
    background-size: cover; background-position: center; position: relative; overflow: hidden;
    border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.3); 
    transition: all 0.3s ease; cursor: pointer; 
  }
  .track-item::before {
    content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--glass); backdrop-filter: blur(10px); z-index: 1;
  }
  .track-item > * { position: relative; z-index: 2; }
  .track-item:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(138, 43, 226, 0.2); border-color: var(--blueviolet-color); }

  .modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #030303; z-index: 1000; flex-direction: column; overflow: hidden; }
  .modal-content { width: 100%; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; padding: 40px 20px; box-sizing: border-box; }
  .close-btn { font-size: 2em; cursor: pointer; color: var(--ghost); margin-bottom: 30px; }
  
  .album-art-wrapper { width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 20px; overflow: hidden; margin-bottom: 30px; }
  .album-art-wrapper iframe { width: 100%; height: 100%; border: none; }
  
  .modal-info { text-align: left; color: var(--ghost); margin-bottom: 20px; }
  .modal-info h2 { font-size: 28px; margin: 0; }
  .modal-info p { font-size: 18px; color: #aaa; margin: 8px 0 0; }

  /* Container de botões horizontais */
  .action-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 10px; }
  .action-btn { 
    background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 12px; text-align: center; 
    font-size: 20px; color: var(--ghost); border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; transition: 0.3s;
  }
  .action-btn:hover { background: rgba(138, 43, 226, 0.2); border-color: var(--blueviolet-color); }

  .search-controls { position: absolute; right: 15px; display: flex; gap: 10px; }
  .btn-icon { background: none; border: none; color: #a0a0a0; cursor: pointer; font-size: 1.1em; transition: color 0.3s; }
  .btn-icon:hover { color: var(--blueviolet-color); }
  .thumbnail { width: 120px; height: 68px; border-radius: 8px; background-color: #cccccc; margin-right: 15px; background-size: cover; background-position: center; flex-shrink: 0; }
  .info h4 { margin: 0; font-size: 0.95em; color: #333; }
  .info p { margin: 4px 0 0; font-size: 0.75em; color: #555; }
  @keyframes pulse { 0% { transform: scale(1); color: var(--blueviolet-color); } 50% { transform: scale(1.2); color: red; } 100% { transform: scale(1); color: var(--blueviolet-color); } }
  .recording { animation: pulse 1.5s infinite; }
</style>
</head>
<body>

<div class="track-list" id="trackList">
  <div class="search-container">
    <input type="text" id="searchInput" class="search-bar" placeholder="Buscar música..." oninput="handleSearch()">
    <div class="search-controls">
      <button class="btn-icon" onclick="toggleVoice(this)"><i class="fa-solid fa-microphone" id="micIcon"></i></button>
      <button class="btn-icon" id="clearBtn" onclick="clearSearch()" style="display:none;"><i class="fa-solid fa-xmark"></i></button>
    </div>
  </div>
  <div id="resultsContainer"></div>
</div>

<div class="modal" id="embedModal">
  <div class="modal-content">
    <i class="fa-solid fa-chevron-down close-btn" onclick="closeModal()"></i>
    <div class="album-art-wrapper">
        <iframe id="modalIframe" src="" frameborder="0" allowfullscreen></iframe>
    </div>
    <div class="modal-info">
        <h2 id="modal-title"></h2>
        <p id="modal-artist"></p>
    </div>
    <div class="action-bar">
        <div class="action-btn" onclick="window.open('https://www.google.com/search?q=' + document.getElementById('modal-title').innerText)"><i class="ph ph-magnifying-glass"></i></div>
        <div class="action-btn" onclick="window.open('https://music.youtube.com/search?q=' + document.getElementById('modal-title').innerText)"><i class="ph ph-music-note"></i></div>
        <div class="action-btn" onclick="window.open('https://pt.wikipedia.org/wiki/Special:Search?search=' + encodeURIComponent(document.getElementById('modal-artist').innerText))"><i class="ph ph-book-open"></i></div>
    </div>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const tema = urlParams.get('tema');
  const capa = urlParams.get('capa');
  if(capa) document.body.style.backgroundImage = `url('${decodeURIComponent(capa)}')`;

  const tracksData = {
    "Jazz": [ { title: "So What", artist: "Miles Davis", id: "zqNTltOGh5c" }, { title: "Take Five", artist: "Dave Brubeck", id: "PHdq0-d63sg" } ],
    "Rock": [ { title: "Do I Wanna Know?", artist: "Arctic Monkeys", id: "bpOSxM0rNPM" } ]
  };

  let currentCategory = tema || 'Jazz'; 

  function renderTracks() {
    const container = document.getElementById('resultsContainer');
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    container.innerHTML = '';
    let filtered = tracksData[currentCategory] || [];
    filtered = filtered.filter(t => t.title.toLowerCase().includes(searchTerm) || t.artist.toLowerCase().includes(searchTerm));

    filtered.forEach(track => {
      const item = document.createElement('div');
      item.className = 'track-item';
      item.onclick = () => openModal(track);
      item.innerHTML = `<div class="thumbnail" style="background-image: url('https://img.youtube.com/vi/${track.id}/mqdefault.jpg');"></div><div class="info"><h4>${track.title}</h4><p>${track.artist}</p></div>`;
      container.appendChild(item);
    });
  }

  function openModal(track) { 
    document.getElementById('modalIframe').src = 'https://www.youtube.com/embed/' + track.id;
    document.getElementById('modal-title').innerText = track.title;
    document.getElementById('modal-artist').innerText = track.artist;
    document.getElementById('embedModal').style.display = 'flex'; 
    document.body.style.overflow = 'hidden';
  }
  
  function closeModal() { 
    document.getElementById('embedModal').style.display = 'none'; 
    document.getElementById('modalIframe').src = ''; 
    document.body.style.overflow = 'auto';
  }
  
  function handleSearch() { toggleClearBtn(); renderTracks(); }
  function toggleClearBtn() { const i = document.getElementById('searchInput'); document.getElementById('clearBtn').style.display = i.value.length > 0 ? 'block' : 'none'; }
  function clearSearch() { const i = document.getElementById('searchInput'); i.value = ''; toggleClearBtn(); renderTracks(); }
  function toggleVoice(b) { document.getElementById('micIcon').classList.toggle('recording'); }

  renderTracks();
</script>
</body>
</html>
