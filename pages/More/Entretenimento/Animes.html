<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LorePlay-Animes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blueviolet-color: #8a2be2;
            --ghost: #f8f8ff;
            --vidro: rgba(255, 255, 255, 0.1);
            --bg-dark: #0e0e10;
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--ghost); 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background 1.5s ease-in-out;
        }

        body.modal-open { overflow: hidden; }

        header { 
            position: sticky; 
            top: 0; 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: rgba(14, 14, 16, 0.6); 
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid var(--vidro); 
            z-index: 1000; 
        }

        .btn-nav { position: absolute; left: 20px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--vidro); color: var(--ghost); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .search-container { padding: 20px; display: flex; gap: 10px; align-items: center; }
        .input-wrapper { position: relative; width: 100%; display: flex; align-items: center; }
        .search-input { width: 100%; padding: 12px 40px 12px 20px; border-radius: 25px; border: 1px solid var(--vidro); background: rgba(255,255,255,0.05); color: var(--ghost); outline: none; box-sizing: border-box; transition: 0.3s; }
        .search-input:focus { border-color: var(--blueviolet-color); box-shadow: 0 0 10px rgba(138,43,226,0.3); }
        .clear-btn { position: absolute; right: 15px; background: none; border: none; color: var(--ghost); cursor: pointer; display: none; font-size: 1rem; }

        main { padding: 0 20px 20px 20px; }
        h2 { font-size: 1.2rem; margin: 30px 0 15px 0; padding-left: 5px; border-left: 4px solid var(--blueviolet-color); }

        .carrossel-wrapper { display: flex; overflow-x: auto; gap: 16px; padding-bottom: 15px; scrollbar-width: none; }
        .carrossel-wrapper::-webkit-scrollbar { display: none; }

        .card { 
            clip-path: polygon(12px 0%, 100% 0%, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0% 100%, 0% 12px);
            flex: 0 0 240px; height: 135px; background-color: var(--vidro); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; cursor: pointer; position: relative; overflow: hidden; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 10px; transition: transform 0.3s; 
        }
        .card:hover { transform: translateY(-5px); border-color: var(--blueviolet-color); }
        .card-title { background: rgba(0, 0, 0, 0.7); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; max-width: 90%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #playerModal { position: fixed; inset: 0; z-index: 9999; background-color: black; display: none; flex-direction: column; transform: translateY(100%); transition: transform 0.3s ease-out; }
        #playerModal.active { display: flex; transform: translateY(0); }
        #modal-drag-handle { height: 40px; display: flex; align-items: center; justify-content: center; cursor: grab; touch-action: none; flex-shrink: 0; }
        .drag-pill { width: 48px; height: 6px; background: rgba(255, 255, 255, 0.3); border-radius: 9999px; }
        .modal-body { padding: 20px; display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.85); flex-grow: 1; overflow-y: auto; overflow-x: hidden; overscroll-behavior-y: contain; width: 100%; box-sizing: border-box; }
        
        .video-container { position: relative; width: 100%; max-width: 950px; flex-shrink: 0; }
        .video-box { aspect-ratio: 16/9; background: #222; border-radius: 15px; overflow: hidden; width: 100%; }
        
        .fullscreen-btn {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--ghost);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 15;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.3s;
        }
        .fullscreen-btn:hover { background: rgba(138, 43, 226, 0.6); border-color: var(--blueviolet-color); }

        .ad-container, .shorts-wrapper { width: 100%; max-width: 950px; box-sizing: border-box; }
        .ad-container { height: 100px; background: var(--vidro); margin: 20px 0; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 1px dashed var(--blueviolet-color); flex-shrink: 0; position: relative; }
        .ad-tag { position: absolute; top: 5px; left: 10px; font-size: 0.6rem; color: var(--blueviolet-color); text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        
        .search-engines { display: flex; gap: 10px; padding: 10px 20px; width: 100%; max-width: 950px; overflow-x: auto; scrollbar-width: none; white-space: nowrap; flex-shrink: 0; box-sizing: border-box; }
        .search-engines::-webkit-scrollbar { display: none; }
        .search-engines a { display: flex; align-items: center; gap: 8px; color: var(--ghost); text-decoration: none; font-size: 0.9rem; padding: 8px 20px; border-radius: 20px; background: rgba(255,255,255,0.05); flex-shrink: 0; border: 1px solid transparent; transition: 0.3s; }
        .search-engines a:hover { border-color: var(--blueviolet-color); }
        
        .shorts-wrapper { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px 10px; padding: 15px 0; flex-shrink: 0; }
        .short-card { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; width: 100%; background: none; border-radius: 0; cursor: pointer; border: 1px solid transparent; transition: 0.3s; box-sizing: border-box; padding: 0; }
        .short-card:hover { transform: scale(1.02); }
        .short-img-wrapper { width: 100%; aspect-ratio: 2/3; background-size: cover; background-position: center; border-radius: 8px; flex-shrink: 0; }
        
        .short-card .card-title { background: none; padding: 0; font-size: 0.85rem; font-weight: 500; color: var(--ghost); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; white-space: normal; line-height: 1.2; }
        .short-price { font-size: 0.75rem; color: #aaa; margin-top: -2px; }

        .close-btn { display: none; position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 10; }
        @media (min-width: 768px) { .close-btn { display: block; } }
    </style>
</head>
<body>

    <header>
        <button onclick="window.location.href='./Index.html'" class="btn-nav"><i class="fas fa-arrow-left"></i></button>
        <h1>Animes</h1>
    </header>

    <div class="search-container">
        <div class="input-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar anime..." oninput="toggleClearBtn()" onkeyup="handleSearch(event)">
            <button id="clearBtn" class="clear-btn" onclick="clearSearch()"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <main id="app">
        <section id="secao-carrossel">
            <h2>Animes em Destaque</h2>
            <div class="carrossel-wrapper" id="carrosselDestaques"></div>
        </section>
        
        <section id="secao-outros">
            <h2 id="titulo-outros">Mais Populares</h2>
            <div class="shorts-wrapper" id="shortsList"></div>
        </section>
    </main>

    <div id="playerModal">
        <div id="modal-drag-handle"><div class="drag-pill"></div></div>
        <div class="modal-body" id="modalContainer">
            <button class="close-btn" onclick="closePlayer()"><i class="fas fa-times"></i></button>
            
            <div class="video-container" id="videoContainer">
                <button class="fullscreen-btn" onclick="toggleFullscreen()"><i class="fas fa-expand"></i> Tela Cheia</button>
                <div class="video-box" id="videoBox"></div>
            </div>

            <h2 id="modalTitle">Título do Anime</h2>
            <a id="animeLink" href="#" target="_blank" style="color: var(--blueviolet-color); text-decoration: none; font-size: 0.9rem; margin-bottom: 10px;">Ver mais detalhes no EmbedMovies</a>
            
            <div class="ad-container">
                <span class="ad-tag">Anúncio</span>
                Espaço para Anúncio
            </div>

            <div class="search-engines">
                <a href="#" onclick="this.href=getSearchUrl('google')" target="_blank"><img src="https://www.google.com/s2/favicons?domain=google.com&sz=32" alt="G"> Google</a>
                <a href="#" onclick="this.href=getSearchUrl('bing')" target="_blank"><img src="https://www.google.com/s2/favicons?domain=bing.com&sz=32" alt="B"> Bing</a>
                <a href="#" onclick="this.href=getSearchUrl('duckduckgo')" target="_blank"><img src="https://www.google.com/s2/favicons?domain=duckduckgo.com&sz=32" alt="D"> DuckDuckGo</a>
            </div>

            <h2 style="align-self: flex-start; width: 100%; max-width: 950px;">Relacionados</h2>
            <div class="shorts-wrapper" id="modalRelacionados"></div>
        </div>
    </div>

    <script>
        const TMDB_API_KEY = '74a27c07e9050ee67a87dccd24df6e09'; 
        const TMDB_BASE_URL = 'https://api.themoviedb.org/3';
        const IMAGE_BASE_URL = 'https://image.tmdb.org/t/p/w500';
        const ORIGINAL_IMAGE_URL = 'https://image.tmdb.org/t/p/original';

        const carrosselDestaques = document.getElementById('carrosselDestaques');
        const shortsList = document.getElementById('shortsList');
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');

        document.addEventListener('DOMContentLoaded', () => {
            carregarAnimesIniciais();
        });

        async function carregarAnimesIniciais() {
            try {
                const url = `${TMDB_BASE_URL}/discover/tv?api_key=${TMDB_API_KEY}&with_genres=16&with_origin_country=JP&sort_by=popularity.desc&language=pt-BR`;
                const response = await fetch(url);
                const data = await response.json();
                
                if(data.results && data.results.length > 0) {
                    renderizarInterface(data.results);
                    definirPlanosDeFundo(data.results.slice(0, 5));
                }
            } catch (error) {
                console.error("Erro ao buscar dados do TMDB:", error);
            }
        }

        function renderizarInterface(animes) {
            carrosselDestaques.innerHTML = '';
            shortsList.innerHTML = '';

            const destaques = animes.slice(0, 7);
            const outros = animes.slice(7, 20);

            destaques.forEach(anime => {
                const imgUrl = anime.backdrop_path ? `${IMAGE_BASE_URL}${anime.backdrop_path}` : 'https://placehold.co/240x135/222/fff?text=Sem+Foto';
                const card = document.createElement('div');
                card.className = 'card';
                card.style.backgroundImage = `url('${imgUrl}')`;
                card.innerHTML = `<span class="card-title">${anime.name || anime.original_name}</span>`;
                card.onclick = () => openPlayer(anime, 'serie');
                carrosselDestaques.appendChild(card);
            });

            renderizarGridOutros(outros);
        }

        function renderizarGridOutros(listaItens) {
            shortsList.innerHTML = '';
            listaItens.forEach(anime => {
                const posterUrl = anime.poster_path ? `${IMAGE_BASE_URL}${anime.poster_path}` : 'https://placehold.co/200x300/222/fff?text=Sem+Foto';
                const titulo = anime.name || anime.original_name;
                const tipoMidia = anime.first_air_date ? 'serie' : 'filme'; 
                
                const short = document.createElement('div');
                short.className = 'short-card';
                short.onclick = () => openPlayer(anime, tipoMidia);
                short.innerHTML = `
                    <div class="short-img-wrapper" style="background-image: url('${posterUrl}')"></div>
                    <span class="card-title">${titulo}</span>
                    <span class="short-price">Nota: ${anime.vote_average ? anime.vote_average.toFixed(1) : 'N/A'}</span>
                `;
                shortsList.appendChild(short);
            });
        }

        async function handleSearch(event) {
            const query = searchInput.value.trim();
            if (query.length === 0) {
                if (event.key === 'Enter' || searchInput.value === '') carregarAnimesIniciais();
                return;
            }

            if (event.key === 'Enter' || query.length > 2) {
                try {
                    const url = `${TMDB_BASE_URL}/search/multi?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&language=pt-BR`;
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    const resultadosFiltrados = data.results.filter(item => 
                        (item.media_type === 'tv' || item.media_type === 'movie') &&
                        ((item.origin_country && item.origin_country.includes('JP')) || (item.genre_ids && item.genre_ids.includes(16)))
                    );

                    document.getElementById('titulo-outros').innerText = `Resultados para: "${query}"`;
                    renderizarGridOutros(resultadosFiltrados.length > 0 ? resultadosFiltrados : data.results);
                } catch (error) {
                    console.error("Erro na busca do TMDB:", error);
                }
            }
        }

        function definirPlanosDeFundo(animes) {
            let indiceFundo = 0;
            const imagens = animes.map(a => a.backdrop_path ? `${ORIGINAL_IMAGE_URL}${a.backdrop_path}` : '').filter(url => url !== '');
            
            if(imagens.length === 0) return;

            function mudarFundo() {
                document.body.style.backgroundImage = `linear-gradient(rgba(14, 14, 16, 0.9), rgba(14, 14, 16, 0.9)), url('${imagens[indiceFundo]}')`;
                indiceFundo = (indiceFundo + 1) % imagens.length;
            }
            setInterval(mudarFundo, 12000);
            mudarFundo();
        }

        // Incorporação adaptada para o oembed da estrutura myembed.biz
        function openPlayer(anime, tipoMidia = 'serie') {
            const titulo = anime.name || anime.title || anime.original_name;
            const tmdbId = anime.id;

            // Tratamento caso a detecção automática venha do search multi do TMDB
            if(anime.media_type) {
                tipoMidia = anime.media_type === 'tv' ? 'serie' : 'filme';
            }

            document.getElementById('modalTitle').innerText = titulo;
            document.getElementById('animeLink').href = `https://embedmovies.org/animes?search=${encodeURIComponent(titulo)}`;
            
            const bg = anime.backdrop_path ? `url('${ORIGINAL_IMAGE_URL}${anime.backdrop_path}')` : "none";
            document.getElementById('modalContainer').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), ${bg}`;
            document.getElementById('modalContainer').style.backgroundSize = "cover";

            const videoBox = document.getElementById('videoBox');
            
            // Monta a URL baseado no padrão oembed informado: /serie/{id} ou /filme/{id}
            const embedUrl = `https://myembed.biz/${tipoMidia}/${tmdbId}`;
            
            videoBox.innerHTML = `
                <iframe 
                    src="${embedUrl}" 
                    width="100%"
                    height="100%"
                    frameborder="0"
                    allowfullscreen="true"
                    webkitallowfullscreen="true"
                    mozallowfullscreen="true"
                    loading="lazy">
                </iframe>`;
            
            document.getElementById('playerModal').classList.add('active');
            document.body.classList.add('modal-open');

            carregarRelacionadosModal(tmdbId, anime.media_type === 'movie' ? 'movie' : 'tv');
        }

        async function carregarRelacionadosModal(id, tmdbTipo) {
            const containerRelacionados = document.getElementById('modalRelacionados');
            containerRelacionados.innerHTML = '';
            try {
                const url = `${TMDB_BASE_URL}/${tmdbTipo}/${id}/recommendations?api_key=${TMDB_API_KEY}&language=pt-BR`;
                const response = await fetch(url);
                const data = await response.json();
                
                if(data.results) {
                    data.results.slice(0, 3).forEach(rel => {
                        const posterUrl = rel.poster_path ? `${IMAGE_BASE_URL}${rel.poster_path}` : 'https://placehold.co/200x300/222/fff?text=Sem+Foto';
                        const div = document.createElement('div');
                        div.className = 'short-card';
                        const proxTipo = tmdbTipo === 'movie' ? 'filme' : 'serie';
                        div.onclick = () => openPlayer(rel, proxTipo);
                        div.innerHTML = `
                            <div class="short-img-wrapper" style="background-image: url('${posterUrl}')"></div>
                            <span class="card-title">${rel.name || rel.title}</span>
                        `;
                        containerRelacionados.appendChild(div);
                    });
                }
            } catch(e) { console.error(e); }
        }

        function closePlayer() {
            if (document.fullscreenElement) document.exitFullscreen();
            document.getElementById('playerModal').style.transform = 'translateY(100%)';
            setTimeout(() => {
                document.getElementById('playerModal').classList.remove('active');
                document.getElementById('playerModal').style.transform = '';
                document.getElementById('videoBox').innerHTML = '';
                document.body.classList.remove('modal-open');
            }, 300);
        }

        function toggleClearBtn() { clearBtn.style.display = searchInput.value.length > 0 ? 'block' : 'none'; }
        
        function clearSearch() { 
            searchInput.value = ''; 
            toggleClearBtn(); 
            document.getElementById('titulo-outros').innerText = "Mais Populares";
            carregarAnimesIniciais(); 
        }

        function getSearchUrl(engine) {
            const animeAtivo = document.getElementById('modalTitle').innerText;
            const query = (animeAtivo !== "Título do Anime" && animeAtivo !== "") ? animeAtivo : searchInput.value.trim();
            const baseUrl = { 
                'google': 'https://google.com/search?q=', 
                'bing': 'https://bing.com/search?q=', 
                'duckduckgo': 'https://duckduckgo.com/?q=' 
            };
            return query ? baseUrl[engine] + encodeURIComponent(query + " anime") : `https://${engine}.com`;
        }

        function toggleFullscreen() {
            const container = document.getElementById('videoContainer');
            if (!document.fullscreenElement) {
                if (container.requestFullscreen) container.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        const handle = document.getElementById('modal-drag-handle');
        let touchStartY = 0;
        handle.addEventListener('touchstart', (e) => touchStartY = e.touches[0].clientY);
        handle.addEventListener('touchmove', (e) => {
            const diff = e.touches[0].clientY - touchStartY;
            if (diff > 0) document.getElementById('playerModal').style.transform = `translateY(${diff}px)`;
        });
        handle.addEventListener('touchend', (e) => {
            if (e.changedTouches[0].clientY - touchStartY > 150) closePlayer();
            else document.getElementById('playerModal').style.transform = 'translateY(0)';
        });
    </script>
</body>
</html>
