<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LorePlay - Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Fundo escuro imersivo */
            background: #0a061e;
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 0, 0, 0.1) 0px, transparent 40%),
                radial-gradient(at 100% 100%, rgba(0, 242, 234, 0.1) 0px, transparent 40%);
            padding: 20px;
        }

        /* --- HEADER --- */
        .header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 40px;
            padding: 10px 0;
        }

        .header-title {
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .back-button {
            position: absolute;
            left: 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 12px 16px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* --- CONTAINER DOS CARDS --- */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1200px;
            width: 100%;
        }

        /* Base do Card de Vidro */
        .card {
            position: relative;
            width: 320px;
            height: 220px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            clip-path: polygon(12px 0%, 100% 0%, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0% 100%, 0% 12px);
        }

        /* Capa/Miniatura */
        .card-thumb {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        /* Sombra interna */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(10, 6, 30, 0.6) 0%, rgba(10, 6, 30, 0.1) 100%);
            z-index: 2;
        }

        /* Badges de Plataforma com Ícones */
        .platform-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            z-index: 3;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Cores customizadas por plataforma */
        .yt-badge { background: #ff0000; }
        .tt-badge { background: #00f2ea; color: #000; }
        .fb-badge { background: #1877f2; }
        .ig-badge { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }

        /* --- HOVERS CUSTOMIZADOS (Efeito de Vidro + Brilho Neon da Marca) --- */
        
        /* Hover Geral */
        .card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .card:hover .card-thumb img {
            transform: scale(1.05);
        }

        /* Glow Vermelho do YouTube */
        .card.youtube:hover {
            border-color: rgba(255, 0, 0, 0.6);
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.35), 0 10px 30px rgba(0,0,0,0.6);
        }

        /* Glow Ciano/Neon do TikTok */
        .card.tiktok:hover {
            border-color: rgba(0, 242, 234, 0.6);
            box-shadow: 0 0 25px rgba(0, 242, 234, 0.35), 0 10px 30px rgba(0,0,0,0.6);
        }

        /* Glow Azul do Facebook */
        .card.facebook:hover {
            border-color: rgba(24, 119, 242, 0.6);
            box-shadow: 0 0 25px rgba(24, 119, 242, 0.35), 0 10px 30px rgba(0,0,0,0.6);
        }

        /* Glow Magenta do Instagram */
        .card.instagram:hover {
            border-color: rgba(220, 39, 67, 0.6);
            box-shadow: 0 0 25px rgba(220, 39, 67, 0.35), 0 10px 30px rgba(0,0,0,0.6);
        }

        /* --- MODAL FLUTUANTE DE URL --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: rgba(20, 14, 45, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.3s ease;
            position: relative;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-title {
            color: #ffffff;
            font-size: 1.4rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .modal-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            margin-bottom: 20px;
            transition: border-color 0.3s ease;
        }

        .modal-input:focus {
            border-color: #00f2ea;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
        }

        .modal-btn.cancel:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .modal-btn.confirm {
            background: linear-gradient(135deg, #00f2ea, #7c3aed);
            color: #fff;
        }

        .modal-btn.confirm:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* --- MODAL DE REPRODUÇÃO EM TELA CHEIA (ESTILO YOUTUBE) --- */
        .player-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #0f0f0f; /* Fundo escuro do YouTube */
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .player-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .player-close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #ffffff;
            font-size: 1.5rem;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2010;
            transition: all 0.2s ease;
        }

        .player-close-btn:hover {
            background: rgba(255, 0, 0, 0.8);
            transform: scale(1.1);
        }

        .player-container {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .player-container iframe {
            width: 100%;
            height: 100%;
            max-width: 1280px;
            max-height: 720px;
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
            aspect-ratio: 16 / 9;
        }
    </style>
</head>
<body>

    <header class="header">
        <button class="back-button" id="btnBack">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <h1 class="header-title">Plataformas</h1>
    </header>

    <div class="container">
        
        <div class="card youtube" data-platform="YouTube">
            <span class="platform-badge yt-badge">
                <i class="fa-brands fa-youtube"></i> YouTube
            </span>
            <div class="card-thumb">
                <img src="https://images.unsplash.com/photo-1598257006458-087169a1f08d?w=500" alt="YouTube">
                <div class="overlay"></div>
            </div>
        </div>

        <div class="card tiktok" data-platform="TikTok">
            <span class="platform-badge tt-badge">
                <i class="fa-brands fa-tiktok"></i> TikTok
            </span>
            <div class="card-thumb">
                <img src="https://images.unsplash.com/photo-1546519638-68e109498ffc?w=500" alt="TikTok">
                <div class="overlay"></div>
            </div>
        </div>

        <div class="card facebook" data-platform="Facebook">
            <span class="platform-badge fb-badge">
                <i class="fa-brands fa-facebook"></i> Facebook
            </span>
            <div class="card-thumb">
                <img src="https://images.unsplash.com/photo-1562577309-4932fdd64cd1?w=500" alt="Facebook">
                <div class="overlay"></div>
            </div>
        </div>

        <div class="card instagram" data-platform="Instagram">
            <span class="platform-badge ig-badge">
                <i class="fa-brands fa-instagram"></i> Instagram
            </span>
            <div class="card-thumb">
                <img src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=500" alt="Instagram">
                <div class="overlay"></div>
            </div>
        </div>

    </div>

    <div class="modal-overlay" id="urlModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Adicionar Vídeo</h2>
            <input type="url" class="modal-input" id="videoUrlInput" placeholder="Cole a URL do vídeo aqui..." autofocus>
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="btnCancel">Cancelar</button>
                <button class="modal-btn confirm" id="btnConfirm">Adicionar</button>
            </div>
        </div>
    </div>

    <div class="player-modal" id="playerModal">
        <button class="player-close-btn" id="btnClosePlayer">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <div class="player-container">
            <iframe id="videoIframe" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        document.getElementById('btnBack').addEventListener('click', function() {
            window.location.href = './Index.html'; 
        });

        // Lógica dos Modais
        const urlModal = document.getElementById('urlModal');
        const modalTitle = document.getElementById('modalTitle');
        const urlInput = document.getElementById('videoUrlInput');
        const btnCancel = document.getElementById('btnCancel');
        const btnConfirm = document.getElementById('btnConfirm');
        const cards = document.querySelectorAll('.card');

        const playerModal = document.getElementById('playerModal');
        const videoIframe = document.getElementById('videoIframe');
        const btnClosePlayer = document.getElementById('btnClosePlayer');

        let selectedPlatform = '';

        cards.forEach(card => {
            card.addEventListener('click', () => {
                selectedPlatform = card.getAttribute('data-platform');
                modalTitle.textContent = `Adicionar Vídeo (${selectedPlatform})`;
                urlInput.value = '';
                urlModal.classList.add('active');
                urlInput.focus();
            });
        });

        function closeUrlModal() {
            urlModal.classList.remove('active');
        }

        btnCancel.addEventListener('click', closeUrlModal);

        urlModal.addEventListener('click', (e) => {
            if (e.target === urlModal) {
                closeUrlModal();
            }
        });

        // Extrai apenas o necessário da URL para gerar o embed exato de cada plataforma
        function getEmbedUrl(url, platform) {
            let embedUrl = url;

            if (platform === 'YouTube') {
                // Pega apenas o ID de 11 caracteres (suporta watch, shorts, embed e youtu.be)
                const ytMatch = url.match(/(?:v=|\/shorts\/|\/embed\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
                if (ytMatch && ytMatch[1]) {
                    embedUrl = `https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1`;
                }
            } else if (platform === 'TikTok') {
                // Pega apenas o ID numérico do vídeo
                const ttMatch = url.match(/\/video\/(\d+)/);
                if (ttMatch && ttMatch[1]) {
                    embedUrl = `https://www.tiktok.com/embed/v2/${ttMatch[1]}`;
                }
            } else if (platform === 'Facebook') {
                // Limpa a URL até o link base do post/vídeo e codifica para o plugin oficial
                const cleanFbUrl = url.split('?')[0];
                embedUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(cleanFbUrl)}&show_text=false&autoplay=true`;
            } else if (platform === 'Instagram') {
                // Extrai apenas o código curto do Post ou Reel (ex: /p/ABC123/ ou /reel/ABC123/)
                const igMatch = url.match(/\/(p|reel|reels)\/([a-zA-Z0-9_-]+)/);
                if (igMatch && igMatch[2]) {
                    embedUrl = `https://www.instagram.com/p/${igMatch[2]}/embed`;
                }
            }

            return embedUrl;
        }

        btnConfirm.addEventListener('click', () => {
            const url = urlInput.value.trim();
            if (url) {
                closeUrlModal();
                // Configura o iframe de acordo com a plataforma
                videoIframe.src = getEmbedUrl(url, selectedPlatform);
                playerModal.classList.add('active');
            } else {
                urlInput.focus();
            }
        });

        // Fechar Player de Vídeo
        function closePlayer() {
            playerModal.classList.remove('active');
            videoIframe.src = ''; // Interrompe o áudio/vídeo ao fechar
        }

        btnClosePlayer.addEventListener('click', closePlayer);

        // Permite fechar o player pressionando ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && playerModal.classList.contains('active')) {
                closePlayer();
            }
        });
    </script>

</body>
</html>
