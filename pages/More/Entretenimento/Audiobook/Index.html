<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiobook Player - Orion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --primary-color: #8a2be2; 
            --glass-bg: rgba(255, 255, 255, 0.2);
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f8ff; padding: 20px; }

        .glass-effect {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 43, 226, 0.3);
        }

        .modal-bg { background: rgba(248, 248, 255, 0.95); backdrop-filter: blur(15px); }

        .gx-mods-carousel {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 5px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .gx-mods-carousel::-webkit-scrollbar { display: none; }

        .gx-mod-card {
            flex: 0 0 180px;
            height: 110px;
            position: relative;
            cursor: pointer;
            overflow: hidden; 
            transition: transform 0.2s ease, filter 0.2s ease;
            clip-path: polygon(15px 0%, 100% 0%, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0% 100%, 0% 15px);
        }
        
        .gx-mod-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .gx-mod-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(138, 43, 226, 0.15);
            pointer-events: none;
        }
        
        .gx-mod-card:hover { transform: scale(1.03); filter: brightness(1.1); }

        .tab-active { color: var(--primary-color) !important; border-bottom: 2px solid var(--primary-color); }

        #playerModal, #modalMenu {
            background: rgba(248, 248, 255, 0.95);
            backdrop-filter: blur(15px);
        }
    </style>
</head>
<body>

    <main class="max-w-3xl w-full mx-auto py-8">
        <div class="mb-8 flex items-center gap-4">
            <div class="relative flex items-center flex-grow group">
                <input type="text" placeholder="Buscar livros..." 
                    class="w-full py-3.5 pl-6 pr-12 rounded-full glass-effect text-slate-800 placeholder-slate-500 border border-purple-300/30 focus:outline-none focus:ring-2 focus:ring-[var(--primary-color)]/50 focus:border-[var(--primary-color)] transition-all shadow-lg shadow-purple-500/10">
                <i class="fas fa-search absolute right-5 text-[var(--primary-color)] transition-transform group-hover:scale-110"></i>
            </div>
            <i class="fas fa-bars text-[var(--primary-color)] text-2xl cursor-pointer hover:opacity-80 transition" onclick="toggleModal(true)"></i>
        </div>

        <div class="flex flex-col gap-8">
            <section><h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Ficção</h2><div class="gx-mods-carousel"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1541963463532-d68292c34b19?q=80&w=600"></div><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=600"></div></div></section>
            <section><h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Desenvolvimento</h2><div class="gx-mods-carousel"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?q=80&w=600"></div><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1531973576160-71254665d8a1?q=80&w=600"></div></div></section>
            <section><h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Romance</h2><div class="gx-mods-carousel"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=600"></div><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1523438885200-e635ba2c371e?q=80&w=600"></div></div></section>
            <section><h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Terror</h2><div class="gx-mods-carousel"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=600"></div><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1514574768585-d4193568c076?q=80&w=600"></div></div></section>
        </div>
    </main>

    <div id="modalMenu" class="fixed inset-0 z-50 hidden flex flex-col p-8 modal-bg">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-[var(--primary-color)]">Biblioteca</h2>
            <i class="fas fa-times text-2xl text-[var(--primary-color)] cursor-pointer" onclick="toggleModal(false)"></i>
        </div>
        <div class="flex gap-4 overflow-x-auto mb-6 pb-2 text-slate-500 font-medium whitespace-nowrap">
            <span class="tab-item tab-active pb-1 cursor-pointer" onclick="selectTab(this, 'ficcao')">Ficção</span>
            <span class="tab-item pb-1 cursor-pointer" onclick="selectTab(this, 'desenvolvimento')">Desenvolvimento</span>
            <span class="tab-item pb-1 cursor-pointer" onclick="selectTab(this, 'romance')">Romance</span>
            <span class="tab-item pb-1 cursor-pointer" onclick="selectTab(this, 'terror')">Terror</span>
        </div>
        <div id="modal-content-area" class="flex-grow overflow-y-auto">
            <div id="ficcao" class="tab-content grid grid-cols-2 md:grid-cols-3 gap-4"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1541963463532-d68292c34b19?q=80&w=600"></div></div>
            <div id="desenvolvimento" class="tab-content hidden grid grid-cols-2 md:grid-cols-3 gap-4"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?q=80&w=600"></div></div>
            <div id="romance" class="tab-content hidden grid grid-cols-2 md:grid-cols-3 gap-4"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=600"></div></div>
            <div id="terror" class="tab-content hidden grid grid-cols-2 md:grid-cols-3 gap-4"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=600"></div></div>
        </div>
    </div>

    <div id="playerModal" class="fixed inset-0 z-[100] hidden">
        <i class="fas fa-times absolute top-8 right-8 text-3xl text-[var(--primary-color)] cursor-pointer z-[101]" onclick="closePlayer()"></i>
        <iframe id="playerIframe" src="" class="w-full h-full border-none" allowfullscreen></iframe>
    </div>

    <script>
        function toggleModal(show) { document.getElementById('modalMenu').classList.toggle('hidden', !show); }
        function openPlayer(url) { const modal = document.getElementById('playerModal'); document.getElementById('playerIframe').src = url; modal.classList.remove('hidden'); }
        function closePlayer() { document.getElementById('playerModal').classList.add('hidden'); document.getElementById('playerIframe').src = ""; }
        function selectTab(element, targetId) {
            document.querySelectorAll('.tab-item').forEach(tab => tab.classList.remove('tab-active'));
            element.classList.add('tab-active');
            document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));
            document.getElementById(targetId).classList.remove('hidden');
        }
    </script>
</body>
</html>
