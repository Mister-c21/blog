<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artigos - TecMundo Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b071e;
            --blueviolet-color: #8a2be2;
            --blueviolet-glow: #9400d3;
            --ghost-color: #f8f8ff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--ghost-color);
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ================= HEADER & TOP TAB BARS ================= */
        .site-header {
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
        }

        .header-container {
            width: 100%;
            max-width: 1200px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .brand-logo {
            font-size: 1.3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--ghost-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-logo span {
            color: var(--blueviolet-color);
        }

        .top-tabbars {
            display: flex;
            height: 100%;
        }

        .tab-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 24px;
            color: rgba(248, 248, 255, 0.6);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease;
            border-bottom: 3px solid transparent;
            cursor: pointer;
        }

        .tab-item:hover {
            color: var(--ghost-color);
        }

        .tab-item.active {
            color: var(--ghost-color);
            border-bottom-color: var(--blueviolet-color);
            background: linear-gradient(to bottom, transparent, rgba(138, 43, 226, 0.05));
        }

        /* ================= SUB-MENU ================= */
        .submenu-row {
            display: flex;
            justify-content: flex-end; 
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            max-width: 100%;
        }

        /* BARRA DE BUSCA COMPACTA */
        .search-box {
            position: relative;
            display: flex;
            align-items: center;
            min-width: 260px;
            max-width: 100%;
            transition: min-width 0.3s ease;
        }

        .hidden-search {
            display: none !important;
        }

        .search-input {
            width: 100%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 9px 110px 9px 40px; 
            color: var(--ghost-color);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease, padding 0.3s ease;
        }

        .search-box.engine-active .search-input {
            padding-right: 170px;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            color: rgba(248, 248, 255, 0.4);
            font-size: 0.9rem;
            transition: color 0.3s ease;
            pointer-events: none;
        }

        .search-controls {
            position: absolute;
            right: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .engine-select-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: var(--ghost-color);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 8px;
            cursor: pointer;
            display: none; 
            align-items: center;
            gap: 4px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .engine-select-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(248, 248, 255, 0.3);
        }

        .engine-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 55px;
            background: rgba(11, 7, 30, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 6px;
            display: none;
            flex-direction: column;
            gap: 4px;
            min-width: 130px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
            max-height: 200px;
            overflow-y: auto;
        }

        .engine-dropdown.show {
            display: flex;
        }

        .engine-option {
            background: transparent;
            border: none;
            color: rgba(248, 248, 255, 0.7);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            width: 100%;
        }

        .engine-option:hover {
            background: rgba(138, 43, 226, 0.2);
            color: var(--ghost-color);
        }

        .search-toggle-btn {
            background: rgba(138, 43, 226, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: var(--ghost-color);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .search-toggle-btn:hover {
            border-color: var(--blueviolet-color);
            background: rgba(138, 43, 226, 0.4);
        }

        .search-toggle-btn.mode-external {
            background: var(--blueviolet-color);
            box-shadow: 0 0 8px rgba(148, 0, 211, 0.4);
        }

        .search-box:hover .search-input {
            border-color: rgba(138, 43, 226, 0.5);
            background: rgba(255, 255, 255, 0.08);
        }

        .search-box:hover .search-icon {
            color: rgba(248, 248, 255, 0.7);
        }

        .search-input:focus {
            background: rgba(11, 7, 30, 0.6);
            border-color: var(--blueviolet-color);
            box-shadow: 0 0 12px rgba(148, 0, 211, 0.4);
        }

        .search-box:focus-within {
            min-width: 380px;
            max-width: 100%;
        }

        .search-input:focus + .search-icon {
            color: var(--blueviolet-color);
        }

        /* ================= CONTEÚDO DE ARTIGOS PADRÃO ================= */
        .articles-grid {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .articles-grid.grid-active {
            display: grid;
        }

        #grid-news.grid-active {
            display: block;
        }
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }
        .news-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            text-decoration: none;
            color: var(--ghost-color);
            transition: background 0.3s ease;
        }
        .news-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .news-content {
            flex: 1;
            padding-right: 20px;
        }
        .news-source {
            font-size: 0.75rem;
            color: var(--blueviolet-color);
            font-weight: 700;
            text-transform: uppercase;
        }
        .news-title {
            font-size: 1.1rem;
            margin-top: 5px;
            line-height: 1.3;
        }
        .news-thumb {
            width: 90px;
            height: 90px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }
        .news-loading, .news-error {
            padding: 30px;
            text-align: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--ghost-color);
            font-weight: 600;
        }

        /* ================= FEED DE CONTATOS ================= */
        .contact-feed-grid {
            display: none;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .contact-feed-grid.grid-active {
            display: flex;
        }

        .contact-card {
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 12px 24px;
            text-decoration: none;
            color: var(--ghost-color);
            transition: background 0.3s ease, border-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .contact-card:hover,
        .contact-card.active-card {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(138, 43, 226, 0.5);
            transform: scale(1.01);
            box-shadow: 0 4px 15px rgba(148, 0, 211, 0.15);
        }

        .contact-header-layout {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 16px;
        }

        .contact-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            border: 2px solid var(--blueviolet-color);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ghost-color);
            font-size: 1.2rem;
        }

        .contact-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .contact-source-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--ghost-color);
        }

        /* ================= MODAL DESLIZANTE ================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 998;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .global-bottom-sheet-modal {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(11, 7, 30, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 2px solid var(--blueviolet-color);
            border-radius: 24px 24px 0 0;
            padding: 24px;
            z-index: 999;
            box-shadow: 0 -8px 32px rgba(138, 43, 226, 0.3);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .global-bottom-sheet-modal.show {
            transform: translateY(0);
        }

        .modal-drag-handle {
            width: 40px;
            height: 4px;
            background: rgba(248, 248, 255, 0.2);
            border-radius: 2px;
            margin: -12px auto 16px auto;
            cursor: pointer;
        }

        .modal-body-wrapper {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .modal-title-context {
            font-size: 1rem;
            font-weight: 600;
            color: rgba(248, 248, 255, 0.8);
            text-align: center;
        }

        .modal-search-row {
            display: flex;
            gap: 12px;
            align-items: center;
            width: 100%;
        }

        .mini-search-input {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px 20px;
            color: var(--ghost-color);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s ease, background 0.3s ease;
        }

        .mini-search-input:focus {
            border-color: var(--blueviolet-color);
            background: rgba(255, 255, 255, 0.08);
        }

        .mini-search-submit {
            background: var(--blueviolet-color);
            border: none;
            color: var(--ghost-color);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .mini-search-submit:hover {
            background: var(--blueviolet-glow);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .submenu-row {
                flex-direction: column;
                align-items: stretch;
                gap: 15px;
            }
            .search-box {
                width: 100%;
                min-width: 100%;
            }
            .search-box:focus-within {
                min-width: 100%;
            }
            .engine-dropdown {
                right: 0;
                width: 100%;
            }
        }

        @media (max-width: 600px) {
            .header-container {
                flex-direction: column;
                height: auto;
                padding: 10px;
                gap: 10px;
            }
            .top-tabbars {
                width: 100%;
                justify-content: center;
            }
            .tab-item {
                padding: 10px 15px;
                font-size: 0.85rem;
            }
            .contact-card {
                border-radius: 20px;
                padding: 12px;
            }
            .search-input {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-container">
            <a href="#" class="brand-logo">
                <i class="fa-solid fa-layer-group"></i> <span>Artigos</span>
            </a>
            <nav class="top-tabbars" id="tabBarContainer">
                <a class="tab-item active" data-tab="news"><i class="fa-solid fa-newspaper"></i> News</a>
                <a class="tab-item" data-tab="web"><i class="fa-solid fa-globe"></i> Web</a>
            </nav>
        </div>
    </header>

    <div class="container">
        
        <div class="submenu-row" style="margin-top: 25px;">
            <div class="search-box" id="searchBoxContainer">
                <input type="text" class="search-input" id="searchInput" placeholder="Busca Interna...">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                
                <div class="search-controls">
                    <button class="engine-select-btn" id="engineSelectBtn" data-engine="google">
                        <i class="fa-brands fa-google"></i> Google <i class="fa-solid fa-chevron-down" style="font-size:0.6rem"></i>
                    </button>
                    <button class="search-toggle-btn" id="searchToggleBtn" data-mode="internal">
                        <i class="fa-solid fa-house"></i> Int
                    </button>
                </div>

                <div class="engine-dropdown" id="engineDropdown">
                    <button class="engine-option" data-engine="google"><i class="fa-brands fa-google"></i> Google</button>
                    <button class="engine-option" data-engine="bing"><i class="fa-solid fa-b"></i> Bing</button>
                    <button class="engine-option" data-engine="duckduckgo"><i class="fa-solid fa-duck"></i> DuckDuckGo</button>
                    <button class="engine-option" data-engine="naver"><i class="fa-solid fa-n"></i> Naver</button>
                    <button class="engine-option" data-engine="baidu"><i class="fa-solid fa-paw"></i> Baidu</button>
                    <button class="engine-option" data-engine="yahoo"><i class="fa-brands fa-yahoo"></i> Yahoo</button>
                </div>
            </div>
        </div>
        
        <div class="articles-grid grid-active" id="grid-news">
            <div class="news-list" id="newsApiContainer">
                <div class="news-loading"><i class="fa-solid fa-spinner fa-spin"></i> Carregando notícias em tempo real...</div>
            </div>
        </div>

        <div class="contact-feed-grid" id="grid-web">
            <div class="contact-card" data-url="https://www.tecmundo.com.br" data-search-route="https://www.tecmundo.com.br/busca?q=" data-name="TecMundo">
                <div class="contact-header-layout">
                    <div class="contact-avatar" style="background-image: url('https://picsum.photos/150/150?random=101');"></div>
                    <div class="contact-info">
                        <h4 class="contact-source-name">TecMundo</h4>
                    </div>
                </div>
            </div>
            <div class="contact-card" data-url="https://br.ign.com" data-search-route="https://br.ign.com/seach?q=" data-name="IGN Brasil">
                <div class="contact-header-layout">
                    <div class="contact-avatar" style="background-image: url('https://picsum.photos/150/150?random=102');"></div>
                    <div class="contact-info">
                        <h4 class="contact-source-name">IGN Brasil</h4>
                    </div>
                </div>
            </div>
            <div class="contact-card" data-url="https://g1.globo.com/tecnologia" data-search-route="https://g1.globo.com/busca/?q=" data-name="G1 Tecnologia">
                <div class="contact-header-layout">
                    <div class="contact-avatar" style="background-image: url('https://picsum.photos/150/150?random=103');"></div>
                    <div class="contact-info">
                        <h4 class="contact-source-name">G1 Tecnologia</h4>
                    </div>
                </div>
            </div>

            <div class="contact-card" data-url="https://time.com" data-search-route="https://time.com/search/?q=" data-name="Time Magazine">
                <div class="contact-header-layout">
                    <div class="contact-avatar"><i class="fa-solid fa-clock" style="color: #e21a22; font-size: 1.4rem;"></i></div>
                    <div class="contact-info">
                        <h4 class="contact-source-name">Time Magazine</h4>
                    </div>
                </div>
            </div>
            <div class="contact-card" data-url="https://www.nytimes.com" data-search-route="https://www.nytimes.com/search?dropmab=false&query=" data-name="The New York Times">
                <div class="contact-header-layout">
                    <div class="contact-avatar"><i class="fa-solid fa-newspaper" style="color: var(--ghost-color); font-size: 1.3rem;"></i></div>
                    <div class="contact-info">
                        <h4 class="contact-source-name">The New York Times</h4>
                    </div>
                </div>
            </div>
            <div class="contact-card" data-url="https://www.bbc.com" data-search-route="https://www.bbc.co.uk/search?q=" data-name="BBC News">
                <div class="contact-header-layout">
                    <div class="contact-avatar"><i class="fa-solid fa-square-rss" style="color: #bb1919; font-size: 1.4rem;"></i></div>
                    <div class="contact-info">
                        <h4 class="contact-source-name">BBC News</h4>
                    </div>
                </div>
            </div>
            <div class="contact-card" data-url="https://edition.cnn.com" data-search-route="https://edition.cnn.com/search?q=" data-name="CNN">
                <div class="contact-header-layout">
                    <div class="contact-avatar"><i class="fa-solid fa-radio" style="color: #cc0000; font-size: 1.3rem;"></i></div>
                    <div class="contact-info">
                        <h4 class="contact-source-name">CNN Global</h4>
                    </div>
                </div>
            </div>
            
            <div class="contact-card" data-url="https://www.forbes.com" data-search-route="https://www.forbes.com/search/?q=" data-name="Forbes">
                <div class="contact-header-layout">
                    <div class="contact-avatar"><i class="fa-solid fa-coins" style="color: #004b87; font-size: 1.3rem;"></i></div>
                    <div class="contact-info">
                        <h4 class="contact-source-name">Forbes</h4>
                    </div>
                </div>
            </div>

            <div class="contact-card" data-url="https://www.youtube.com" data-search-route="https://www.youtube.com/results?search_query=" data-name="YouTube">
                <div class="contact-header-layout">
                    <div class="contact-avatar"><i class="fa-brands fa-youtube" style="color: #ff0000; font-size: 1.5rem;"></i></div>
                    <div class="contact-info">
                        <h4 class="contact-source-name">YouTube</h4>
                    </div>
                </div>
            </div>
            <div class="contact-card" data-url="https://www.reddit.com" data-search-route="https://www.reddit.com/search/?q=" data-name="Reddit">
                <div class="contact-header-layout">
                    <div class="contact-avatar"><i class="fa-brands fa-reddit-alien" style="color: #ff4500; font-size: 1.5rem;"></i></div>
                    <div class="contact-info">
                        <h4 class="contact-source-name">Reddit</h4>
                    </div>
                </div>
            </div>
            <div class="contact-card" data-url="https://github.com" data-search-route="https://github.com/search?q=" data-name="GitHub">
                <div class="contact-header-layout">
                    <div class="contact-avatar"><i class="fa-brands fa-github" style="color: var(--ghost-color); font-size: 1.5rem;"></i></div>
                    <div class="contact-info">
                        <h4 class="contact-source-name">GitHub</h4>
                    </div>
                </div>
            </div>
            <div class="contact-card" data-url="https://wikipedia.org" data-search-route="https://pt.wikipedia.org/w/index.php?search=" data-name="Wikipedia">
                <div class="contact-header-layout">
                    <div class="contact-avatar"><i class="fa-solid fa-wikipedia-w" style="color: var(--ghost-color); font-size: 1.3rem;"></i></div>
                    <div class="contact-info">
                        <h4 class="contact-source-name">Wikipedia</h4>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="modal-overlay" id="modalOverlay"></div>
    
    <div class="global-bottom-sheet-modal" id="globalBottomSheet">
        <div class="modal-drag-handle" id="modalDragHandle"></div>
        <div class="modal-body-wrapper">
            <p class="modal-title-context" id="modalTitleContext">Pesquisar</p>
            <div class="modal-search-row">
                <input type="text" class="mini-search-input" id="globalMiniInput" placeholder="O que deseja buscar?">
                <button class="mini-search-submit" id="globalMiniSubmit"><i class="fa-solid fa-arrow-up"></i></button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tabs = document.querySelectorAll('.tab-item');
            const grids = document.querySelectorAll('.articles-grid, .contact-feed-grid');
            const searchBoxContainer = document.getElementById('searchBoxContainer');
            const bottomSheet = document.getElementById('globalBottomSheet');
            const modalOverlay = document.getElementById('modalOverlay');
            const modalTitleContext = document.getElementById('modalTitleContext');
            const globalInput = document.getElementById('globalMiniInput');
            const globalSubmit = document.getElementById('globalMiniSubmit');
            const dragHandle = document.getElementById('modalDragHandle');
            const searchInput = document.getElementById('searchInput');

            let activeBaseUrl = "";
            let activeSearchRoute = "";

            // ================= ESTADO E OPERAÇÃO DA NEWS API =================
            const NEWS_API_KEY = 'aa199db9b7774c639b8f68779ad3fcb9'; 
            const newsContainer = document.getElementById('newsApiContainer');
            let allArticles = []; // Armazena a resposta bruta da API para filtros locais rápidos

            async function fetchNewsData() {
                const url = `https://newsapi.org/v2/top-headlines?category=technology&language=pt&apiKey=${NEWS_API_KEY}`;
                
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('Falha ao conectar com a News API');
                    
                    const data = await response.json();
                    
                    if (!data.articles || data.articles.length === 0) {
                        newsContainer.innerHTML = '<div class="news-error"><i class="fa-solid fa-triangle-exclamation"></i> Nenhuma notícia encontrada no momento.</div>';
                        return;
                    }

                    // Guarda em memória filtrando previamente os itens inválidos da API
                    allArticles = data.articles.filter(article => article.title !== '[Removed]');
                    
                    // Renderiza o feed completo inicialmente
                    renderArticles(allArticles);

                } catch (error) {
                    console.error('Erro na requisição da News API:', error);
                    newsContainer.innerHTML = `
                        <div class="news-error">
                            <i class="fa-solid fa-triangle-exclamation"></i> Erro ao carregar feed dinâmico.<br>
                            <span style="font-size:0.8rem; color: rgba(248,248,255,0.4);">Verifique sua API Key ou limite de requisições.</span>
                        </div>`;
                }
            }

            // Função limpa responsável por injetar o HTML estruturado
            function renderArticles(articlesList) {
                newsContainer.innerHTML = '';

                if (articlesList.length === 0) {
                    newsContainer.innerHTML = '<div class="news-loading">Nenhum resultado interno corresponde à sua busca.</div>';
                    return;
                }

                articlesList.forEach(article => {
                    const newsItem = document.createElement('a');
                    newsItem.href = article.url;
                    newsItem.className = 'news-item';
                    newsItem.target = '_blank';
                    newsItem.rel = 'noopener noreferrer';

                    const sourceName = article.source.name || 'Notícias';
                    const publishedDate = new Date(article.publishedAt).toLocaleDateString('pt-BR');
                    const imageUrl = article.urlToImage || `https://picsum.photos/200/200?random=${Math.floor(Math.random() * 100)}`;

                    newsItem.innerHTML = `
                        <div class="news-content">
                            <span class="news-source">${sourceName} • ${publishedDate}</span>
                            <h3 class="news-title">${article.title}</h3>
                        </div>
                        <div class="news-thumb" style="background-image: url('${imageUrl}');"></div>
                    `;
                    newsContainer.appendChild(newsItem);
                });
            }

            // Executa a carga inicial da API
            fetchNewsData();

            // Lógica de Filtro Interno Conectada em Tempo Real ao Input superior
            searchInput.addEventListener('input', () => {
                const currentMode = searchToggleBtn.getAttribute('data-mode');
                
                // Só executa o filtro local se o modo for interno ("Int")
                if (currentMode === 'internal') {
                    const searchTerm = searchInput.value.trim().toLowerCase();
                    
                    if (searchTerm === "") {
                        renderArticles(allArticles);
                    } else {
                        const filtered = allArticles.filter(article => {
                            const titleMatch = article.title?.toLowerCase().includes(searchTerm);
                            const sourceMatch = article.source.name?.toLowerCase().includes(searchTerm);
                            return titleMatch || sourceMatch;
                        });
                        renderArticles(filtered);
                    }
                }
            });

            // ================= FECHAMENTO DO MODAL SHEET =================
            function closeBottomSheet() {
                bottomSheet.classList.remove('show');
                modalOverlay.classList.remove('show');
                document.querySelectorAll('.contact-card').forEach(c => c.classList.remove('active-card'));
            }

            tabs.forEach(tab => {
                tab.addEventListener('click', (e) => {
                    e.preventDefault(); 
                    closeBottomSheet();
                    
                    tabs.forEach(item => item.classList.remove('active'));
                    tab.classList.add('active');
                    
                    const targetTab = tab.getAttribute('data-tab');
                    
                    if (targetTab === 'web') {
                        searchBoxContainer.classList.add('hidden-search');
                    } else {
                        searchBoxContainer.classList.remove('hidden-search');
                    }
                    
                    grids.forEach(grid => {
                        grid.classList.remove('grid-active');
                    });
                    
                    const activeGrid = document.getElementById(`grid-${targetTab}`);
                    if(activeGrid) {
                        activeGrid.classList.add('grid-active');
                    }
                });
            });

            function setupCardsEvents() {
                const cards = document.querySelectorAll('.contact-card');
                cards.forEach(card => {
                    card.onclick = (e) => {
                        e.stopPropagation();

                        const url = card.getAttribute('data-url');
                        const searchRoute = card.getAttribute('data-search-route');
                        const name = card.getAttribute('data-name');
                        const isAlreadyActive = card.classList.contains('active-card');

                        if (isAlreadyActive) {
                            closeBottomSheet();
                            return;
                        }

                        cards.forEach(c => c.classList.remove('active-card'));
                        card.classList.add('active-card');

                        activeBaseUrl = url;
                        activeSearchRoute = searchRoute;
                        
                        modalTitleContext.textContent = `Pesquisa Direta: ${name}`;
                        globalInput.placeholder = `O que você quer buscar no portal ${name}?`;
                        globalInput.value = "";

                        modalOverlay.classList.add('show');
                        bottomSheet.classList.add('show');
                        
                        setTimeout(() => {
                            globalInput.focus();
                        }, 300);
                    };
                });
            }

            setupCardsEvents();

            function executeUrlSearch() {
                const query = globalInput.value.trim();
                let finalUrl = "";

                if (query !== "" && activeSearchRoute !== "") {
                    finalUrl = `${activeSearchRoute}${encodeURIComponent(query)}`;
                } else if (activeBaseUrl !== "") {
                    finalUrl = activeBaseUrl;
                }

                if (finalUrl !== "") {
                    const link = document.createElement('a');
                    link.href = finalUrl;
                    link.target = '_blank';
                    link.rel = 'noopener noreferrer';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            }

            globalInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    executeUrlSearch();
                }
            });

            globalSubmit.addEventListener('click', (e) => {
                e.preventDefault();
                executeUrlSearch();
            });

            modalOverlay.addEventListener('click', closeBottomSheet);
            dragHandle.addEventListener('click', closeBottomSheet);

            // CONTROLE DOS MOTORES DE BUSCA EXTERNA EXPANDIDOS
            const searchToggleBtn = document.getElementById('searchToggleBtn');
            const engineSelectBtn = document.getElementById('engineSelectBtn');
            const engineDropdown = document.getElementById('engineDropdown');

            const engineUrls = {
                google: 'https://www.google.com/search?q=',
                bing: 'https://www.bing.com/search?q=',
                duckduckgo: 'https://duckduckgo.com/?q=',
                naver: 'https://search.naver.com/search.naver?query=',
                baidu: 'https://www.baidu.com/s?wd=',
                yahoo: 'https://search.yahoo.com/search?p='
            };

            const engineIcons = {
                google: '<i class="fa-brands fa-google"></i> Google',
                bing: '<i class="fa-solid fa-b"></i> Bing',
                duckduckgo: '<i class="fa-solid fa-duck"></i> DuckDuck',
                naver: '<i class="fa-solid fa-n"></i> Naver',
                baidu: '<i class="fa-solid fa-paw"></i> Baidu',
                yahoo: '<i class="fa-brands fa-yahoo"></i> Yahoo'
            };

            searchToggleBtn.addEventListener('click', () => {
                const currentMode = searchToggleBtn.getAttribute('data-mode');
                
                if (currentMode === 'internal') {
                    searchToggleBtn.setAttribute('data-mode', 'external');
                    searchToggleBtn.classList.add('mode-external');
                    searchToggleBtn.innerHTML = '<i class="fa-solid fa-earth-americas"></i> Ext';
                    
                    engineSelectBtn.style.display = 'flex';
                    searchBoxContainer.classList.add('engine-active');
                    
                    const currentEngine = engineSelectBtn.getAttribute('data-engine');
                    searchInput.placeholder = `Buscar no ${currentEngine.toUpperCase()}...`;
                } else {
                    searchToggleBtn.setAttribute('data-mode', 'internal');
                    searchToggleBtn.classList.remove('mode-external');
                    searchToggleBtn.innerHTML = '<i class="fa-solid fa-house"></i> Int';
                    
                    engineSelectBtn.style.display = 'none';
                    engineDropdown.classList.remove('show');
                    searchBoxContainer.classList.remove('engine-active');
                    
                    searchInput.placeholder = 'Busca Interna...';
                    // Restaura a exibição de todas as notícias ao voltar para o modo interno
                    renderArticles(allArticles);
                }
                searchInput.focus();
            });

            engineSelectBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                engineDropdown.classList.toggle('show');
            });

            document.querySelectorAll('.engine-option').forEach(option => {
                option.addEventListener('click', () => {
                    const engine = option.getAttribute('data-engine');
                    engineSelectBtn.setAttribute('data-engine', engine);
                    engineSelectBtn.innerHTML = `${engineIcons[engine]} <i class="fa-solid fa-chevron-down" style="font-size:0.6rem"></i>`;
                    searchInput.placeholder = `Buscar no ${engine.toUpperCase()}...`;
                    engineDropdown.classList.remove('show');
                    searchInput.focus();
                });
            });

            document.addEventListener('click', () => {
                engineDropdown.classList.remove('show');
            });

            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const query = searchInput.value.trim();
                    if (!query) return;

                    const currentMode = searchToggleBtn.getAttribute('data-mode');
                    
                    if (currentMode === 'external') {
                        const activeEngine = engineSelectBtn.getAttribute('data-engine');
                        const searchUrl = engineUrls[activeEngine] || engineUrls.google;
                        
                        const extLink = document.createElement('a');
                        extLink.href = `${searchUrl}${encodeURIComponent(query)}`;
                        extLink.target = '_blank';
                        extLink.rel = 'noopener noreferrer';
                        document.body.appendChild(extLink);
                        extLink.click();
                        document.body.removeChild(extLink);
                    }
                }
            });
        });
    </script>
</body>
</html>
