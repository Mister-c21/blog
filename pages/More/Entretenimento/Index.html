<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Responsiva</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8f8ff;
            --primary-color: #8a2be2;
            --text-color: #2c1a4d;
            --glass-bg: rgba(138, 43, 226, 0.15);
            --glass-border: rgba(138, 43, 226, 0.25);
            --glass-blur: blur(12px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; height: 100vh; overflow: hidden; }

        /* --- Desktop: Botão sempre escondido --- */
        .menu-btn {
            display: none !important;
        }

        .sidebar {
            width: 260px; height: 100vh; position: fixed; top: 0; left: 0;
            background: var(--glass-bg); backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--glass-border); padding: 30px 20px;
            display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 150;
        }

        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .sidebar-menu a {
            display: flex; align-items: center; gap: 15px; padding: 12px 15px;
            color: var(--text-color); text-decoration: none; font-weight: 500; border-radius: 8px;
        }
        .sidebar-menu a i { color: var(--primary-color); }
        .sidebar-menu a:hover, .sidebar-menu a.active { background: rgba(138, 43, 226, 0.2); color: var(--primary-color); }

        .main-content { flex: 1; margin-left: 260px; height: 100vh; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }

        /* --- Mobile --- */
        @media (max-width: 768px) {
            .menu-btn { display: block !important; position: fixed; top: 15px; left: 15px; z-index: 200; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--primary-color); padding: 10px 14px; border-radius: 8px; cursor: pointer; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .sidebar.active ~ .menu-btn { display: none !important; } /* Esconde o botão ao abrir */
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>

    <button class="menu-btn" id="openMenu"><i class="fa-solid fa-bars"></i></button>

    <nav class="sidebar" id="sidebar">
        <ul class="sidebar-menu">
            <!-- Adicionado target="_top" para forçar a saída de frames se necessário -->
            <li><a href="../../../../index.html" class="menu-item" target="_top"><i class="fa-solid fa-house"></i> Início</a></li>
            <li><a href="./Social/Index.html" class="menu-item active"><i class="fa-solid fa-users"></i> Social</a></li>
            <li><a href="" class="menu-item"><i class="fa-solid fa-dog"></i>Pet</a></li>
            <li><a href="" class="menu-item"><i class="fa-solid fa-video"></i>Midia</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <iframe id="contentFrame" src="./Social/Index.html"></iframe>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const openMenuBtn = document.getElementById('openMenu');
        const frame = document.getElementById('contentFrame');
        const menuItems = document.querySelectorAll('.menu-item');

        function toggleMenu() {
            sidebar.classList.toggle('active');
        }

        openMenuBtn.addEventListener('click', toggleMenu);

        menuItems.forEach(item => {
            item.addEventListener('click', function(e) {
                // Modificado para detectar o caminho correto do link de Início
                if (this.getAttribute('href').includes('index.html')) {
                    return; // Permite o comportamento padrão de navegação da página
                }
                
                e.preventDefault(); // Impede a navegação normal apenas para os outros links
                frame.src = this.getAttribute('href');
                menuItems.forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                if (window.innerWidth <= 768) toggleMenu();
            });
        });
    </script>
</body>
</html>
