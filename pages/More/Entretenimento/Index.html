<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entretenimento</title>
  <style>
    :root {
      --bg-color: #0f0a1c;
      --card-bg: transparent;
      --violet-primary: #9d4edd;
      --violet-glow: #7b2cbf;
      --text-white: #ffffff;
      --text-muted: #d8c7ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      font-family: 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Container do Header */
    .header {
      width: 100%;
      max-width: 450px;
      display: flex;
      align-items: center;
      position: relative;
      margin-bottom: 30px;
      padding: 10px 0;
    }

    /* Botão de seta na extremidade esquerda (agora uma tag <a>) */
    .back-button {
      position: absolute;
      left: 0;
      background: transparent;
      border: 1px solid rgba(157, 78, 221, 0.4);
      color: var(--text-white);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s ease;
      outline: none;
      text-decoration: none; /* Remove sublinhado do link */
    }

    /* Estilo do ícone SVG dentro do botão */
    .back-button svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* Efeitos do botão da seta */
    .back-button:hover,
    .back-button:focus-visible {
      border-color: var(--violet-primary);
      box-shadow: 0 0 15px rgba(157, 78, 221, 0.6);
      transform: scale(1.05);
    }

    .back-button:focus-visible {
      outline: 2px solid var(--text-white);
      outline-offset: 2px;
    }

    /* Título Centralizado no Header */
    .header-title {
      width: 100%;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-white);
    }

    /* Container da lista vertical */
    .card-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
      width: 100%;
      max-width: 450px;
    }

    /* Estilo individual do Card (agora é a tag <a>) */
    .card {
      background-color: var(--card-bg);
      border: 2px solid rgba(157, 78, 221, 0.3);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      color: var(--text-white);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      outline: none;
      position: relative;
      height: 180px;
      display: block; /* Garante comportamento em bloco para o link */
      text-decoration: none; /* Remove sublinhado do link */
    }

    /* Imagem do Card */
    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    /* Conteúdo do Card - Sobreposto na Imagem */
    .card-content {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 20px;
      background: linear-gradient(to top, rgba(15, 10, 28, 0.85) 0%, transparent 100%);
      pointer-events: none;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-white);
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
    }

    /* Efeitos de HOVER e FOCUS (Glow violeta) */
    .card:hover,
    .card:focus-visible {
      transform: translateY(-6px);
      border-color: var(--violet-primary);
      box-shadow: 0 0 25px rgba(157, 78, 221, 0.6),
                  0 0 10px rgba(255, 255, 255, 0.3);
    }

    .card:hover .card-image,
    .card:focus-visible .card-image {
      transform: scale(1.05);
    }

    /* Borda destacada ao navegar via teclado (Focus) */
    .card:focus-visible {
      outline: 2px solid var(--text-white);
      outline-offset: 2px;
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="../../../../index.html" class="back-button" aria-label="Voltar">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
      </svg>
    </a>
    <h1 class="header-title">Entretenimento</h1>
  </header>

  <div class="card-list">
    
    <a href="lives.html" class="card">
      <img class="card-image" src="https://picsum.photos/500/300?random=1" alt="Lives">
      <div class="card-content">
        <h3 class="card-title">Lives</h3>
      </div>
    </a>

    <a href="streamings.html" class="card">
      <img class="card-image" src="https://picsum.photos/500/300?random=2" alt="Streamings">
      <div class="card-content">
        <h3 class="card-title">Streamings</h3>
      </div>
    </a>

    <a href="biblioteca.html" class="card">
      <img class="card-image" src="https://picsum.photos/500/300?random=3" alt="Biblioteca de Livros">
      <div class="card-content">
        <h3 class="card-title">Biblioteca</h3>
      </div>
    </a>

    <a href="com-amigos.html" class="card">
      <img class="card-image" src="https://picsum.photos/500/300?random=4" alt="Com Amigos e Livros">
      <div class="card-content">
        <h3 class="card-title">Com Amigos</h3>
      </div>
    </a>

  </div>

</body>
</html>
