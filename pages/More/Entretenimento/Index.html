<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lore Blog</title>
    <style>
        :root {
            --primary: #8A2BE2; /* blueviolet */
            --bg: #F8F8FF;      /* ghost */
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            
            /* Configuração do Fundo */
            background-color: var(--bg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            transition: background 1.5s ease-in-out; /* Transição suave */
        }

        .container {
            max-width: 1000px;
            margin: auto;
            flex: 1;
            width: 100%;
        }

        /* Estilo Vidro (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 0px;
            margin-bottom: 15px;
            box-shadow: 0 8px 32px 0 rgba(138, 43, 226, 0.15);
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
        }

        .card-content { padding: 12px; background: transparent; }
        .card-content h3 { margin: 0; font-size: 14px; color: #333; }

        .pin:hover, .pin:focus-within {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
            border-color: rgba(138, 43, 226, 0.5);
        }

        .pinterest-grid { column-count: 2; column-gap: 15px; }
        @media (min-width: 600px) { .pinterest-grid { column-count: 3; } }
        @media (min-width: 900px) { .pinterest-grid { column-count: 4; } }

        .pin { break-inside: avoid; margin-bottom: 15px; outline: none; }
        .pin img { width: 100%; height: auto; display: block; }

        .nav-menu {
            position: fixed; bottom: 0; left: 0; width: 100%; display: flex;
            justify-content: space-around; padding: 15px 0;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.5); z-index: 1000;
        }
        .nav-item, .nav-link { color: #a0a0a0; cursor: pointer; transition: all 0.3s; text-decoration: none; outline: none; }
        .nav-item.active, .nav-link.active { color: var(--primary); }
        .nav-item:hover, .nav-link:hover { color: var(--primary); opacity: 0.8; }

        @media (min-width: 768px) {
            body { padding-left: 240px; }
            .nav-menu {
                position: fixed; top: 0; left: 0; width: 80px; height: 100vh;
                flex-direction: column; justify-content: flex-start;
                border-right: 1px solid rgba(255, 255, 255, 0.5); padding-top: 50px; gap: 30px;
            }
        }
    </style>
</head>
<body>

    <nav class="nav-menu">
        <a href="../../index.html" class="nav-link"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></a>
        <div class="nav-item active" onclick="setActive(this)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg></div>
        <div class="nav-item" onclick="setActive(this)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg></div>
    </nav>

    <div class="container">
        <main class="pinterest-grid">
            <article class="glass-card pin" tabindex="0"><img src="https://i.pinimg.com/originals/2f/38/84/2f38841a446bdcb48fdfbcb1ffd335a5.gif" alt="Post 1"><div class="card-content"><h3>Animações</h3></div></article>
            <article class="glass-card pin" tabindex="0"><img src="https://i.pinimg.com/originals/fd/ce/27/fdce2751f4569720a9f77428865fc996.gif" alt="Post 2"><div class="card-content"><h3>Animes</h3></div></article>
            <article class="glass-card pin" tabindex="0"><img src="https://i.pinimg.com/originals/f9/ef/a3/f9efa376dece23c7a1aeb5c17208de18.gif" alt="Post 3"><div class="card-content"><h3>Música</h3></div></article>
            <article class="glass-card pin" tabindex="0"><img src="https://i.pinimg.com/originals/2d/82/62/2d8262c9ad37e3433963a94c341a7366.gif" alt="Post 4"><div class="card-content"><h3>Games</h3></div></article>
            <article class="glass-card pin" tabindex="0"><img src="https://i.pinimg.com/originals/bc/66/d6/bc66d6df15aa760d408d26a3425dc5b5.gif" alt="Post 5"><div class="card-content"><h3>filmes</h3></div></article>
            <article class="glass-card pin" tabindex="0"><img src="https://64.media.tumblr.com/3a8a1b3ace6900eeae20bbdfd592b759/tumblr_pjkwc0bmWF1qcrr5qo2_r1_640.gif" alt="Post 6"><div class="card-content"><h3>Seres</h3></div></article>
        </main>
    </div>

    <script>
        function setActive(element) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }

        // Array de imagens de fundo
        const imagensFundo = [
            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR5y7ghk1lkATsg2qgCDY7nHRiUIBl5y-F_uAH8PBOK6JR3v5AT47u3wnFG&s=10",
            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-TPxNhwFPTkf9Qo5HU1agIJ7EvRrWUarVdjs2lByWUDE9F_bFE5qFfpAS&s=10",
            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-TPxNhwFPTkf9Qo5HU1agIJ7EvRrWUarVdjs2lByWUDE9F_bFE5qFfpAS&s=10",
            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRlcLL8ZOXNx4Ok4UIj3mIvN_KPAK4bVex5jB_g0YSm3XFDujqJEqNvBN4&s=10"
        ];

        let indiceAtual = 0;

        function trocarFundo() {
            document.body.style.backgroundImage = `url('${imagensFundo[indiceAtual]}')`;
            indiceAtual = (indiceAtual + 1) % imagensFundo.length;
        }

        // Troca a imagem a cada 10 segundos
        setInterval(trocarFundo, 10000);

        // Inicia a primeira imagem
        trocarFundo();
    </script>
</body>
</html>
