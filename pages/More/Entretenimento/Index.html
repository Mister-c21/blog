<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entretenimento</title>
  <style>
    :root {
      --bg-color: #0f0a1c;
      --card-bg: transparent;
      --violet-primary: #9d4edd;
      --violet-glow: #7b2cbf;
      --text-white: #ffffff;
      --text-muted: #d8c7ff;
      --bg-image: none; /* Variável para guardar a imagem do card ativo */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      font-family: 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
    }

    /* Pseudo-elemento para criar o fundo borrado sem afetar o resto do conteúdo */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: var(--bg-image);
      background-size: cover;
      background-position: center;
      filter: blur(25px) brightness(0.4); /* Aplica o desfoque e escurece levemente */
      opacity: 0;
      transition: opacity 0.5s ease; /* Transição suave de entrada e saída */
      z-index: -1; /* Mantém o fundo atrás de tudo */
      transform: scale(1.1); /* Evita bordas brancas/secas causadas pelo blur */
    }

    /* Ativa a visibilidade do fundo borrado */
    body.has-hover::before {
      opacity: 1;
    }

    /* Container do Header */
    .header {
      width: 100%;
      max-width: 450px;
      display: flex;
      align-items: center;
      position: relative;
      margin-bottom: 30px;
      padding: 10px 0;
    }

    /* Botão de seta na extremidade esquerda */
    .back-button {
      position: absolute;
      left: 0;
      background: transparent;
      border: 1px solid rgba(157, 78, 221, 0.4);
      color: var(--text-white);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s ease;
      outline: none;
      text-decoration: none;
    }

    .back-button svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .back-button:hover,
    .back-button:focus-visible {
      border-color: var(--violet-primary);
      box-shadow: 0 0 15px rgba(157, 78, 221, 0.6);
      transform: scale(1.05);
    }

    .back-button:focus-visible {
      outline: 2px solid var(--text-white);
      outline-offset: 2px;
    }

    /* Título Centralizado no Header */
    .header-title {
      width: 100%;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-white);
    }

    /* Container da lista vertical */
    .card-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
      width: 100%;
      max-width: 450px;
    }

    /* Estilo individual do Card */
    .card {
      background-color: var(--card-bg);
      border: 2px solid rgba(157, 78, 221, 0.3);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      color: var(--text-white);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      outline: none;
      position: relative;
      height: 180px;
      display: block;
      text-decoration: none;
    }

    /* Imagem do Card */
    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    /* Conteúdo do Card - Sobreposto na Imagem */
    .card-content {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 20px;
      background: linear-gradient(to top, rgba(15, 10, 28, 0.85) 0%, transparent 100%);
      pointer-events: none;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-white);
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
    }

    /* Efeitos de HOVER e FOCUS (Glow violeta) */
    .card:hover,
    .card:focus-visible {
      transform: translateY(-6px);
      border-color: var(--violet-primary);
      box-shadow: 0 0 25px rgba(157, 78, 221, 0.6),
                  0 0 10px rgba(255, 255, 255, 0.3);
    }

    .card:hover .card-image,
    .card:focus-visible .card-image {
      transform: scale(1.05);
    }

    .card:focus-visible {
      outline: 2px solid var(--text-white);
      outline-offset: 2px;
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="../../../../index.html" class="back-button" aria-label="Voltar">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
      </svg>
    </a>
    <h1 class="header-title">Entretenimento</h1>
  </header>

  <div class="card-list">
    
    <a href="lives.html" class="card">
      <img class="card-image" src="Src/lives.png" alt="Lives">
      <div class="card-content">
        <h3 class="card-title">Lives</h3>
      </div>
    </a>

    <a href="streamings.html" class="card">
      <img class="card-image" src="Src/streamings.png" alt="Streamings">
      <div class="card-content">
        <h3 class="card-title">Streamings</h3>
      </div>
    </a>

    <a href="com-amigos.html" class="card">
      <img class="card-image" src="Src/com-amigos.png" alt="Com Amigos e Livros">
      <div class="card-content">
        <h3 class="card-title">Com Amigos</h3>
      </div>
    </a>

  </div>

  <script>
    const cards = document.querySelectorAll('.card');
    const body = document.body;

    cards.forEach(card => {
      // Captura o src da imagem contida dentro do card atual
      const img = card.querySelector('.card-image');
      if (!img) return;

      // Evento de passar o mouse (ou focar pelo teclado)
      const handleEnter = () => {
        body.style.setProperty('--bg-image', `url("${img.src}")`);
        body.classList.add('has-hover');
      };

      // Evento de tirar o mouse
      const handleLeave = () => {
        body.classList.remove('has-hover');
      };

      card.addEventListener('mouseenter', handleEnter);
      card.addEventListener('mouseleave', handleLeave);
      card.addEventListener('focus', handleEnter);
      card.addEventListener('blur', handleLeave);
    });
  </script>

</body>
</html>
