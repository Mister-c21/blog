<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>LorePlay</title>
    <link class="icon" type="image/png" href="/20260703_211636_0000.png" sizes="32x32">
    <link rel="shortcut icon" href="/20260703_211636_0000.png">
    <link class="icon" type="image/svg+xml" href="/20260703_211636_0000.png">

    <script src="dataSeres.js"></script>
    <script src="dataFilmes.js"></script>
    <script src="dataMusicas.js"></script>

    <style>
        :root {
            --blueviolet-color: #8a2be2;
            --ghost-color: #f8f8ff;
            --glass-bg: rgba(255, 255, 255, 0.2); 
        }

        #background {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; background-size: cover; background-position: center;
            transition: background-image 1s ease-in-out;
            filter: brightness(0.6);
        }

        body { margin: 0; font-family: sans-serif; color: white; }
        body.modal-open { overflow: hidden !important; height: 100vh !important; }

        header { 
            display: flex; align-items: center; padding: 10px 20px; 
            background: rgba(138, 43, 226, 0.15); backdrop-filter: blur(10px); height: 60px; 
        }
        
        .nav-button { background: none; border: none; color: white; font-size: 20px; cursor: pointer; width: 30px; }
        .title { flex-grow: 1; text-align: center; font-size: 20px; font-weight: bold; margin-right: 30px; }

        .tab-bar { display: flex; overflow-x: auto; white-space: nowrap; background: var(--glass-bg); backdrop-filter: blur(10px); padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.2); scrollbar-width: none; }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab-item { padding: 0 20px; font-weight: bold; color: white; cursor: pointer; position: relative; }
        .tab-item.active { color: #fff; }
        .tab-item.active::after { content: ''; position: absolute; bottom: -15px; left: 20px; right: 20px; height: 3px; background-color: white; border-radius: 2px; }

        .search-wrapper { padding: 10px 15px; background: var(--glass-bg); backdrop-filter: blur(10px); display: flex; align-items: center; gap: 10px; }
        .search-bar { 
            flex-grow: 1; padding: 10px 15px; border: 1px solid rgba(255,255,255,0.3); border-radius: 25px; 
            background: rgba(255,255,255,0.1); color: white; outline: none; transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--blueviolet-color); box-shadow: 0 0 10px var(--blueviolet-color); }
        
        .clear-btn, .voice-btn { background: none; border: none; color: white; cursor: pointer; font-size: 18px; }
        .clear-btn { display: none; margin-right: 5px; }
        .voice-btn { margin-right: 10px; }

        .suggestions-label { padding: 10px 15px; margin: 0; font-weight: bold; color: white; background: var(--glass-bg); backdrop-filter: blur(5px); }

        .feed-container { display: none; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
        .feed-container.active { display: grid; }
        
          .feed-item { 
            width: 100%; height: 120px; background-size: cover; background-position: center; 
            position: relative; box-sizing: border-box; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s ease, filter 0.2s ease;
            clip-path: polygon(12px 0%, 100% 0%, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0% 100%, 0% 12px);
          }
        
        .feed-item:hover { transform: scale(1.03); box-shadow: 0 0 15px var(--blueviolet-color); z-index: 1; }
        
        .item-title { position: absolute; bottom: 0; width: 100%; background: rgba(0, 0, 0, 0.6); color: white; padding: 5px 0; font-size: 12px; text-align: center; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; }

        #epMenu { position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; padding: 20px; }
        .ep-menu-content { background: rgba(20, 20, 20, 0.95); padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .ep-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .ep-select-btn { background: var(--blueviolet-color); border: none; color: white; padding: 10px; border-radius: 10px; cursor: pointer; }

        #playerModal {
            position: fixed; inset: 0; z-index: 9999; background-color: black;
            display: none; flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateY(100%);
            border-radius: 0; background-size: cover; background-position: center;
        }
        #playerModal.active { display: flex; transform: translateY(0); }
        #modal-drag-handle { height: 40px; display: flex; align-items: center; justify-content: center; cursor: grab; touch-action: none; flex-shrink: 0; }
        .drag-pill { width: 48px; height: 6px; background: rgba(255, 255, 255, 0.3); border-radius: 9999px; }
        
        .modal-body { padding: 10px; display: flex; flex-direction: column; align-items: center; background: rgba(0, 0, 0, 0.85); flex-grow: 1; overflow-y: auto; width: 100%; box-sizing: border-box; position: relative; }
        
        .close-btn { display: none; position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; z-index: 10; }
        
        .content-wrapper { width: 100%; max-width: 600px; transition: max-width 0.3s; }
        .video-box { aspect-ratio: 16 / 10; background: #222; margin-bottom: 15px; border-radius: 15px; overflow: hidden; }
        .video-box iframe { width: 100%; height: 100%; border: none; }
        
        @media (min-width: 768px) { 
            .close-btn { display: block; }
            .feed-container { grid-template-columns: repeat(4, 1fr); } 
            .content-wrapper { max-width: 900px; }
            .video-box { aspect-ratio: 16 / 9; }
        }

        .nav-ep-box { display: flex; gap: 5px; margin-bottom: 15px; justify-content: center; display: none; }
        .nav-ep-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; }
        .nav-ep-btn:disabled { opacity: 0.3; }

        .info-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .work-title { font-size: 18px; font-weight: bold; }
        .view-more-btn { background: var(--blueviolet-color); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 8px; }

        .ad-container { height: 180px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; margin-top: 15px; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; color: rgba(255,255,255,0.5); font-size: 14px; }
        .ad-label { position: absolute; top: 10px; left: 10px; font-size: 10px; background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 4px; color: white; }

        .search-scroll-container { display: flex; gap: 10px; overflow-x: auto; padding: 12px 5px; margin-top: 15px; scrollbar-width: none; }
        .search-scroll-container::-webkit-scrollbar { display: none; }
        .scroll-search-btn { width: 120px; height: 80px; border: none; color: white; border-radius: 10px; clip-path: polygon(20% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 30%); font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background-size: cover; background-position: center; position: relative; }
        .scroll-search-btn::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
        .scroll-search-btn i { position: relative; z-index: 1; }

        .video-platform-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; padding-bottom: 20px; }
        .platform-card { display: flex; align-items: center; gap: 15px; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; cursor: pointer; }
        .platform-icon { width: 50px; height: 50px; background-size: cover; background-position: center; border-radius: 10px; }
        .platform-name { font-weight: bold; }
    </style>
</head>
<body>

    <div id="background"></div>

    <header>
        <button class="nav-button" onclick="window.location.href='../../../../index.html'"><i class="fas fa-chevron-left"></i></button>
        <div class="title">Lore Play</div>
    </header>

    <nav class="tab-bar">
        <div class="tab-item active" onclick="updateUI('seres', this)">seres</div>
        <div class="tab-item" onclick="updateUI('filmes', this)">filmes</div>
        <div class="tab-item" onclick="updateUI('músicas', this)">músicas</div>
        <div class="tab-item" onclick="window.location.href='./Live.html'">Lives</div>
        <div class="tab-item" onclick="window.location.href='./Animes.html'">Animes</div>

    </nav>

    <div class="search-wrapper">
        <button id="voiceBtn" class="voice-btn" onclick="startVoiceSearch()"><i class="fas fa-microphone"></i></button>
        <input type="text" id="searchInput" class="search-bar" placeholder="Buscar..." oninput="handleSearch()">
        <button id="clearBtn" class="clear-btn" onclick="clearSearch()"><i class="fas fa-times"></i></button>
    </div>

    <p class="suggestions-label">sugestões</p>

    <main id="seres" class="feed-container active"></main>
    <main id="filmes" class="feed-container"></main>
    <main id="músicas" class="feed-container"></main>

    <div id="epMenu" onclick="this.style.display='none'">
        <div class="ep-menu-content" onclick="event.stopPropagation()">
            <h3 id="epMenuTitle">Selecione o Episódio</h3>
            <div class="ep-grid" id="epGrid"></div>
        </div>
    </div>

    <div id="playerModal">
        <div id="modal-drag-handle"><div class="drag-pill"></div></div>
        <div class="modal-body">
            <button class="close-btn" onclick="closePlayer()"><i class="fas fa-times"></i></button>
            <div class="content-wrapper">
                <div class="video-box" id="videoBox"></div>
                
                <div class="nav-ep-box" id="navEpBox">
                    <button class="nav-ep-btn" id="prevBtn" onclick="changeEp(-1)"><i class="fas fa-arrow-left"></i></button>
                    <button class="nav-ep-btn" id="nextBtn" onclick="changeEp(1)"><i class="fas fa-arrow-right"></i></button>
                </div>

                <div class="info-bar">
                    <div class="work-title" id="modalTitle">Nome da Obra</div>
                    <button class="view-more-btn" onclick="goToPlatform()">Ver mais<i class="fas fa-external-link-alt"></i></button>
                </div>

                <div class="ad-container">
                    <span class="ad-label">anúncio</span>
                    <div>Espaço Publicitário</div>
                </div>

                <div class="search-scroll-container">
                    <button class="scroll-search-btn" style="background-image: url('https://yt3.googleusercontent.com/bAseQlKvNmjdLQrvYWm_q3QDp8C8YKyYI-nYJewgOkPi0JU1_3X9oFgjrEdzkOlXzLGFxFbnsw=s900-c-k-c0x00ffffff-no-rj')" onclick="redirect('https://www.google.com/search?q=')"><i class="fas fa-search"></i></button>
                    <button class="scroll-search-btn" style="background-image: url('https://www.latevaweb.com/web-design/bing-seo.jpg')" onclick="redirect('https://www.bing.com/search?q=')"><i class="fas fa-search"></i></button>
                    <button class="scroll-search-btn" style="background-image: url('https://play-lh.googleusercontent.com/8g15G46I-P4wZRcQqX---TMMia5yzpXJLPBh2TWhwbD1zb7AvhMuTc05OZZfnVzXZxOtxLuU6d1G9JKCRUCdnQ=s256-rw')" onclick="redirect('https://search.naver.com/search.naver?query=')"><i class="fas fa-search"></i></button>
                    <button class="scroll-search-btn" style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTn7G-6vqaf-a18YW56wfn0Fk8H0vgqlFC8RPyORXWI6hCCkRidRrNiCw14&s=10')" onclick="redirect('https://www.baidu.com/s?wd=')"><i class="fas fa-search"></i></button>
                </div>

                <div class="video-platform-list">
                    <div class="platform-card" onclick="redirect('https://www.youtube.com/results?search_query=')">
                        <div class="platform-icon" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg')"></div>
                        <div class="platform-name">YouTube</div>
                    </div>
                    <div class="platform-card" onclick="redirect('https://www.twitch.tv/search?term=')">
                        <div class="platform-icon" style="background-image: url('https://m.media-amazon.com/images/I/21kRx-CJsUL.png')"></div>
                        <div class="platform-name">Twitch</div>
                    </div>
                    <div class="platform-card" onclick="redirect('https://www.tiktok.com/search?q=')">
                        <div class="platform-icon" style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRDES1RgqfRc__1IQZrqjhJjpED5AuRVRGVOSzvbT5jGA&s=10')"></div>
                        <div class="platform-name">TikTok</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const contentData = { seres: dataSeres, filmes: dataFilmes, músicas: dataMusicas };
        const backgroundImages = [
            'https://static.crunchyroll.com/cr-acquisition/assets/img/start/hero/us-global/background-desktop.jpg',
            'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSthZIQDPJrKOz_O2t485hQjlcAOxdtTw-BF2rNzsmcdwNeY00XMddXodNw&s=10',
            'https://png.pngtree.com/thumb_back/fh260/background/20230611/pngtree-colorful-music-notes-and-a-black-background-image_2975597.jpg'
        ];
        let bgIndex = 0;
        const bgElement = document.getElementById('background');

        function rotateBackground() {
            bgIndex = (bgIndex + 1) % backgroundImages.length;
            bgElement.style.backgroundImage = `url('${backgroundImages[bgIndex]}')`;
        }
        setInterval(rotateBackground, 8000);

        const playerModal = document.getElementById('playerModal');
        const epMenu = document.getElementById('epMenu');
        const handle = document.getElementById('modal-drag-handle');
        const videoBox = document.getElementById('videoBox');
        let touchStartY = 0, isDragging = false, currentTab = 'seres';
        let currentItem = { title: '', eps: [], currentEpIndex: 0, img: '' };

        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const clearBtn = document.getElementById('clearBtn');
            clearBtn.style.display = query.length > 0 ? 'block' : 'none';
            const activeContainer = document.getElementById(currentTab);
            const items = activeContainer.querySelectorAll('.feed-item');
            items.forEach(item => {
                const title = item.querySelector('.item-title').innerText.toLowerCase();
                item.style.display = title.includes(query) ? 'block' : 'none';
            });
        }

        function clearSearch() {
            const input = document.getElementById('searchInput');
            input.value = '';
            handleSearch();
            input.focus();
        }

        function getThumb(id) { return `https://i.ytimg.com/vi/${id}/maxresdefault.jpg`; }

        function handleItemClick(item) {
            const img = item.v ? getThumb(item.v) : getThumb(item.eps[0]);
            if (currentTab === 'seres') {
                document.getElementById('epMenuTitle').innerText = item.t;
                const grid = document.getElementById('epGrid');
                grid.innerHTML = '';
                item.eps.forEach((v, index) => {
                    grid.innerHTML += `<button class="ep-select-btn" onclick="openPlayerWithEp('${item.t}', '${getThumb(v)}', ${index}, '${item.eps.join(',')}')">Ep ${index + 1}</button>`;
                });
                epMenu.style.display = 'flex';
            } else {
                openPlayer(item.t, img, item.v);
            }
        }

        function openPlayerWithEp(title, imageUrl, index, epsString) {
            const eps = epsString.split(',');
            currentItem = { title, eps, currentEpIndex: index, img: imageUrl };
            renderPlayer(title, imageUrl, eps[index], index, eps.length);
        }

        function openPlayer(title, imageUrl, videoId) {
            currentItem = { title, eps: [], currentEpIndex: -1, img: imageUrl };
            renderPlayer(title, imageUrl, videoId);
        }

        function renderPlayer(title, imageUrl, videoId, index = -1, total = 0) {
            epMenu.style.display = 'none';
            const displayTitle = index !== -1 ? `${title} - Ep ${index + 1}` : title;
            document.getElementById('modalTitle').innerText = displayTitle;
            videoBox.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&enablejsapi=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            playerModal.style.backgroundImage = `url('${imageUrl}')`;
            playerModal.classList.add('active');
            document.body.classList.add('modal-open');
            const nav = document.getElementById('navEpBox');
            nav.style.display = total > 0 ? 'flex' : 'none';
            document.getElementById('prevBtn').disabled = index <= 0;
            document.getElementById('nextBtn').disabled = index >= total - 1;
        }

        function changeEp(dir) {
            const newIndex = currentItem.currentEpIndex + dir;
            if(newIndex >= 0 && newIndex < currentItem.eps.length) {
                renderPlayer(currentItem.title, getThumb(currentItem.eps[newIndex]), currentItem.eps[newIndex], newIndex, currentItem.eps.length);
                currentItem.currentEpIndex = newIndex;
            }
        }

        function render(data, container) {
            container.innerHTML = data.map(item => {
                const thumb = item.v ? getThumb(item.v) : getThumb(item.eps[0]);
                const itemStr = JSON.stringify(item).replace(/"/g, "'");
                return `
                    <div class="feed-item" style="background-image: url('${thumb}')" onclick="handleItemClick(${itemStr})">
                        <div class="item-title">${item.t}</div>
                    </div>
                `;
            }).join('');
        }

        function updateUI(id, el) {
            currentTab = id;
            document.querySelectorAll('.feed-container').forEach(f => f.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            render(contentData[id], document.getElementById(id));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('searchInput').value = '';
            handleSearch();
        }

        function closePlayer() {
            playerModal.style.transform = 'translateY(100%)';
            setTimeout(() => { playerModal.classList.remove('active'); playerModal.style.transform = ''; document.body.classList.remove('modal-open'); videoBox.innerHTML = ''; }, 400);
        }

        function goToPlatform() { window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(document.getElementById('modalTitle').innerText)}`, '_blank'); }
        function redirect(url) { window.open(url + encodeURIComponent(document.getElementById('modalTitle').innerText), '_blank'); }

        handle.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; isDragging = true; }, { passive: true });
        handle.addEventListener('touchmove', (e) => { if (!isDragging) return; const diff = e.touches[0].clientY - touchStartY; if (diff > 0) playerModal.style.transform = `translateY(${diff}px)`; }, { passive: true });
        handle.addEventListener('touchend', (e) => { isDragging = false; const diff = e.changedTouches[0].clientY - touchStartY; diff > 100 ? closePlayer() : playerModal.style.transform = 'translateY(0)'; }, { passive: true });

        bgElement.style.backgroundImage = `url('${backgroundImages[0]}')`;
        updateUI('seres', document.querySelector('.tab-item'));
    </script>
</body>
</html>
