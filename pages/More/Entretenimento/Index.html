<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entretenimento</title>
  <style>
    :root {
      --bg-color: #0f0a1c;
      --card-bg: transparent;
      --violet-primary: #9d4edd;
      --violet-glow: #7b2cbf;
      --text-white: #ffffff;
      --text-muted: #d8c7ff;
      --bg-image: none;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      font-family: 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: var(--bg-image);
      background-size: cover;
      background-position: center;
      filter: blur(25px) brightness(0.4);
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: -1;
      transform: scale(1.1);
    }

    body.has-hover::before {
      opacity: 1;
    }

    .header {
      width: 100%;
      max-width: 450px;
      display: flex;
      align-items: center;
      position: relative;
      margin-bottom: 30px;
      padding: 10px 0;
    }

    .back-button {
      position: absolute;
      left: 0;
      background: transparent;
      border: 1px solid rgba(157, 78, 221, 0.4);
      color: var(--text-white);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s ease;
      outline: none;
      text-decoration: none;
    }

    .back-button svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .back-button:hover,
    .back-button:focus-visible {
      border-color: var(--violet-primary);
      box-shadow: 0 0 15px rgba(157, 78, 221, 0.6);
      transform: scale(1.05);
    }

    .header-title {
      width: 100%;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-white);
    }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
      width: 100%;
      max-width: 450px;
    }

    .card {
      background-color: var(--card-bg);
      border: 2px solid rgba(157, 78, 221, 0.3);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      color: var(--text-white);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      outline: none;
      position: relative;
      height: 180px;
      display: block;
      text-decoration: none;
    }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .card-content {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 20px;
      background: linear-gradient(to top, rgba(15, 10, 28, 0.85) 0%, transparent 100%);
      pointer-events: none;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-white);
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-6px);
      border-color: var(--violet-primary);
      box-shadow: 0 0 25px rgba(157, 78, 221, 0.6),
                  0 0 10px rgba(255, 255, 255, 0.3);
    }

    .card:hover .card-image,
    .card:focus-visible .card-image {
      transform: scale(1.05);
    }

    /* === SOBREPOSIÇÃO CINZA PARA TV E BIBLIOTECA === */
    .card.coming-soon::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(40, 40, 40, 0.75); /* Capa cinza escura */
      z-index: 2;
      pointer-events: none;
    }

    /* Texto "Em breve" sutil na capa */
    .card.coming-soon .coming-soon-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.6);
      color: #ddd;
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      z-index: 3;
      pointer-events: none;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }

    /* Modal Em Breve */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }

    .modal-content {
      background: linear-gradient(145deg, #1a1433, #2a1f4d);
      border: 3px solid #9d4edd;
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 320px;
      text-align: center;
      box-shadow: 0 0 40px rgba(157, 78, 221, 0.7);
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-content h2 {
      font-size: 2rem;
      margin-bottom: 12px;
      background: linear-gradient(to right, #9d4edd, #c77dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .modal-content p {
      color: #d8c7ff;
      font-size: 1.1rem;
      line-height: 1.5;
    }

    .close-btn {
      margin-top: 25px;
      padding: 12px 32px;
      background: #9d4edd;
      color: white;
      border: none;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .close-btn:hover {
      background: #c77dff;
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(157, 78, 221, 0.6);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes popIn {
      0% { transform: scale(0.6); opacity: 0; }
      60% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="../../../../index.html" class="back-button" aria-label="Voltar">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
      </svg>
    </a>
    <h1 class="header-title">Entretenimento</h1>
  </header>

  <div class="card-list">
    
    <a href="lives.html" class="card">
      <img class="card-image" src="Src/lives.png" alt="Lives">
      <div class="card-content">
        <h3 class="card-title">Lives</h3>
      </div>
    </a>

    <a href="streamings.html" class="card">
      <img class="card-image" src="Src/streamings.png" alt="Streamings">
      <div class="card-content">
        <h3 class="card-title">Streamings</h3>
      </div>
    </a>

    <!-- TV com capa cinza -->
    <a href="#" class="card coming-soon" id="tv-card">
      <img class="card-image" src="Src/tv.png" alt="TV">
      <div class="card-content">
        <h3 class="card-title">TV</h3>
      </div>
      <div class="coming-soon-label">Em breve</div>
    </a>

    <!-- Biblioteca com capa cinza -->
    <a href="#" class="card coming-soon" id="bib-card">
      <img class="card-image" src="Src/biblioteca.png" alt="Biblioteca">
      <div class="card-content">
        <h3 class="card-title">Biblioteca</h3>
      </div>
      <div class="coming-soon-label">Em breve</div>
    </a>

  </div>

  <!-- Modal Carismático -->
  <div class="modal" id="comingSoonModal">
    <div class="modal-content">
      <h2>🎉 Em breve!</h2>
      <p>Estamos preparando algo incrível pra você! 🔥<br><br>Fica ligado que vai valer a pena! ✨</p>
      <button class="close-btn">Beleza, tô ansioso!</button>
    </div>
  </div>

  <script>
    const cards = document.querySelectorAll('.card');
    const body = document.body;
    const modal = document.getElementById('comingSoonModal');
    const closeBtn = modal.querySelector('.close-btn');

    cards.forEach(card => {
      const img = card.querySelector('.card-image');
      if (!img) return;

      const handleEnter = () => {
        body.style.setProperty('--bg-image', `url("${img.src}")`);
        body.classList.add('has-hover');
      };

      const handleLeave = () => {
        body.classList.remove('has-hover');
      };

      card.addEventListener('mouseenter', handleEnter);
      card.addEventListener('mouseleave', handleLeave);
      card.addEventListener('focus', handleEnter);
      card.addEventListener('blur', handleLeave);

      // Tratamento especial para cards "Em breve"
      if (card.classList.contains('coming-soon')) {
        card.addEventListener('click', (e) => {
          e.preventDefault();           // Impede navegação
          modal.style.display = 'flex'; // Mostra modal
        });
      }
    });

    // Fechar modal
    closeBtn.addEventListener('click', () => {
      modal.style.display = 'none';
    });

    // Fechar clicando fora do conteúdo
    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.style.display = 'none';
      }
    });
  </script>

</body>
</html>
