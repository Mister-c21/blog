<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LorePlay - Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Fundo escuro imersivo */
            background: #0a061e;
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 0, 0, 0.1) 0px, transparent 40%),
                radial-gradient(at 100% 100%, rgba(0, 242, 234, 0.1) 0px, transparent 40%);
            padding: 20px;
        }

        /* --- HEADER --- */
        .header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 40px;
            padding: 10px 0;
        }

        .header-title {
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .back-button {
            position: absolute;
            left: 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 12px 16px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* --- CONTAINER DOS CARDS --- */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1200px;
            width: 100%;
        }

        /* Base do Card de Vidro */
        .card {
            position: relative;
            width: 320px;
            height: 220px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        /* Capa/Miniatura */
        .card-thumb {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        /* Sombra interna */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(10, 6, 30, 0.6) 0%, rgba(10, 6, 30, 0.1) 100%);
            z-index: 2;
        }

        /* Badges de Plataforma com Ícones */
        .platform-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            z-index: 3;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Cores customizadas por plataforma */
        .yt-badge { background: #ff0000; }
        .tt-badge { background: #00f2ea; color: #000; }
        .lc-badge { background: #4b5563; }
        .st-badge { background: linear-gradient(135deg, #7c3aed, #c084fc); }
        .fb-badge { background: #1877f2; }
        .ig-badge { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .cb-badge { background: #22c55e; }

        /* --- HOVERS CUSTOMIZADOS (Efeito de Vidro + Brilho Neon da Marca) --- */
        
        /* Hover Geral */
        .card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .card:hover .card-thumb img {
            transform: scale(1.05);
        }

        /* Glow Vermelho do YouTube */
        .card.youtube:hover {
            border-color: rgba(255, 0, 0, 0.6);
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.35), 0 10px 30px rgba(0,0,0,0.6);
        }

        /* Glow Ciano/Neon do TikTok */
        .card.tiktok:hover {
            border-color: rgba(0, 242, 234, 0.6);
            box-shadow: 0 0 25px rgba(0, 242, 234, 0.35), 0 10px 30px rgba(0,0,0,0.6);
        }

        /* Glow Cinza Metálico do Local */
        .card.local:hover {
            border-color: rgba(156, 163, 175, 0.6);
            box-shadow: 0 0 25px rgba(156, 163, 175, 0.25), 0 10px 30px rgba(0,0,0,0.6);
        }

        /* Glow Roxo/Púrpura do Streamings */
        .card.streamings:hover {
            border-color: rgba(124, 58, 237, 0.6);
            box-shadow: 0 0 25px rgba(124, 58, 237, 0.4), 0 10px 30px rgba(0,0,0,0.6);
        }

        /* Glow Azul do Facebook */
        .card.facebook:hover {
            border-color: rgba(24, 119, 242, 0.6);
            box-shadow: 0 0 25px rgba(24, 119, 242, 0.35), 0 10px 30px rgba(0,0,0,0.6);
        }

        /* Glow Magenta do Instagram */
        .card.instagram:hover {
            border-color: rgba(220, 39, 67, 0.6);
            box-shadow: 0 0 25px rgba(220, 39, 67, 0.35), 0 10px 30px rgba(0,0,0,0.6);
        }

        /* Glow Verde do Coub */
        .card.coub:hover {
            border-color: rgba(34, 197, 94, 0.6);
            box-shadow: 0 0 25px rgba(34, 197, 94, 0.35), 0 10px 30px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>

    <header class="header">
        <button class="back-button" id="btnBack">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <h1 class="header-title">Plataformas</h1>
    </header>

    <div class="container">
        
        <div class="card youtube">
            <span class="platform-badge yt-badge">
                <i class="fa-brands fa-youtube"></i> YouTube
            </span>
            <div class="card-thumb">
                <img src="https://images.unsplash.com/photo-1598257006458-087169a1f08d?w=500" alt="YouTube">
                <div class="overlay"></div>
            </div>
        </div>

        <div class="card tiktok">
            <span class="platform-badge tt-badge">
                <i class="fa-brands fa-tiktok"></i> TikTok
            </span>
            <div class="card-thumb">
                <img src="https://images.unsplash.com/photo-1546519638-68e109498ffc?w=500" alt="TikTok">
                <div class="overlay"></div>
            </div>
        </div>

        <div class="card local">
            <span class="platform-badge lc-badge">
                <i class="fa-solid fa-folder-open"></i> Local
            </span>
            <div class="card-thumb">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500" alt="Local Files">
                <div class="overlay"></div>
            </div>
        </div>

        <div class="card streamings">
            <span class="platform-badge st-badge">
                <i class="fa-solid fa-tv"></i> Streamings
            </span>
            <div class="card-thumb">
                <img src="https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?w=500" alt="Streamings">
                <div class="overlay"></div>
            </div>
        </div>

        <div class="card facebook">
            <span class="platform-badge fb-badge">
                <i class="fa-brands fa-facebook"></i> Facebook
            </span>
            <div class="card-thumb">
                <img src="https://images.unsplash.com/photo-1562577309-4932fdd64cd1?w=500" alt="Facebook">
                <div class="overlay"></div>
            </div>
        </div>

        <div class="card instagram">
            <span class="platform-badge ig-badge">
                <i class="fa-brands fa-instagram"></i> Instagram
            </span>
            <div class="card-thumb">
                <img src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=500" alt="Instagram">
                <div class="overlay"></div>
            </div>
        </div>

        <div class="card coub">
            <span class="platform-badge cb-badge">
                <i class="fa-solid fa-bolt"></i> Coub
            </span>
            <div class="card-thumb">
                <img src="https://images.unsplash.com/photo-1618336753974-aae8e04506aa?w=500" alt="Coub">
                <div class="overlay"></div>
            </div>
        </div>

    </div>

    <script>
        document.getElementById('btnBack').addEventListener('click', function() {
            window.location.href = 'index.html'; 
        });
    </script>

</body>
</html>
