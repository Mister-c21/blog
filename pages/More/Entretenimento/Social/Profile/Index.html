<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Fundo gradiente para destacar o efeito de vidro */
            background: linear-gradient(135deg, #120c1f 0%, #3a1c6e 100%);
            padding: 0;
        }

        /* Container Principal - Ocupa 100% da tela com efeito de vidro */
        .settings-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #f8f8ff; /* Ghostwhite */
        }

        /* Cabeçalho (Settings) */
        .settings-header {
            display: flex;
            align-items: center;
            justify-content: center; /* Ajustado para centralizar o título perfeitamente */
            padding: 20px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .settings-header .title {
            text-align: center;
        }

        /* Seção do Perfil */
        .profile-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-avatar {
            position: relative;
            width: 65px;
            height: 65px;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid blueviolet;
            padding: 2px;
        }

        .status-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background-color: #2ecc71;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .profile-meta {
            display: flex;
            flex-direction: column;
        }

        .profile-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f8f8ff;
        }

        .profile-username {
            font-size: 0.85rem;
            color: rgba(248, 248, 255, 0.6);
        }

        /* Lista de Opções do Menu */
        .menu-list {
            display: flex;
            flex-direction: column;
            padding: 10px 0;
            flex-grow: 1;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 18px 20px;
            text-decoration: none;
            color: #f8f8ff;
            font-size: 1rem;
            transition: background 0.3s;
            cursor: pointer;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .menu-item i {
            font-size: 1.25rem;
            width: 24px;
            text-align: center;
            color: #f8f8ff;
        }

        /* Linha divisória para o Log out */
        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 10px 0;
        }

        /* Item de Sair (Log out) */
        .menu-item.logout {
            color: #ff5b5b;
        }

        .menu-item.logout i {
            color: #ff5b5b;
        }
    </style>
</head>
<body>

    <div class="settings-container">
        <div class="settings-header">
            <div class="title">Settings</div>
        </div>

        <div class="profile-section">
            <div class="profile-info">
                <div class="profile-avatar">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150&auto=format&fit=crop&q=80" alt="Foto de Perfil">
                    <div class="status-badge"></div>
                </div>
                <div class="profile-meta">
                    <span class="profile-name">Orion</span>
                    <span class="profile-username">caioyhwhson</span>
                </div>
            </div>
        </div>

        <div class="menu-list">
            <div class="menu-item">
                <i class="fa-regular fa-user-pen"></i>
                <span>Edit profile</span>
            </div>

            <div class="menu-item">
                <i class="fa-regular fa-bell"></i>
                <span>Notifications</span>
            </div>
            
            <div class="menu-item">
                <i class="fa-regular fa-user"></i>
                <span>Account</span>
            </div>

            <div class="divider"></div>

            <div class="menu-item logout">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Log out</span>
            </div>
        </div>
    </div>

</body>
</html>
