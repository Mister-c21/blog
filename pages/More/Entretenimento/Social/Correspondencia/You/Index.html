<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compartilhar Projeto</title>
    <style>
        /* Configurações Gerais e Variáveis */
        :root {
            --bg-color: #0b0f19;
            --blueviolet-color: #8a2be2;
            --blueviolet-glow: rgba(138, 43, 226, 0.15);
            --ghost-white: #f8f8ff;
            --ghost-muted: rgba(248, 248, 255, 0.6);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-inner-bg: rgba(15, 22, 38, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--ghost-white);
            min-height: 100vh;
        }

        /* Container Principal (Ocupa todo o espaço da tela) */
        .app-container {
            width: 100%;
            min-height: 100vh;
            background: radial-gradient(circle at top right, var(--blueviolet-glow), transparent 60%), #0d1321;
            padding: 24px;
            border-radius: 0;
            border: none;
        }

        /* Card Central Principal (Feedback) */
        .main-card {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.25), rgba(30, 10, 60, 0.4));
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 32px;
            padding: 32px 24px 60px 24px;
            text-align: center;
            position: relative;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            margin-bottom: 24px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .avatar-circle {
            width: 84px;
            height: 84px;
            background-color: var(--ghost-white);
            border-radius: 50%;
            margin: 0 auto 24px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(138, 27, 226, 0.3);
            overflow: hidden; /* Mantém a imagem dentro do círculo */
        }

        /* Estilo para a imagem de perfil carregada */
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Estilo para o ícone padrão caso a imagem falhe */
        .avatar-icon-fallback {
            color: var(--blueviolet-color);
            width: 50px;
            height: 50px;
            display: none; /* Escondido por padrão */
        }

        /* Campo de Texto Interativo e Editável para a Pergunta */
        .card-prompt-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--ghost-white);
            font-size: 22px;
            font-weight: 700;
            line-height: 1.3;
            text-align: center;
            resize: none;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            font-family: inherit;
        }

        .card-prompt-input::placeholder {
            color: rgba(248, 248, 255, 0.4);
        }

        /* Pequenos Controles do Card Principal */
        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            position: absolute;
            bottom: 20px;
            right: 20px;
        }

        .mini-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--ghost-white);
        }

        /* Seções de Passos (Cards de Instrução Estilo Vidro) */
        .step-box {
            background: var(--card-inner-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px 20px;
            text-align: center;
            margin-bottom: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .step-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px; /* Ajustado para compensar a remoção do link */
        }

        /* Botão Copiar Link */
        .btn-copy {
            background: rgba(235, 87, 87, 0.1);
            border: 1.5px solid #eb5757;
            color: #ff6b6b;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-copy:active {
            background: rgba(235, 87, 87, 0.2);
        }

        /* Botão Compartilhar Gradiente (Instagram Style) */
        .btn-share {
            width: 100%;
            background: linear-gradient(45deg, #f0147a, #ff8a00);
            border: none;
            color: white;
            padding: 16px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(240, 20, 122, 0.3);
            transition: transform 0.1s;
        }

        .btn-share:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="app-container">

        <main class="main-card">
            <div class="avatar-circle">
                <img id="avatarImg" class="avatar-img" src="https://via.placeholder.com/84" alt="Perfil" onerror="handleAvatarError()">
                
                <svg id="avatarIcon" class="avatar-icon-fallback" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
            
            <textarea class="card-prompt-input" rows="2" placeholder="Escreva sua pergunta aqui...">Dê sua opinião sobre o projeto.</textarea>
            
            <div class="card-actions">
                <button class="mini-btn" aria-label="Resetar" onclick="document.querySelector('.card-prompt-input').value = 'Dê sua opinião sobre o projeto.'">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                </button>
                <button class="mini-btn" aria-label="Editar" onclick="document.querySelector('.card-prompt-input').focus()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                </button>
            </div>
        </main>

        <section class="step-box">
            <h2 class="step-title">Copie seu link</h2>
            <button class="btn-copy">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                copiar link
            </button>
        </section>

        <section class="step-box">
            <h2 class="step-title" style="margin-bottom: 20px;">Compartilhar em suas redes</h2>
            <button class="btn-share">Compartilhe!</button>
        </section>

    </div>

    <script>
        function handleAvatarError() {
            const img = document.getElementById('avatarImg');
            const icon = document.getElementById('avatarIcon');
            if (img && icon) {
                img.style.display = 'none';
                icon.style.display = 'block';
            }
        }
    </script>

</body>
</html>
