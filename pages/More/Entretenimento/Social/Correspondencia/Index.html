<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Orion</title>
    <style>
        /* Configurações Globais e Fundo */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #12072B 0%, #2A1B54 100%);
            color: #FFFFFF;
            overflow: hidden; /* Evita barras de rolagem duplas na página principal */
        }

        /* Header Estilo TikTok: Apenas 1 Tabbar Centralizada */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(138, 43, 226, 0.1); /* Vidro semitransparente sutil */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            padding: 15px 0;
            display: flex;
            justify-content: center;
        }

        /* Estrutura da única Top Tabbar */
        .tiktok-tabbar {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        /* Botões Estilo TikTok (Ghost / Minimalista) */
        .tab-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            transition: all 0.2s ease;
            position: relative;
        }

        .tab-btn:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        /* Opção Ativa com a linha indicadora abaixo */
        .tab-btn.active {
            color: #FFFFFF;
            font-weight: 700;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 25%;
            width: 50%;
            height: 3px;
            background-color: #8A2BE2; /* Blueviolet */
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.8);
        }

        /* Área de Conteúdo Principal ocupando 100% do espaço abaixo do Header */
        main {
            margin-top: 56px; /* Altura exata para ficar logo abaixo do header */
            height: calc(100vh - 56px); /* Ocupa todo o restante da altura da tela */
            width: 100vw; /* Ocupa toda a largura da tela */
        }

        /* Contêiner preenchendo totalmente o espaço disponível */
        .content-card {
            width: 100%;
            height: 100%;
        }

        /* Iframes configurados para preenchimento total */
        .iframe-content {
            display: none;
            width: 100%;
            height: 100%;
            border: none; /* Remove bordas para integração total */
            background: transparent;
        }

        .iframe-content.active {
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <nav class="tiktok-tabbar">
            <button class="tab-btn active" data-target="iframe-you">you</button>
            <button class="tab-btn" data-target="iframe-correspondencia">correspondência</button>
        </nav>
    </header>

    <main>
        <div class="content-card">
            <iframe id="iframe-you" class="iframe-content active" src="you/Index.html"></iframe>
            <iframe id="iframe-correspondencia" class="iframe-content" src="messages/Index.html"></iframe>
        </div>
    </main>

    <script>
        // Lógica para alternar as abas
        document.querySelectorAll('.tab-btn').forEach(button => {
            button.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                document.querySelectorAll('.iframe-content').forEach(content => content.classList.remove('active'));
                
                const targetId = this.getAttribute('data-target');
                document.getElementById(targetId).classList.add('active');
            });
        });
    </script>
</body>
</html>
