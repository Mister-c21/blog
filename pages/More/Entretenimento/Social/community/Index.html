<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed com Carrosséis e Modal</title>
  <!-- Tailwind CSS para utilitários de layout -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Customização de cores baseada nas preferências do usuário */
    :root {
      --color-primary: #8A2BE2; /* blueviolet */
      --color-ghost: #F8F8FF;   /* ghostwhite */
    }
    
    body {
      background: linear-gradient(135deg, #0f0c20 0%, #15102a 100%);
      color: var(--color-ghost);
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* Efeito de Vidro Semitransparente (Glassmorphism) */
    .glass-effect {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Customização da barra de rolagem dos carrosséis (escondida por padrão, funcional ao arrastar/scroll) */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .btn-primary {
      background-color: var(--color-primary);
      color: var(--color-ghost);
    }
    
    .text-ghost {
      color: var(--color-ghost);
    }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8">

  <!-- Container do Feed (Lista Vertical) -->
  <main class="max-w-4xl mx-auto space-y-10">
    
    <!-- Seção/Carrossel 1 -->
    <section class="space-y-4">
      <h2 class="text-xl font-semibold tracking-wide flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        Novidades para Você
      </h2>
      
      <!-- Carrossel Horizontal -->
      <div class="flex gap-4 overflow-x-auto pb-3 no-scrollbar snap-x snap-mandatory">
        <!-- Card 1 -->
        <div onclick="openModal('Explorando o Design Fluido', 'Conteúdo detalhado sobre interfaces imersivas e o uso correto de blur e transparências para reter a atenção do usuário no mobile e desktop.', 'https://picsum.photos/800/600?random=1')" 
             class="glass-effect min-w-[260px] md:min-w-[300px] p-4 rounded-2xl snap-start cursor-pointer hover:scale-[1.02] transition-transform duration-300 group">
          <img src="https://picsum.photos/400/250?random=1" alt="Thumbnail" class="w-full h-40 object-cover rounded-xl mb-3 opacity-80 group-hover:opacity-100 transition-opacity">
          <span class="text-xs font-bold uppercase tracking-wider style-[color:var(--color-primary)]">Design</span>
          <h3 class="text-lg font-medium mt-1 text-ghost">Explorando o Design Fluido</h3>
        </div>
        
        <!-- Card 2 -->
        <div onclick="openModal('O Futuro do Mobile', 'Uma análise profunda sobre a evolução dos componentes nativos e web views em 2026.', 'https://picsum.photos/800/600?random=2')" 
             class="glass-effect min-w-[260px] md:min-w-[300px] p-4 rounded-2xl snap-start cursor-pointer hover:scale-[1.02] transition-transform duration-300 group">
          <img src="https://picsum.photos/400/250?random=2" alt="Thumbnail" class="w-full h-40 object-cover rounded-xl mb-3 opacity-80 group-hover:opacity-100 transition-opacity">
          <span class="text-xs font-bold uppercase tracking-wider style-[color:var(--color-primary)]">Tech</span>
          <h3 class="text-lg font-medium mt-1 text-ghost">O Futuro do Mobile</h3>
        </div>

        <!-- Card 3 -->
        <div onclick="openModal('Performance em Foco', 'Como otimizar a renderização de elementos pesados com backdrop-filter no CSS.', 'https://picsum.photos/800/600?random=3')" 
             class="glass-effect min-w-[260px] md:min-w-[300px] p-4 rounded-2xl snap-start cursor-pointer hover:scale-[1.02] transition-transform duration-300 group">
          <img src="https://picsum.photos/400/250?random=3" alt="Thumbnail" class="w-full h-40 object-cover rounded-xl mb-3 opacity-80 group-hover:opacity-100 transition-opacity">
          <span class="text-xs font-bold uppercase tracking-wider style-[color:var(--color-primary)]">Código</span>
          <h3 class="text-lg font-medium mt-1 text-ghost">Performance em Foco</h3>
        </div>
      </div>
    </section>

    <!-- Seção/Carrossel 2 -->
    <section class="space-y-4">
      <h2 class="text-xl font-semibold tracking-wide flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        Mais Populares
      </h2>
      
      <div class="flex gap-4 overflow-x-auto pb-3 no-scrollbar snap-x snap-mandatory">
        <!-- Card 4 -->
        <div onclick="openModal('Arquitetura de Sistemas', 'Montando aplicações escaláveis sem perder a identidade visual da marca.', 'https://picsum.photos/800/600?random=4')" 
             class="glass-effect min-w-[260px] md:min-w-[300px] p-4 rounded-2xl snap-start cursor-pointer hover:scale-[1.02] transition-transform duration-300 group">
          <img src="https://picsum.photos/400/250?random=4" alt="Thumbnail" class="w-full h-40 object-cover rounded-xl mb-3 opacity-80 group-hover:opacity-100 transition-opacity">
          <span class="text-xs font-bold uppercase tracking-wider style-[color:var(--color-primary)]">Estratégia</span>
          <h3 class="text-lg font-medium mt-1 text-ghost">Arquitetura de Sistemas</h3>
        </div>
        
        <!-- Card 5 -->
        <div onclick="openModal('Psicologia das Cores', 'Por que tons violetas transmitem criatividade, modernidade e tecnologia ao mesmo tempo?', 'https://picsum.photos/800/600?random=5')" 
             class="glass-effect min-w-[260px] md:min-w-[300px] p-4 rounded-2xl snap-start cursor-pointer hover:scale-[1.02] transition-transform duration-300 group">
          <img src="https://picsum.photos/400/250?random=5" alt="Thumbnail" class="w-full h-40 object-cover rounded-xl mb-3 opacity-80 group-hover:opacity-100 transition-opacity">
          <span class="text-xs font-bold uppercase tracking-wider style-[color:var(--color-primary)]">UI/UX</span>
          <h3 class="text-lg font-medium mt-1 text-ghost">Psicologia das Cores</h3>
        </div>
      </div>
    </section>

  </main>

  <!-- Modal Tela Cheia (Full Screen) -->
  <div id="fullScreenModal" class="fixed inset-0 z-50 invisible opacity-0 transition-all duration-300 flex flex-col glass-effect" style="background-color: rgba(15, 12, 32, 0.95);">
    
    <!-- Barra de Controle Superior -->
    <div class="w-full p-4 md:p-6 flex justify-end items-center border-b border-white/10 shrink-0">
      <button onclick="closeModal()" class="p-2 rounded-full hover:bg-white/10 transition-colors flex items-center justify-center" aria-label="Fechar modal">
        <svg class="w-8 h-8 text-ghost" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Área de Conteúdo Centralizada com Scroll Isolado se necessário -->
    <div class="flex-1 overflow-y-auto p-6 md:p-12">
      <div class="max-w-3xl mx-auto space-y-6">
        <img id="modalImage" src="" alt="Imagem de Capa" class="w-full h-64 md:h-96 object-cover rounded-2xl shadow-2xl border border-white/10">
        <h1 id="modalTitle" class="text-3xl md:text-5xl font-bold tracking-tight text-ghost mt-4"></h1>
        <hr class="border-white/10">
        <p id="modalDescription" class="text-lg text-white/80 leading-relaxed font-light"></p>
      </div>
    </div>
  </div>

  <!-- Lógica de Controle do Modal -->
  <script>
    const modal = document.getElementById('fullScreenModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalDescription = document.getElementById('modalDescription');
    const modalImage = document.getElementById('modalImage');

    function openModal(title, description, imgSrc) {
      // Atualiza os dados dinamicamente
      modalTitle.textContent = title;
      modalDescription.textContent = description;
      modalImage.src = imgSrc;

      // Exibe o modal com transição suave
      modal.classList.remove('invisible', 'opacity-0');
      modal.classList.add('visible', 'opacity-100');
      
      // Bloqueia o scroll do feed de fundo
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      // Oculta o modal
      modal.classList.remove('visible', 'opacity-100');
      modal.classList.add('invisible', 'opacity-0');
      
      // Restaura o scroll do feed de fundo
      document.body.style.overflow = '';
      
      // Limpa a imagem após a transição para evitar flash visual no próximo clique
      setTimeout(() => { modalImage.src = ''; }, 300);
    }

    // Fechar pressionando a tecla Esc
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
