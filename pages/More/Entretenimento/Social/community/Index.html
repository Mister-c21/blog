<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed com Carrosséis e Modal de Feed Isolado</title>
  <!-- Tailwind CSS para utilitários de layout -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Customização baseada na paleta solicitada */
    :root {
      --color-primary: #8A2BE2; /* blueviolet */
      --color-ghost: #F8F8FF;   /* ghostwhite */
    }
    
    body {
      background: linear-gradient(135deg, #0f0c20 0%, #15102a 100%);
      color: var(--color-ghost);
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* Efeito de Vidro Semitransparente (Glassmorphism) */
    .glass-effect {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* Esconde as barras de rolagem mantendo a funcionalidade de scroll */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .text-ghost {
      color: var(--color-ghost);
    }
    .accent-violet {
      color: var(--color-primary);
    }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8">

  <!-- ==================== FEED PRINCIPAL (CARROSSÉIS) ==================== -->
  <main class="max-w-4xl mx-auto space-y-12">
    
    <!-- Categoria 1 -->
    <section class="space-y-4">
      <h2 class="text-xl font-semibold tracking-wide flex items-center gap-2 text-ghost">
        <svg class="w-5 h-5 accent-violet" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        Explorar Conteúdo
      </h2>
      
      <!-- Carrossel -->
      <div class="flex gap-4 overflow-x-auto pb-3 no-scrollbar snap-x snap-mandatory">
        <!-- Card 1 -->
        <div onclick="openFeedModal('Design & UI')" 
             class="glass-effect min-w-[280px] md:min-w-[320px] p-4 rounded-2xl snap-start cursor-pointer hover:scale-[1.02] transition-all duration-300 group">
          <img src="https://picsum.photos/400/250?random=11" alt="Capa" class="w-full h-40 object-cover rounded-xl mb-3 opacity-80 group-hover:opacity-100 transition-opacity">
          <span class="text-xs font-bold uppercase tracking-wider accent-violet">Feed de Design</span>
          <h3 class="text-lg font-medium mt-1 text-ghost">Clique para abrir o Feed de UI</h3>
        </div>
        
        <!-- Card 2 -->
        <div onclick="openFeedModal('Tecnologia')" 
             class="glass-effect min-w-[280px] md:min-w-[320px] p-4 rounded-2xl snap-start cursor-pointer hover:scale-[1.02] transition-all duration-300 group">
          <img src="https://picsum.photos/400/250?random=12" alt="Capa" class="w-full h-40 object-cover rounded-xl mb-3 opacity-80 group-hover:opacity-100 transition-opacity">
          <span class="text-xs font-bold uppercase tracking-wider accent-violet">Feed Tech</span>
          <h3 class="text-lg font-medium mt-1 text-ghost">Clique para abrir o Feed Dev</h3>
        </div>
      </div>
    </section>

    <!-- Categoria 2 -->
    <section class="space-y-4">
      <h2 class="text-xl font-semibold tracking-wide flex items-center gap-2 text-ghost">
        <svg class="w-5 h-5 accent-violet" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
        Mais Feeds
      </h2>
      
      <div class="flex gap-4 overflow-x-auto pb-3 no-scrollbar snap-x snap-mandatory">
        <!-- Card 3 -->
        <div onclick="openFeedModal('Geral')" 
             class="glass-effect min-w-[280px] md:min-w-[320px] p-4 rounded-2xl snap-start cursor-pointer hover:scale-[1.02] transition-all duration-300 group">
          <img src="https://picsum.photos/400/250?random=13" alt="Capa" class="w-full h-40 object-cover rounded-xl mb-3 opacity-80 group-hover:opacity-100 transition-opacity">
          <span class="text-xs font-bold uppercase tracking-wider accent-violet">Comunidade</span>
          <h3 class="text-lg font-medium mt-1 text-ghost">Ver todas as postagens</h3>
        </div>
      </div>
    </section>

  </main>


  <!-- ==================== MODAL FEED (TELA CHEIA ISOLADA) ==================== -->
  <div id="feedModal" class="fixed inset-0 z-50 invisible opacity-0 transition-all duration-300 flex flex-col glass-effect" style="background-color: rgba(10, 8, 22, 0.98);">
    
    <!-- Header Fixo do Modal -->
    <header class="w-full p-4 md:px-8 flex justify-between items-center border-b border-white/10 shrink-0 bg-[#0a0816]/80 backdrop-blur-md">
      <div class="flex items-center gap-3">
        <span class="p-2 rounded-xl bg-white/5 accent-violet">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 2 0 01-2-2V6a2 2 2 0 012-2h10a2 2 2 0 012 2v1m2 13a2 2 2 0 01-2-2V7m2 13a2 2 2 0 002-2V9a2 2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6m-6 4h10"/></svg>
        </span>
        <h1 id="modalFeedTitle" class="text-xl md:text-2xl font-bold text-ghost tracking-wide">Feed</h1>
      </div>
      
      <!-- Botão Fechar -->
      <button onclick="closeFeedModal()" class="p-2 rounded-full hover:bg-white/10 transition-colors flex items-center justify-center" aria-label="Fechar feed">
        <svg class="w-7 h-7 text-ghost" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </header>

    <!-- Área de Scroll Isolada (O Feed Interno) -->
    <div class="flex-1 overflow-y-auto p-4 md:p-8 no-scrollbar">
      <div id="modalFeedContainer" class="max-w-2xl mx-auto space-y-8 pb-16">
        <!-- Os posts gerados dinamicamente via JS entram aqui -->
      </div>
    </div>
  </div>


  <!-- ==================== LOGICA DE RENDERIZAÇÃO E SCROLL ==================== -->
  <script>
    const modal = document.getElementById('feedModal');
    const modalTitle = document.getElementById('modalFeedTitle');
    const feedContainer = document.getElementById('modalFeedContainer');

    // Simulação de banco de dados para popular o feed de forma dinâmica
    const postsMock = [
      { title: "Primeiro Post do Stream", desc: "Este é o primeiro elemento do feed dentro do modal. Você pode rolar a tela à vontade aqui sem interferir no posicionamento dos carrosséis que ficaram em segundo plano.", img: "https://picsum.photos/800/450?random=101" },
      { title: "Segunda Publicação da Linha do Tempo", desc: "Aproveitando o efeito de transparência sutil e mantendo o foco do usuário na leitura limpa. Componentes estruturados de forma vertical.", img: "https://picsum.photos/800/450?random=102" },
      { title: "Mais um conteúdo relevante", desc: "A rolagem deste container é totalmente independente através da propriedade overflow-y-auto aplicada na div pai dentro do modal.", img: "https://picsum.photos/800/450?random=103" }
    ];

    function openFeedModal(categoryName) {
      modalTitle.textContent = `Feed: ${categoryName}`;
      
      // Limpa posts anteriores e gera novos componentes de post estruturados
      feedContainer.innerHTML = '';
      
      postsMock.forEach((post, index) => {
        const postCard = `
          <article class="glass-effect rounded-2xl overflow-hidden border border-white/5 shadow-xl">
            <img src="${post.img}" alt="Imagem do post" class="w-full h-64 object-cover opacity-90">
            <div class="p-6 space-y-3">
              <div class="flex items-center gap-2 text-xs font-semibold uppercase tracking-wider accent-violet">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/></svg>
                Postado por Oryun • Criador
              </div>
              <h2 class="text-xl md:text-2xl font-bold text-ghost">${post.title} (#${index + 1})</h2>
              <p class="text-white/70 leading-relaxed font-light">${post.desc}</p>
              
              <!-- Ações do Post fictícias -->
              <div class="pt-4 flex items-center gap-6 border-t border-white/5 text-sm text-white/50">
                <button class="flex items-center gap-2 hover:text-white transition-colors">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg> Curtir
                </button>
                <button class="flex items-center gap-2 hover:text-white transition-colors">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg> Comentar
                </button>
              </div>
            </div>
          </article>
        `;
        feedContainer.innerHTML += postCard;
      });

      // Abre o modal de forma suave
      modal.classList.remove('invisible', 'opacity-0');
      modal.classList.add('visible', 'opacity-100');
      
      // PRESERVA O FUNDO: Trava o scroll do body principal para não perder a posição original do carrossel
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('visible', 'opacity-100');
      modal.classList.add('invisible', 'opacity-0');
      
      // Devolve o scroll natural ao feed de baixo, exatamente onde ele estava
      document.body.style.overflow = '';
    }

    // Fechar usando a tecla Esc
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
