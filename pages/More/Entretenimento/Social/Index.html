<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Hub</title>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary-white: #FFFFFF;
            --violet-main: #8A2BE2;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(138, 43, 226, 0.2);
            --header-height: 105px;
        }

        body {
            background: linear-gradient(135deg, #FFFFFF 0%, #F0F0F0 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow: hidden; 
            transition: background 0.3s ease;
        }

        /* --- HEADER --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
            padding: 10px 0;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }

        .header-top {
            display: flex;
            justify-content: center; /* Centraliza o título após a remoção do botão */
            align-items: center;
            padding: 0 20px;
            margin-bottom: 10px;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--violet-main);
            margin: 0;
            text-transform: uppercase;
        }

        /* --- TOP TAB BAR --- */
        .top-tab-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .tab-item {
            font-size: 0.95rem;
            font-weight: 700;
            color: #888;
            cursor: pointer;
            position: relative;
            padding-bottom: 8px;
            transition: color 0.3s ease;
        }

        .tab-item.active {
            color: #000;
        }

        .tab-item.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 3px;
            background: var(--violet-main);
            border-radius: 10px;
        }

        /* --- CONTAINER DOS IFRAMES --- */
        #content-container {
            margin-top: var(--header-height);
            height: calc(100vh - var(--header-height));
            width: 100%;
            position: relative;
            transition: margin-top 0.4s cubic-bezier(0.4, 0, 0.2, 1), height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: margin-top, height;
        }

        .tab-content {
            display: none;
            width: 100%;
            height: 100%;
            border: none;
        }

        .tab-content.active {
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- ESTADO MOBILE HIDDEN (Animação) --- */
        @media (max-width: 768px) {
            body.header-hidden header {
                transform: translateY(-100%);
            }

            body.header-hidden #content-container {
                margin-top: 0;
                height: 100vh;
            }
        }
    </style>
</head>
<body id="main-body">

    <header id="main-header">
        <div class="header-top">
            <h1 class="page-title">Social Hub</h1>
        </div>

        <div class="top-tab-bar">
            <div class="tab-item active" onclick="switchTab(this, 'communities-frame')">Comunidades</div>
            <div class="tab-item" onclick="switchTab(this, 'chat-frame')">Random Chat</div>
        </div>
    </header>

    <main id="content-container">

        <!-- Iframe da Sessão Comunidades -->
        <div id="communities-frame" class="tab-content">
            <iframe src="./community/Index.html" title="Comunidades" id="iframe-communities"></iframe>
        </div>

        <!-- Iframe da Sessão Random Chat -->
        <div id="chat-frame" class="tab-content">
            <iframe src="RandomChat.html" title="Chat Aleatório" id="iframe-chat"></iframe>
        </div>
    </main>

    <script>
        function switchTab(element, frameId) {
            // Atualiza as abas visuais
            const tabs = document.querySelectorAll('.tab-item');
            tabs.forEach(tab => tab.classList.remove('active'));
            element.classList.add('active');

            // Atualiza a exibição dos containers de iframe
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(content => content.classList.remove('active'));
            document.getElementById(frameId).classList.add('active');

            // Ao trocar de aba, mostramos o header novamente
            document.body.classList.remove('header-hidden');
        }

        // LÓGICA DE SCROLL EXCLUSIVA MOBILE
        let lastScrollTop = 0;
        const body = document.body;

        // Escuta mensagens vindas dos iframes (Feed, Comunidades e RandomChat)
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'iframeScroll') {
                const scrollTop = event.data.scrollTop;
                
                if (window.innerWidth <= 768) { // Apenas Mobile
                    if (scrollTop > 60) {
                        // Scroll para baixo: esconde header
                        body.classList.add('header-hidden');
                    } else {
                        // Perto do topo: mostra header
                        body.classList.remove('header-hidden');
                    }
                }
                lastScrollTop = scrollTop;
            }
        });
    </script>

</body>
</html>
