<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reprodutor de Músicas - Orion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --primary-color: #8a2be2; 
            --glass-bg: rgba(255, 255, 255, 0.2);
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f8ff; padding: 20px; }

        .glass-effect {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 43, 226, 0.3);
        }

        .modal-bg { background: rgba(248, 248, 255, 0.95); backdrop-filter: blur(15px); }

        .gx-mods-carousel {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 5px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .gx-mods-carousel::-webkit-scrollbar { display: none; }

        .gx-mod-card {
            flex: 0 0 180px;
            height: 110px;
            position: relative;
            cursor: pointer;
            overflow: hidden; 
            transition: transform 0.2s ease, filter 0.2s ease;
            clip-path: polygon(15px 0%, 100% 0%, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0% 100%, 0% 15px);
        }
        
        .gx-mod-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .gx-mod-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(138, 43, 226, 0.15);
            pointer-events: none;
        }
        
        .gx-mod-card:hover { transform: scale(1.03); filter: brightness(1.1); }

        .story-container { display: flex; gap: 12px; overflow-x: auto; padding: 5px; scrollbar-width: none; }
        .story-container::-webkit-scrollbar { display: none; }
        .story-item { flex: 0 0 70px; height: 70px; border-radius: 50%; border: 3px solid var(--primary-color); padding: 2px; cursor: pointer; }
        .story-item img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .story-item-more { display: flex; align-items: center; justify-content: center; background: var(--primary-color); color: white; font-weight: bold; }

        .tab-active { color: var(--primary-color) !important; border-bottom: 2px solid var(--primary-color); }

        #playerModal, #artistListModal {
            background: rgba(248, 248, 255, 0.95);
            backdrop-filter: blur(15px);
        }
    </style>
</head>
<body>

    <main class="max-w-3xl w-full mx-auto py-8">
        <div class="mb-8 flex items-center gap-4">
            <div class="relative flex items-center flex-grow group">
                <input type="text" placeholder="Buscar artistas, álbuns ou faixas..." 
                    class="w-full py-3.5 pl-6 pr-12 rounded-full glass-effect text-slate-800 placeholder-slate-500 border border-purple-300/30 focus:outline-none focus:ring-2 focus:ring-[var(--primary-color)]/50 focus:border-[var(--primary-color)] transition-all shadow-lg shadow-purple-500/10">
                <i class="fas fa-search absolute right-5 text-[var(--primary-color)] transition-transform group-hover:scale-110"></i>
            </div>
            <i class="fas fa-bars text-[var(--primary-color)] text-2xl cursor-pointer hover:opacity-80 transition" onclick="toggleModal(true)"></i>
        </div>

        <section class="mb-8">
            <h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Artistas</h2>
            <div class="story-container">
                <div class="story-item"><img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=200"></div>
                <div class="story-item"><img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=200"></div>
                <div class="story-item"><img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=200"></div>
                <div class="story-item"><img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?q=80&w=200"></div>
                <div class="story-item"><img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=200"></div>
                <div class="story-item story-item-more" onclick="toggleArtistModal(true)"><i class="fas fa-plus"></i></div>
            </div>
        </section>

        <div class="flex flex-col gap-8">
            <section><h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Pop</h2><div class="gx-mods-carousel"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?q=80&w=600"></div><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1493225255756-d955f844d293?q=80&w=600"></div></div></section>
            <section><h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Rock</h2><div class="gx-mods-carousel"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1598387993441-a364f854c3e1?q=80&w=600"></div><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1524368535928-5b5e00ddc76b?q=80&w=600"></div></div></section>
            <section><h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Lo-Fi / Relax</h2><div class="gx-mods-carousel"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1514320291840-2e0a912a7674?q=80&w=600"></div><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1459749411155-045353164923?q=80&w=600"></div></div></section>
            <section><h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Eletrônica</h2><div class="gx-mods-carousel"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1571266023315-779893d5a56d?q=80&w=600"></div><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1516280440614-629724128f73?q=80&w=600"></div></div></section>
            <section><h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Jazz</h2><div class="gx-mods-carousel"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1511192336575-5a79af67a629?q=80&w=600"></div><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1415201364774-f6f0bb35f28f?q=80&w=600"></div></div></section>
            <section><h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Clássica</h2><div class="gx-mods-carousel"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1507838153414-b4b713384a76?q=80&w=600"></div><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1465847899084-d164df4ded06?q=80&w=600"></div></div></section>
            <section><h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Hip Hop</h2><div class="gx-mods-carousel"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1517230814440-8da194f71295?q=80&w=600"></div><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1526478607647-79753e16440f?q=80&w=600"></div></div></section>
            <section><h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Blues</h2><div class="gx-mods-carousel"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1510915361894-db8b60106cb1?q=80&w=600"></div><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1520523839897-fd0b5228a93e?q=80&w=600"></div></div></section>
            <section><h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Indie</h2><div class="gx-mods-carousel"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1524678440078-43111f18fa67?q=80&w=600"></div><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1496293455970-f8581aae0e3c?q=80&w=600"></div></div></section>
            <section><h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Temas</h2><div class="gx-mods-carousel"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=600"></div></div></section>
            <section><h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Raps</h2><div class="gx-mods-carousel"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1520677054694-824a7536d5a8?q=80&w=600"></div></div></section>
            <section><h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Gospel</h2><div class="gx-mods-carousel"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1507838153414-b4b713384a76?q=80&w=600"></div></div></section>
        </div>
    </main>

    <div id="modalMenu" class="fixed inset-0 z-50 hidden flex flex-col p-8 modal-bg">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-[var(--primary-color)]">Biblioteca</h2>
            <i class="fas fa-times text-2xl text-[var(--primary-color)] cursor-pointer" onclick="toggleModal(false)"></i>
        </div>
        <div class="flex gap-4 overflow-x-auto mb-6 pb-2 text-slate-500 font-medium whitespace-nowrap">
            <span class="tab-item tab-active pb-1 cursor-pointer" onclick="selectTab(this, 'pop')">Pop</span>
            <span class="tab-item pb-1 cursor-pointer" onclick="selectTab(this, 'rock')">Rock</span>
            <span class="tab-item pb-1 cursor-pointer" onclick="selectTab(this, 'lofi')">Lo-Fi</span>
            <span class="tab-item pb-1 cursor-pointer" onclick="selectTab(this, 'eletronica')">Eletrônica</span>
            <span class="tab-item pb-1 cursor-pointer" onclick="selectTab(this, 'jazz')">Jazz</span>
            <span class="tab-item pb-1 cursor-pointer" onclick="selectTab(this, 'classica')">Clássica</span>
            <span class="tab-item pb-1 cursor-pointer" onclick="selectTab(this, 'hiphop')">Hip Hop</span>
            <span class="tab-item pb-1 cursor-pointer" onclick="selectTab(this, 'blues')">Blues</span>
            <span class="tab-item pb-1 cursor-pointer" onclick="selectTab(this, 'indie')">Indie</span>
            <span class="tab-item pb-1 cursor-pointer" onclick="selectTab(this, 'temas')">Temas</span>
            <span class="tab-item pb-1 cursor-pointer" onclick="selectTab(this, 'raps')">Raps</span>
            <span class="tab-item pb-1 cursor-pointer" onclick="selectTab(this, 'gospel')">Gospel</span>
        </div>
        <div id="modal-content-area" class="flex-grow overflow-y-auto">
            <div id="pop" class="tab-content grid grid-cols-2 md:grid-cols-3 gap-4"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?q=80&w=600"></div></div>
            <div id="rock" class="tab-content hidden grid grid-cols-2 md:grid-cols-3 gap-4"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1598387993441-a364f854c3e1?q=80&w=600"></div></div>
            <div id="lofi" class="tab-content hidden grid grid-cols-2 md:grid-cols-3 gap-4"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1514320291840-2e0a912a7674?q=80&w=600"></div></div>
            <div id="eletronica" class="tab-content hidden grid grid-cols-2 md:grid-cols-3 gap-4"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1571266023315-779893d5a56d?q=80&w=600"></div></div>
            <div id="jazz" class="tab-content hidden grid grid-cols-2 md:grid-cols-3 gap-4"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1511192336575-5a79af67a629?q=80&w=600"></div></div>
            <div id="classica" class="tab-content hidden grid grid-cols-2 md:grid-cols-3 gap-4"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1507838153414-b4b713384a76?q=80&w=600"></div></div>
            <div id="hiphop" class="tab-content hidden grid grid-cols-2 md:grid-cols-3 gap-4"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1517230814440-8da194f71295?q=80&w=600"></div></div>
            <div id="blues" class="tab-content hidden grid grid-cols-2 md:grid-cols-3 gap-4"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1510915361894-db8b60106cb1?q=80&w=600"></div></div>
            <div id="indie" class="tab-content hidden grid grid-cols-2 md:grid-cols-3 gap-4"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1524678440078-43111f18fa67?q=80&w=600"></div></div>
            <div id="temas" class="tab-content hidden grid grid-cols-2 md:grid-cols-3 gap-4"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=600"></div></div>
            <div id="raps" class="tab-content hidden grid grid-cols-2 md:grid-cols-3 gap-4"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1520677054694-824a7536d5a8?q=80&w=600"></div></div>
            <div id="gospel" class="tab-content hidden grid grid-cols-2 md:grid-cols-3 gap-4"><div class="gx-mod-card" onclick="openPlayer('embed.html')"><img src="https://images.unsplash.com/photo-1507838153414-b4b713384a76?q=80&w=600"></div></div>
        </div>
    </div>

    <div id="artistListModal" class="fixed inset-0 z-50 hidden flex flex-col p-8 modal-bg">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-[var(--primary-color)]">Artistas</h2>
            <i class="fas fa-times text-2xl text-[var(--primary-color)] cursor-pointer" onclick="toggleArtistModal(false)"></i>
        </div>
        <div class="flex-grow overflow-y-auto space-y-4">
            <div class="flex items-center gap-4 p-3 glass-effect rounded-xl"><div class="w-12 h-12 rounded-full bg-slate-300"></div><span class="font-semibold text-slate-800">Artista 1</span></div>
            <div class="flex items-center gap-4 p-3 glass-effect rounded-xl"><div class="w-12 h-12 rounded-full bg-slate-300"></div><span class="font-semibold text-slate-800">Artista 2</span></div>
            <div class="flex items-center gap-4 p-3 glass-effect rounded-xl"><div class="w-12 h-12 rounded-full bg-slate-300"></div><span class="font-semibold text-slate-800">Artista 3</span></div>
        </div>
    </div>

    <div id="playerModal" class="fixed inset-0 z-[100] hidden">
        <i class="fas fa-times absolute top-8 right-8 text-3xl text-[var(--primary-color)] cursor-pointer z-[101]" onclick="closePlayer()"></i>
        <iframe id="playerIframe" src="" class="w-full h-full border-none" allowfullscreen></iframe>
    </div>

    <script>
        function toggleModal(show) { document.getElementById('modalMenu').classList.toggle('hidden', !show); }
        function toggleArtistModal(show) { document.getElementById('artistListModal').classList.toggle('hidden', !show); }
        function openPlayer(url) { const modal = document.getElementById('playerModal'); document.getElementById('playerIframe').src = url; modal.classList.remove('hidden'); }
        function closePlayer() { document.getElementById('playerModal').classList.add('hidden'); document.getElementById('playerIframe').src = ""; }
        function selectTab(element, targetId) {
            document.querySelectorAll('.tab-item').forEach(tab => tab.classList.remove('tab-active'));
            element.classList.add('tab-active');
            document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));
            document.getElementById(targetId).classList.remove('hidden');
        }
    </script>
</body>
</html>
