<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interface Orion</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: blueviolet;
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-color: #ffffff;
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background-color: #000; overflow: hidden; }

        #viewport { position: relative; width: 100vw; height: 100vh; }

        .video-slide { position: absolute; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1); display: flex; justify-content: center; align-items: center; color: var(--text-color); font-size: 2rem; background: #1a1a1a; }
        
        #myVideoContainer { 
            position: absolute; top: 15px; right: 15px; 
            width: 30vw; max-width: 150px; height: 20vh; 
            background: #333; border: 2px solid var(--primary); border-radius: 12px; z-index: 10;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }
        #myVideo { width: 100%; height: 100%; object-fit: cover; }

        #tabbar {
            position: fixed; bottom: 5vh; left: 50%; transform: translateX(-50%);
            display: flex; gap: 3vw; z-index: 100;
            padding: 2vw 5vw; background: var(--glass);
            backdrop-filter: blur(15px); border: 1px solid var(--glass-border);
            border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .btn { 
            width: 12vw; height: 12vw; max-width: 55px; max-height: 55px;
            border-radius: 50%; background: rgba(255, 255, 255, 0.1); 
            border: 1px solid var(--glass-border);
            display: flex; justify-content: center; align-items: center; 
            cursor: pointer; color: var(--primary); transition: all 0.3s; 
        }
        .btn:hover { background: var(--primary); color: white; }

        /* Esconder a barra inteira no mobile */
        @media (max-width: 768px) {
            #tabbar { display: none; }
        }
        
        .slide-left { transform: translateX(-100%); }
        .slide-right { transform: translateX(100%); }
        .active { transform: translateX(0); }
    </style>
</head>
<body>

<div id="viewport">
    <div id="v1" class="video-slide active">Pessoa 1</div>
    <div id="v2" class="video-slide slide-right">Pessoa 2</div>
    <div id="myVideoContainer"><video id="myVideo" autoplay playsinline muted></video></div>
</div>

<div id="tabbar">
    <div class="btn" onclick="proximo()"><i data-lucide="skip-forward"></i></div>
</div>

<script>
    lucide.createIcons();
    let stream;
    let touchStartX = 0;

    async function iniciarCamera() {
        const constraints = { video: true, audio: true };
        try {
            stream = await navigator.mediaDevices.getUserMedia(constraints);
            document.getElementById('myVideo').srcObject = stream;
        } catch (err) { console.error(err); }
    }
    
    let atual = 1;
    function proximo() {
        const v1 = document.getElementById('v1'), v2 = document.getElementById('v2');
        if (atual === 1) { v1.className = 'video-slide slide-left'; v2.className = 'video-slide active'; atual = 2; }
        else { v2.className = 'video-slide slide-left'; v1.className = 'video-slide active'; atual = 1; }
    }

    const viewport = document.getElementById('viewport');
    viewport.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
    viewport.addEventListener('touchend', e => {
        let diff = touchStartX - e.changedTouches[0].screenX;
        if (Math.abs(diff) > 50) proximo();
    });

    iniciarCamera();
</script>
</body>
</html>
