<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed Concept</title>
    <!-- Font Awesome para os ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8a2be2; /* Blueviolet */
            --bg-ghost: #f8f8ff; /* Ghost White */
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text-dark: #222;
            --text-light: #fff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-ghost);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        /* Container Principal (Simulando um dispositivo móvel) */
        .app-container {
            width: 100%;
            max-width: 414px;
            height: 100vh;
            max-height: 896px;
            background-color: #000;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            border: 8px solid #222;
        }

        /* --- Header --- */
        .app-header {
            padding: 15px 20px 5px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #000;
        }

        .app-logo {
            color: var(--primary);
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-actions i {
            color: var(--bg-ghost);
            font-size: 20px;
            cursor: pointer;
        }

        /* --- Container de Stories (Horizontal) --- */
        .stories-container {
            display: flex;
            gap: 15px;
            padding: 15px 20px;
            overflow-x: auto;
            background-color: #000;
            scrollbar-width: none; /* Esconde barra no Firefox */
        }

        .stories-container::-webkit-scrollbar {
            display: none; /* Esconde barra no Chrome/Safari */
        }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .story-avatar {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            padding: 2px;
            background-color: #000;
            object-fit: cover;
        }

        .story-item.viewed .story-avatar {
            border-color: #444;
        }

        .story-name {
            color: var(--bg-ghost);
            font-size: 11px;
            margin-top: 6px;
            max-width: 70px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        /* --- Card Estilo Tinder --- */
        .feed-container {
            flex: 1;
            padding: 10px 20px 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            position: relative;
        }

        .tinder-card {
            width: 100%;
            height: 100%;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Gradiente para garantir leitura do texto */
        .card-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }

        /* Informações do Perfil (Vidro Semitransparente) */
        .card-info {
            position: absolute;
            bottom: 90px;
            left: 15px;
            right: 15px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            color: var(--text-light);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .profile-name {
            font-size: 22px;
            font-weight: bold;
        }

        .profile-age {
            font-size: 20px;
            font-weight: 300;
        }

        .profile-verified {
            color: #1da1f2;
            font-size: 16px;
        }

        .profile-bio {
            font-size: 14px;
            opacity: 0.9;
            line-height: 1.4;
        }

        /* --- Botões de Ação Flutuantes (Vidro Semitransparente) --- */
        .card-actions {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .action-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .action-btn:active {
            transform: scale(0.9);
        }

        .action-btn.rewind i { color: #ffe600; }
        .action-btn.dislike i { color: #ff3b30; }
        .action-btn.superlike i { color: #007aff; }
        .action-btn.like i { color: var(--primary); }
        .action-btn.boost i { color: #ff9500; }

        .action-btn.like, .action-btn.dislike {
            width: 65px;
            height: 65px;
            font-size: 24px;
        }

        .action-btn i {
            font-size: 18px;
        }
        
        .action-btn.like i, .action-btn.dislike i {
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Header -->
        <header class="app-header">
            <div class="app-logo">
                <i class="fa-solid fa-fire"></i> match
            </div>
            <div class="header-actions">
                <i class="fa-solid fa-sliders"></i>
            </div>
        </header>

        <!-- Container de Stories -->
        <div class="stories-container">
            <!-- Seu Story -->
            <div class="story-item">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150" alt="Seu Story" class="story-avatar" style="border-color: #666;">
                <span class="story-name">Meu Story</span>
            </div>
            <!-- Outros Stories -->
            <div class="story-item">
                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150" alt="Avatar" class="story-avatar">
                <span class="story-name">Lucas</span>
            </div>
            <div class="story-item">
                <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150" alt="Avatar" class="story-avatar">
                <span class="story-name">Mariana</span>
            </div>
            <div class="story-item">
                <img src="https://images.unsplash.com/photo-1501196354995-cbb51c65aaea?w=150" alt="Avatar" class="story-avatar">
                <span class="story-name">Rodrigo</span>
            </div>
            <div class="story-item viewed">
                <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=150" alt="Avatar" class="story-avatar">
                <span class="story-name">Beatriz</span>
            </div>
            <div class="story-item viewed">
                <img src="https://images.unsplash.com/photo-1522075469751-3a6694fb2f61?w=150" alt="Avatar" class="story-avatar">
                <span class="story-name">Gabriel</span>
            </div>
        </div>

        <!-- Feed Estilo Tinder -->
        <div class="feed-container">
            <div class="tinder-card">
                <!-- Imagem de Fundo do Card -->
                <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=600" alt="Foto de Perfil" class="card-image">
                
                <!-- Gradiente de Leitura -->
                <div class="card-gradient"></div>

                <!-- Info Box (Glassmorphism) -->
                <div class="card-info">
                    <div class="profile-header">
                        <span class="profile-name">Juliana</span>
                        <span class="profile-age">24</span>
                        <i class="fa-solid fa-circle-check profile-verified"></i>
                    </div>
                    <p class="profile-bio">Paulista explorando o mundo. Apaixonada por fotografia, cafés escondidos e música ao vivo. Vamos tomar um vinho? 🍷</p>
                </div>

                <!-- Botões de Ação Flutuantes (Glassmorphism) -->
                <div class="card-actions">
                    <button class="action-btn rewind">
                        <i class="fa-solid fa-rotate-left"></i>
                    </button>
                    <button class="action-btn dislike">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                    <button class="action-btn superlike">
                        <i class="fa-solid fa-star"></i>
                    </button>
                    <button class="action-btn like">
                        <i class="fa-solid fa-heart"></i>
                    </button>
                    <button class="action-btn boost">
                        <i class="fa-solid fa-bolt"></i>
                    </button>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
