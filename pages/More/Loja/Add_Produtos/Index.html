<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --blueviolet: #8a2be2;
            --ghost: #f8f8ff;
        }

        body {
            background-color: var(--ghost);
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px 0 rgba(138, 43, 226, 0.15);
        }

        h2 { color: var(--blueviolet); }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.5);
        }

        button {
            background-color: var(--blueviolet);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <h2>Adicionar ao Catálogo</h2>
    <form>
        <input type="text" placeholder="Nome do Produto/Serviço" required>
        <select>
            <option>Produto</option>
            <option>App</option>
            <option>Serviço</option>
        </select>
        <textarea placeholder="Descrição detalhada" rows="4"></textarea>
        <button type="submit">Publicar no Catálogo</button>
    </form>
</div>

</body>
</html>
