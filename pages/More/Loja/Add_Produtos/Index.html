<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços - Orion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --primary-color: #8a2be2; 
            --glass-bg: rgba(255, 255, 255, 0.2);
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f8ff; padding: 20px; }

        .glass-effect {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 43, 226, 0.3);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        .gx-mod-card {
            height: 120px;
            position: relative;
            cursor: pointer;
            overflow: hidden; 
            transition: all 0.3s ease; /* Transição unificada */
            clip-path: polygon(15px 0%, 100% 0%, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0% 100%, 0% 15px);
            background: var(--glass-bg);
            border: 1px solid rgba(138, 43, 226, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
        }
        
        .gx-mod-card i { font-size: 24px; margin-bottom: 8px; }
        .gx-mod-card span { font-size: 0.8em; font-weight: 600; color: #333; }
        
        .gx-mod-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(138, 43, 226, 0.05);
            pointer-events: none;
        }
        
        /* Efeitos solicitados */
        .gx-mod-card:hover { 
            transform: scale(1.05); 
            background: rgba(138, 43, 226, 0.15); 
            border-color: var(--primary-color);
        }

        .gx-mod-card:focus { 
            outline: 2px solid var(--primary-color); 
            outline-offset: 2px;
            transform: scale(1.05);
            background: rgba(138, 43, 226, 0.15);
        }
    </style>
</head>
<body>

    <main class="max-w-3xl w-full mx-auto py-8">
        <h2 class="text-xl font-bold text-slate-800 mb-6 text-center">Nossos Serviços</h2>
        
        <div class="services-grid">
            <div class="gx-mod-card" tabindex="0"><i class="fas fa-broom"></i><span>Limpeza</span></div>
            <div class="gx-mod-card" tabindex="0"><i class="fas fa-bolt"></i><span>Elétrica</span></div>
            <div class="gx-mod-card" tabindex="0"><i class="fas fa-hammer"></i><span>Marcenaria</span></div>
            <div class="gx-mod-card" tabindex="0"><i class="fas fa-snowflake"></i><span>Ar Cond.</span></div>
            <div class="gx-mod-card" tabindex="0"><i class="fas fa-faucet"></i><span>Encanador</span></div>
            <div class="gx-mod-card" tabindex="0"><i class="fas fa-tools"></i><span>Reparos</span></div>
            <div class="gx-mod-card" tabindex="0"><i class="fas fa-bug"></i><span>Dedetização</span></div>
            <div class="gx-mod-card" tabindex="0"><i class="fas fa-paint-roller"></i><span>Pintura</span></div>
            <div class="gx-mod-card" tabindex="0"><i class="fas fa-gavel"></i><span>Jurídico</span></div>
        </div>
    </main>

</body>
</html>
