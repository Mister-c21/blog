<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradutor Glass</title>
    <!-- Ícones -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #8A2BE2;        /* BlueViolet */
            --primary-hover: #7A1FA2;
            --bg-ghost: #F8F8FF;       /* Ghost White */
            --glass-bg: rgba(248, 248, 255, 0.07);
            --glass-border: rgba(248, 248, 255, 0.15);
            --text-main: #F8F8FF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0e091a 0%, #160c30 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Container Principal */
        .translator-container {
            width: 100%;
            max-width: 1000px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Cabeçalho */
        .header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(138, 43, 226, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header .title {
            color: var(--bg-ghost);
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header .icon {
            color: var(--primary);
        }

        /* Área dos Paineis de Texto */
        .panels-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--glass-border);
        }

        @media (max-width: 768px) {
            .panels-box {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: rgba(14, 9, 26, 0.4);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Controles de Idioma */
        .select-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        select {
            background: rgba(248, 248, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: var(--bg-ghost);
            padding: 8px 12px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        select:focus {
            border-color: var(--primary);
            background: rgba(138, 43, 226, 0.2);
        }

        select option {
            background: #160c30;
            color: var(--bg-ghost);
        }

        /* Áreas de Texto */
        textarea {
            width: 100%;
            height: 220px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(248, 248, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            color: var(--text-main);
            font-size: 1.1rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: rgba(138, 43, 226, 0.5);
        }

        textarea::placeholder {
            color: rgba(248, 248, 255, 0.25);
        }

        /* Botões de Ação */
        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-util {
            background: transparent;
            border: none;
            color: rgba(248, 248, 255, 0.6);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .btn-util:hover {
            background: rgba(138, 43, 226, 0.2);
            color: var(--bg-ghost);
        }

        .btn-translate {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
            transition: all 0.2s;
        }

        .btn-translate:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        /* Indicador de Caracteres */
        .char-counter {
            color: rgba(248, 248, 255, 0.4);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="translator-container">
        <!-- Topo -->
        <div class="header">
            <span class="material-icons icon">g_translate</span>
            <span class="title">Tradutor.io</span>
        </div>

        <!-- Conteúdo dividido em duas colunas -->
        <div class="panels-box">
            <!-- Esquerda: Entrada -->
            <div class="panel">
                <div class="select-box">
                    <select id="langFrom">
                        <option value="pt">Português</option>
                        <option value="en">Inglês</option>
                        <option value="es">Espanhol</option>
                        <option value="fr">Francês</option>
                        <option value="ja">Japonês</option>
                    </select>
                    <span class="char-counter" id="charCount">0 / 5000</span>
                </div>
                
                <textarea id="textFrom" placeholder="Digite o texto para tradução..." maxlength="5000"></textarea>
                
                <div class="action-row">
                    <button class="btn-util" id="clearBtn" title="Limpar tudo">
                        <span class="material-icons">delete_outline</span>
                    </button>
                    <button class="btn-translate" id="translateBtn">
                        Traduzir <span class="material-icons">arrow_forward</span>
                    </button>
                </div>
            </div>

            <!-- Direita: Saída -->
            <div class="panel" style="border-left: 1px solid var(--glass-border);">
                <div class="select-box">
                    <select id="langTo">
                        <option value="en">Inglês</option>
                        <option value="pt">Português</option>
                        <option value="es">Espanhol</option>
                        <option value="fr">Francês</option>
                        <option value="ja">Japonês</option>
                    </select>
                </div>
                
                <textarea id="textTo" placeholder="Tradução..." readonly></textarea>
                
                <div class="action-row" style="justify-content: flex-end;">
                    <button class="btn-util" id="copyBtn" title="Copiar tradução">
                        <span class="material-icons">content_copy</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const textFrom = document.getElementById('textFrom');
        const textTo = document.getElementById('textTo');
        const langFrom = document.getElementById('langFrom');
        const langTo = document.getElementById('langTo');
        const translateBtn = document.getElementById('translateBtn');
        const charCount = document.getElementById('charCount');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');

        // Atualiza o contador de caracteres em tempo real
        textFrom.addEventListener('input', () => {
            charCount.textContent = `${textFrom.value.length} / 5000`;
        });

        // Função assíncrona que consome a API MyMemory para tradução gratuita
        async function performTranslation() {
            const queryText = textFrom.value.trim();
            if (!queryText) {
                textTo.value = '';
                return;
            }

            textTo.placeholder = "Traduzindo...";
            textTo.value = '';

            const sourceLang = langFrom.value;
            const targetLang = langTo.value;
            
            // Endpoint público da API MyMemory
            const apiUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(queryText)}&langpair=${sourceLang}|${targetLang}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                if (data.responseData) {
                    textTo.value = data.responseData.translatedText;
                } else {
                    textTo.value = "Erro ao processar a tradução.";
                }
            } catch (error) {
                console.error("Erro na requisição:", error);
                textTo.value = "Erro de conexão com o servidor de tradução.";
            } finally {
                textTo.placeholder = "Tradução...";
            }
        }

        // Eventos para disparar a tradução ao clicar no botão
        translateBtn.addEventListener('click', performTranslation);

        // Copiar o texto traduzido
        copyBtn.addEventListener('click', () => {
            if (textTo.value.trim() === '') return;
            navigator.clipboard.writeText(textTo.value);
            
            const originalIcon = copyBtn.innerHTML;
            copyBtn.innerHTML = '<span class="material-icons" style="color: #4cd137;">done</span>';
            setTimeout(() => {
                copyBtn.innerHTML = originalIcon;
            }, 1500);
        });

        // Limpar os campos
        clearBtn.addEventListener('click', () => {
            textFrom.value = '';
            textTo.value = '';
            charCount.textContent = "0 / 5000";
        });
    </style>
</body>
</html>
