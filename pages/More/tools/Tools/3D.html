<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Modelador 3D</title>
    <style>
        :root {
            --bg-color: #f8f8ff; /* ghost */
            --primary-color: #8a2be2; /* blueviolet */
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(138, 43, 226, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
        }

        /* Canvas ocupa a tela cheia de fundo */
        #canvas3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Interface flutuante estilo Vidro Semitransparente (Glassmorphism) */
        .interface-panel {
            position: absolute;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #topBar {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            flex-direction: row;
            align-items: center;
        }

        #sideTools {
            top: 100px;
            left: 20px;
            width: 160px;
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: var(--primary-color);
            text-align: center;
        }

        .info-text {
            font-size: 12px;
            color: #333;
            text-align: center;
            line-height: 1.4;
        }

        button {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 10px 14px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        button:hover {
            background: var(--primary-color);
            color: #ffffff;
        }

        button.active {
            background: var(--primary-color);
            color: #ffffff;
            box-shadow: 0 0 8px rgba(138, 43, 226, 0.5);
        }

        .divider {
            height: 1px;
            background: var(--glass-border);
            margin: 5px 0;
        }
    </style>
    <!-- Carregando a biblioteca Three.js e OrbitControls via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <!-- Canvas de Renderização -->
    <canvas id="canvas3d"></canvas>

    <!-- Barra Superior de Controle de Formas -->
    <div class="interface-panel" id="topBar">
        <button id="btnAddCube" class="active">📦 Cubo</button>
        <button id="btnAddSphere">🔮 Esfera</button>
        <button id="btnReset">🔄 Resetar Malha</button>
    </div>

    <!-- Barra Lateral de Ferramentas de Modelagem -->
    <div class="interface-panel" id="sideTools">
        <h2>Ferramentas</h2>
        <button id="toolView" class="active">🔄 Câmera / Órbita</button>
        <button id="toolSculpt">👇 Puxar Vértice</button>
        
        <div class="divider"></div>
        
        <h2>Visualização</h2>
        <button id="btnWireframe" class="active">🌐 Modo Malha</button>
        
        <div class="divider"></div>
        <div class="info-text">
            <strong>Dica:</strong> No modo <em>Puxar Vértice</em>, clique e arraste diretamente nos pontos do objeto 3D para deformá-lo.
        </div>
    </div>

    <script>
        // --- Configuração Inicial da Cena 3D ---
        const canvas = document.getElementById('canvas3d');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf8f8ff); // Cor GhostWhite de fundo

        // Câmera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 8);

        // Renderizador
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // Controles de Câmera (Orbit Controls)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Iluminação da Cena
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 15, 10);
        scene.add(dirLight);

        // Grade de Referência (Grid)
        const gridHelper = new THREE.GridHelper(10, 20, 0x8a2be2, 0xcccccc);
        gridHelper.position.y = -1.5;
        scene.add(gridHelper);

        // --- Variáveis de Estado do Modelador ---
        let currentMesh = null;
        let currentGeometryType = 'cube'; // 'cube' ou 'sphere'
        let currentTool = 'view'; // 'view' ou 'sculpt'
        let showWireframe = true;

        // Elementos de ajuda visual para os vértices editáveis
        let vertexPointsGroup = new THREE.Group();
        scene.add(vertexPointsGroup);

        // Raycasting para detectar cliques em objetos 3D
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedVertexIndex = null;

        // --- Criação das Formas Geométricas ---
        function generateModel(type) {
            // Remove o modelo anterior se houver
            if (currentMesh) {
                scene.remove(currentMesh);
                currentMesh.geometry.dispose();
                if(Array.isArray(currentMesh.material)) {
                    currentMesh.material.forEach(m => m.dispose());
                } else {
                    currentMesh.material.dispose();
                }
            }

            let geometry;
            if (type === 'sphere') {
                // Esfera segmentada para expor vértices manipuláveis
                geometry = new THREE.SphereGeometry(1.5, 8, 8);
            } else {
                // Cubo subdividido para permitir deformações locais
                geometry = new THREE.BoxGeometry(2, 2, 2, 2, 2, 2);
            }

            // Material duplo: Preenchimento semitransparente + linhas estruturais (Wireframe)
            const material = new THREE.MeshPhongMaterial({
                color: 0x8a2be2,
                flatShading: true,
                transparent: true,
                opacity: 0.8,
                side: THREE.DoubleSide
            });

            currentMesh = new THREE.Mesh(geometry, material);
            scene.add(currentMesh);

            rebuildVertexMarkers();
            updateWireframeVisibility();
        }

        // Reconstrói as esferas visuais que indicam onde ficam os vértices modificáveis
        function rebuildVertexMarkers() {
            // Limpa marcadores antigos
            while(vertexPointsGroup.children.length > 0) {
                const obj = vertexPointsGroup.children[0];
                obj.geometry.dispose();
                obj.material.dispose();
                vertexPointsGroup.remove(obj);
            }

            if (!currentMesh) return;

            const positionAttribute = currentMesh.geometry.attributes.position;
            const vertexGeo = new THREE.SphereGeometry(0.06, 4, 4);
            const vertexMat = new THREE.MeshBasicMaterial({ color: 0x333333 });

            // Cria um ponto visual interativo para cada coordenada de vértice único
            for (let i = 0; i < positionAttribute.count; i++) {
                const marker = new THREE.Mesh(vertexGeo, vertexMat);
                
                // Posição local do vértice convertida para o espaço do mundo
                const x = positionAttribute.getX(i);
                const y = positionAttribute.getY(i);
                const z = positionAttribute.getZ(i);
                
                marker.position.set(x, y, z);
                marker.userData = { vertexIndex: i }; // Guarda a referência do índice original
                vertexPointsGroup.add(marker);
            }
        }

        function updateWireframeVisibility() {
            if (!currentMesh) return;
            // Cria ou remove uma malha de linhas (Wireframe) acoplada
            let wire = currentMesh.getObjectByName("wireframeOverlay");
            if (wire) currentMesh.remove(wire);

            if (showWireframe) {
                const wireGeo = new THREE.WireframeGeometry(currentMesh.geometry);
                const wireMat = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 1 });
                const wireMesh = new THREE.LineSegments(wireGeo, wireMat);
                wireMesh.name = "wireframeOverlay";
                currentMesh.add(wireMesh);
                vertexPointsGroup.visible = true;
            } else {
                vertexPointsGroup.visible = false;
            }
        }

        // --- Interação do Mouse / Escultura (Sculpting) ---
        window.addEventListener('mousedown', (e) => {
            if (currentTool !== 'sculpt') return;

            // Calcula a posição do mouse em coordenadas normalizadas (-1 a +1)
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            // Verifica se clicou em algum marcador de vértice
            const intersects = raycaster.intersectObjects(vertexPointsGroup.children);

            if (intersects.length > 0) {
                // Bloqueia a rotação da câmera para permitir o arrasto do ponto
                controls.enabled = false;
                selectedVertexIndex = intersects[0].object.userData.vertexIndex;
                intersects[0].object.material.color.setHex(0xff0000); // Destaca em vermelho
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (currentTool !== 'sculpt' || selectedVertexIndex === null) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            
            // Cria um plano imaginário de arrasto perpendicular à câmera
            const plane = new THREE.Plane();
            plane.setFromNormalAndCoplanarPoint(new THREE.Vector3(0, 0, 1).applyQuaternion(camera.quaternion), currentMesh.position);
            
            const targetPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(plane, targetPoint);

            // Transforma o ponto tridimensional global de volta para as coordenadas locais da malha
            currentMesh.worldToLocal(targetPoint);

            // Aplica a nova posição ao vértice selecionado na geometria
            const positionAttribute = currentMesh.geometry.attributes.position;
            positionAttribute.setXYZ(selectedVertexIndex, targetPoint.x, targetPoint.y, targetPoint.z);
            positionAttribute.needsUpdate = true; // Avisa a GPU que a malha mudou

            // Força a atualização da topologia das linhas do wireframe
            updateWireframeVisibility();
            // Move o marcador visual junto
            vertexPointsGroup.children[selectedVertexIndex].position.copy(targetPoint);
        });

        window.addEventListener('mouseup', () => {
            if (selectedVertexIndex !== null) {
                // Restaura a cor padrão do marcador e religa os controles da câmera
                vertexPointsGroup.children[selectedVertexIndex].material.color.setHex(0x333333);
                selectedVertexIndex = null;
                controls.enabled = true;
            }
        });

        // --- Manipulação da Interface (UI) ---
        const btnAddCube = document.getElementById('btnAddCube');
        const btnAddSphere = document.getElementById('btnAddSphere');
        const btnReset = document.getElementById('btnReset');
        const toolView = document.getElementById('toolView');
        const toolSculpt = document.getElementById('toolSculpt');
        const btnWireframe = document.getElementById('btnWireframe');

        btnAddCube.onclick = () => {
            currentGeometryType = 'cube';
            btnAddCube.classList.add('active');
            btnAddSphere.classList.remove('active');
            generateModel('cube');
        };

        btnAddSphere.onclick = () => {
            currentGeometryType = 'sphere';
            btnAddSphere.classList.add('active');
            btnAddCube.classList.remove('active');
            generateModel('sphere');
        };

        btnReset.onclick = () => {
            generateModel(currentGeometryType);
        };

        toolView.onclick = () => {
            currentTool = 'view';
            controls.enabled = true;
            toolView.classList.add('active');
            toolSculpt.classList.remove('active');
        };

        toolSculpt.onclick = () => {
            currentTool = 'sculpt';
            controls.enabled = true; // Mantém ativo, mas desativa dinamicamente no mousedown do ponto
            toolSculpt.classList.add('active');
            toolView.classList.remove('active');
        };

        btnWireframe.onclick = () => {
            showWireframe = !showWireframe;
            btnWireframe.classList.toggle('active', showWireframe);
            updateWireframeVisibility();
        };

        // Redimensionamento responsivo do Canvas
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Inicialização e Loop de Renderização ---
        generateModel('cube');

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Necessário para o efeito suave (damping) da câmera
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
