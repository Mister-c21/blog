<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Maker - Criador de Figurinhas</title>
    <style>
        :root {
            --bg-color: #f8f8ff; /* Ghost White */
            --primary-color: #8a2be2; /* Blueviolet */
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text-color: #2c2c2c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-image: linear-gradient(135deg, #f8f8ff 0%, #e6e6fa 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 8px 32px 0 rgba(138, 43, 226, 0.12);
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            margin-top: 0;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        /* Área de Upload */
        .upload-area {
            border: 2px dashed var(--primary-color);
            border-radius: 12px;
            padding: 30px 20px;
            margin: 20px 0;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            transition: background 0.3s;
        }

        .upload-area:hover {
            background: rgba(138, 43, 226, 0.05);
        }

        .icon-folder {
            display: inline-block;
            width: 35px;
            height: 25px;
            background: var(--primary-color);
            border-radius: 0 4px 4px 4px;
            position: relative;
            margin-bottom: 10px;
        }
        .icon-folder::before {
            content: "";
            position: absolute;
            top: -6px;
            left: 0;
            width: 15px;
            height: 6px;
            background: var(--primary-color);
            border-radius: 4px 4px 0 0;
        }

        input[type="file"] {
            display: none;
        }

        /* Área de Edição e Recorte */
        #editor-container {
            display: none;
            margin-top: 20px;
        }

        .canvas-wrapper {
            position: relative;
            margin: 0 auto 20px auto;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), 
                              linear-gradient(-45deg, #ccc 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #ccc 75%), 
                              linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px; /* Fundo xadrez PNG */
        }

        canvas {
            display: block;
            cursor: crosshair;
            max-width: 100%;
        }

        .instructions {
            background: rgba(255, 255, 255, 0.6);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 0.95rem;
            border-radius: 8px;
            cursor: pointer;
            flex: 1;
            font-weight: bold;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }
        
        button.secondary {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }

        /* Resultado Final */
        #result-container {
            display: none;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(0,0,0,0.08);
        }

        #sticker-preview {
            max-width: 180px;
            background-size: 15px 15px;
            padding: 10px;
        }

        .download-link {
            display: inline-block;
            margin-top: 15px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
            border-bottom: 2px solid var(--primary-color);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sticker Maker</h1>

        <!-- Escolha da Imagem -->
        <div class="upload-area" id="drop-zone" onclick="document.getElementById('image-input').click()">
            <div class="icon-folder"></div>
            <p style="margin: 5px 0 0 0; font-weight: 500;">Escolha uma foto da galeria</p>
            <span style="font-size: 0.8rem; color: #666;">(Formatos PNG, JPG ou JPEG)</span>
            <input type="file" id="image-input" accept="image/*">
        </div>

        <!-- Tela de Desenho/Corte -->
        <div id="editor-container">
            <div class="instructions">
                Arraste o dedo ou o mouse para contornar a área que deseja transformar em figurinha.
            </div>

            <div class="canvas-wrapper" id="wrapper">
                <canvas id="crop-canvas"></canvas>
            </div>

            <div class="btn-group">
                <button class="secondary" id="reset-btn">Reiniciar Linha</button>
                <button id="cut-btn">Cortar Figurinha</button>
            </div>
        </div>

        <!-- Exibição do Adesivo Pronto -->
        <div id="result-container">
            <h3 style="margin-top: 0;">Sua Figurinha!</h3>
            <img id="sticker-preview" src="" alt="Figurinha finalizada">
            <br>
            <a id="download-btn" class="download-link" href="#" download="my_sticker.png">Salvar no Dispositivo</a>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const editorContainer = document.getElementById('editor-container');
        const canvas = document.getElementById('crop-canvas');
        const ctx = canvas.getContext('2d');
        const resetBtn = document.getElementById('reset-btn');
        const cutBtn = document.getElementById('cut-btn');
        const resultContainer = document.getElementById('result-container');
        const stickerPreview = document.getElementById('sticker-preview');
        const downloadBtn = document.getElementById('download-btn');

        let originalImage = new Image();
        let points = []; // Array para guardar o caminho do contorno
        let isDrawing = false;

        // 1. Carrega a Imagem no Canvas
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
            resultContainer.style.display = 'none';
        });

        originalImage.onload = function() {
            // Define o tamanho máximo de exibição para manter a proporção
            const maxWidth = 450;
            let width = originalImage.width;
            let height = originalImage.height;

            if (width > maxWidth) {
                height = (maxWidth / width) * height;
                width = maxWidth;
            }

            canvas.width = width;
            canvas.height = height;
            
            resetEditor();
            editorContainer.style.display = 'block';
        };

        function resetEditor() {
            points = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
        }

        resetBtn.addEventListener('click', resetEditor);

        // 2. Captura dos movimentos de Desenho (Mouse e Touchscreen)
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            // Suporta cliques comuns e toques em celular
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startDraw(e) {
            isDrawing = true;
            points = []; // Limpa trajetórias anteriores
            // Redesenha a imagem limpa para começar
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
            
            const pos = getPos(e);
            points.push(pos);
            
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.strokeStyle = '#8a2be2';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
        }

        function moveDraw(e) {
            if (!isDrawing) return;
            e.preventDefault(); // Impede scroll na tela do celular durante o desenho

            const pos = getPos(e);
            points.push(pos);

            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function endDraw() {
            if (!isDrawing) return;
            isDrawing = false;
            ctx.closePath();
        }

        // Eventos de Mouse
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', moveDraw);
        window.addEventListener('mouseup', endDraw);

        // Eventos Touch (Mobile)
        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchmove', moveDraw);
        window.addEventListener('touchend', endDraw);

        // 3. Processamento do Recorte e Criação da Borda de Adesivo
        cutBtn.addEventListener('click', function() {
            if (points.length < 3) {
                alert("Por favor, faça um contorno fechado ao redor do objeto primeiro!");
                return;
            }

            // Criamos um canvas temporário para gerar o corte limpo isolado
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;

            // Criar a máscara com o desenho do usuário
            tCtx.beginPath();
            tCtx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                tCtx.lineTo(points[i].x, points[i].y);
            }
            tCtx.closePath();
            
            // Recorta a imagem baseada no caminho desenhado
            tCtx.clip();
            tCtx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);

            // Agora, vamos aplicar o efeito de borda branca clássico do aplicativo original
            const finalCanvas = document.createElement('canvas');
            const fCtx = finalCanvas.getContext('2d');
            
            // Damos uma pequena margem extra para a borda branca não cortar nas pontas
            const borderSize = 6; 
            finalCanvas.width = canvas.width + (borderSize * 2);
            finalCanvas.height = canvas.height + (borderSize * 2);

            // Técnica de "Shadow/Glow" opaca para simular a borda recortada do Sticker Maker
            fCtx.shadowColor = '#ffffff';
            fCtx.shadowBlur = 1;
            // Desenha em múltiplas direções para deixar a borda firme e sem desfoques
            for(let y = -borderSize; y <= borderSize; y += 2) {
                for(let x = -borderSize; x <= borderSize; x += 2) {
                    if(x*x + y*y <= borderSize*borderSize) {
                        fCtx.drawImage(tempCanvas, x + borderSize, y + borderSize);
                    }
                }
            }
            
            // Desenha a imagem recortada por cima do fundo branco gerado
            fCtx.shadowColor = 'transparent';
            fCtx.drawImage(tempCanvas, borderSize, borderSize);

            // Exporta o resultado para a área de download
            const stickerDataURL = finalCanvas.toDataURL('image/png');
            stickerPreview.src = stickerDataURL;
            downloadBtn.href = stickerDataURL;
            
            resultContainer.style.display = 'block';
            resultContainer.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
