<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InSMIX Studio - Editor de Layouts</title>
    <style>
        :root {
            --bg-color: #f8f8ff; /* Ghost White */
            --primary-color: #8a2be2; /* Blueviolet */
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text-color: #2c2c2c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-image: linear-gradient(135deg, #f8f8ff 0%, #e6e6fa 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 8px 32px 0 rgba(138, 43, 226, 0.12);
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 650px) {
            .container {
                grid-template-columns: 1fr 1fr;
            }
            .header-full { grid-column: span 2; }
        }

        .header-full {
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            margin: 0 0 5px 0;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed var(--primary-color);
            border-radius: 12px;
            padding: 40px 20px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            transition: background 0.3s;
            text-align: center;
        }

        .upload-area:hover {
            background: rgba(138, 43, 226, 0.05);
        }

        .icon-image {
            display: inline-block;
            width: 36px;
            height: 28px;
            border: 3px solid var(--primary-color);
            border-radius: 4px;
            position: relative;
            margin-bottom: 10px;
        }
        .icon-image::before {
            content: "";
            position: absolute;
            top: 6px;
            left: 6px;
            width: 6px;
            height: 6px;
            background: var(--primary-color);
            border-radius: 50%;
        }

        input[type="file"] {
            display: none;
        }

        /* Workspace do Canvas */
        .workspace {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .canvas-container {
            width: 100%;
            max-width: 320px;
            aspect-ratio: 1 / 1;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            border-radius: 8px;
            overflow: hidden;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: aspect-ratio 0.3s ease;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Painel de Controles Laterais */
        .control-panel {
            display: none;
            flex-direction: column;
            gap: 15px;
            text-align: left;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary-color);
            text-transform: uppercase;
            margin-bottom: 5px;
            border-bottom: 1px solid rgba(138, 43, 226, 0.2);
            padding-bottom: 3px;
        }

        .ratio-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        .ratio-btn {
            background: rgba(255, 255, 255, 0.6);
            color: var(--text-color);
            border: 1px solid rgba(0, 0, 0, 0.1);
            padding: 8px;
            font-size: 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .ratio-btn.active, .ratio-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-bottom: 8px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary-color);
        }

        button.main-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(138, 43, 226, 0.2);
        }

        button.main-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-full">
            <h1>InSMIX Studio</h1>
            <p style="margin: 0; font-size: 0.9rem; color: #555;">Estilize suas fotos para o Feed e Stories</p>
        </div>

        <!-- Seção Inicial de Upload -->
        <div class="upload-area header-full" id="upload-box" onclick="document.getElementById('image-input').click()">
            <div class="icon-image"></div>
            <p style="margin: 5px 0 0 0; font-weight: 600;">Importar Imagem para o Layout</p>
            <span style="font-size: 0.8rem; color: #666;">(PNG, JPG, WebP)</span>
            <input type="file" id="image-input" accept="image/*">
        </div>

        <!-- Coluna Esquerda: Preview do Canvas -->
        <div class="workspace" id="editor-workspace">
            <div class="canvas-container" id="canvas-frame">
                <canvas id="editor-canvas"></canvas>
            </div>
        </div>

        <!-- Coluna Direita: Controles e Filtros -->
        <div class="control-panel" id="editor-controls">
            <!-- Formato / Proporção -->
            <div>
                <div class="section-title">Formato da Tela</div>
                <div class="ratio-buttons">
                    <button class="ratio-btn active" data-ratio="1:1">1:1 Feed</button>
                    <button class="ratio-btn" data-ratio="9:16">9:16 Story</button>
                    <button class="ratio-btn" data-ratio="4:5">4:5 Retrato</button>
                </div>
            </div>

            <!-- Preenchimento Inteligente de Fundo -->
            <div>
                <div class="section-title">Fundo do Layout</div>
                <div class="slider-group">
                    <div class="slider-label">
                        <span>Desfoque de Fundo (Blur)</span>
                        <span id="blur-val">20px</span>
                    </div>
                    <input type="range" id="bg-blur" min="0" max="50" value="20">
                </div>
            </div>

            <!-- Ajustes da Imagem -->
            <div>
                <div class="section-title">Filtros & Ajustes</div>
                <div class="slider-group">
                    <div class="slider-label">
                        <span>Brilho</span>
                        <span id="brightness-val">100%</span>
                    </div>
                    <input type="range" id="filter-brightness" min="50" max="150" value="100">
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>Contraste</span>
                        <span id="contrast-val">100%</span>
                    </div>
                    <input type="range" id="filter-contrast" min="50" max="150" value="100">
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>Saturação</span>
                        <span id="saturate-val">100%</span>
                    </div>
                    <input type="range" id="filter-saturate" min="0" max="200" value="100">
                </div>
            </div>

            <button class="main-btn" id="download-btn">Exportar Imagem</button>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const uploadBox = document.getElementById('upload-box');
        const workspace = document.getElementById('editor-workspace');
        const controls = document.getElementById('editor-controls');
        const canvas = document.getElementById('editor-canvas');
        const ctx = canvas.getContext('2d');
        const canvasFrame = document.getElementById('canvas-frame');

        // Inputs
        const bgBlurInput = document.getElementById('bg-blur');
        const brightnessInput = document.getElementById('filter-brightness');
        const contrastInput = document.getElementById('filter-contrast');
        const saturateInput = document.getElementById('filter-saturate');
        const downloadBtn = document.getElementById('download-btn');

        let loadedImg = new Image();
        let currentRatio = "1:1";

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                loadedImg.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        loadedImg.onload = function() {
            // Remove a caixa de upload e revela o estúdio completo
            uploadBox.style.display = 'none';
            workspace.style.display = 'flex';
            controls.style.display = 'flex';
            
            updateCanvasDimensions();
        };

        // Gerencia as alterações das proporções (Ratio)
        document.querySelectorAll('.ratio-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelector('.ratio-btn.active').classList.remove('active');
                this.classList.add('active');
                currentRatio = this.getAttribute('data-ratio');
                
                // Atualiza a proporção visual do container da interface
                if(currentRatio === "1:1") canvasFrame.style.aspectRatio = "1 / 1";
                if(currentRatio === "9:16") canvasFrame.style.aspectRatio = "9 / 16";
                if(currentRatio === "4:5") canvasFrame.style.aspectRatio = "4 / 5";

                updateCanvasDimensions();
            });
        });

        function updateCanvasDimensions() {
            // Resolução nativa alta para exportação sem perda de qualidade
            let targetWidth = 1080;
            let targetHeight = 1080;

            if (currentRatio === "9:16") targetHeight = 1920;
            if (currentRatio === "4:5") targetHeight = 1350;

            canvas.width = targetWidth;
            canvas.height = targetHeight;

            renderEditor();
        }

        function renderEditor() {
            if (!loadedImg.src) return;

            const cw = canvas.width;
            const ch = canvas.height;

            ctx.clearRect(0, 0, cw, ch);
            ctx.save();

            // --- PASSO 1: DESENHAR O FUNDO DESFOCADO (Mecânica InSMIX) ---
            const blurAmount = bgBlurInput.value;
            ctx.filter = `blur(${blurAmount}px) brightness(90%)`;
            
            // Renderiza cobrindo toda a área de fundo (estilo Cover)
            let bgScale = Math.max(cw / loadedImg.width, ch / loadedImg.height);
            let bgW = loadedImg.width * bgScale;
            let bgH = loadedImg.height * bgScale;
            let bgX = (cw - bgW) / 2;
            let bgY = (ch - bgH) / 2;
            ctx.drawImage(loadedImg, bgX, bgY, bgW, bgH);
            
            ctx.restore();

            // --- PASSO 2: APLICAR FILTROS APENAS NA IMAGEM PRINCIPAL ---
            ctx.save();
            const b = brightnessInput.value;
            const c = contrastInput.value;
            const s = saturateInput.value;
            ctx.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%)`;

            // Encaixa a imagem principal no centro sem cortar (estilo Contain)
            let imgScale = Math.min(cw / loadedImg.width, ch / loadedImg.height);
            let imgW = loadedImg.width * imgScale;
            let imgH = loadedImg.height * imgScale;
            let imgX = (cw - imgW) / 2;
            let imgY = (ch - imgH) / 2;

            ctx.drawImage(loadedImg, imgX, imgY, imgW, imgH);
            ctx.restore();
        }

        // Eventos de escuta dos Sliders de Configurações
        bgBlurInput.addEventListener('input', (e) => {
            document.getElementById('blur-val').textContent = e.target.value + 'px';
            renderEditor();
        });
        brightnessInput.addEventListener('input', (e) => {
            document.getElementById('brightness-val').textContent = e.target.value + '%';
            renderEditor();
        });
        contrastInput.addEventListener('input', (e) => {
            document.getElementById('contrast-val').textContent = e.target.value + '%';
            renderEditor();
        });
        saturateInput.addEventListener('input', (e) => {
            document.getElementById('saturate-val').textContent = e.target.value + '%';
            renderEditor();
        });

        // Ação de download da imagem processada
        downloadBtn.addEventListener('click', function() {
            const link = document.createElement('a');
            link.download = `insmix_layout_${currentRatio.replace(':', '_')}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
