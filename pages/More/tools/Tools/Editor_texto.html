<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextoEditor Glass</title>
    <!-- Ícones -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #8A2BE2;        /* BlueViolet */
            --primary-hover: #7A1FA2;
            --bg-ghost: #F8F8FF;       /* Ghost White */
            --glass-bg: rgba(248, 248, 255, 0.08);
            --glass-border: rgba(248, 248, 255, 0.15);
            --text-main: #F8F8FF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
        }

        body {
            background: linear-gradient(135deg, #120c1f 0%, #1a103c 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        /* Container Principal em Vidro */
        .editor-container {
            width: 100%;
            max-width: 1000px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Barra de Ações Superior */
        .editor-header {
            background: rgba(138, 43, 226, 0.15);
            border-bottom: 1px solid var(--glass-border);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            color: var(--bg-ghost);
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: sans-serif;
        }

        .brand span.icon {
            color: var(--primary);
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: var(--glass-border);
            border: 1px solid transparent;
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            font-family: sans-serif;
        }

        .btn:hover {
            background: var(--primary);
            border-color: var(--bg-ghost);
        }

        /* Corpo do Editor (Linhas + Área de Texto) */
        .editor-body {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        /* Numeração das Linhas */
        .line-numbers {
            width: 50px;
            background: rgba(0, 0, 0, 0.2);
            border-right: 1px solid var(--glass-border);
            padding: 15px 0;
            text-align: right;
            padding-right: 10px;
            color: rgba(248, 248, 255, 0.4);
            user-select: none;
            overflow: hidden;
            font-size: 16px;
            line-height: 1.5;
        }

        /* Área de Digitação */
        .text-area {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 15px;
            color: var(--text-main);
            font-size: 16px;
            line-height: 1.5;
            resize: none;
            overflow-y: auto;
            white-space: pre;
        }

        /* Barra de Status Inferior */
        .editor-footer {
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--glass-border);
            padding: 8px 20px;
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            color: rgba(248, 248, 255, 0.6);
            font-size: 0.85rem;
            font-family: sans-serif;
        }

        /* Customização da Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(138, 43, 226, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
</head>
<body>

    <div class="editor-container">
        <!-- Cabeçalho -->
        <div class="editor-header">
            <div class="brand">
                <span class="material-icons icon">code</span>
                <span>TextoEditor.io</span>
            </div>
            <div class="actions">
                <button class="btn" onclick="copyText()" title="Copiar tudo">
                    <span class="material-icons">content_copy</span> Copiar
                </button>
                <button class="btn" onclick="clearAll()" title="Limpar tudo">
                    <span class="material-icons">delete_sweep</span> Limpar
                </button>
            </div>
        </div>

        <!-- Área Central -->
        <div class="editor-body">
            <div class="line-numbers" id="lineNumbers">1</div>
            <textarea class="text-area" id="textarea" placeholder="// Comece a escrever seu texto ou código aqui..." oninput="updateEditor()" onscroll="syncScroll()"></textarea>
        </div>

        <!-- Rodapé informativo -->
        <div class="editor-footer">
            <span id="wordCount">Palavras: 0</span>
            <span id="charCount">Caracteres: 0</span>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('textarea');
        const lineNumbers = document.getElementById('lineNumbers');
        const wordCount = document.getElementById('wordCount');
        const charCount = document.getElementById('charCount');

        function updateEditor() {
            // Atualiza contador de linhas
            const text = textarea.value;
            const lines = text.split('\n');
            let lineNumbersHTML = '';
            
            for (let i = 1; i <= lines.length; i++) {
                lineNumbersHTML += i + '<br>';
            }
            lineNumbers.innerHTML = lineNumbersHTML;

            // Atualiza contadores de palavras e caracteres
            charCount.textContent = `Caracteres: ${text.length}`;
            
            const words = text.trim().split(/\s+/);
            const totalWords = text.trim() === '' ? 0 : words.length;
            wordCount.textContent = `Palavras: ${totalWords}`;
            
            // Sincroniza a rolagem imediatamente ao digitar
            syncScroll();
        }

        // Sincroniza o scroll da numeração lateral com o campo de texto
        function syncScroll() {
            lineNumbers.scrollTop = textarea.scrollTop;
        }

        // Copia o conteúdo para a área de transferência
        function copyText() {
            if (textarea.value.trim() === '') return;
            navigator.clipboard.writeText(textarea.value);
            
            // Feedback visual rápido no botão
            const copyBtn = document.querySelector('.btn');
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = '<span class="material-icons">done</span> Copiado!';
            setTimeout(() => {
                copyBtn.innerHTML = originalText;
            }, 1500);
        }

        // Limpa o editor
        function clearAll() {
            if(confirm('Deseja mesmo limpar todo o texto?')) {
                textarea.value = '';
                updateEditor();
            }
        }

        // Inicializa o comportamento correto do scroll emparelhado
        textarea.addEventListener('scroll', syncScroll);
    </script>
</body>
</html>
