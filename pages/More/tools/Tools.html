<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-color: blueviolet;
            --bg-ghost: #f8f9fa;
            --text-main: #1a1a1a;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-modal: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-ghost);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* Ajustado para ser responsivo entre Mobile e Desktop */
        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            padding: 20px;
            background-color: var(--bg-ghost);
            display: flex;
            flex-direction: column;
            transition: max-width 0.3s ease;
        }

        @media (min-width: 1024px) {
            .app-container {
                max-width: 1200px; /* Expande o container no desktop */
                padding: 40px 20px;
            }
            
            .grid-container {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)) !important; /* Distribui melhor os cards na horizontal */
            }
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 30px;
            overflow-y: auto;
            scrollbar-width: none;
        }

        main::-webkit-scrollbar {
            display: none;
        }

        .section {
            flex-shrink: 0;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 8px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .tool-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .tool-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .tool-item:active {
            transform: scale(0.95);
        }

        .icon-box {
            background-color: #fff;
            color: var(--primary-color);
            padding: 8px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .tool-item span {
            font-size: 0.85rem;
            font-weight: 500;
            color: #444;
        }

        #tool-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-ghost);
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .modal-header {
            padding: 15px 20px;
            background: var(--glass-modal);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .close-modal {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            margin-right: 15px;
        }

        #tool-iframe {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: 100%;
        }

        svg {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <main>
        <section class="section">
            <div class="category-header">
                <h2 class="section-title">Trabalho</h2>
                <i data-lucide="chevron-right"></i>
            </div>
            <div class="grid-container">
                <div class="tool-card">
                    <div class="tool-item" data-url="transcricao.html">
                        <div class="icon-box"><i data-lucide="mic"></i></div>
                        <span>Transcrição</span>
                    </div>
                    <div class="tool-item" data-url="traducao.html">
                        <div class="icon-box"><i data-lucide="languages"></i></div>
                        <span>Tradução</span>
                    </div>
                    <div class="tool-item" data-url="pdf.html">
                        <div class="icon-box"><i data-lucide="file-text"></i></div>
                        <span>PDF</span>
                    </div>
                </div>
                <div class="tool-card">
                    <div class="tool-item" data-url="texto.html">
                        <div class="icon-box"><i data-lucide="type"></i></div>
                        <span>Editor de Texto</span>
                    </div>
                    <div class="tool-item" data-url="imagem.html">
                        <div class="icon-box"><i data-lucide="image"></i></div>
                        <span>Editor de Imagem</span>
                    </div>
                    <div class="tool-item" data-url="video.html">
                        <div class="icon-box"><i data-lucide="video"></i></div>
                        <span>Editor de Vídeo</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="category-header">
                <h2 class="section-title">Arte</h2>
                <i data-lucide="chevron-right"></i>
            </div>
            <div class="grid-container">
                <div class="tool-card">
                    <div class="tool-item" data-url="desenho.html">
                        <div class="icon-box"><i data-lucide="pen-tool"></i></div>
                        <span>Desenho</span>
                    </div>
                    <div class="tool-item" data-url="animacao.html">
                        <div class="icon-box"><i data-lucide="clapperboard"></i></div>
                        <span>Animação</span>
                    </div>
                    <div class="tool-item" data-url="modelagem.html">
                        <div class="icon-box"><i data-lucide="box"></i></div>
                        <span>Modelagem 3D</span>
                    </div>
                </div>
                <div class="tool-card">
                    <div class="tool-item" data-url="stick.html">
                        <div class="icon-box"><i data-lucide="sticker"></i></div>
                        <span>Stick</span>
                    </div>
                    <div class="tool-item" data-url="gif.html">
                        <div class="icon-box"><i data-lucide="file-video"></i></div>
                        <span>GIF</span>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>

<div id="tool-modal">
    <div class="modal-header">
        <button class="close-modal" onclick="closeTool()"><i data-lucide="arrow-left"></i></button>
        <span id="modal-title" style="font-weight: 700;">Ferramenta</span>
    </div>
    <iframe id="tool-iframe" src=""></iframe>
</div>

<script>
    lucide.createIcons();

    const modal = document.getElementById('tool-modal');
    const iframe = document.getElementById('tool-iframe');
    const modalTitle = document.getElementById('modal-title');

    document.querySelectorAll('.tool-item').forEach(item => {
        item.addEventListener('click', () => {
            const url = item.getAttribute('data-url');
            const name = item.querySelector('span').innerText;
            
            if(url) {
                modalTitle.innerText = name;
                iframe.src = url;
                modal.style.display = 'flex';
            }
        });
    });

    function closeTool() {
        modal.style.display = 'none';
        iframe.src = '';
    }


   /*/animation */      
        window.onscroll = function() {
                   window.parent.postMessage({
                       type: 'iframeScroll',
                       scrollTop: window.pageYOffset || document.documentElement.scrollTop
                   }, '*');
               };
</script>
</body>
</html>
