<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoreWiki-Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --blueviolet-color: #8a2be2;
            --ghost-color: #f8f8ff;
        }

        body {
            background-color: var(--ghost-color);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .lista-container { max-width: 600px; margin: auto; }

        .search-wrapper { margin-bottom: 20px; position: relative; display: flex; align-items: center; }
        .search-bar {
            width: 100%;
            padding: 12px 45px 12px 20px;
            border-radius: 25px;
            border: 1px solid var(--blueviolet-color);
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            outline: none;
            box-sizing: border-box;
            font-size: 16px;
            color: var(--blueviolet-color);
        }
        .search-bar::placeholder { color: var(--blueviolet-color); opacity: 0.7; }

        #clear-btn {
            position: absolute;
            right: 15px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--blueviolet-color);
            display: none;
            font-size: 18px;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.2s;
            cursor: pointer;
        }

        .item-card:hover { background: rgba(255, 255, 255, 0.7); box-shadow: 0 0 10px var(--blueviolet-color); }
        .item-card img { width: 80px; height: 120px; border-radius: 8px; object-fit: cover; }

        .info { flex-grow: 1; }
        .info h3 { margin: 0 0 5px 0; font-size: 16px; color: var(--blueviolet-color); }
        .info p { margin: 0; font-size: 13px; color: #555; }

        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: var(--ghost-color);
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .fechar-btn { font-size: 24px; cursor: pointer; color: var(--blueviolet-color); margin-bottom: 20px; display: block; }
        
        .idiomas-container, .motores-container, .streamings-lista, .detalhes-container, .musicas-container { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        
        .btn-idioma, .btn-motor, .btn-stream {
            padding: 5px 10px;
            border: 1px solid var(--blueviolet-color);
            background: rgba(255, 255, 255, 0.5);
            border-radius: 5px;
            cursor: pointer;
            color: var(--blueviolet-color);
            text-decoration: none;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-idioma.ativo { background: var(--blueviolet-color); color: white; }

        .sugestoes-container { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        .sugestao-item { display: flex; align-items: center; gap: 10px; cursor: pointer; background: rgba(255, 255, 255, 0.3); padding: 8px; border-radius: 8px; }
        .sugestao-item img { width: 50px; height: 75px; border-radius: 4px; object-fit: cover; border: 1px solid var(--blueviolet-color); }
        .sugestao-item p { font-size: 13px; color: var(--blueviolet-color); margin: 0; }

        .musicas-container { overflow-x: auto; flex-wrap: nowrap; }
        .musica-item { flex: 0 0 auto; width: 100px; text-align: center; cursor: pointer; position: relative; }
        .musica-item img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 1px solid var(--blueviolet-color); }
        .musica-item p { font-size: 10px; color: var(--blueviolet-color); margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .detalhes-container { flex-direction: column; font-size: 14px; color: var(--blueviolet-color); background: rgba(255, 255, 255, 0.3); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="lista-container">
        <div class="search-wrapper">
            <input type="text" id="search" class="search-bar" placeholder="Buscar jogos..." 
                   oninput="toggleClearButton()" 
                   onkeypress="if(event.key==='Enter') buscarJogo()">
            <button id="clear-btn" onclick="limparBusca()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div id="lista"></div>
    </div>

    <div id="modal">
        <i class="fa-solid fa-arrow-left fechar-btn" onclick="fecharModal()"></i>
        <div id="modal-conteudo"></div>
    </div>

    <script>
        const OMDb_URL = 'https://www.omdbapi.com/?apikey=thewdb'; // Mantido como base funcional
        let jogoAtual = null;
        let playerAtual = new Audio();

        async function carregarLista(query = 'zelda') {
            const container = document.getElementById('lista');
            container.innerHTML = '<p>Carregando...</p>';
            const url = query ? `${OMDb_URL}&s=${encodeURIComponent(query)}&type=game` : `${OMDb_URL}&s=mario&type=game`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                container.innerHTML = '';
                if (data.Search) {
                    data.Search.slice(0, 10).forEach(jogo => {
                        const item = document.createElement('div');
                        item.className = 'item-card';
                        item.onclick = () => abrirModal(jogo);
                        item.innerHTML = `
                            <img src="${jogo.Poster !== 'N/A' ? jogo.Poster : 'https://via.placeholder.com/80x120?text=Sem+Imagem'}" alt="${jogo.Title}">
                            <div class="info">
                                <h3>${jogo.Title}</h3>
                                <p>${jogo.Year}</p>
                            </div>
                        `;
                        container.appendChild(item);
                    });
                }
            } catch (e) { container.innerHTML = '<p>Erro ao conectar.</p>'; }
        }

        function tocarPrevia(url) {
            if (playerAtual.src === url && !playerAtual.paused) {
                playerAtual.pause();
            } else {
                playerAtual.src = url;
                playerAtual.play();
            }
        }

        async function abrirModal(jogo, lang = 'pt') {
            jogoAtual = jogo;
            document.getElementById('modal').style.display = 'block';
            const modalConteudo = document.getElementById('modal-conteudo');
            modalConteudo.innerHTML = `<h1>${jogo.Title}</h1><p>Carregando...</p>`;
            
            let sinopse = 'Informações não disponíveis.';
            let sugestoesHtml = '';
            let extraInfo = '';
            let musicasHtml = '';
            
            try {
                const infoRes = await fetch(`${OMDb_URL}&i=${jogo.imdbID}&plot=full`);
                const infoData = await infoRes.json();
                extraInfo = `
                    <div class="detalhes-container">
                        <span><strong>Desenvolvedora:</strong> ${infoData.Director || 'N/A'}</span>
                        <span><strong>Gênero:</strong> ${infoData.Genre}</span>
                        <span><strong>Nota:</strong> ${infoData.imdbRating}</span>
                        <span><strong>Lançamento:</strong> ${infoData.Released}</span>
                    </div>
                `;

                const itunesRes = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(jogo.Title)}&media=music&limit=6`);
                const itunesData = await itunesRes.json();
                musicasHtml = itunesData.results.map(m => `
                    <div class="musica-item" onclick="tocarPrevia('${m.previewUrl}')">
                        <img src="${m.artworkUrl100}" alt="${m.trackName}">
                        <p>${m.trackName}</p>
                    </div>
                `).join('');

                const wikiRes = await fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(jogo.Title)}`);
                const wikiData = await wikiRes.json();
                if (wikiData.extract) sinopse = wikiData.extract;

                const sugRes = await fetch(`${OMDb_URL}&s=${jogo.Title.substring(0, 3)}&type=game`);
                const sugData = await sugRes.json();
                if (sugData.Search) {
                    sugestoesHtml = sugData.Search.slice(0, 6).map(s => `
                        <div class="sugestao-item" onclick="abrirModal(${JSON.stringify(s).replace(/"/g, '&quot;')})">
                            <img src="${s.Poster !== 'N/A' ? s.Poster : 'https://via.placeholder.com/50x75'}" alt="${s.Title}">
                            <p>${s.Title}</p>
                        </div>
                    `).join('');
                }
            } catch (e) {}
            
            modalConteudo.innerHTML = `
                <h1 style="color: var(--blueviolet-color);">${jogo.Title}</h1>
                <img src="${jogo.Poster !== 'N/A' ? jogo.Poster : ''}" style="width:100%; border-radius:15px; margin-bottom:15px;">
                
                <div class="streamings-lista">
                    <a href="https://store.steampowered.com/search/?term=${encodeURIComponent(jogo.Title)}" target="_blank" class="btn-stream">Steam</a>
                    <a href="https://www.epicgames.com/store/pt-BR/browse?q=${encodeURIComponent(jogo.Title)}" target="_blank" class="btn-stream">Epic Games</a>
                    <a href="https://www.xbox.com/pt-BR/search?q=${encodeURIComponent(jogo.Title)}" target="_blank" class="btn-stream">Xbox</a>
                </div>

                <p><strong>Ano:</strong> ${jogo.Year}</p>
                <div class="idiomas-container">
                    <button class="btn-idioma ${lang === 'pt' ? 'ativo' : ''}" onclick="abrirModal(jogoAtual, 'pt')">PT</button>
                    <button class="btn-idioma ${lang === 'en' ? 'ativo' : ''}" onclick="abrirModal(jogoAtual, 'en')">EN</button>
                    <button class="btn-idioma ${lang === 'es' ? 'ativo' : ''}" onclick="abrirModal(jogoAtual, 'es')">ES</button>
                </div>
                <p><strong>Sobre:</strong> ${sinopse}</p>
                
                <p style="font-size: 12px; color: var(--blueviolet-color);">Sugestões:</p>
                <div class="sugestoes-container">${sugestoesHtml}</div>
                
                <hr style="border: 0; border-top: 1px solid var(--blueviolet-color); margin: 20px 0;">
                
                <div class="motores-container">
                    <a href="https://www.google.com/search?q=${encodeURIComponent(jogo.Title)}" target="_blank" class="btn-motor">Google</a>
                    <a href="https://www.bing.com/search?q=${encodeURIComponent(jogo.Title)}" target="_blank" class="btn-motor">Bing</a>
                    <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(jogo.Title)}" target="_blank" class="btn-motor">YouTube</a>
                    <a href="https://www.twitch.tv/search?term=${encodeURIComponent(jogo.Title)}" target="_blank" class="btn-motor">Twitch</a>
                </div>
                
                ${extraInfo}
                
                <p style="font-size: 12px; color: var(--blueviolet-color); margin-top: 20px;">Trilha Sonora (Toque para ouvir):</p>
                <div class="musicas-container">${musicasHtml}</div>
            `;
        }

        function toggleClearButton() { document.getElementById('clear-btn').style.display = document.getElementById('search').value.length > 0 ? 'block' : 'none'; }
        function limparBusca() { document.getElementById('search').value = ''; toggleClearButton(); carregarLista('zelda'); }
        function buscarJogo() { carregarLista(document.getElementById('search').value); }
        function fecharModal() { playerAtual.pause(); document.getElementById('modal').style.display = 'none'; }
        carregarLista();
    </script>
</body>
</html>
