<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoreWiki-Séries</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --blueviolet-color: #8a2be2;
            --ghost-color: #f8f8ff;
        }

        body {
            background-color: var(--ghost-color);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .lista-container { max-width: 600px; margin: auto; }

        .search-wrapper { margin-bottom: 20px; position: relative; display: flex; align-items: center; }
        .search-bar {
            width: 100%;
            padding: 12px 45px 12px 20px;
            border-radius: 25px;
            border: 1px solid var(--blueviolet-color);
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            outline: none;
            box-sizing: border-box;
            font-size: 16px;
            color: var(--blueviolet-color);
        }
        .search-bar::placeholder { color: var(--blueviolet-color); opacity: 0.7; }

        #clear-btn {
            position: absolute;
            right: 15px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--blueviolet-color);
            display: none;
            font-size: 18px;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.2s;
            cursor: pointer;
        }

        .item-card:hover { background: rgba(255, 255, 255, 0.7); box-shadow: 0 0 10px var(--blueviolet-color); }
        .item-card img { width: 80px; height: 120px; border-radius: 8px; object-fit: cover; }

        .info { flex-grow: 1; }
        .info h3 { margin: 0 0 5px 0; font-size: 16px; color: var(--blueviolet-color); }
        .info p { margin: 0; font-size: 13px; color: #555; }

        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: var(--ghost-color);
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .fechar-btn { font-size: 24px; cursor: pointer; color: var(--blueviolet-color); margin-bottom: 20px; display: block; }
        
        .idiomas-container, .motores-container, .streaming-container, .elenco-container, .sugestoes-container { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .btn-idioma, .btn-motor, .btn-streaming {
            padding: 5px 10px;
            border: 1px solid var(--blueviolet-color);
            background: rgba(255, 255, 255, 0.5);
            border-radius: 5px;
            cursor: pointer;
            color: var(--blueviolet-color);
            text-decoration: none;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-motor img, .btn-streaming img { width: 16px; height: 16px; }
        .btn-idioma.ativo { background: var(--blueviolet-color); color: white; }
        
        .musicas-container { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; margin-top: 15px; }
        .musica-item { flex: 0 0 auto; width: 100px; text-align: center; cursor: pointer; }
        .musica-item img { width: 80px; height: 80px; border-radius: 8px; display: block; margin: auto; }
        .musica-item p { font-size: 10px; color: var(--blueviolet-color); margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .elenco-container, .sugestoes-container { overflow-x: auto; flex-wrap: nowrap; }
        .elenco-item { flex: 0 0 auto; width: 80px; text-align: center; font-size: 11px; color: var(--blueviolet-color); cursor: pointer; }
        .elenco-item img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; display: block; margin: auto; border: 1px solid var(--blueviolet-color); }
        
        /* Novos estilos para Sugestões */
        .sugestao-item { flex: 0 0 auto; width: 100px; text-align: center; cursor: pointer; }
        .sugestao-item img { width: 100px; height: 150px; border-radius: 8px; object-fit: cover; border: 1px solid var(--blueviolet-color); }
        .sugestao-item p { font-size: 11px; color: var(--blueviolet-color); margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <div class="lista-container">
        <div class="search-wrapper">
            <input type="text" id="search" class="search-bar" placeholder="Buscar séries..." 
                   oninput="toggleClearButton()" 
                   onkeypress="if(event.key==='Enter') buscarSerie()">
            <button id="clear-btn" onclick="limparBusca()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div id="lista"></div>
    </div>

    <div id="modal">
        <i class="fa-solid fa-arrow-left fechar-btn" onclick="fecharModal()"></i>
        <div id="modal-conteudo"></div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        let serieAtual = null;

        async function carregarLista(query = '') {
            const container = document.getElementById('lista');
            container.innerHTML = '<p>Carregando...</p>';
            
            const url = query ? 
                `https://api.tvmaze.com/search/shows?q=${encodeURIComponent(query)}` : 
                `https://api.tvmaze.com/shows`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                container.innerHTML = '';
                
                const resultados = query ? data.map(item => item.show) : data.slice(0, 10);

                resultados.forEach(serie => {
                    const item = document.createElement('div');
                    item.className = 'item-card';
                    item.onclick = () => abrirModal(serie);
                    item.innerHTML = `
                        <img src="${serie.image?.medium || 'https://via.placeholder.com/80x120?text=Sem+Imagem'}" alt="${serie.name}">
                        <div class="info">
                            <h3>${serie.name}</h3>
                            <p>${serie.genres ? serie.genres.join(', ') : 'Gênero indisponível'}</p>
                        </div>
                    `;
                    container.appendChild(item);
                });
            } catch (e) { container.innerHTML = '<p>Erro ao conectar com servidor.</p>'; }
        }

        function tocarPrevia(url) {
            const player = document.getElementById('audio-player');
            player.src = url;
            player.play();
        }

        function toggleClearButton() {
            document.getElementById('clear-btn').style.display = document.getElementById('search').value.length > 0 ? 'block' : 'none';
        }

        function limparBusca() {
            document.getElementById('search').value = '';
            toggleClearButton();
            carregarLista();
        }

        function buscarSerie() { carregarLista(document.getElementById('search').value); }

        async function abrirModal(serie, lang = 'pt') {
            serieAtual = serie;
            const modal = document.getElementById('modal');
            modal.style.display = 'block';
            
            document.getElementById('modal-conteudo').innerHTML = `
                <h1 style="color: var(--blueviolet-color);">${serie.name}</h1>
                <p>Carregando dados...</p>
            `;

            let artigoWikipedia = 'Sinopse não disponível.';
            let musicasHtml = '<p>Carregando trilha sonora...</p>';
            let elencoHtml = '<p>Carregando elenco...</p>';
            let sugestoesHtml = '<p>Carregando sugestões...</p>';
            
            try {
                const wikiRes = await fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(serie.name)}`);
                const wikiData = await wikiRes.json();
                if (wikiData.extract) artigoWikipedia = wikiData.extract;
            } catch (e) {}

            try {
                const castRes = await fetch(`https://api.tvmaze.com/shows/${serie.id}/cast`);
                const castData = await castRes.json();
                elencoHtml = castData.length > 0 
                    ? castData.slice(0, 8).map(c => `
                        <div class="elenco-item" onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(c.person.name)}', '_blank')">
                            <img src="${c.person.image?.medium || 'https://via.placeholder.com/60?text=?'}" alt="${c.person.name}">
                            <span>${c.person.name}</span>
                        </div>
                    `).join('') 
                    : 'Elenco não disponível.';
            } catch (e) { elencoHtml = 'Erro ao carregar elenco.'; }

            try {
                const musicRes = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(serie.name)}&media=music&limit=6`);
                const musicData = await musicRes.json();
                if (musicData.results.length > 0) {
                    musicasHtml = musicData.results.map(m => `
                        <div class="musica-item" onclick="tocarPrevia('${m.previewUrl}')">
                            <img src="${m.artworkUrl100}">
                            <p>${m.trackName || m.collectionName}</p>
                        </div>
                    `).join('');
                }
            } catch (e) {}

            // Lógica para sugestões (usando uma lista aleatória da TVMaze)
            try {
                const sugRes = await fetch(`https://api.tvmaze.com/shows`);
                const sugData = await sugRes.json();
                sugestoesHtml = sugData.sort(() => 0.5 - Math.random()).slice(0, 6).map(s => `
                    <div class="sugestao-item" onclick="abrirModal(${JSON.stringify(s).replace(/"/g, '&quot;')})">
                        <img src="${s.image?.medium || 'https://via.placeholder.com/100x150'}" alt="${s.name}">
                        <p>${s.name}</p>
                    </div>
                `).join('');
            } catch (e) { sugestoesHtml = 'Sugestões não disponíveis.'; }

            document.getElementById('modal-conteudo').innerHTML = `
                <h1 style="color: var(--blueviolet-color);">${serie.name}</h1>
                <img src="${serie.image?.original || ''}" style="width:100%; border-radius:15px; margin-bottom:15px;">
                <p><strong>Gênero:</strong> ${serie.genres?.join(', ') || 'N/A'}</p>
                <div class="idiomas-container">
                    <button class="btn-idioma ${lang === 'pt' ? 'ativo' : ''}" onclick="abrirModal(serieAtual, 'pt')">PT</button>
                    <button class="btn-idioma ${lang === 'en' ? 'ativo' : ''}" onclick="abrirModal(serieAtual, 'en')">EN</button>
                    <button class="btn-idioma ${lang === 'es' ? 'ativo' : ''}" onclick="abrirModal(serieAtual, 'es')">ES</button>
                </div>
                <p><strong>Sobre:</strong> ${artigoWikipedia}</p>
                <hr style="border: 0; border-top: 1px solid var(--blueviolet-color); margin: 20px 0;">
                <p style="font-size: 12px; color: var(--blueviolet-color);">Pesquisar em:</p>
                <div class="motores-container">
                    <a href="https://www.google.com/search?q=${encodeURIComponent(serie.name)}" target="_blank" class="btn-motor"><i class="fa-brands fa-google"></i> Google</a>
                    <a href="https://www.bing.com/search?q=${encodeURIComponent(serie.name)}" target="_blank" class="btn-motor"><i class="fa-brands fa-microsoft"></i> Bing</a>
                    <a href="https://duckduckgo.com/?q=${encodeURIComponent(serie.name)}" target="_blank" class="btn-motor"><i class="fa-solid fa-magnifying-glass"></i> DuckDuckGo</a>
                </div>
                <hr style="border: 0; border-top: 1px solid var(--blueviolet-color); margin: 20px 0;">
                <p style="font-size: 12px; color: var(--blueviolet-color);">Trilha Sonora (Clique para tocar):</p>
                <div class="musicas-container">${musicasHtml}</div>
                <hr style="border: 0; border-top: 1px solid var(--blueviolet-color); margin: 20px 0;">
                <p style="font-size: 12px; color: var(--blueviolet-color);">Streamings de Música:</p>
                <div class="streaming-container">
                    <a href="https://open.spotify.com/search/${encodeURIComponent(serie.name)}" target="_blank" class="btn-streaming"><i class="fa-brands fa-spotify"></i> Spotify</a>
                    <a href="https://music.apple.com/search?term=${encodeURIComponent(serie.name)}" target="_blank" class="btn-streaming"><i class="fa-brands fa-apple"></i> Apple Music</a>
                    <a href="https://deezer.com/search/${encodeURIComponent(serie.name)}" target="_blank" class="btn-streaming"><i class="fa-solid fa-music"></i> Deezer</a>
                </div>
                <hr style="border: 0; border-top: 1px solid var(--blueviolet-color); margin: 20px 0;">
                <p style="font-size: 12px; color: var(--blueviolet-color);">Streamings de Filmes e Séries:</p>
                <div class="streaming-container">
                    <a href="https://www.netflix.com/search?q=${encodeURIComponent(serie.name)}" target="_blank" class="btn-streaming"><i class="fa-brands fa-netflix"></i> Netflix</a>
                    <a href="https://www.primevideo.com/search?phrase=${encodeURIComponent(serie.name)}" target="_blank" class="btn-streaming"><i class="fa-brands fa-amazon"></i> Prime Video</a>
                    <a href="https://www.max.com/search?q=${encodeURIComponent(serie.name)}" target="_blank" class="btn-streaming"><i class="fa-solid fa-play"></i> Max</a>
                    <a href="https://www.disneyplus.com/search?q=${encodeURIComponent(serie.name)}" target="_blank" class="btn-streaming"><i class="fa-solid fa-circle-play"></i> Disney+</a>
                </div>
                <hr style="border: 0; border-top: 1px solid var(--blueviolet-color); margin: 20px 0;">
                <p style="font-size: 12px; color: var(--blueviolet-color);">Elenco:</p>
                <div class="elenco-container">${elencoHtml}</div>
                <hr style="border: 0; border-top: 1px solid var(--blueviolet-color); margin: 20px 0;">
                <p style="font-size: 12px; color: var(--blueviolet-color);">Sugestões de outras séries:</p>
                <div class="sugestoes-container">${sugestoesHtml}</div>
            `;
        }

        function fecharModal() { 
            document.getElementById('modal').style.display = 'none';
            document.getElementById('audio-player').pause(); 
        }

        carregarLista();
    </script>
</body>
</html>
