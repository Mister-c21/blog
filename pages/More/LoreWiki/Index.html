<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoreWiki</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #8a2be2;
            --bg: #f7f7fc;
            --glass: rgba(255, 255, 255, 0.7);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: #1a1a1a; }

        .header { height: 50px; background: rgba(138, 43, 226, 0.05); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid rgba(138, 43, 226, 0.1); }
        .header h1 { font-size: 18px; color: var(--primary); flex: 1; text-align: center; }
        .header a { text-decoration: none; color: var(--primary); font-size: 20px; }

        #iframe-modal {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg); backdrop-filter: blur(20px);
            transform: translateY(100%);
            transition: var(--transition);
            display: flex; flex-direction: column;
            border-radius: 24px 24px 0 0;
            pointer-events: none;
        }
        #iframe-modal.active { transform: translateY(0); pointer-events: auto; }

        #modal-drag-handle { height: 40px; display: flex; align-items: center; justify-content: center; cursor: grab; touch-action: none; }
        .drag-pill { width: 48px; height: 6px; background: rgba(138, 43, 226, 0.2); border-radius: 9999px; }

        .top-tab-container { width: 100%; background: var(--bg); border-bottom: 1px solid rgba(138, 43, 226, 0.1); overflow-x: auto; scrollbar-width: none; }
        .tab-list { display: flex; align-items: center; gap: 20px; padding: 0 20px; list-style: none; position: relative; }
        .tab-item { padding: 14px 4px; font-weight: 600; color: #999; cursor: pointer; transition: var(--transition); white-space: nowrap; }
        .tab-item.active { color: var(--primary); }
        .tab-indicator { position: absolute; bottom: 0; height: 3px; background-color: var(--primary); border-radius: 2px; transition: var(--transition); }

        .window-wrapper { flex: 1; width: 100%; overflow: hidden; }
        .tabs-view-pager { display: flex; width: 500%; height: 100%; transition: var(--transition); }
        .tab-page { width: 20%; height: 100%; }
        .content-iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="iframe-modal">
        <div id="modal-drag-handle"><div class="drag-pill"></div></div>
        <iframe id="main-iframe" src=""></iframe>
    </div>

    <header class="header">
        <a href="../../../index.html"><i class="fas fa-arrow-left"></i></a>
        <h1>LoreWiki</h1>
        <div style="width: 20px;"></div>
    </header>

    <nav class="top-tab-container">
        <div class="tab-list" id="tab-list">
            <div class="tab-item active" onclick="switchTab(0)">Animes</div>
            <div class="tab-item" onclick="switchTab(1)">Games</div>
            <div class="tab-item" onclick="switchTab(2)">Séries</div>
            <div class="tab-item" onclick="switchTab(3)">Filmes</div>
            <div class="tab-item" onclick="switchTab(4)">Livros</div>
            <div class="tab-indicator" id="indicator"></div>
        </div>
    </nav>

    <div class="window-wrapper">
        <div class="tabs-view-pager" id="view-pager">
            <div class="tab-page"><iframe class="content-iframe" src="./Themes/Animes.html"></iframe></div>
            <div class="tab-page"><iframe class="content-iframe" src="./Themes/Games.html"></iframe></div>
            <div class="tab-page"><iframe class="content-iframe" src="./Themes/Series.html"></iframe></div>
            <div class="tab-page"><iframe class="content-iframe" src="./Themes/Filmes.html"></iframe></div>
            <div class="tab-page"><iframe class="content-iframe" src="./Themes/Livros.html"></iframe></div>
        </div>
    </div>

    <script>
        const iframeModal = document.getElementById('iframe-modal');
        const pager = document.getElementById('view-pager');
        const tabs = document.querySelectorAll('.tab-item');
        const indicator = document.getElementById('indicator');
        let touchStartY = 0;

        function switchTab(index) {
            tabs.forEach((t, i) => t.classList.toggle('active', i === index));
            const activeTab = tabs[index];
            indicator.style.width = `${activeTab.offsetWidth}px`;
            indicator.style.left = `${activeTab.offsetLeft}px`;
            pager.style.transform = `translateX(-${index * 20}%)`;
        }

        // Modal Touch Gestures
        iframeModal.addEventListener('touchstart', (e) => touchStartY = e.touches[0].clientY, { passive: true });
        iframeModal.addEventListener('touchmove', (e) => {
            const diff = e.touches[0].clientY - touchStartY;
            if (diff > 0) iframeModal.style.transform = `translateY(${diff}px)`;
        }, { passive: true });

        iframeModal.addEventListener('touchend', (e) => {
            const diff = e.changedTouches[0].clientY - touchStartY;
            if (diff > 100) {
                iframeModal.classList.remove('active');
                iframeModal.style.transform = 'translateY(100%)';
            } else {
                iframeModal.style.transform = 'translateY(0)';
            }
        }, { passive: true });

        window.onload = () => switchTab(0);
    </script>
</body>
</html>
