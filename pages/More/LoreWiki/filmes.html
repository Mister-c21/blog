
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoreWiki-Filmes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --blueviolet-color: #8a2be2;
            --ghost-color: #f8f8ff;
        }

        body {
            background-color: var(--ghost-color);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .lista-container { max-width: 600px; margin: auto; }

        .search-wrapper { margin-bottom: 20px; position: relative; display: flex; align-items: center; }
        
        /* Ícone de voltar */
        .arrow-back-icon {
            color: var(--blueviolet-color);
            font-size: 20px;
            margin-right: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .arrow-back-icon:hover {
            transform: scale(1.1);
        }

        .search-bar {
            width: 100%;
            padding: 12px 45px 12px 20px;
            border-radius: 25px;
            border: 1px solid var(--blueviolet-color);
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            outline: none;
            box-sizing: border-box;
            font-size: 16px;
            color: var(--blueviolet-color);
        }
        .search-bar::placeholder { color: var(--blueviolet-color); opacity: 0.7; }

        #clear-btn {
            position: absolute;
            right: 15px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--blueviolet-color);
            display: none;
            font-size: 18px;
        }

        /* Container de Abas Estilo TikTok */
        .tiktok-tabs-container {
            display: flex;
            gap: 25px;
            overflow-x: auto;
            padding: 5px 0 10px 0;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(138, 43, 226, 0.15);
            scrollbar-width: none;
        }
        .tiktok-tabs-container::-webkit-scrollbar {
            display: none;
        }
        .tiktok-tabs-container a {
            text-decoration: none;
        }

        .tab-item {
            font-size: 16px;
            font-weight: 600;
            color: #777;
            cursor: pointer;
            white-space: nowrap;
            position: relative;
            padding-bottom: 8px;
            transition: color 0.2s;
        }
        .tab-item:hover {
            color: var(--blueviolet-color);
        }
        .tab-item.active {
            color: var(--blueviolet-color);
        }
        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 15%;
            width: 70%;
            height: 3px;
            background-color: var(--blueviolet-color);
            border-radius: 2px;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.2s;
            cursor: pointer;
        }

        .item-card:hover { background: rgba(255, 255, 255, 0.7); box-shadow: 0 0 10px var(--blueviolet-color); }
        .item-card img { width: 80px; height: 120px; border-radius: 8px; object-fit: cover; }

        .info { flex-grow: 1; }
        .info h3 { margin: 0 0 5px 0; font-size: 16px; color: var(--blueviolet-color); }
        .info p { margin: 0; font-size: 13px; color: #555; }

        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: var(--ghost-color);
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .fechar-btn { font-size: 24px; cursor: pointer; color: var(--blueviolet-color); margin-bottom: 20px; display: block; }
        
        .idiomas-container, .motores-container, .streamings-lista, .detalhes-container, .musicas-container { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        
        .btn-idioma, .btn-motor, .btn-stream {
            padding: 5px 10px;
            border: 1px solid var(--blueviolet-color);
            background: rgba(255, 255, 255, 0.5);
            border-radius: 5px;
            cursor: pointer;
            color: var(--blueviolet-color);
            text-decoration: none;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-idioma.ativo { background: var(--blueviolet-color); color: white; }

        .sugestoes-container { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        .sugestao-item { display: flex; align-items: center; gap: 10px; cursor: pointer; background: rgba(255, 255, 255, 0.3); padding: 8px; border-radius: 8px; }
        .sugestao-item img { width: 50px; height: 75px; border-radius: 4px; object-fit: cover; border: 1px solid var(--blueviolet-color); }
        .sugestao-item p { font-size: 13px; color: var(--blueviolet-color); margin: 0; }

        .musicas-container { overflow-x: auto; flex-wrap: nowrap; }
        .musica-item { flex: 0 0 auto; width: 100px; text-align: center; cursor: pointer; position: relative; }
        .musica-item img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 1px solid var(--blueviolet-color); }
        .musica-item p { font-size: 10px; color: var(--blueviolet-color); margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .detalhes-container { flex-direction: column; font-size: 14px; color: var(--blueviolet-color); background: rgba(255, 255, 255, 0.3); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="lista-container">
        <div class="search-wrapper">
            <a href="../../../index.html"><i class="fa-solid fa-arrow-left arrow-back-icon"></i></a>
            <input type="text" id="search" class="search-bar" placeholder="Buscar filmes..." 
                   oninput="toggleClearButton()" 
                   onkeypress="if(event.key==='Enter') buscarFilme()">
            <button id="clear-btn" onclick="limparBusca()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div class="tiktok-tabs-container">
            <a href="Index.html"><div class="tab-item">Animes</div></a>
            <a href="series.html"><div class="tab-item">Series</div></a>
            <a><div class="tab-item active">Filmes</div></a>
            <a href="livros.html"><div class="tab-item">Livros</div></a>
            <a href="games.html"><div class="tab-item">Games</div></a>
        </div>

        <div id="lista"></div>
    </div>

    <div id="modal">
        <i class="fa-solid fa-arrow-left fechar-btn" onclick="fecharModal()"></i>
        <div id="modal-conteudo"></div>
    </div>

    <script>
        const OMDb_URL = 'https://www.omdbapi.com/?apikey=thewdb';
        let filmeAtual = null;
        let playerAtual = new Audio();

        async function carregarLista(query = 'batman') {
            const container = document.getElementById('lista');
            container.innerHTML = '<p>Carregando...</p>';
            const url = query ? `${OMDb_URL}&s=${encodeURIComponent(query)}&type=movie` : `${OMDb_URL}&s=action&type=movie`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                container.innerHTML = '';
                if (data.Search) {
                    data.Search.slice(0, 10).forEach(filme => {
                        const item = document.createElement('div');
                        item.className = 'item-card';
                        item.onclick = () => abrirModal(filme);
                        item.innerHTML = `
                            <img src="${filme.Poster !== 'N/A' ? filme.Poster : 'https://via.placeholder.com/80x120?text=Sem+Imagem'}" alt="${filme.Title}">
                            <div class="info">
                                <h3>${filme.Title}</h3>
                                <p>${filme.Year}</p>
                            </div>
                        `;
                        container.appendChild(item);
                    });
                }
            } catch (e) { container.innerHTML = '<p>Erro ao conectar.</p>'; }
        }

        function tocarPrevia(url) {
            if (playerAtual.src === url && !playerAtual.paused) {
                playerAtual.pause();
            } else {
                playerAtual.src = url;
                playerAtual.play();
            }
        }

        async function abrirModal(filme, lang = 'pt') {
            filmeAtual = filme;
            document.getElementById('modal').style.display = 'block';
            const modalConteudo = document.getElementById('modal-conteudo');
            modalConteudo.innerHTML = `<h1>${filme.Title}</h1><p>Carregando...</p>`;
            
            let sinopse = 'Sinopse não disponível.';
            let sugestoesHtml = '';
            let extraInfo = '';
            let musicasHtml = '';
            
            try {
                const infoRes = await fetch(`${OMDb_URL}&i=${filme.imdbID}&plot=full`);
                const infoData = await infoRes.json();
                extraInfo = `
                    <div class="detalhes-container">
                        <span><strong>Diretor:</strong> ${infoData.Director}</span>
                        <span><strong>Gênero:</strong> ${infoData.Genre}</span>
                        <span><strong>Nota IMDb:</strong> ${infoData.imdbRating}</span>
                        <span><strong>Duração:</strong> ${infoData.Runtime}</span>
                    </div>
                `;

                const itunesRes = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(filme.Title)}&media=music&limit=6`);
                const itunesData = await itunesRes.json();
                musicasHtml = itunesData.results.map(m => `
                    <div class="musica-item" onclick="tocarPrevia('${m.previewUrl}')">
                        <img src="${m.artworkUrl100}" alt="${m.trackName}">
                        <p>${m.trackName}</p>
                    </div>
                `).join('');

                const wikiRes = await fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(filme.Title)}`);
                const wikiData = await wikiRes.json();
                if (wikiData.extract) sinopse = wikiData.extract;

                const sugRes = await fetch(`${OMDb_URL}&s=${filme.Title.substring(0, 3)}&type=movie`);
                const sugData = await sugRes.json();
                if (sugData.Search) {
                    window.sugestoesAtuais = sugData.Search.slice(0, 6);
                    sugestoesHtml = window.sugestoesAtuais.map((s, index) => `
                        <div class="sugestao-item" onclick="abrirModal(window.sugestoesAtuais[${index}])">
                            <img src="${s.Poster !== 'N/A' ? s.Poster : 'https://via.placeholder.com/50x75'}" alt="${s.Title}">
                            <p>${s.Title}</p>
                        </div>
                    `).join('');
                }
            } catch (e) {}
            
            modalConteudo.innerHTML = `
                <h1 style="color: var(--blueviolet-color);">${filme.Title}</h1>
                <img src="${filme.Poster !== 'N/A' ? filme.Poster : ''}" style="width:100%; border-radius:15px; margin-bottom:15px;">
                
                <div class="streamings-lista">
                    <a href="https://www.netflix.com/search?q=${encodeURIComponent(filme.Title)}" target="_blank" class="btn-stream">Netflix</a>
                    <a href="https://www.primevideo.com/search?phrase=${encodeURIComponent(filme.Title)}" target="_blank" class="btn-stream">Prime Video</a>
                    <a href="https://www.disneyplus.com/search?q=${encodeURIComponent(filme.Title)}" target="_blank" class="btn-stream">Disney+</a>
                </div>

                <p><strong>Ano:</strong> ${filme.Year}</p>
                <div class="idiomas-container">
                    <button class="btn-idioma ${lang === 'pt' ? 'ativo' : ''}" onclick="abrirModal(filmeAtual, 'pt')">PT</button>
                    <button class="btn-idioma ${lang === 'en' ? 'ativo' : ''}" onclick="abrirModal(filmeAtual, 'en')">EN</button>
                    <button class="btn-idioma ${lang === 'es' ? 'ativo' : ''}" onclick="abrirModal(filmeAtual, 'es')">ES</button>
                </div>
                <p><strong>Sobre:</strong> ${sinopse}</p>
                
                <p style="font-size: 12px; color: var(--blueviolet-color);">Sugestões:</p>
                <div class="sugestoes-container">${sugestoesHtml}</div>
                
                <hr style="border: 0; border-top: 1px solid var(--blueviolet-color); margin: 20px 0;">
                
                <div class="motores-container">
                    <a href="https://www.google.com/search?q=${encodeURIComponent(filme.Title)}" target="_blank" class="btn-motor">Google</a>
                    <a href="https://www.bing.com/search?q=${encodeURIComponent(filme.Title)}" target="_blank" class="btn-motor">Bing</a>
                    <a href="https://www.baidu.com/s?wd=${encodeURIComponent(filme.Title)}" target="_blank" class="btn-motor">Baidu</a>
                    <a href="https://search.naver.com/search.naver?query=${encodeURIComponent(filme.Title)}" target="_blank" class="btn-motor">Naver</a>
                    <a href="https://yandex.com/search/?text=${encodeURIComponent(filme.Title)}" target="_blank" class="btn-motor">Yandex</a>
                </div>
                <a href="https://www.imdb.com/title/${filme.imdbID}" target="_blank" class="btn-stream" style="display:inline-block;"><i class="fa-brands fa-imdb"></i> Ver no IMDb</a>
                
                ${extraInfo}
                
                <p style="font-size: 12px; color: var(--blueviolet-color); margin-top: 20px;">Trilha Sonora (Toque para ouvir):</p>
                <div class="musicas-container">${musicasHtml}</div>
            `;
        }

        function toggleClearButton() { document.getElementById('clear-btn').style.display = document.getElementById('search').value.length > 0 ? 'block' : 'none'; }
        function limparBusca() { document.getElementById('search').value = ''; toggleClearButton(); carregarLista('batman'); }
        function buscarFilme() { carregarLista(document.getElementById('search').value); }
        function fecharModal() { playerAtual.pause(); document.getElementById('modal').style.display = 'none'; }
        carregarLista();
    </script>
</body>
</html>
