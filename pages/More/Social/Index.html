<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoreSpace - Social</title>
    <!-- Adicionando Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --blueviolet-color: #8a2be2;
            --ghost: #f8f8ff;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-color: #333;
        }

        body { background-color: var(--ghost); font-family: sans-serif; margin: 0; padding-top: 110px; color: var(--text-color); }

        /* --- Header --- */
        .header { position: fixed; top: 0; left: 0; width: 100%; background-color: var(--ghost); z-index: 1000; }
        .header-actions { display: flex; justify-content: space-between; padding: 10px 16px; background-color: var(--ghost); }
        .right-actions { display: flex; gap: 20px; }
        
        .action-btn { text-decoration: none; color: var(--blueviolet-color); font-size: 18px; cursor: pointer; display: flex; align-items: center; transition: all 0.2s ease; border: none; background: none; }
        
        @media (min-width: 769px) { .mobile-only { display: none; } }
        
        .action-btn:hover { opacity: 0.6; transform: scale(1.1); }
        .action-btn:focus { outline: 2px solid var(--blueviolet-color); border-radius: 4px; padding: 2px; }

        #tabBar { height: 60px; display: flex; align-items: center; padding: 0 16px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; border-bottom: 1px solid var(--glass-border); }
        .tab { text-decoration: none; color: #777; padding: 8px 16px; font-weight: 600; font-size: 15px; border-bottom: 3px solid transparent; cursor: pointer; transition: all 0.3s ease; }
        .tab:hover { color: var(--blueviolet-color); text-shadow: 0 0 8px rgba(138, 43, 226, 0.4); }
        .tab:focus { outline: none; border-bottom: 3px solid var(--blueviolet-color); }
        .tab.active { color: var(--blueviolet-color); border-bottom: 3px solid var(--blueviolet-color); }

        /* --- Feed Grid --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 10px; column-count: 2; column-gap: 12px; }
        @media (min-width: 768px) { .container { column-count: 3; } }

        .card { position: relative; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; margin-bottom: 12px; break-inside: avoid; overflow: hidden; transition: all 0.3s ease; cursor: pointer; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(138, 43, 226, 0.3), 0 0 15px rgba(138, 43, 226, 0.1); }
        .card img { width: 100%; display: block; min-height: 200px; }
        
        .card-footer { position: absolute; bottom: 0; left: 0; width: 100%; padding: 10px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); display: flex; align-items: center; gap: 8px; box-sizing: border-box; }
        .avatar { width: 24px; height: 24px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
        .username { font-size: 12px; font-weight: 600; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

        /* --- Modal de Imagem (Original) --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: transparent; width: 90%; max-width: 500px; position: relative; overflow: hidden; border-radius: 24px; }
        .modal-img { width: 100%; display: block; border-radius: 24px; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.7); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 18px; z-index: 2001; }
        
        .modal-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.6)); border-radius: 0 0 24px 24px; display: flex; align-items: center; gap: 10px; box-sizing: border-box; }
        .modal-avatar { width: 32px; height: 32px; border-radius: 50%; background: #ddd; }
        .modal-username { color: white; font-weight: 600; font-size: 14px; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

        /* --- Modal de Páginas (Novo) --- */
        .page-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 3000; }
        .page-frame { width: 100%; height: 100%; border: none; }
        .page-close { position: absolute; top: 20px; left: 20px; font-size: 30px; cursor: pointer; z-index: 3001; }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-actions">
            <a href="../../../index.html" class="action-btn" title="Voltar" tabindex="0"><i class="fas fa-arrow-left"></i></a>
            <div class="right-actions">
                <button class="action-btn" title="Perfil" onclick="openPage('./Feed/Perfil.html')"><i class="fas fa-user"></i></button>
                <button class="action-btn mobile-only" title="Postar" onclick="openPage('./Feed/Postar.html')"><i class="fas fa-plus"></i></button>
            </div>
        </div>
        <nav id="tabBar">
            <a class="tab active" data-cat="cosplay">cosplay</a>
            <a class="tab" data-cat="arte">arte</a>
            <a class="tab" data-cat="animais">animais</a>
            <a class="tab" data-cat="natureza">natureza</a>
            <a class="tab" data-cat="céu">céu</a>
            <a class="tab" data-cat="jogos">jogos</a>
        </nav>
    </header>

    <main class="container" id="feed"></main>

    <!-- Modal de Imagem -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="document.getElementById('modal').style.display='none'">✕</button>
            <img id="modalImg" class="modal-img" src="">
            <div class="modal-overlay">
                <div class="modal-avatar"></div>
                <span id="modalUsername" class="modal-username"></span>
            </div>
        </div>
    </div>

    <!-- Modal de Páginas -->
    <div class="page-modal" id="pageModal">
        <div class="page-close" onclick="document.getElementById('pageModal').style.display='none'">✕</div>
        <iframe class="page-frame" id="pageFrame" src=""></iframe>
    </div>

    <script>
        // Função para abrir páginas no novo modal
        function openPage(url) {
            document.getElementById('pageFrame').src = url;
            document.getElementById('pageModal').style.display = 'block';
        }

        const contentData = {
            "cosplay": ["Kira", "Misa"],
            "arte": ["DaVinci", "VanGogh"],
            "animais": ["Doggo", "Kitty"],
            "natureza": ["Green", "Mountain"],
            "céu": ["Blue", "Night"],
            "jogos": ["Player1", "Gamer"]
        };

        const feed = document.getElementById('feed');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modalImg');
        const modalUsername = document.getElementById('modalUsername');

        function updateFeed(category) {
            feed.innerHTML = '';
            contentData[category].forEach(user => {
                const card = document.createElement('article');
                card.className = 'card';
                const imgSrc = `https://picsum.photos/400/${300 + Math.floor(Math.random() * 200)}?random=${Math.random()}`;
                card.innerHTML = `
                    <img src="${imgSrc}">
                    <div class="card-footer">
                        <div class="avatar"></div>
                        <span class="username">${user}</span>
                    </div>`;
                card.onclick = () => {
                    modalImg.src = imgSrc;
                    modalUsername.innerText = user;
                    modal.style.display = 'flex';
                };
                feed.appendChild(card);
            });
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                updateFeed(this.dataset.cat);
            });
        });

        updateFeed("cosplay");
    </script>
</body>
</html>
