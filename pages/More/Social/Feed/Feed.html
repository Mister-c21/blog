<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed Pinterest - Orion</title>
    <style>
        :root {
            --blueviolet-color: #8a2be2;
            --ghost: #f8f8ff;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-color: #333;
        }

        body { background-color: var(--ghost); font-family: sans-serif; margin: 0; padding-top: 70px; color: var(--text-color); }

        /* --- Cabeçalho e Abas --- */
        .header { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background-color: var(--ghost); display: flex; align-items: center; padding: 0 16px; z-index: 1000; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .tab { text-decoration: none; color: #777; padding: 8px 16px; font-weight: 600; font-size: 15px; border-bottom: 3px solid transparent; cursor: pointer; transition: all 0.3s ease; }
        .tab:hover { color: var(--blueviolet-color); text-shadow: 0 0 8px rgba(138, 43, 226, 0.4); }
        .tab:focus { outline: none; border-bottom: 3px solid var(--blueviolet-color); }
        .tab.active { color: var(--blueviolet-color); border-bottom: 3px solid var(--blueviolet-color); }

        /* --- Feed Grid --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 10px; column-count: 2; column-gap: 12px; }
        @media (min-width: 768px) { .container { column-count: 3; } }

        .card { position: relative; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; margin-bottom: 12px; break-inside: avoid; overflow: hidden; transition: all 0.3s ease; cursor: pointer; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(138, 43, 226, 0.3), 0 0 15px rgba(138, 43, 226, 0.1); }
        .card:focus-within { outline: 2px solid var(--blueviolet-color); box-shadow: 0 0 20px var(--blueviolet-color); }
        .card img { width: 100%; display: block; min-height: 200px; }
        
        .card-footer { position: absolute; bottom: 0; left: 0; width: 100%; padding: 10px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); display: flex; align-items: center; gap: 8px; box-sizing: border-box; }
        .avatar { width: 24px; height: 24px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
        .username { font-size: 12px; font-weight: 600; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

        /* --- Modal --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: var(--ghost); padding: 20px; border-radius: 24px; max-width: 450px; width: 90%; position: relative; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); text-align: center; }
        .modal-img { width: 100%; border-radius: 16px; margin-bottom: 15px; }
        .modal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; justify-content: center; }
        .modal-avatar { width: 40px; height: 40px; border-radius: 50%; background: #ccc; }
        .modal-user { font-weight: 700; color: var(--blueviolet-color); margin: 0; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.1); border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="header" id="tabBar">
        <a class="tab active" data-cat="pra você">pra você</a>
        <a class="tab" data-cat="cosplay">cosplay</a>
        <a class="tab" data-cat="arte">arte</a>
        <a class="tab" data-cat="animais">animais</a>
        <a class="tab" data-cat="natureza">natureza</a>
        <a class="tab" data-cat="céu">céu</a>
        <a class="tab" data-cat="jogos">jogos</a>
    </nav>

    <main class="container" id="feed"></main>

    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="document.getElementById('modal').style.display='none'">✕</button>
            <div class="modal-header">
                <div class="modal-avatar" id="modalAvatar"></div>
                <p id="modalUser" class="modal-user"></p>
            </div>
            <img id="modalImg" class="modal-img" src="">
        </div>
    </div>

    <script>
        const contentData = {
            "pra você": ["Orion", "Dev", "Star"],
            "cosplay": ["Kira", "Misa"],
            "arte": ["DaVinci", "VanGogh"],
            "animais": ["Doggo", "Kitty"],
            "natureza": ["Green", "Mountain"],
            "céu": ["Blue", "Night"],
            "jogos": ["Player1", "Gamer"]
        };

        const feed = document.getElementById('feed');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modalImg');
        const modalUser = document.getElementById('modalUser');

        function updateFeed(category) {
            feed.innerHTML = '';
            contentData[category].forEach(user => {
                const card = document.createElement('article');
                card.className = 'card';
                card.tabIndex = 0;
                const imgSrc = `https://picsum.photos/400/${300 + Math.floor(Math.random() * 200)}?random=${Math.random()}`;
                card.innerHTML = `
                    <img src="${imgSrc}">
                    <div class="card-footer">
                        <div class="avatar"></div>
                        <span class="username">${user}</span>
                    </div>`;
                card.onclick = () => {
                    modalImg.src = imgSrc;
                    modalUser.innerText = user;
                    modal.style.display = 'flex';
                };
                feed.appendChild(card);
            });
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                updateFeed(this.dataset.cat);
            });
        });

        updateFeed("pra você");
    </script>
</body>
</html>
