<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --blueviolet: #8a2be2;
            --white-bg: #ffffff;
            --text-dark: #1a1a1a;
            --glass: rgba(138, 43, 226, 0.1);
        }

        body { background-color: var(--white-bg); color: var(--text-dark); margin: 0; font-family: sans-serif; }
        
        /* Efeitos Globais de Glow/Hover (Exceto nas tabs) */
        button:not(.tab-btn), input, .avatar, .avatar-option { transition: all 0.3s ease; }
        button:not(.tab-btn):hover, .avatar:hover, .avatar-option:hover { transform: translateY(-2px); box-shadow: 0 0 10px rgba(138, 43, 226, 0.5); }
        button:not(.tab-btn):active { transform: scale(0.95); }
        input:focus { outline: none; box-shadow: 0 0 8px var(--blueviolet); border-color: var(--blueviolet) !important; }

        .profile-page { max-width: 480px; margin: 0 auto; padding: 20px; position: relative; min-height: 100vh; }
        
        #profile-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.1; background-size: cover; background-position: center; transition: background-image 0.5s ease; }
        
        .header { display: flex; flex-direction: column; align-items: center; text-align: center; padding-bottom: 20px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--blueviolet); background: var(--blueviolet); margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .btn { background: var(--glass); border: 1px solid var(--blueviolet); color: var(--blueviolet); padding: 10px 25px; border-radius: 50px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--blueviolet); color: white; }

        .settings-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .settings-btn { background: #fdfbff; border: 1px solid var(--blueviolet); color: var(--text-dark); padding: 15px; border-radius: 50px; cursor: pointer; width: 100%; display: flex; align-items: center; gap: 15px; }
        .settings-btn i { color: var(--blueviolet); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 20px; width: 90%; max-width: 350px; overflow: hidden; position: relative; border: 1px solid var(--blueviolet); cursor: default; }
        .modal-header { background: var(--blueviolet); height: 120px; display: flex; align-items: center; justify-content: center; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; color: white; cursor: pointer; font-size: 20px; }
        .modal-avatar { width: 80px; height: 80px; background: #eee; border-radius: 50%; border: 4px solid white; margin-top: 60px; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .modal-body { padding: 50px 20px 20px 20px; display: flex; flex-direction: column; gap: 10px; }
        .modal-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 50px; box-sizing: border-box; }
        .modal-confirm { background: var(--blueviolet); color: white; border: none; padding: 15px; border-radius: 50px; cursor: pointer; margin-top: 10px; font-weight: bold; }

        .tabs { display: flex; overflow-x: auto; border-bottom: 1px solid #eee; padding: 10px; white-space: nowrap; }
        .tab-btn { padding: 8px 12px; cursor: pointer; border: none; background: none; font-weight: bold; color: #888; transition: color 0.3s; }
        .tab-btn.active { color: var(--blueviolet); border-bottom: 2px solid var(--blueviolet); }
        .avatar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; max-height: 250px; overflow-y: auto; }
        .avatar-option { width: 80px; height: 80px; cursor: pointer; border-radius: 50%; border: 2px solid transparent; object-fit: cover; }
        
        .search-container { padding: 10px; position: relative; display: flex; align-items: center; }
        .search-bar { width: 100%; padding: 10px 35px 10px 15px; border: 1px solid var(--blueviolet); border-radius: 50px; box-sizing: border-box; }
        .clear-btn { position: absolute; right: 20px; color: #aaa; cursor: pointer; display: none; }
        
        #customInputArea { display: none; padding: 10px; gap: 5px; align-items: center; }
        .url-input { padding: 10px; border: 1px solid var(--blueviolet); border-radius: 50px; flex-grow: 1; }
    </style>
</head>
<body>

<div id="profile-bg"></div>

<div class="profile-page">
    <div class="header">
        <div class="avatar" id="mainAvatar" onclick="toggleModal('editModal', true)"></div>
        <h2 id="username-display">Orion</h2>
        <div class="actions">
            <button class="btn btn-primary" onclick="toggleModal('editModal', true)"><i class="fas fa-edit"></i> Editar Perfil</button>
        </div>
    </div>

    <div class="settings-list">
        <button class="settings-btn"><i class="fas fa-user"></i> Informações pessoais</button>
        <button class="settings-btn"><i class="fas fa-sign-out-alt"></i> Deslogar</button>
        <button class="settings-btn" style="border-color: #ff4d4d; color: #ff4d4d;">
            <i class="fas fa-trash-alt" style="color: #ff4d4d;"></i> Excluir conta
        </button>
    </div>
</div>

<div class="modal-overlay" id="editModal" onclick="if(event.target==this) toggleModal('editModal', false)">
    <div class="modal-content">
        <div class="modal-header">
            <span class="close-btn" onclick="toggleModal('editModal', false)">&times;</span>
            <div class="modal-avatar" id="modalAvatar" onclick="toggleModal('avatarModal', true)">+</div>
        </div>
        <div class="modal-body">
            <input type="text" id="nameInput" class="modal-input" placeholder="Novo apelido">
            <button class="modal-confirm" onclick="saveProfile()">Confirmar</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="avatarModal" onclick="if(event.target==this) toggleModal('avatarModal', false)">
    <div class="modal-content" style="max-width: 400px;">
        <span class="close-btn" style="color: #333;" onclick="toggleModal('avatarModal', false)">&times;</span>
        
        <div class="search-container" id="searchArea">
            <input type="text" id="searchInput" class="search-bar" placeholder="Pesquisar..." 
                   oninput="toggleClearBtn(this.value)" 
                   onkeypress="if(event.key==='Enter') loadAvatars(this.value, null)">
            <i class="fas fa-times clear-btn" id="clearBtn" onclick="clearSearch()"></i>
        </div>

        <div id="customInputArea">
            <input type="text" id="urlInput" class="url-input" placeholder="Cole a URL aqui">
            <button class="btn" onclick="setCustomAvatar()">OK</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="loadAvatars('Naruto', this)">Naruto</button>
            <button class="tab-btn" onclick="loadAvatars('Dragon Ball', this)">Dragon Ball</button>
            <button class="tab-btn" onclick="loadAvatars('Jujutsu Kaisen', this)">JJK</button>
            <button class="tab-btn" onclick="loadAvatars('Personalizado', this)">Personalizado</button>
        </div>
        <div class="avatar-grid" id="apiAvatars">Selecione uma categoria</div>
    </div>
</div>

<script>
    function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }
    function toggleClearBtn(val) { document.getElementById('clearBtn').style.display = val.length > 0 ? 'block' : 'none'; }
    function saveProfile() {
        const newName = document.getElementById('nameInput').value;
        if (newName.trim() !== "") document.getElementById('username-display').innerText = newName;
        toggleModal('editModal', false);
    }
    function clearSearch() {
        document.getElementById('searchInput').value = '';
        document.getElementById('clearBtn').style.display = 'none';
        document.getElementById('apiAvatars').innerHTML = 'Selecione uma categoria';
    }
    function setCustomAvatar() {
        const url = document.getElementById('urlInput').value;
        if (url) updateAvatar(url);
    }
    function updateAvatar(url) {
        const html = `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">`;
        document.getElementById('mainAvatar').innerHTML = html;
        document.getElementById('modalAvatar').innerHTML = html;
        document.getElementById('profile-bg').style.backgroundImage = `url('${url}')`;
        toggleModal('avatarModal', false);
    }
    async function loadAvatars(query, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        const searchArea = document.getElementById('searchArea');
        const customArea = document.getElementById('customInputArea');
        const container = document.getElementById('apiAvatars');
        if (query === 'Personalizado') {
            searchArea.style.display = 'none';
            customArea.style.display = 'flex';
            container.innerHTML = 'Insira uma URL acima.';
            return;
        }
        searchArea.style.display = 'flex';
        customArea.style.display = 'none';
        container.innerHTML = 'Carregando...';
        const res = await fetch(`https://api.jikan.moe/v4/anime?q=${query}&limit=9`);
        const data = await res.json();
        container.innerHTML = '';
        data.data.forEach(anime => {
            const img = document.createElement('img');
            img.src = anime.images.jpg.image_url;
            img.className = 'avatar-option';
            img.onclick = () => updateAvatar(img.src);
            container.appendChild(img);
        });
    }
    loadAvatars('Naruto', document.querySelector('.tab-btn'));
</script>

</body>
</html>
