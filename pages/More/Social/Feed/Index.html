<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidade</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body { background-color: #f7f7fc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: #1a1a1a; }

        /* UI PADRÃO - Mantida como original */
        .top-tab-container { width: 100%; padding: 14px 0; background: rgba(138, 43, 226, 0.08); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid rgba(138, 43, 226, 0.15); overflow-x: auto; white-space: nowrap; scrollbar-width: none; z-index: 1000; transition: opacity 0.3s ease; }
        .tab-list { display: flex; align-items: center; justify-content: center; gap: 40px; list-style: none; }
        .tab-item { font-size: 16px; font-weight: 600; color: rgba(138, 43, 226, 0.6); cursor: pointer; transition: color 0.25s ease, transform 0.2s ease; position: relative; padding: 6px 4px; }
        .tab-item.active { color: #8a2be2; transform: scale(1.05); }
        .tab-indicator { position: absolute; bottom: -2px; height: 3px; background-color: #8a2be2; border-radius: 2px; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); }

        /* Novo botão para o modo Postar */
        #back-btn { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); font-size: 20px; color: #8a2be2; cursor: pointer; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 1001; }

        .window-wrapper { flex: 1; width: 100%; overflow: hidden; position: relative; }
        .tabs-view-pager { display: flex; width: 300%; height: 100%; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
        .tab-page { width: 33.333%; height: 100%; }
        .content-iframe { width: 100%; height: 100%; border: none; }

        /* Esconde apenas no desktop */
        @media (min-width: 768px) { .tab-item:nth-child(3) { display: none !important; } }
    </style>
</head>
<body>

    <nav class="top-tab-container" id="nav-bar">
        <ul class="tab-list">
            <li class="tab-item active" onclick="switchTab(0)">Feed</li>
            <li class="tab-item" onclick="switchTab(1)">Perfil</li>
            <li class="tab-item" onclick="switchTab(2)">Postar</li>
            <div class="tab-indicator" id="indicator"></div>
        </ul>
    </nav>

    <i class="fa-solid fa-chevron-down" id="back-btn" onclick="switchTab(0)"></i>

    <div class="window-wrapper" id="gesture-zone">
        <div class="tabs-view-pager" id="view-pager">
            <div class="tab-page"><iframe class="content-iframe" src="./Feed.html"></iframe></div>
            <div class="tab-page"><iframe class="content-iframe" src="./Perfil.html"></iframe></div>
            <div class="tab-page"><iframe class="content-iframe" src="./Postar.html"></iframe></div>
        </div>
    </div>

    <script>
        const pager = document.getElementById('view-pager');
        const tabs = Array.from(document.querySelectorAll('.tab-item'));
        const navBar = document.getElementById('nav-bar');
        const backBtn = document.getElementById('back-btn');
        
        function switchTab(index) {
            // Lógica de visualização
            if (index === 2) {
                navBar.style.opacity = '0';
                backBtn.style.opacity = '1';
                backBtn.style.pointerEvents = 'all';
            } else {
                navBar.style.opacity = '1';
                backBtn.style.opacity = '0';
                backBtn.style.pointerEvents = 'none';
            }

            tabs.forEach((item, i) => { item.classList.toggle('active', i === index); });
            const indicator = document.getElementById('indicator');
            indicator.style.width = `${tabs[index].offsetWidth}px`;
            indicator.style.left = `${tabs[index].offsetLeft}px`;
            pager.style.transform = `translateX(-${index * (100 / 3)}%)`;
        }
        
        window.addEventListener('DOMContentLoaded', () => { switchTab(0); });
    </script>
</body>
</html>
