<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Promoção - Orion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --primary-color: #8a2be2; 
            --ghost: #f8f8ff;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--ghost); padding: 20px; }

        .gx-mod-card {
            height: 120px;
            position: relative;
            cursor: pointer;
            overflow: hidden; 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), filter 0.3s ease;
            clip-path: polygon(15px 0%, 100% 0%, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0% 100%, 0% 15px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            outline: none;
        }
        
        .gx-mod-card:hover, .gx-mod-card:focus { transform: scale(1.05); filter: brightness(1.2); z-index: 10; }
        .gx-mod-card img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        .gx-mod-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(138, 43, 226, 0.6); z-index: 1; }
        .gx-mod-card span, .gx-mod-card i { position: relative; z-index: 2; pointer-events: none; }
        .gx-mod-card i { font-size: 1.2rem; margin-bottom: 5px; }

        .promo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 800px;
            margin: 0 auto;
        }

        @media (min-width: 768px) { .promo-grid { grid-template-columns: repeat(3, 1fr); } }

        #modalContainer {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(248, 248, 255, 0.95);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: none;
        }
    </style>
</head>
<body>

    <main class="py-10">
        <h1 class="text-center text-2xl font-bold text-[var(--primary-color)] mb-8">Escolha o Formato da Campanha</h1>
        
        <div class="promo-grid">
            <div class="gx-mod-card" tabindex="0" onclick="openModal('anunciar.html')">
                <img src="https://images.unsplash.com/photo-1552664730-d307ca884978?q=80&w=400" alt="Anunciar">
                <i class="fas fa-bullhorn"></i> <span>ANUNCIAR</span>
            </div>
            <div class="gx-mod-card" tabindex="0" onclick="openModal('produto.html')">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=400" alt="Produto">
                <i class="fas fa-box"></i> <span>PRODUTO</span>
            </div>
            <div class="gx-mod-card" tabindex="0" onclick="openModal('app.html')">
                <img src="https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?q=80&w=400" alt="App">
                <i class="fas fa-mobile-alt"></i> <span>APP</span>
            </div>
            <div class="gx-mod-card" tabindex="0" onclick="openModal('perfil.html')">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=400" alt="Perfil">
                <i class="fas fa-user"></i> <span>PERFIL</span>
            </div>
            <div class="gx-mod-card" tabindex="0" onclick="openModal('jogo.html')">
                <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=400" alt="Jogo">
                <i class="fas fa-gamepad"></i> <span>JOGO</span>
            </div>
            <div class="gx-mod-card" tabindex="0" onclick="openModal('site.html')">
                <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=400" alt="Site">
                <i class="fas fa-globe"></i> <span>SITE</span>
            </div>
            <div class="gx-mod-card" tabindex="0" onclick="openModal('servicos.html')">
                <img src="https://images.unsplash.com/photo-1521737711867-e3b97375f902?q=80&w=400" alt="Serviços">
                <i class="fas fa-briefcase"></i> <span>SERVIÇOS</span>
            </div>
        </div>
    </main>

    <div id="modalContainer">
        <i class="fas fa-times absolute top-8 right-8 text-3xl text-[var(--primary-color)] cursor-pointer z-[101]" onclick="closeModal()"></i>
        <iframe id="modalIframe" class="w-full h-full border-none" src=""></iframe>
    </div>

    <script>
        function openModal(url) {
            const modal = document.getElementById('modalContainer');
            const iframe = document.getElementById('modalIframe');
            iframe.src = url;
            modal.style.display = 'block';
        }

        function closeModal() {
            const modal = document.getElementById('modalContainer');
            modal.style.display = 'none';
            document.getElementById('modalIframe').src = '';
        }
    </script>
</body>
</html>
