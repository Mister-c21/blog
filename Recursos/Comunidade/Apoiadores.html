<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apoiadores</title>
    <style>
        :root {
            --primary-accent: #8a2be2;
            --main-bg: #ffffff;
            --main-text: #000000;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--main-text);
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            background-size: cover;
            background-position: center;
            transition: background-image 1s ease-in-out;
        }

        .supporters-section {
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-left: 1px solid rgba(138, 43, 226, 0.3);
            border-right: 1px solid rgba(138, 43, 226, 0.3);
            width: 100%;
            min-height: 100vh;
            padding: 20px;
            border-radius: 0;
        }

        .supporters-section h3 {
            color: var(--primary-accent);
            margin: 0 0 20px 0;
            font-size: 1.1rem;
        }

        .stories-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(138, 43, 226, 0.2);
        }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 70px;
        }

        .story-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 3px solid var(--primary-accent);
            padding: 2px;
            background-size: cover;
            background-position: center;
        }

        .supporters-list {
            list-style: none;
            padding: 0;
            margin: 0;
            width: 100%;
        }

        .supporter-item {
            display: flex;
            align-items: center;
            padding: 10px;
            gap: 12px;
            cursor: pointer;
            width: 100%;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .supporter-item:hover, .supporter-item:focus {
            background: rgba(138, 43, 226, 0.1);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.3);
            outline: none;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background-color: var(--primary-accent);
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }

        .verified-badge {
            width: 16px;
            height: 16px;
            margin-left: 6px;
        }

        .info h4 {
            margin: 0;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-size: cover;
            background-position: center;
            position: relative;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 300px;
            border: 1px solid var(--primary-accent);
            overflow: hidden;
            color: var(--primary-accent);
            background-color: rgba(255, 255, 255, 0.95);
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--primary-accent);
            font-weight: bold;
            transition: transform 0.2s, text-shadow 0.2s;
        }

        .close-btn:hover, .close-btn:focus {
            transform: scale(1.2);
            text-shadow: 0 0 10px var(--primary-accent);
            outline: none;
        }

        .modal-content::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            z-index: -1;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            background-color: var(--primary-accent);
            border-radius: 50%;
            margin: 0 auto 15px auto;
            background-size: cover;
            background-position: center;
            border: 2px solid white;
        }

        .social-list {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        .social-link {
            text-decoration: none;
            color: var(--primary-accent);
            display: block;
            padding: 10px;
            border-bottom: 1px solid rgba(138, 43, 226, 0.2);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 5px;
        }

        .social-link:hover, .social-link:focus {
            background: rgba(138, 43, 226, 0.1);
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.2);
            outline: none;
        }
    </style>
</head>
<body>

    <main class="supporters-section">
        <h3>Apoiadores Oficiais</h3>
        <div id="storiesList" class="stories-container"></div>
        
        <h3>Apoiadores</h3>
        <ul id="supportersList" class="supporters-list"></ul>
    </main>

    <div id="infoModal" class="modal" onclick="closeModal()">
        <div id="modalContent" class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" tabindex="0" onclick="closeModal()">&times;</span>
            <div id="modalAvatar" class="profile-pic"></div>
            <h2 id="modalName">Nome</h2>
            <ul id="socialList" class="social-list"></ul>
        </div>
    </div>

    <script>
        const oficiais = [{ id: 1, nome: "Oficial 1", avatar: "https://picsum.photos/200?random=1", insta: "#", tiktok: "#", youtube: "#" }];
        const comuns = [
            { id: 2, nome: "Multiversal A", avatar: "https://picsum.photos/200?random=2", insta: "#", tiktok: "#", youtube: "#", tipo: "M" },
            { id: 3, nome: "Universal B", avatar: "https://picsum.photos/200?random=3", insta: "#", tiktok: "#", tipo: "U" },
            { id: 4, nome: "Galáctico C", avatar: "https://picsum.photos/200?random=4", insta: "#", tipo: "G" }
        ];

        const getIcone = (tipo) => {
            const cores = { M: "#FFD700", U: "#1DA1F2", G: "#CD7F32" };
            return `<svg class="verified-badge" fill="${cores[tipo]}" viewBox="0 0 24 24"><path d="M22.5 12.5c0-1.58-.875-2.95-2.148-3.6.154-.435.238-.905.238-1.4 0-2.21-1.79-4-4-4-.495 0-.97.084-1.405.238-.65-1.273-2.02-2.148-3.6-2.148s-2.95.875-3.6 2.148c-.435-.154-.905-.238-1.4-.238-2.21 0-4 1.79-4 4 0 .495.084.97.238 1.405C2.875 9.55 2 10.92 2 12.5s.875 2.95 2.148 3.6c-.154.435-.238.905-.238 1.4 0 2.21 1.79 4 4 4 .495 0 .97-.084 1.405-.238.65 1.273 2.02 2.148 3.6 2.148s2.95-.875 3.6-2.148c.435.154.905.238 1.4.238 2.21 0 4-1.79 4-4 0-.495-.084-.97-.238-1.405C21.625 15.45 22.5 14.08 22.5 12.5zm-8.75 3.5l-4.5-4.5 1.415-1.414 3.085 3.082 5.836-5.836L20 8.5l-6.25 7.5z"/></svg>`;
        };

        const stories = document.getElementById('storiesList');
        const list = document.getElementById('supportersList');

        oficiais.forEach(ap => {
            stories.innerHTML += `<div class="story-item" onclick="openModal(${ap.id})">
                <div class="story-avatar" style="background-image: url('${ap.avatar}')"></div>
            </div>`;
        });

        comuns.forEach(ap => {
            list.innerHTML += `<li class="supporter-item" tabindex="0" onclick="openModal(${ap.id})">
                <div class="avatar" style="background-image: url('${ap.avatar}')"></div>
                <div class="info"><h4>${ap.nome} ${getIcone(ap.tipo)}</h4></div>
            </li>`;
        });

        const backgroundImages = ['https://f.i.uol.com.br/fotografia/2025/10/07/175985855868e54f7e4defb_175985855868e54f7e4defb_1759858558_5x2_lg.jpg', 'https://recreio.com.br/wp-content/uploads/2024/12/sonic-3_capa.jpg', 'https://res.cloudinary.com/jerrick/image/upload/d_642250b563292b35f27461a7.png,f_jpg,fl_progressive,q_auto,w_1024/63c45dffe7f884001ee53f4e.jpg'];
        function changeBackground() { document.body.style.backgroundImage = `url('${backgroundImages[Math.floor(Math.random() * backgroundImages.length)]}')`; }
        setInterval(changeBackground, 5000);
        changeBackground();

        function openModal(id) {
            const all = [...oficiais, ...comuns];
            const ap = all.find(a => a.id === id);
            document.getElementById('modalName').innerText = ap.nome;
            document.getElementById('modalAvatar').style.backgroundImage = `url('${ap.avatar}')`;
            document.getElementById('modalContent').style.backgroundImage = `url('${ap.avatar}')`;
            
            const socialList = document.getElementById('socialList');
            socialList.innerHTML = '';
            
            if (ap.insta) socialList.innerHTML += `<li><a href="${ap.insta}" target="_blank" class="social-link">Instagram</a></li>`;
            if (ap.tiktok) socialList.innerHTML += `<li><a href="${ap.tiktok}" target="_blank" class="social-link">TikTok</a></li>`;
            if (ap.youtube) socialList.innerHTML += `<li><a href="${ap.youtube}" target="_blank" class="social-link">YouTube</a></li>`;
            
            document.getElementById('infoModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('infoModal').style.display = 'none'; }
    </script>
</body>
</html>
