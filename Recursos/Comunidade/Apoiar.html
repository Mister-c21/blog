<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleção de Planos</title>
    <style>
        :root {
            --primary-accent: #8a2be2;
            --bg-color: #f8f8ff;
            --glow-shadow: 0 0 20px rgba(138, 43, 226, 0.4);
            --glow-tiktok: 0 0 12px rgba(254, 44, 85, 0.4);
            --glow-instagram: 0 0 12px rgba(225, 48, 108, 0.4);
            --glow-youtube: 0 0 12px rgba(255, 0, 0, 0.4);
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 900px; width: 100%; }
        h1 { color: var(--primary-accent); text-align: center; }

        .plans-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .plan-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(138, 43, 226, 0.2); padding: 30px; border-radius: 20px; text-align: center; transition: all 0.3s ease; position: relative; }
        .recommended-badge { position: absolute; top: 15px; right: 15px; background: var(--primary-accent); color: white; font-size: 0.7rem; padding: 4px 8px; border-radius: 10px; font-weight: bold; }
        .plan-card:hover { transform: translateY(-10px); box-shadow: var(--glow-shadow); border-color: var(--primary-accent); }
        .plan-card h2 { color: var(--primary-accent); }
        .price { font-size: 1.5rem; font-weight: bold; color: var(--primary-accent); margin: 15px 0; }
        .plan-card ul { list-style: none; padding: 0; margin: 20px 0; text-align: left; }
        .plan-card li { margin: 10px 0; padding-left: 25px; position: relative; }
        .plan-card li::before { content: "✦"; position: absolute; left: 0; color: var(--primary-accent); }

        .btn-select { display: inline-block; padding: 12px 30px; background-color: var(--primary-accent); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; transition: all 0.3s ease; border: none; cursor: pointer; position: relative; }
        .btn-select:hover { box-shadow: var(--glow-shadow); transform: scale(1.05); opacity: 0.9; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.3); backdrop-filter: blur(10px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; border-radius: 20px; width: 90%; max-width: 450px; overflow: hidden; border: 1px solid var(--primary-accent); position: relative; }
        /* Botão fechar */
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #fff; z-index: 1001; }
        
        .profile-header { height: 100px; background: var(--primary-accent); }
        .profile-pic-container { margin-top: -50px; text-align: center; }
        .profile-pic { width: 100px; height: 100px; background: #eee; border-radius: 50%; border: 4px solid #fff; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; }
        .profile-form { padding: 20px; }
        
        .social-input { display: block; width: 90%; margin: 10px auto; padding: 12px 15px; border: 1px solid #ddd; border-radius: 25px; transition: all 0.3s ease; outline: none; }
        .social-input.tiktok:focus { box-shadow: var(--glow-tiktok); border-color: #fe2c55; }
        .social-input.insta:focus { box-shadow: var(--glow-instagram); border-color: #e1306c; }
        .social-input.yt:focus { box-shadow: var(--glow-youtube); border-color: #ff0000; }
        
        .tabs { display: flex; overflow-x: auto; border-bottom: 1px solid #eee; padding: 10px 0; white-space: nowrap; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: none; font-weight: bold; color: #888; flex-shrink: 0; }
        .tab-btn.active { color: var(--primary-accent); border-bottom: 2px solid var(--primary-accent); }
        .avatar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; max-height: 250px; overflow-y: auto; }
        .avatar-option { width: 80px; height: 80px; cursor: pointer; border-radius: 50%; border: 2px solid transparent; object-fit: cover; }

        .particle { position: fixed; pointer-events: none; font-size: 20px; z-index: 9999; animation: burst 0.8s ease-out forwards; }
        @keyframes burst { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) scale(0.5); opacity: 0; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>Escolha seu Plano de Apoio</h1>
        <div class="plans-grid">
            <div class="plan-card">
                <h2>Multiversal</h2>
                <div class="price">R$ 25,00</div>
                <ul><li>TikTok, Instagram e YouTube</li><li>Badge de Apoiador Ouro</li></ul>
                <button class="btn-select" onclick="handleAction(event, ['TikTok', 'Instagram', 'YouTube'], '✨')">Adquirir</button>
            </div>
            <div class="plan-card">
                <span class="recommended-badge">Recomendado</span>
                <h2>Universal</h2>
                <div class="price">R$ 10,00</div>
                <ul><li>Instagram e TikTok</li><li>Badge de Apoiador Azul</li></ul>
                <button class="btn-select" onclick="handleAction(event, ['Instagram', 'TikTok'], '🌌')">Adquirir</button>
            </div>
            <div class="plan-card">
                <h2>Galáctico</h2>
                <div class="price">R$ 5,00</div>
                <ul><li>Instagram</li><li>Badge de Apoiador Bronze</li></ul>
                <button class="btn-select" onclick="handleAction(event, ['Instagram'], '☄️')">Adquirir</button>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">×</span>
            <div class="profile-header"></div>
            <div class="profile-pic-container">
                <div class="profile-pic" id="mainAvatar" onclick="openAvatarModal()">👤</div>
            </div>
            <div class="profile-form">
                <input type="text" placeholder="Apelido" class="social-input">
                <div id="socialInputs"></div>
                <button class="btn-select" style="width: 90%; margin-top: 10px; display: block; margin-left: auto; margin-right: auto;" onclick="closeModal()">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="avatarModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" style="color: #333;" onclick="closeModal()">×</span>
            <div class="tabs">
                <button class="tab-btn active" onclick="loadAvatars('Naruto', this)">Naruto</button>
                <button class="tab-btn" onclick="loadAvatars('Dragon Ball', this)">Dragon Ball</button>
                <button class="tab-btn" onclick="loadAvatars('Jujutsu Kaisen', this)">JJK</button>
                <button class="tab-btn" onclick="loadAvatars('Beyblade', this)">Beyblade</button>
                <button class="tab-btn" onclick="loadAvatars('Bakugan', this)">Bakugan</button>
            </div>
            <div class="avatar-grid" id="apiAvatars">Selecione uma categoria</div>
        </div>
    </div>

    <script>
        const networkConfigs = {
            'TikTok': { class: 'tiktok', pattern: 'tiktok.com/@' },
            'Instagram': { class: 'insta', pattern: 'instagram.com/' },
            'YouTube': { class: 'yt', pattern: 'youtube.com/@' }
        };

        function handleAction(e, networks, emoji) {
            triggerBurst(e, emoji);
            const container = document.getElementById('socialInputs');
            container.innerHTML = '';
            networks.forEach(net => {
                const config = networkConfigs[net];
                container.innerHTML += `<input type="url" placeholder="URL Perfil ${net}" class="social-input ${config.class}" onchange="validateUrl(this, '${config.pattern}')">`;
            });
            document.getElementById('modal').style.display = 'flex';
        }

        function validateUrl(input, pattern) {
            const val = input.value;
            if (!val.includes(pattern) || val.split(pattern)[1].length < 1) {
                alert("Por favor, insira uma URL de PERFIL válida (ex: " + pattern + "nome_usuario)");
                input.value = '';
            }
        }

        async function loadAvatars(query, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const container = document.getElementById('apiAvatars');
            container.innerHTML = 'Carregando...';
            const res = await fetch(`https://api.jikan.moe/v4/anime?q=${query}&limit=9`);
            const data = await res.json();
            container.innerHTML = '';
            data.data.forEach(anime => {
                const img = document.createElement('img');
                img.src = anime.images.jpg.image_url;
                img.className = 'avatar-option';
                img.onclick = () => {
                    document.getElementById('mainAvatar').innerHTML = `<img src="${img.src}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
                    document.getElementById('avatarModal').style.display = 'none';
                };
                container.appendChild(img);
            });
        }

        function openAvatarModal() { 
            document.getElementById('avatarModal').style.display = 'flex';
            loadAvatars('Naruto', document.querySelector('.tab-btn'));
        }

        function closeModal() { 
            document.getElementById('modal').style.display = 'none';
            document.getElementById('avatarModal').style.display = 'none';
        }

        function triggerBurst(e, emoji) {
            const rect = e.target.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.innerText = emoji;
                p.className = 'particle';
                const angle = (i / 12) * Math.PI * 2;
                const v = 100 + Math.random() * 100;
                p.style.setProperty('--dx', (Math.cos(angle) * v) + 'px');
                p.style.setProperty('--dy', (Math.sin(angle) * v) + 'px');
                p.style.left = x + 'px'; p.style.top = y + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        }
    </script>
</body>
</html>
