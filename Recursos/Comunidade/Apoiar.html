<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apoiar</title>
    <style>
        :root {
            --primary-accent: #8a2be2;
            --bg-color: #f8f8ff;
            --glow-shadow: 0 0 20px rgba(138, 43, 226, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { max-width: 900px; width: 100%; }
        h1 { color: var(--primary-accent); text-align: center; }

        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .plan-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(138, 43, 226, 0.2);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Destaque para o Recomendado */
        .recommended-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--primary-accent);
            color: white;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        .plan-card:hover, .plan-card:focus-within {
            transform: translateY(-10px);
            box-shadow: var(--glow-shadow);
            border-color: var(--primary-accent);
        }

        .plan-card h2 { color: var(--primary-accent); }
        .price { font-size: 1.5rem; font-weight: bold; color: var(--primary-accent); margin: 15px 0; }
        .plan-card ul { list-style: none; padding: 0; margin: 20px 0; text-align: left; }
        .plan-card li { margin: 10px 0; padding-left: 25px; position: relative; }
        .plan-card li::before { content: "✦"; position: absolute; left: 0; color: var(--primary-accent); }

        .btn-select {
            display: inline-block;
            padding: 12px 30px;
            background-color: var(--primary-accent);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
            position: relative;
        }

        .btn-select:hover, .btn-select:focus {
            box-shadow: var(--glow-shadow);
            transform: scale(1.05);
            outline: none;
            opacity: 0.9;
        }

        .particle {
            position: fixed;
            pointer-events: none;
            font-size: 20px;
            z-index: 9999;
            animation: burst 0.8s ease-out forwards;
        }

        @keyframes burst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Escolha seu Plano de Apoio</h1>
        
        <div class="plans-grid">
            <div class="plan-card" tabindex="0">
                <h2>Multiversal</h2>
                <div class="price">R$ 25,00</div>
                <ul>
                    <li>Acesso a 3 Redes Sociais</li>
                    <li>Badge de Apoiador Ouro</li>
                </ul>
                <a href="#" class="btn-select" onclick="triggerBurst(event, '✨')">Assinar</a>
            </div>

            <div class="plan-card" tabindex="0">
                <span class="recommended-badge">Recomendado</span>
                <h2>Universal</h2>
                <div class="price">R$ 10,00</div>
                <ul>
                    <li>Acesso a 2 Redes Sociais</li>
                    <li>Badge de Apoiador Azul</li>
                </ul>
                <a href="#" class="btn-select" onclick="triggerBurst(event, '🌌')">Assinar</a>
            </div>

            <div class="plan-card" tabindex="0">
                <h2>Galáctico</h2>
                <div class="price">R$ 5,00</div>
                <ul>
                    <li>Acesso a 1 Rede Social</li>
                    <li>Badge de Apoiador Bronze</li>
                </ul>
                <a href="#" class="btn-select" onclick="triggerBurst(event, '☄️')">Assinar</a>
            </div>
        </div>
    </div>

    <script>
        function triggerBurst(e, emoji) {
            e.preventDefault();
            const rect = e.target.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;

            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.innerText = emoji;
                p.className = 'particle';
                
                const angle = (i / 12) * Math.PI * 2;
                const velocity = 100 + Math.random() * 100;
                
                p.style.setProperty('--dx', (Math.cos(angle) * velocity) + 'px');
                p.style.setProperty('--dy', (Math.sin(angle) * velocity) + 'px');
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        }
    </script>
</body>
</html>
