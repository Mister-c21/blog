<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Style Top Tab Bar - Work</title>
    <style>
        /* Configurações baseadas no seu app */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f7f7fc; /* Fundo Ghost White da imagem */
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Mantém a tela fixa, quem rola é o iframe */
            color: #1a1a1a;
        }

        /* Container da Tab Bar com efeito Vidro Semitransparente */
        .top-tab-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 14px 0;
            z-index: 1000;
            
            /* Glassmorphism baseado no roxo da imagem */
            background: rgba(138, 43, 226, 0.08); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(138, 43, 226, 0.15);
            
            /* Ativa rolagem horizontal contínua para as abas de ferramentas */
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none; /* Oculta no Firefox */
        }

        /* Oculta barra de rolagem no Chrome/Safari/Edge */
        .top-tab-container::-webkit-scrollbar {
            display: none;
        }

        /* Lista de abas */
        .tab-list {
            display: inline-flex;
            align-items: center;
            gap: 28px;
            padding: 0 24px;
            position: relative;
            list-style: none;
            min-width: max-content;
        }

        /* Item Individual (Estilo TikTok) */
        .tab-item {
            font-size: 16px;
            font-weight: 600;
            color: rgba(138, 43, 226, 0.6); /* Roxo suavizado */
            cursor: pointer;
            transition: color 0.25s ease, transform 0.2s ease;
            position: relative;
            padding: 6px 4px;
            user-select: none;
        }

        /* Aba Ativa (Branco Puro em destaque) */
        .tab-item.active {
            color: #ffffff;
            transform: scale(1.05);
        }

        /* Linha Indicadora Inferior (Estilo TikTok) */
        .tab-indicator {
            position: absolute;
            bottom: -2px;
            height: 3px;
            background-color: #ffffff;
            border-radius: 2px;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.6);
        }

        /* --- ESTEIRA DE CONTEÚDO (ESTILO REACT NAVIGATION) --- */
        .window-wrapper {
            flex: 1;
            margin-top: 53px; /* Espaço para não cobrir a barra superior */
            width: 100%;
            height: calc(100% - 53px);
            overflow: hidden;
            position: relative;
        }

        /* Container que agrupa todas as telas horizontais (5 abas = 500%) */
        .tabs-view-pager {
            display: flex;
            width: 500%; 
            height: 100%;
            will-change: transform;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Desativa as transições durante o arrasto manual do dedo */
        .tabs-view-pager.swiping {
            transition: none;
        }

        /* Cada container interno individual ocupando exatamente 1 largura de tela */
        .tab-page {
            width: calc(100% / 5); /* Divisão perfeita para as 5 abas */
            height: 100%;
            position: relative;
        }

        .content-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: transparent;
        }

        /* Película invisível para capturar o swipe por cima do iframe sem travar */
        .swipe-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: none;
        }
    </style>
</head>
<body>

    <nav class="top-tab-container">
        <ul class="tab-list">
            <li class="tab-item active" onclick="switchTab(0)">música</li>
            <li class="tab-item" onclick="switchTab(1)">seres</li>
            <li class="tab-item" onclick="switchTab(2)">filmes</li>
            <li class="tab-item" onclick="switchTab(3)">games</li>
            <li class="tab-item" onclick="switchTab(4)">sports</li>
            <div class="tab-indicator" id="indicator"></div>
        </ul>
    </nav>

    <div class="window-wrapper" id="gesture-zone">
        <div class="tabs-view-pager" id="view-pager">
            
            <div class="tab-page">
                <div class="swipe-overlay"></div>
                <iframe class="content-iframe" src="musica.html"></iframe>
            </div>

            <div class="tab-page">
                <div class="swipe-overlay"></div>
                <iframe class="content-iframe" src="seres.html"></iframe>
            </div>

            <div class="tab-page">
                <div class="swipe-overlay"></div>
                <iframe class="content-iframe" src="filmes.html"></iframe>
            </div>

            <div class="tab-page">
                <div class="swipe-overlay"></div>
                <iframe class="content-iframe" src="games.html"></iframe>
            </div>

            <div class="tab-page">
                <div class="swipe-overlay"></div>
                <iframe class="content-iframe" src="sports.html"></iframe>
            </div>

        </div>
    </div>

    <script>
        const pager = document.getElementById('view-pager');
        const gestureZone = document.getElementById('gesture-zone');
        const tabs = Array.from(document.querySelectorAll('.tab-item'));
        const overlays = document.querySelectorAll('.swipe-overlay');
        
        let activeIndex = 0;
        let startX = 0;
        let currentX = 0;
        let isSwiping = false;
        let windowWidth = window.innerWidth;

        // Recalcula dimensões caso mude a orientação do telemóvel
        window.addEventListener('resize', () => {
            windowWidth = window.innerWidth;
            updateTabPosition(activeIndex, false);
        });

        // Altera o estado visual dos botões, indicador e faz o scroll do slide
        function switchTab(index) {
            activeIndex = index;
            
            tabs.forEach((item, i) => {
                item.classList.remove('active');
                if(i === index) item.classList.add('active');
            });

            const activeElement = tabs[index];
            const indicator = document.getElementById('indicator');
            indicator.style.width = `${activeElement.offsetWidth}px`;
            indicator.style.comprimento = `${activeElement.offsetWidth}px`; // Segurança extra cross-browser
            indicator.style.left = `${activeElement.offsetLeft}px`;
            
            // Centraliza o item de menu do topo de forma suave caso passe da tela
            activeElement.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

            updateTabPosition(index, true);
        }

        function updateTabPosition(index, animate) {
            if (!animate) pager.classList.add('swiping');
            // Deslocamento fracionado baseado em partes dinâmicas (tabs.length)
            pager.style.transform = `translateX(-${index * (100 / tabs.length)}%)`;
            if (!animate) setTimeout(() => pager.classList.remove('swiping'), 50);
        }

        // --- SISTEMA DE CAPTURA DE GESTOS HORIZONTAIS ---

        gestureZone.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            isSwiping = true;
        }, { passive: true });

        gestureZone.addEventListener('touchmove', (e) => {
            if (!isSwiping) return;
            
            currentX = e.touches[0].clientX;
            const deltaX = currentX - startX;

            // Bloqueia arrasto elástico para fora das bordas limites (primeira e última tela)
            if ((activeIndex === 0 && deltaX > 0) || (activeIndex === tabs.length - 1 && deltaX < 0)) {
                return; 
            }

            // Exibe as películas sobre os iframes para impedir travamento do toque
            overlays.forEach(overlay => overlay.style.display = 'block');
            pager.classList.add('swiping');

            // Calcula a transição progressiva milimétrica
            const currentTransform = -(activeIndex * windowWidth) + deltaX;
            const percentageMove = (currentTransform / (windowWidth * tabs.length)) * 100;
            
            pager.style.transform = `translateX(${percentageMove}%)`;
        }, { passive: true });

        gestureZone.addEventListener('touchend', (e) => {
            if (!isSwiping) return;
            isSwiping = false;
            
            pager.classList.remove('swiping');
            overlays.forEach(overlay => overlay.style.display = 'none');

            const finalDeltaX = currentX - startX;
            const swipeThreshold = windowWidth * 0.22; // Sensibilidade de 22% da tela para validar transição

            if (finalDeltaX > swipeThreshold && activeIndex > 0) {
                switchTab(activeIndex - 1);
            } 
            else if (finalDeltaX < -swipeThreshold && activeIndex < tabs.length - 1) {
                switchTab(activeIndex + 1);
            } 
            else {
                switchTab(activeIndex);
            }

            startX = 0;
            currentX = 0;
        });

        // Inicialização automática na primeira aba
        window.addEventListener('DOMContentLoaded', () => {
            switchTab(0);
        });
    </script>
</body>
</html>
