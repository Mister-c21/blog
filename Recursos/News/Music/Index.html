<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface de Música</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        /* --- Variáveis de Cores e Estilo --- */
        :root {
            --bg-color: ghostwhite;
            --primary-color: blueviolet;
            --text-main: #1c1a27;
            --text-muted: #706e7b;
            --card-bg: rgba(255, 255, 255, 0.65);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- Container Principal (Simulação de Mobile) --- */
        .app-container {
            width: 100%;
            max-width: 412px;
            height: 900px;
            background-color: var(--bg-color);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        /* --- Carrossel de Sub-tags (Filtros) --- */
        .sub-filters {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 24px 16px 16px 16px;
            overflow-x: auto;
            scrollbar-width: none;
            
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 76px;
            background-color: var(--bg-color);
            z-index: 10;
            transition: transform 0.3s ease-in-out;
        }

        .sub-filters.hidden {
            transform: translateY(-100%);
        }

        .sub-filters::-webkit-scrollbar {
            display: none;
        }

        .tag {
            background: var(--card-bg);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            color: var(--text-main);
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s ease;
            user-select: none;
        }

        .tag .material-symbols-outlined,
        .tag .custom-icon {
            width: 16px;
            height: 16px;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tag.hot {
            background: var(--primary-color);
            color: white;
        }

        /* --- Lista de Músicas com Scroll Independente --- */
        .ranking-list {
            padding: 0 16px 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            
            height: calc(100% - 76px); 
            margin-top: 76px;
            overflow-y: auto;
            transition: margin-top 0.3s ease-in-out, height 0.3s ease-in-out;
        }

        .ranking-list.expanded {
            margin-top: 16px;
            height: calc(100% - 16px);
        }

        .ranking-item {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            cursor: pointer;
            user-select: none;
        }

        .image-container {
            position: relative;
            width: 64px;
            height: 64px;
        }

        .music-thumb {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
            background-color: #ddd;
        }

        /* Botão de Play/Pause na capa */
        .play-overlay-btn {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            transition: background-color 0.2s ease, color 0.2s ease;
            z-index: 2;
        }

        .play-overlay-btn .material-symbols-outlined {
            font-size: 14px;
        }

        .ranking-item.playing .play-overlay-btn {
            background: var(--primary-color);
            color: white;
        }

        .music-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            padding-bottom: 12px;
        }

        .music-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .music-author {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* --- Menu Flutuante (Position Fixed) --- */
        .backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .backdrop.active {
            opacity: 1;
            pointer-events: auto;
        }

        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translate(-50%, 100%);
            width: 100%;
            max-width: 412px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            border-radius: 24px 24px 0 0;
            padding: 20px 24px 32px 24px;
            z-index: 2500;
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.12);
        }

        .bottom-sheet.active {
            transform: translate(-50%, 0);
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 2px;
            margin: 0 auto 16px auto;
        }

        .sheet-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-main);
        }

        .sheet-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .streaming-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stream-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.03);
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        .stream-btn:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.8);
        }

        .stream-btn .material-symbols-outlined {
            font-size: 20px;
            color: var(--primary-color);
        }

        /* Feedback visual de carregamento */
        .loading-text {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="app-container">

        <div class="sub-filters" id="subFilters">
            <div class="tag hot" data-genre="hits">
                <span class="material-symbols-outlined">trending_up</span> HOT
            </div>
            <div class="tag" data-genre="brazil">
                <svg class="custom-icon" viewBox="0 0 720 504">
                    <rect width="720" height="504" fill="#009c3b"/>
                    <polygon points="360,64 656,252 360,440 64,252" fill="#ffdf00"/>
                    <circle cx="360" cy="252" r="111.6" fill="#002171"/>
                    <path d="M248.4,256.4 C256.4,220.4 290.4,188.4 336.4,172.4 C382.4,156.4 430.4,158.4 466.4,174.4 C432.4,166.4 386.4,167.4 343.4,182.4 C300.4,197.4 267.4,224.4 256.4,256.4 Z" fill="#ffffff"/>
                </svg>
                Nacional
            </div>
            <div class="tag" data-genre="romance">
                <span class="material-symbols-outlined">favorite</span> Romântica
            </div>
            <div class="tag" data-genre="lofi">
                <span class="material-symbols-outlined">bedtime</span> Lofi
            </div>
            <div class="tag" data-genre="rock">
                <span class="material-symbols-outlined">rocket_launch</span> Rock
            </div>
            <div class="tag" data-genre="pop">
                <span class="material-symbols-outlined">audiotrack</span> Pop
            </div>
            <div class="tag" data-genre="gospel">
                <span class="material-symbols-outlined">church</span> Gospel
            </div>
            <div class="tag" data-genre="halloween">
                <span class="material-symbols-outlined">skull</span> Terror
            </div>
            <div class="tag" data-genre="classical">
                <span class="material-symbols-outlined">piano</span> Clássica
            </div>
        </div>

        <main class="ranking-list" id="rankingList">
            <div id="invisibleElement" style="display: none;" data-purpose="hidden-tracker"></div>
        </main>

    </div>

    <div class="backdrop" id="menuBackdrop"></div>
    <div class="bottom-sheet" id="streamingSheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title" id="sheetMusicTitle">Nome da Música</div>
        <div class="sheet-subtitle" id="sheetMusicAuthor">Artista</div>
        
        <div class="streaming-options">
            <a href="#" target="_blank" class="stream-btn" id="linkSpotify">
                <span class="material-symbols-outlined">album</span> Ouvir no Spotify
            </a>
            <a href="#" target="_blank" class="stream-btn" id="linkYoutube">
                <span class="material-symbols-outlined">smart_display</span> Ouvir no YouTube Music
            </a>
            <a href="#" target="_blank" class="stream-btn" id="linkItunes">
                <span class="material-symbols-outlined">music_note</span> Abrir no Apple Music / iTunes
            </a>
            <a href="#" target="_blank" class="stream-btn" id="linkAmazon">
                <span class="material-symbols-outlined">queue_music</span> Ouvir na Amazon Music
            </a>
        </div>
    </div>

    <script>
        // --- Gerenciador Global de Áudio ---
        const globalAudio = new Audio();
        globalAudio.loop = true;

        // --- Elementos do Menu Flutuante ---
        const backdrop = document.getElementById('menuBackdrop');
        const streamingSheet = document.getElementById('streamingSheet');
        const sheetMusicTitle = document.getElementById('sheetMusicTitle');
        const sheetMusicAuthor = document.getElementById('sheetMusicAuthor');
        
        const linkSpotify = document.getElementById('linkSpotify');
        const linkYoutube = document.getElementById('linkYoutube');
        const linkItunes = document.getElementById('linkItunes');
        const linkAmazon = document.getElementById('linkAmazon');

        const rankingList = document.getElementById('rankingList');
        const invisibleElement = document.getElementById('invisibleElement');

        // --- Comportamento das Tags / Filtros Dinâmicos ---
        const tags = document.querySelectorAll('.tag');
        tags.forEach(tag => {
            tag.addEventListener('click', () => {
                if (tag.classList.contains('hot')) return;

                tags.forEach(t => t.classList.remove('hot'));
                tag.classList.add('hot');
                
                const selectedGenre = tag.getAttribute('data-genre');
                
                if (selectedGenre === 'brazil') {
                    fetchiTunesMusics('brazilian pop mpb sertanejo pagode');
                } else {
                    fetchiTunesMusics(selectedGenre);
                }
            });
        });

        // --- Renderizador da Lista de Músicas ---
        function renderMusicList(tracks) {
            rankingList.innerHTML = '';

            if (tracks.length === 0) {
                rankingList.innerHTML = '<div class="loading-text">Nenhuma música encontrada.</div>';
                return;
            }

            tracks.forEach(track => {
                const coverUrl = track.artworkUrl100;
                
                const itemDiv = document.createElement('div');
                itemDiv.className = 'ranking-item';
                itemDiv.setAttribute('data-url', track.trackViewUrl);
                itemDiv.setAttribute('data-preview', track.previewUrl);
                itemDiv.setAttribute('data-title', track.trackName);
                itemDiv.setAttribute('data-author', track.artistName);

                if (globalAudio.src === track.previewUrl && !globalAudio.paused) {
                    itemDiv.classList.add('playing');
                }

                itemDiv.innerHTML = `
                    <div class="image-container">
                        <img class="music-thumb" src="${coverUrl}" alt="Capa">
                        <div class="play-overlay-btn">
                            <span class="material-symbols-outlined">${itemDiv.classList.contains('playing') ? 'pause' : 'play_arrow'}</span>
                        </div>
                    </div>
                    <div class="music-info">
                        <span class="music-title">${track.trackName}</span>
                        <span class="music-author">${track.artistName}</span>
                    </div>
                `;

                setupItemEvents(itemDiv);
                rankingList.appendChild(itemDiv);
            });

            rankingList.appendChild(invisibleElement);
        }

        // --- Integração Dinâmica com Sistema de Cache (LocalStorage) ---
        async function fetchiTunesMusics(genre) {
            // Chave identificadora única para o cache desse termo
            const cacheKey = `itunes_cache_${genre}`;
            
            // Tenta obter os dados já salvos no cache local
            const cachedData = localStorage.getItem(cacheKey);
            
            if (cachedData) {
                try {
                    const parsedTracks = JSON.parse(cachedData);
                    renderMusicList(parsedTracks);
                    return; // Retorna imediatamente sem tocar na API externa
                } catch (e) {
                    console.warn("Erro ao ler cache antigo, buscando dados novos...", e);
                }
            }

            // Se não houver cache, exibe o loading e busca na API normalmente
            try {
                rankingList.innerHTML = '<div class="loading-text">Buscando faixas...</div>';
                
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(genre)}&media=music&limit=21`);
                const data = await response.json();
                
                // Salva o array de resultados transformado em string JSON no cache
                localStorage.setItem(cacheKey, JSON.stringify(data.results));
                
                renderMusicList(data.results);

            } catch (error) {
                console.error('Erro ao carregar dados da API do iTunes:', error);
                rankingList.innerHTML = '<div class="loading-text">Erro ao carregar músicas.</div>';
            }
        }

        // --- Interação e Abertura do Menu Flutuante ---
        function setupItemEvents(item) {
            item.addEventListener('click', () => {
                const title = item.getAttribute('data-title');
                const author = item.getAttribute('data-author');
                const itunesUrl = item.getAttribute('data-url');

                sheetMusicTitle.textContent = title;
                sheetMusicAuthor.textContent = author;

                const searchQuery = encodeURIComponent(`${title} ${author}`);

                linkSpotify.href = `https://open.spotify.com/search/${searchQuery}`;
                linkYoutube.href = `https://music.youtube.com/search?q=${searchQuery}`;
                linkAmazon.href = `https://music.amazon.com/search/${searchQuery}`;
                linkItunes.href = itunesUrl;

                backdrop.classList.add('active');
                streamingSheet.classList.add('active');
            });

            const playBtn = item.querySelector('.play-overlay-btn');
            playBtn.addEventListener('click', (e) => {
                e.stopPropagation();

                const iconSpan = playBtn.querySelector('.material-symbols-outlined');
                const isCurrentlyPlaying = item.classList.contains('playing');
                const previewUrl = item.getAttribute('data-preview');
                const allItems = document.querySelectorAll('.ranking-item');

                if (isCurrentlyPlaying) {
                    globalAudio.pause();
                    item.classList.remove('playing');
                    iconSpan.textContent = 'play_arrow';
                } else {
                    allItems.forEach(otherItem => {
                        otherItem.classList.remove('playing');
                        const otherIcon = otherItem.querySelector('.play-overlay-btn .material-symbols-outlined');
                        if (otherIcon) otherIcon.textContent = 'play_arrow';
                    });

                    item.classList.add('playing');
                    iconSpan.textContent = 'pause';

                    if (globalAudio.src !== previewUrl) {
                        globalAudio.src = previewUrl;
                    }
                    
                    globalAudio.play().catch(err => console.warn(err));
                }
            });
        }

        backdrop.addEventListener('click', closeStreamingMenu);

        function closeStreamingMenu() {
            backdrop.classList.remove('active');
            streamingSheet.classList.remove('active');
        }

        // --- Lógica de Scroll Reverso ---
        const subFilters = document.getElementById('subFilters');
        let lastScrollTop = 0;

        rankingList.addEventListener('scroll', () => {
            let scrollTop = rankingList.scrollTop;

            if (scrollTop > lastScrollTop && scrollTop > 10) {
                subFilters.classList.add('hidden');
                rankingList.classList.add('expanded');
            } else if (scrollTop < lastScrollTop) {
                subFilters.classList.remove('hidden');
                rankingList.classList.remove('expanded');
            }
            
            lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
        });

        // Inicializa o aplicativo carregando a primeira aba de hits globais
        fetchiTunesMusics('hits');
    </script>

</body>
</html>
