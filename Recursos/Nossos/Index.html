<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        body {
            background-color: #f8f8ff;
            height: 100vh;
            padding: 20px;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .platform-section {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .platform-list {
            list-style: none;
            width: 90%; /* Ajuste para mobile */
            max-width: 400px; /* Ajuste para desktop */
        }

        .platform-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(138, 43, 226, 0.2);
            border-radius: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .platform-item:hover {
            background: blueviolet;
            color: white;
        }

        .platform-item img {
            width: 28px;
            height: 28px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <section class="platform-section">
        <ul class="platform-list">
            <li class="platform-item">
                <img src="https://www.google.com/s2/favicons?domain=lorespace.com.br" alt="Lorespace">
                Lorespace
            </li>
      
        </ul>
    </section>

</body>
</html>
