<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Notícias</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- ESTILOS GERAIS & VARIÁVEIS --- */
        :root {
            --primary-color: #8a2be2;
            --background-color: #f8f9fa;
            --card-background: #ffffff;
            --text-color: #202124;
            --text-secondary: #5f6368;
            --border-color: #dadce0;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.5;
        }

        /* --- CABEÇALHO (HEADER) --- */
        header {
            background-color: var(--card-background);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .search-bar {
            flex: 0 1 720px;
            margin: 0 auto;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 0.8rem 3rem 0.8rem 3rem;
            border: 1px solid transparent;
            border-radius: 24px;
            background-color: #f1f3f4;
            font-size: 1rem;
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        .search-bar input:focus {
            background-color: var(--card-background);
            border-color: transparent;
            box-shadow: 0 1px 1px 0 rgba(65,69,73,0.3), 0 1px 3px 1px rgba(65,69,73,0.15);
            outline: none;
        }

        .search-submit-btn {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 50%;
            transition: background-color 0.1s, color 0.1s;
        }

        .search-submit-btn:hover {
            background-color: rgba(0, 0, 0, 0.08);
            color: var(--primary-color);
        }

        .clear-search-btn {
            position: absolute;
            right: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 50%;
            transition: background-color 0.1s;
        }

        /* --- TOP TABBAR (ESTILO TIKTOK) --- */
        .top-tabbar {
            display: none;
            background-color: var(--card-background);
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
            white-space: nowrap;
            padding: 0 1rem;
            gap: 1.5rem;
            justify-content: center;
            -webkit-overflow-scrolling: touch;
        }

        .top-tabbar::-webkit-scrollbar {
            display: none;
        }

        .top-tabbar-item {
            display: inline-flex;
            align-items: center;
            padding: 0.8rem 0.2rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 700;
            background-color: transparent;
            border-radius: 0;
            position: relative;
            transition: color 0.2s;
            cursor: pointer;
        }

        .top-tabbar-item.active {
            color: var(--text-color);
            background-color: transparent;
        }

        .top-tabbar-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 15%;
            right: 15%;
            height: 3px;
            background-color: var(--primary-color);
            border-radius: 10px;
        }

        /* --- LAYOUT PRINCIPAL --- */
        .container {
            display: flex;
            max-width: 1280px;
            margin: 1.5rem auto;
            padding: 0 1rem;
            gap: 2rem;
        }

        /* --- MENU LATERAL (SIDEBAR) --- */
        aside {
            width: 250px;
            flex-shrink: 0;
        }

        .sidebar-menu {
            list-style: none;
            position: sticky;
            top: 5rem;
        }

        .sidebar-menu li a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            color: var(--text-color);
            text-decoration: none;
            border-radius: 0 100px 100px 0;
            font-weight: 500;
            font-size: 0.9rem;
            transition: background-color 0.1s;
        }

        .sidebar-menu li a i {
            width: 20px;
            text-align: center;
        }

        .sidebar-menu li a:hover {
            background-color: #f1f3f4;
        }

        .sidebar-menu li.active a {
            color: var(--primary-color);
            background-color: #f3eafb;
        }

        /* --- CONTEÚDO DE NOTÍCIAS --- */
        main {
            flex-grow: 1;
        }

        .news-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .news-card {
            background-color: var(--card-background);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            flex-direction: row;
            gap: 1rem;
            transition: box-shadow 0.2s;
            text-decoration: none;
        }

        .news-card:hover {
            box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
        }

        .card-image {
            width: 120px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            background-color: #e8eaed;
            flex-shrink: 0;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        .card-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 0.4rem;
        }

        .card-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* --- BOTTOM TABBAR --- */
        .bottom-tabbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: var(--card-background);
            border-top: 1px solid var(--border-color);
            display: none;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .tabbar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            height: 100%;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 500;
            gap: 4px;
        }

        .tabbar-item.active {
            color: var(--primary-color);
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 960px) {
            aside { display: none; }
            .bottom-tabbar { display: flex; }
            .top-tabbar { display: flex; }
            .container { flex-direction: column; gap: 1rem; margin-top: 0; padding: 0; }
            main { padding: 0 1rem; }
            body { padding-bottom: 60px; }
        }

        @media (max-width: 600px) {
            .top-tabbar { justify-content: flex-start; }
            .news-card { padding: 0.8rem; gap: 0.8rem; }
            .card-image { width: 100px; height: 70px; }
            .card-title { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="search-bar">
            <button type="submit" class="search-submit-btn" title="Pesquisar">
                <i class="fas fa-search"></i>
            </button>
            <input type="text" id="search-input" placeholder="Pesquisar assuntos, locais e fontes">
            <button type="button" id="clear-btn" class="clear-search-btn" title="Limpar pesquisa">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </header>

    <nav class="top-tabbar">
        <a href="#" class="top-tabbar-item active">Brasil</a>
        <a href="#" class="top-tabbar-item">Mundo</a>
        <a href="#" class="top-tabbar-item">Negócios</a>
        <a href="#" class="top-tabbar-item">Tecnologia</a>
        <a href="#" class="top-tabbar-item">Entretenimento</a>
    </nav>

    <div class="container">
        
        <aside>
            <ul class="sidebar-menu">
                <li class="active"><a href="#"><i class="fas fa-newspaper"></i> Notícias</a></li>
                <li><a href="esportes.html"><i class="fas fa-futbol"></i> Esportes</a></li>
                <hr style="margin: 1rem 0; border: none; border-top: 1px solid var(--border-color);">
                <li><a href="#"><i class="fas fa-globe-americas"></i> Brasil</a></li>
                <li><a href="#"><i class="fas fa-globe"></i> Mundo</a></li>
                <li><a href="#"><i class="fas fa-briefcase"></i> Negócios</a></li>
                <li><a href="#"><i class="fas fa-laptop-code"></i> Tecnologia</a></li>
                <li><a href="esportes.html"><i class="fas fa-futbol"></i> Esportes</a></li>
            </ul>
        </aside>

        <main>
            <div class="news-grid" id="news-grid">
                </div>
        </main>

    </div>

    <nav class="bottom-tabbar">
        <a href="#" class="tabbar-item active">
            <i class="fas fa-newspaper"></i>
            <span>Notícias</span>
        </a>
        <a href="esportes.html" class="tabbar-item">
            <i class="fas fa-futbol"></i>
            <span>Esportes</span>
        </a>
    </nav>

    <script>
        const searchInput = document.getElementById('search-input');
        const clearBtn = document.getElementById('clear-btn');
        const newsGrid = document.getElementById('news-grid');
        const topTabItems = document.querySelectorAll('.top-tabbar-item');

        const apiKey = '555f0883a37432386c2d1d61841ee734'; 
        let currentTopic = 'Brasil';
        
        // Caminho da página de esportes
        const esportesUrl = 'esportes.html';

        // Evento para tratar o clique nos itens do Top Tabbar
        topTabItems.forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                const text = item.textContent.trim();

                if (text.toLowerCase() === 'esportes') {
                    window.location.href = esportesUrl;
                    return;
                }

                topTabItems.forEach(tab => tab.classList.remove('active'));
                item.classList.add('active');
                
                currentTopic = text;
                searchInput.value = '';
                toggleClearButton();
                fetchNews(currentTopic);
            });
        });

        // Função para calcular tempo decorrido
        function timeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);
            const hours = Math.floor(seconds / 3600);
            
            if (hours < 1) {
                const minutes = Math.floor(seconds / 60);
                return `${minutes}m`;
            } else if (hours < 24) {
                return `${hours}h`;
            } else {
                const days = Math.floor(hours / 24);
                return `${days}d`;
            }
        }

        // Função para buscar notícias reais da API
        async function fetchNews(query = 'Brasil') {
            newsGrid.innerHTML = '<p style="padding: 1rem;">Carregando notícias...</p>';

            const url = `https://gnews.io/api/v4/search?q=${encodeURIComponent(query)}&lang=pt&country=br&apikey=${apiKey}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.articles && data.articles.length > 0) {
                    renderNews(data.articles);
                } else {
                    fetchFallbackNews();
                }
            } catch (error) {
                console.error('Erro ao buscar notícias:', error);
                fetchFallbackNews();
            }
        }

        // Fallback caso a chave precise ser configurada
        async function fetchFallbackNews() {
            try {
                const res = await fetch('https://ok.m3o.co/news/headlines?language=pt');
                const data = await res.json();
                renderNews(data.articles || []);
            } catch (e) {
                newsGrid.innerHTML = '<p style="padding: 1rem;">Não foi possível carregar as notícias. Adicione uma chave válida da API GNews.</p>';
            }
        }

        // Desenha os cards de notícias
        function renderNews(articles) {
            newsGrid.innerHTML = '';
            
            articles.forEach(article => {
                const card = document.createElement('a');
                card.className = 'news-card';
                card.href = article.url;
                card.target = '_blank';

                const domain = new URL(article.url || article.source.url || 'https://google.com').hostname.replace('www.', '');
                const imageUrl = article.image || article.urlToImage || 'https://via.placeholder.com/120x80?text=Noticia';
                const timeStr = article.publishedAt ? timeAgo(article.publishedAt) : 'recente';

                card.innerHTML = `
                    <img class="card-image" src="${imageUrl}" alt="${article.title}" onerror="this.style.background='linear-gradient(135deg, #1e3c72, #2a5298)'; this.src='';">
                    <div class="card-content">
                        <h2 class="card-title">${article.title}</h2>
                        <div class="card-meta">${domain} · ${timeStr}</div>
                    </div>
                `;

                newsGrid.appendChild(card);
            });
        }

        // Controle da barra de pesquisa
        function toggleClearButton() {
            clearBtn.style.display = searchInput.value.trim().length > 0 ? 'flex' : 'none';
        }

        let debounceTimer;
        searchInput.addEventListener('input', () => {
            toggleClearButton();
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const query = searchInput.value.trim();
                fetchNews(query || currentTopic);
            }, 500);
        });

        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            toggleClearButton();
            fetchNews(currentTopic);
            searchInput.focus();
        });

        // Carrega notícias ao iniciar a página
        fetchNews(currentTopic);
    </script>
</body>
</html>
