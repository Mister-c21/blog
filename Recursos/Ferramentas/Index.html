<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Style Top Tab Bar</title>
    <style>
        /* Configurações baseadas no seu app */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f7f7fc;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #1a1a1a;
        }

        /* Header adicionado com título Ferramentas */
        .header {
            height: 50px;
            background: rgba(138, 43, 226, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid rgba(138, 43, 226, 0.15);
        }

        .header h1 { font-size: 18px; color: #8a2be2; }
        .header a { text-decoration: none; color: #8a2be2; font-size: 24px; }

        /* Container da Tab Bar (ajustado top para 50px) */
        .top-tab-container {
            position: fixed;
            top: 50px;
            left: 0;
            width: 100%;
            padding: 14px 0;
            z-index: 1000;
            background: rgba(138, 43, 226, 0.08); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(138, 43, 226, 0.15);
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }

        .top-tab-container::-webkit-scrollbar {
            display: none;
        }

        .tab-list {
            display: inline-flex;
            align-items: center;
            gap: 28px;
            padding: 0 24px;
            position: relative;
            list-style: none;
            min-width: max-content;
        }

        .tab-item {
            font-size: 16px;
            font-weight: 600;
            color: rgba(138, 43, 226, 0.6);
            cursor: pointer;
            transition: color 0.25s ease, transform 0.2s ease;
            position: relative;
            padding: 6px 4px;
            user-select: none;
        }

        .tab-item.active {
            color: #ffffff;
            transform: scale(1.05);
        }

        .tab-indicator {
            position: absolute;
            bottom: -2px;
            height: 3px;
            background-color: #ffffff;
            border-radius: 2px;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.6);
        }

        /* Ajuste do margin-top para 103px (50px header + 53px nav) */
        .window-wrapper {
            flex: 1;
            margin-top: 103px;
            width: 100%;
            height: calc(100% - 103px);
            overflow: hidden;
            position: relative;
        }

        .tabs-view-pager {
            display: flex;
            width: 700%; 
            height: 100%;
            will-change: transform;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .tabs-view-pager.swiping {
            transition: none;
        }

        .tab-page {
            width: calc(100% / 7);
            height: 100%;
            position: relative;
        }

        .content-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: transparent;
        }

        .swipe-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: none;
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>Ferramentas</h1>
        <a href="././index.html">⌂</a>
    </header>

    <nav class="top-tab-container">
        <ul class="tab-list">
            <li class="tab-item active" onclick="switchTab(0)">Calculadora</li>
            <li class="tab-item" onclick="switchTab(1)">Calendário</li>
            <li class="tab-item" onclick="switchTab(2)">Conversor</li>
            <li class="tab-item" onclick="switchTab(3)">Anotações</li>
            <li class="tab-item" onclick="switchTab(4)">Cronômetro</li>
            <li class="tab-item" onclick="switchTab(5)">Clima</li>
            <li class="tab-item" onclick="switchTab(6)">Gravador</li>
            <div class="tab-indicator" id="indicator"></div>
        </ul>
    </nav>

    <div class="window-wrapper" id="gesture-zone">
        <div class="tabs-view-pager" id="view-pager">
            <div class="tab-page"><div class="swipe-overlay"></div><iframe class="content-iframe" src="./Tools/Math.html"></iframe></div>
            <div class="tab-page"><div class="swipe-overlay"></div><iframe class="content-iframe" src="./Tools/Calendar.html"></iframe></div>
            <div class="tab-page"><div class="swipe-overlay"></div><iframe class="content-iframe" src="./Tools/Conver.html"></iframe></div>
            <div class="tab-page"><div class="swipe-overlay"></div><iframe class="content-iframe" src="./Tools/Notes.html"></iframe></div>
            <div class="tab-page"><div class="swipe-overlay"></div><iframe class="content-iframe" src="./Tools/Crono.html"></iframe></div>
            <div class="tab-page"><div class="swipe-overlay"></div><iframe class="content-iframe" src="./Tools/Clima.html"></iframe></div>
            <div class="tab-page"><div class="swipe-overlay"></div><iframe class="content-iframe" src="./Tools/Grava.html"></iframe></div>
        </div>
    </div>

    <script>
        const pager = document.getElementById('view-pager');
        const gestureZone = document.getElementById('gesture-zone');
        const tabs = Array.from(document.querySelectorAll('.tab-item'));
        const overlays = document.querySelectorAll('.swipe-overlay');
        
        let activeIndex = 0;
        let startX = 0;
        let currentX = 0;
        let isSwiping = false;
        let windowWidth = window.innerWidth;

        window.addEventListener('resize', () => {
            windowWidth = window.innerWidth;
            updateTabPosition(activeIndex, false);
        });

        function switchTab(index) {
            activeIndex = index;
            tabs.forEach((item, i) => {
                item.classList.remove('active');
                if(i === index) item.classList.add('active');
            });
            const activeElement = tabs[index];
            const indicator = document.getElementById('indicator');
            indicator.style.width = `${activeElement.offsetWidth}px`;
            indicator.style.left = `${activeElement.offsetLeft}px`;
            activeElement.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            updateTabPosition(index, true);
        }

        function updateTabPosition(index, animate) {
            if (!animate) pager.classList.add('swiping');
            pager.style.transform = `translateX(-${index * (100 / tabs.length)}%)`;
            if (!animate) setTimeout(() => pager.classList.remove('swiping'), 50);
        }

        gestureZone.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            isSwiping = true;
        }, { passive: true });

        gestureZone.addEventListener('touchmove', (e) => {
            if (!isSwiping) return;
            currentX = e.touches[0].clientX;
            const deltaX = currentX - startX;
            if ((activeIndex === 0 && deltaX > 0) || (activeIndex === tabs.length - 1 && deltaX < 0)) return;
            overlays.forEach(overlay => overlay.style.display = 'block');
            pager.classList.add('swiping');
            const currentTransform = -(activeIndex * windowWidth) + deltaX;
            const percentageMove = (currentTransform / (windowWidth * tabs.length)) * 100;
            pager.style.transform = `translateX(${percentageMove}%)`;
        }, { passive: true });

        gestureZone.addEventListener('touchend', (e) => {
            if (!isSwiping) return;
            isSwiping = false;
            pager.classList.remove('swiping');
            overlays.forEach(overlay => overlay.style.display = 'none');
            const finalDeltaX = currentX - startX;
            const swipeThreshold = windowWidth * 0.22;
            if (finalDeltaX > swipeThreshold && activeIndex > 0) switchTab(activeIndex - 1);
            else if (finalDeltaX < -swipeThreshold && activeIndex < tabs.length - 1) switchTab(activeIndex + 1);
            else switchTab(activeIndex);
            startX = 0; currentX = 0;
        });

        window.addEventListener('DOMContentLoaded', () => { switchTab(0); });
    </script>
</body>
</html>
