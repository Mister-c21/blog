<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Style Top Tab Bar</title>
    <style>
        /* Configurações baseadas no seu app */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f7f7fc; /* Fundo Ghost White da imagem */
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Mantém a tela fixa, quem rola é o iframe */
            color: #1a1a1a;
        }

        /* Container da Tab Bar com efeito Vidro Semitransparente */
        .top-tab-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 14px 0;
            z-index: 1000;
            
            /* Glassmorphism baseado no roxo da imagem */
            background: rgba(138, 43, 226, 0.08); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(138, 43, 226, 0.15);
            
            /* Ativa rolagem horizontal contínua para as 9 abas de ferramentas */
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none; /* Oculta no Firefox */
        }

        /* Oculta barra de rolagem no Chrome/Safari/Edge */
        .top-tab-container::-webkit-scrollbar {
            display: none;
        }

        /* Lista de abas */
        .tab-list {
            display: inline-flex;
            align-items: center;
            gap: 28px;
            padding: 0 24px;
            position: relative;
            list-style: none;
            min-width: max-content;
        }

        /* Item Individual (Estilo TikTok) */
        .tab-item {
            font-size: 16px;
            font-weight: 600;
            color: rgba(138, 43, 226, 0.6); /* Roxo suavizado */
            cursor: pointer;
            transition: color 0.25s ease, transform 0.2s ease;
            position: relative;
            padding: 6px 4px;
            user-select: none;
        }

        /* Aba Ativa (Branco Puro em destaque) */
        .tab-item.active {
            color: #ffffff;
            transform: scale(1.05);
        }

        /* Linha Indicadora Inferior (Estilo TikTok) */
        .tab-indicator {
            position: absolute;
            bottom: -2px;
            height: 3px;
            background-color: #ffffff;
            border-radius: 2px;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.6);
        }

        /* Iframe: Ocupa todo o espaço restante abaixo da barra */
        .content-iframe {
            flex: 1;
            margin-top: 53px; /* Espaço para não cobrir a barra superior */
            width: 100%;
            height: 100%;
            border: none; /* Remove bordas padrão do iframe */
            background-color: transparent;
        }
    </style>
</head>
<body>

    <nav class="top-tab-container">
        <ul class="tab-list">
            <li class="tab-item active" data-file="calculadora.html" onclick="moveIndicator(this)">Calculadora</li>
            <li class="tab-item" data-file="calendario.html" onclick="moveIndicator(this)">Calendário</li>
            <li class="tab-item" data-file="conversor.html" onclick="moveIndicator(this)">Conversor</li>
            <li class="tab-item" data-file="anotacoes.html" onclick="moveIndicator(this)">Anotações</li>
            <li class="tab-item" data-file="cronometro.html" onclick="moveIndicator(this)">Cronômetro</li>
            <li class="tab-item" data-file="clima.html" onclick="moveIndicator(this)">Clima</li>
            <li class="tab-item" data-file="gravador.html" onclick="moveIndicator(this)">Gravador</li>
            <li class="tab-item" data-file="desenho.html" onclick="moveIndicator(this)">Desenho</li>
            <li class="tab-item" data-file="arquivos.html" onclick="moveIndicator(this)">Arquivos</li>
            <div class="tab-indicator" id="indicator"></div>
        </ul>
    </nav>

    <iframe class="content-iframe" id="content-viewport" src=""></iframe>

    <script>
        function moveIndicator(element) {
            const items = document.querySelectorAll('.tab-item');
            items.forEach(item => item.classList.remove('active'));

            element.classList.add('active');

            const indicator = document.getElementById('indicator');
            indicator.style.width = `${element.offsetWidth}px`;
            indicator.style.left = `${element.offsetLeft}px`;
            
            element.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

            // Altera o 'src' do iframe para navegar para a ferramenta correspondente
            const targetFile = element.getAttribute('data-file');
            document.getElementById('content-viewport').src = targetFile;
        }

        // Carrega a ferramenta padrão assim que a estrutura do DOM estiver pronta
        window.addEventListener('DOMContentLoaded', () => {
            const activeTab = document.querySelector('.tab-item.active');
            if (activeTab) {
                const indicator = document.getElementById('indicator');
                indicator.style.width = `${activeTab.offsetWidth}px`;
                indicator.style.left = `${activeTab.offsetLeft}px`;
                
                // Define o link inicial do iframe (calculadora.html)
                document.getElementById('content-viewport').src = activeTab.getAttribute('data-file');
            }
        });
    </script>
</body>
</html>
