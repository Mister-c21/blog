<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronômetro de Precisão Pro</title>
    <style>
        :root {
            --primary-color: #ffffff; 
            --primary-hover: #e6e6e6;
            --text-color: #1d1d1f; /* Tom escuro para leitura no fundo claro */
            --bg-glass: rgba(255, 255, 255, 0.4); /* Vidro claro adaptado */
            --border-glass: rgba(0, 0, 0, 0.08);
            --shadow-glass: rgba(0, 0, 0, 0.05);
            --detail-violet: #8a2be2; /* Violeta para identidade e foco */
            --detail-violet-hover: #9933ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffffff, #f5f5f7, #ffffff); /* Fundo limpo e branco */
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            padding: 20px;
        }

        .stopwatch-container {
            width: 100%;
            max-width: 420px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 8px 32px 0 var(--shadow-glass);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* Display do Cronômetro */
        .timer-display {
            display: flex;
            justify-content: center;
            align-items: baseline;
            font-variant-numeric: tabular-nums;
            padding: 20px 0;
            margin-bottom: 24px;
            width: 100%;
        }

        .time-main {
            font-size: 3.5rem;
            font-weight: 200;
            letter-spacing: -1px;
        }

        .time-ms {
            font-size: 1.6rem;
            font-weight: 400;
            color: var(--detail-violet); /* Destaque dos milissegundos em violeta */
            margin-left: 6px;
            width: 45px;
            text-align: left;
        }

        /* Painel de Controle (Botões) */
        .controls-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            width: 100%;
            margin-bottom: 24px;
        }

        .control-btn {
            flex: 1;
            max-width: 120px;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 14px;
            color: var(--text-color);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .control-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        .control-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .control-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        /* Estados Específicos dos Botões */
        .control-btn.start {
            background: var(--detail-violet); /* Botão de início em violeta */
            border-color: transparent;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(138, 43, 226, 0.2);
        }
        .control-btn.start:hover { background: var(--detail-violet-hover); }

        .control-btn.stop {
            background: rgba(255, 69, 101, 0.1);
            border-color: rgba(255, 69, 101, 0.2);
            color: #ff4565;
        }
        .control-btn.stop:hover { background: rgba(255, 69, 101, 0.15); }

        @media (hover: hover) {
            .control-btn:not(.start):not(.stop):not(:disabled):hover {
                background: rgba(0, 0, 0, 0.04);
                border-color: rgba(0, 0, 0, 0.1);
            }
        }

        /* Seção de Voltas (Laps) */
        .laps-section {
            width: 100%;
            border-top: 1px solid var(--border-glass);
            padding-top: 20px;
            display: none;
            flex-direction: column;
        }

        .laps-section.active {
            display: flex;
        }

        .laps-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 180px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .laps-list::-webkit-scrollbar {
            width: 4px;
        }
        .laps-list::-webkit-scrollbar-thumb {
            background: var(--border-glass);
            border-radius: 4px;
        }

        .lap-item {
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-glass);
            border-radius: 10px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            font-variant-numeric: tabular-nums;
        }

        .lap-number {
            color: rgba(0, 0, 0, 0.4);
            font-weight: 600;
        }

        .lap-time {
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="stopwatch-container">
        <div class="timer-display">
            <span class="time-main" id="display-main">00:00:00</span>
            <span class="time-ms" id="display-ms">.00</span>
        </div>

        <div class="controls-row">
            <button class="control-btn" id="btn-lap-reset" onclick="handleSecondaryAction()" disabled>
                <svg viewBox="0 0 24 24" id="icon-secondary">
                    <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                </svg>
                <span id="label-secondary">Reset</span>
            </button>

            <button class="control-btn start" id="btn-start-stop" onclick="handlePrimaryAction()">
                <svg viewBox="0 0 24 24" id="icon-primary">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                <span id="label-primary">Iniciar</span>
            </button>
        </div>

        <div class="laps-section" id="laps-panel">
            <div class="laps-list" id="html-laps-list">
                </div>
        </div>
    </div>

    <script>
        const displayMain = document.getElementById('display-main');
        const displayMs = document.getElementById('display-ms');
        const btnStartStop = document.getElementById('btn-start-stop');
        const btnLapReset = document.getElementById('btn-lap-reset');
        const labelPrimary = document.getElementById('label-primary');
        const labelSecondary = document.getElementById('label-secondary');
        const iconPrimary = document.getElementById('icon-primary');
        const iconSecondary = document.getElementById('icon-secondary');
        const lapsPanel = document.getElementById('laps-panel');
        const htmlLapsList = document.getElementById('html-laps-list');

        let timerInterval = null;
        let isRunning = false;
        let startTime = 0;
        let elapsedTime = 0;
        let laps = [];

        const icons = {
            play: `<polygon points="5 3 19 12 5 21 5 3"></polygon>`,
            pause: `<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>`,
            reset: `<path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>`,
            lap: `<circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>`
        };

        function handlePrimaryAction() {
            if (!isRunning) {
                isRunning = true;
                startTime = Date.now() - elapsedTime;
                
                timerInterval = setInterval(updateTime, 10);
                
                btnStartStop.className = "control-btn stop";
                labelPrimary.innerText = "Pausar";
                iconPrimary.innerHTML = icons.pause;
                
                btnLapReset.disabled = false;
                labelSecondary.innerText = "Volta";
                iconSecondary.innerHTML = icons.lap;
            } else {
                isRunning = false;
                
                clearInterval(timerInterval);
                timerInterval = null;
                
                btnStartStop.className = "control-btn start";
                labelPrimary.innerText = "Retomar";
                iconPrimary.innerHTML = icons.play;
                
                labelSecondary.innerText = "Reset";
                iconSecondary.innerHTML = icons.reset;
            }
        }

        function handleSecondaryAction() {
            if (isRunning) {
                laps.unshift(elapsedTime);
                renderLaps();
            } else {
                isRunning = false;
                clearInterval(timerInterval);
                timerInterval = null;
                
                elapsedTime = 0;
                laps = [];
                
                displayMain.innerText = "00:00:00";
                displayMs.innerText = ".00";
                
                btnStartStop.className = "control-btn start";
                labelPrimary.innerText = "Iniciar";
                iconPrimary.innerHTML = icons.play;
                
                btnLapReset.disabled = true;
                labelSecondary.innerText = "Reset";
                iconSecondary.innerHTML = icons.reset;
                
                renderLaps();
            }
        }

        function updateTime() {
            elapsedTime = Date.now() - startTime;
            
            const totalSeconds = Math.floor(elapsedTime / 1000);
            const ms = Math.floor((elapsedTime % 1000) / 10);
            const seconds = totalSeconds % 60;
            const minutes = Math.floor(totalSeconds / 60) % 60;
            const hours = Math.floor(totalSeconds / 3600);

            const formattedMain = 
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            displayMain.innerText = formattedMain;
            displayMs.innerText = `.${String(ms).padStart(2, '0')}`;
        }

        function renderLaps() {
            htmlLapsList.innerHTML = '';

            if (laps.length === 0) {
                lapsPanel.classList.remove('active');
                return;
            }

            lapsPanel.classList.add('active');

            laps.forEach((lapTime, index) => {
                const totalSeconds = Math.floor(lapTime / 1000);
                const ms = Math.floor((lapTime % 1000) / 10);
                const seconds = totalSeconds % 60;
                const minutes = Math.floor(totalSeconds / 60) % 60;
                const hours = Math.floor(totalSeconds / 3600);

                const timeStr = 
                    `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(ms).padStart(2, '0')}`;

                const item = document.createElement('div');
                item.className = 'lap-item';
                item.innerHTML = `
                    <span class="lap-number">Volta ${laps.length - index}</span>
                    <span class="lap-time">${timeStr}</span>
                `;
                htmlLapsList.appendChild(item);
            });
        }
    </script>
</body>
</html>
