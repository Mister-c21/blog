<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadro de Desenho Pro</title>
    <style>
        :root {
            --primary-color: #8a2be2; /* blueviolet */
            --primary-hover: #9933ff;
            --text-color: #f8f8ff; /* ghostwhite */
            --bg-glass: rgba(255, 255, 255, 0.06);
            --border-glass: rgba(255, 255, 255, 0.1);
            --shadow-glass: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c1b, #241442, #0f0c1b);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            padding: 20px;
        }

        .paint-container {
            width: 100%;
            max-width: 460px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 var(--shadow-glass);
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: hidden; /* Evita vazamentos estruturais */
        }

        /* Barra de Ferramentas Superior */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-glass);
            padding: 10px 14px;
            border-radius: 14px;
            gap: 8px;
            flex-shrink: 0;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tool-btn {
            background: none;
            border: 1px solid transparent;
            color: rgba(248, 248, 255, 0.5);
            padding: 8px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tool-btn svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        .tool-btn.active {
            color: var(--text-color);
            background: rgba(138, 43, 226, 0.2);
            border-color: rgba(138, 43, 226, 0.3);
        }

        .tool-btn.clear {
            color: #ff4565;
        }
        .tool-btn.clear:hover {
            background: rgba(255, 69, 101, 0.1);
        }

        /* Seletor de Tamanho do Pincel */
        .brush-slider {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: rgba(248, 248, 255, 0.6);
        }

        .brush-slider input[type="range"] {
            -webkit-appearance: none;
            width: 70px;
            background: rgba(255, 255, 255, 0.1);
            height: 4px;
            border-radius: 2px;
            outline: none;
        }

        .brush-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
        }

        /* Área do Canvas (Tela de Desenho) */
        .canvas-box {
            width: 100%;
            background: #110922;
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            position: relative;
            aspect-ratio: 4 / 3; /* Proporção de tela fixa e responsiva */
            overflow: hidden;
            touch-action: none; /* Bloqueia gestos nativos do browser sobre o canvas */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        @media (max-width: 380px) {
            .paint-container { padding: 14px; }
            .toolbar { padding: 8px; gap: 4px; }
            .brush-slider input[type="range"] { width: 50px; }
        }
    </style>
</head>
<body>

    <div class="paint-container">
        <div class="toolbar">
            <div class="tool-group">
                <button class="tool-btn active" id="btn-pencil" onclick="setMode('pencil')" title="Lápis">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                </button>
                <button class="tool-btn" id="btn-eraser" onclick="setMode('eraser')" title="Borracha">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 20H7L3 16c-1-1-1-2 0-3l9-9c1-1 2-1 3 0l5 5c1 1 1 2 0 3l-5 5"></path>
                        <line x1="12" y1="11" x2="17" y2="16"></line>
                    </svg>
                </button>
            </div>

            <div class="brush-slider">
                <span>Tam:</span>
                <input type="range" id="brush-size" min="2" max="24" value="6" onchange="updateBrushSize(this.value)">
                <span id="size-indicator">6px</span>
            </div>

            <button class="tool-btn clear" onclick="clearCanvas()" title="Limpar Tela">
                <svg viewBox="0 0 24 24">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
            </button>
        </div>

        <div class="canvas-box">
            <canvas id="paint-canvas"></canvas>
        </div>
    </div>

    <script>
        // Mapeamento de Elementos do DOM
        const canvas = document.getElementById('paint-canvas');
        const ctx = canvas.getContext('2d');
        const btnPencil = document.getElementById('btn-pencil');
        const btnEraser = document.getElementById('btn-eraser');
        const sizeIndicator = document.getElementById('size-indicator');

        // Configuração de Estado Inicial
        let isDrawing = false;
        let currentMode = 'pencil'; // pencil | eraser
        let brushSize = 6;
        let lastX = 0;
        let lastY = 0;

        function init() {
            resizeCanvas();
            setupCanvasStyle();
            
            // Listeners para Desktop (Mouse)
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);

            // Listeners para Mobile (Touch)
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', stopDrawing);

            // Reajusta dimensões caso a janela mude de tamanho
            window.addEventListener('resize', resizeCanvas);
        }

        // Configura propriedades de linha estáveis
        function setupCanvasStyle() {
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            updateBrushProperties();
        }

        // Sincroniza o tamanho real do buffer de pixels com o tamanho do elemento CSS
        function resizeCanvas() {
            // Guarda temporariamente o desenho atual antes do redimensionamento
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(canvas, 0, 0);

            // Altera o tamanho físico
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            // Restaura as configurações de estilo que se perdem no resize
            setupCanvasStyle();

            // Redesenha a imagem salva de volta adaptando ao novo container
            ctx.drawImage(tempCanvas, 0, 0, canvas.width, canvas.height);
        }

        function updateBrushProperties() {
            ctx.lineWidth = brushSize;
            if (currentMode === 'pencil') {
                ctx.strokeStyle = '#8a2be2'; // blueviolet
            } else {
                ctx.strokeStyle = '#110922'; // Cor idêntica ao fundo do canvas (borracha)
            }
        }

        // Gatilhos de Controle da Barra de Ferramentas
        function setMode(mode) {
            currentMode = mode;
            btnPencil.classList.toggle('active', mode === 'pencil');
            btnEraser.classList.toggle('active', mode === 'eraser');
            updateBrushProperties();
        }

        function updateBrushSize(size) {
            brushSize = size;
            sizeIndicator.innerText = `${size}px`;
            updateBrushProperties();
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Lógica de Desenho - Desktop
        function startDrawing(e) {
            isDrawing = true;
            [lastX, lastY] = [e.offsetX, e.offsetY];
        }

        function draw(e) {
            if (!isDrawing) return;
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
            
            [lastX, lastY] = [e.offsetX, e.offsetY];
        }

        function stopDrawing() {
            isDrawing = false;
        }

        // Lógica de Desenho - Mobile Touch (Mapeamento de Matriz de Coordenadas)
        function getTouchPos(touchEvent) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: touchEvent.touches[0].clientX - rect.left,
                y: touchEvent.touches[0].clientY - rect.top
            };
        }

        function handleTouchStart(e) {
            e.preventDefault(); // Impede rolagem da página ao desenhar
            isDrawing = true;
            const pos = getTouchPos(e);
            [lastX, lastY] = [pos.x, pos.y];
        }

        function handleTouchMove(e) {
            e.preventDefault(); // Impede rolagem da página ao mover o dedo
            if (!isDrawing) return;
            
            const pos = getTouchPos(e);
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            
            [lastX, lastY] = [pos.x, pos.y];
        }

        window.onload = init;
    </script>
</body>
</html>
