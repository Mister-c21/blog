<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerologia & Astrologia: Redescubra-se</title>
    <style>
        :root {
            --bg-color: #f7f5fa;
            --card-bg: #ffffff;
            --primary-color: #7b2cbf;
            --secondary-color: #9d4edd;
            --astro-color: #c77dff;
            --text-color: #240046;
            --text-muted: #5a5066;
            --border-color: #e0d6ed;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(123, 44, 191, 0.1);
            border: 1px solid var(--border-color);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(123, 44, 191, 0.1);
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .tab-menu {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            background: rgba(123, 44, 191, 0.05);
            padding: 5px;
            border-radius: 10px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            cursor: pointer;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: #fff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: rgba(123, 44, 191, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button.btn-calc {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        button.btn-calc:hover {
            background-color: var(--secondary-color);
        }

        button.btn-calc:active {
            transform: scale(0.98);
        }

        .result-section {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            background: linear-gradient(145deg, #ffffff, #fcfaff);
            border: 1px solid rgba(123, 44, 191, 0.2);
            display: none;
            animation: fadeIn 0.5s ease forwards;
            box-shadow: 0 4px 15px rgba(123, 44, 191, 0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-number {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(123, 44, 191, 0.1);
        }

        .result-astro {
            font-size: 2.5rem;
            color: var(--secondary-color);
            text-shadow: 0 0 15px rgba(157, 78, 221, 0.1);
        }

        .result-title {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-color);
        }

        .result-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-muted);
            text-align: justify;
            margin-bottom: 15px;
        }

        .astro-divider {
            border-top: 1px dashed var(--border-color);
            margin: 20px 0;
            padding-top: 15px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>🔮 Portal Místico</h1>
        <p>Descubra os segredos dos números e dos astros</p>
    </header>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('data-tab')">Nascimento</button>
        <button class="tab-btn" onclick="switchTab('nome-tab')">Nome Completo</button>
    </div>

    <div id="data-tab" class="tab-content active">
        <div class="form-group">
            <label for="birthdate">Escolha sua data de nascimento:</label>
            <input type="date" id="birthdate" value="2000-01-01">
        </div>
        <button class="btn-calc" onclick="calcularMapaNascimento()">Calcular Meu Perfil</button>
    </div>

    <div id="nome-tab" class="tab-content">
        <div class="form-group">
            <label for="fullname">Digite seu nome completo:</label>
            <input type="text" id="fullname" placeholder="Ex: Maria Silva" autocomplete="off">
        </div>
        <button class="btn-calc" onclick="calcularNumeroNome()">Calcular Número do Nome</button>
    </div>

    <div id="result-box" class="result-section">
        <div id="numerology-result">
            <div class="result-number" id="res-num">7</div>
            <div class="result-title" id="res-title">O Pensador</div>
            <div class="result-text" id="res-desc">Carregando...</div>
        </div>

        <div id="astrology-result" class="astro-divider" style="display: none;">
            <div class="result-number result-astro" id="res-signo-icon">♈</div>
            <div class="result-title" id="res-signo-nome">Áries</div>
            <div class="result-text" id="res-signo-desc">Carregando...</div>
        </div>
    </div>
</div>

<script>
    // Banco de dados de interpretações numerológicas
    const INTERPRETACOES_DATA = {
        1: { titulo: "O Líder", desc: "Independente, pioneiro, focado e ambicioso. Você nasceu para liderar e abrir caminhos novos. Seu principal desafio é aprender a superar o egoísmo e a impulsividade." },
        2: { titulo: "O Diplomata", desc: "Cooperativo, sensível, harmonioso e excelente parceiro. Você trabalha melhor em equipe e busca sempre a paz. Seu desafio é aprender a não ser excessivamente dependente dos outros." },
        3: { titulo: "O Comunicador", desc: "Expressivo, creative, sociável e otimista. Possui um dom natural para as artes e para a oratória. Seu desafio é manter o foco e não dispersar sua valiosa energia." },
        4: { titulo: "O Construtor", desc: "Prático, organizado, trabalhador, leal e estável. Você é a fundação de qualquer projeto seguro. Seu desafio é vencer a teimosia e aceitar mudanças com mais facilidade." },
        5: { titulo: "O Viajante", desc: "Livre, versátil, aventureiro e altamente adaptável. Você ama a liberdade e detesta a rotina. Seu desafio é desenvolver a constância e controlar a impaciência." },
        6: { titulo: "O Protetor", desc: "Responsável, amoroso, acolhedor e focado no bem-estar da família e comunidade. Tem grande senso de justiça. Seu maior desafio é controlar o perfeccionismo e a tendência a se sobrecarregar." },
        7: { titulo: "O Pensador", desc: "Analítico, espiritual, intuitivo e muito reservado. Busca a verdade por trás das aparências e ama o conhecimento profundo. Seu desafio é evitar o isolamento e o excesso de frieza emocional." },
        8: { titulo: "O Executivo", desc: "Focado no sucesso material, ambicioso, forte, ético e justo. Sabe gerenciar e comandar grandes metas. Seu desafio é equilibrar a ambição financeira com a espiritualidade." },
        9: { titulo: "O Humanitário", desc: "Generoso, idealista, compassivo e tolerante. Você deseja mudar o mundo para melhor. Seu desafio é não se doar tanto a ponto de esquecer das suas próprias necessidades." },
        11: { titulo: "Número Mestre: O Visionário", desc: "Altamente intuitivo, inspirado e conectado ao plano espiritual. Você atua como um farol para a humanidade. Traz a energia do 2 elevada ao extremo, exigindo grande equilíbrio emocional." },
        22: { titulo: "Número Mestre: O Arquiteto Master", desc: "A capacidade de transformar os maiores ideais abstratos em realizações materiais palpáveis. Traz a estabilidade do 4 multiplicada pela genialidade mística." },
        33: { titulo: "Número Mestre: O Mestre Guia", desc: "A energia do amor universal e da cura em seu grau mais puro. Indivíduos que dedicam a vida a guiar e proteger o desenvolvimento espiritual do próximo." }
    };

    const INTERPRETACOES_NOME = {
        1: { titulo: "Expressão da Individualidade", desc: "Seu nome emana a energia da independência e da inovação. As pessoas te veem como alguém determinado e autossuficiente." },
        2: { titulo: "Expressão da Parceria", desc: "Seu nome transmite acolhimento, paciência e habilidade de mediação. Você atrai conexões harmoniosas." },
        3: { titulo: "Expressão do Brilho", desc: "Popularidade, alegria e magnetismo social. Seu nome tem uma vibração leve que atrai amigos e oportunidades de comunicação." },
        4: { titulo: "Expressão da Confiança", desc: "Transmite seriedade, segurança e solidez. As pessoas sabem que podem contar com você em momentos de crise." },
        5: { titulo: "Expressão da Mudança", desc: "Magnetismo dinâmico e imprevisível. Seu nome sugere curiosidade e uma personalidade magnética que atrai novidades." },
        6: { titulo: "Expressão do Coração", desc: "Gera uma sensação instantânea de conforto, instinto maternal/paternal e senso de abrigo nos outros." },
        7: { titulo: "Expressão do Mistério", desc: "Transmite inteligência refinada, respeito e um ar enigmático. Inspira sabedoria intelectual ou espiritual." },
        8: { titulo: "Expressão do Poder", desc: "Emana autoridade, imponência e capacidade executiva. É o número ligado à prosperidade e ao respeito profissional." },
        9: { titulo: "Expressão Universal", desc: "Seu nome gera empatia imediata. As pessoas se sentem compreendidas por você, que exala um ar de sabedoria ancestral." }
    };

    // Banco de dados Astrológico
    const SIGNOS_DATA = [
        { nome: "Capricórnio", icone: "♑", diaInicio: 22, mesInicio: 12, diaFim: 19, mesFim: 1, desc: "Determinado, pragmático e focado em metas. Possui uma enorme resiliência para alcançar o topo." },
        { nome: "Aquário", icone: "♒", diaInicio: 20, mesInicio: 1, diaFim: 18, mesFim: 2, desc: "Inovador, original, independente e humanitário. Valoriza a liberdade intelectual e conexões coletivas." },
        { nome: "Peixes", icone: "♓", diaInicio: 19, mesInicio: 2, diaFim: 20, mesFim: 3, desc: "Empático, intuitivo, artístico e profundamente sensível. Possui forte conexão com o inconsciente." },
        { nome: "Áries", icone: "♈", diaInicio: 21, mesInicio: 3, diaFim: 19, mesFim: 4, desc: "Corajoso, entusiasmado, líder natural e cheio de energia. Age por impulso criativo e pioneirismo." },
        { nome: "Touro", icone: "♉", diaInicio: 20, mesInicio: 4, diaFim: 20, mesFim: 5, desc: "Paciente, confiável, persistente e amante do conforto. Aprecia a estabilidade material e a beleza real." },
        { nome: "Gêmeos", icone: "♊", diaInicio: 21, mesInicio: 5, diaFim: 20, mesFim: 6, desc: "Curioso, versátil, expressivo e intelectual. Adora aprender coisas novas e compartilhar ideias." },
        { nome: "Câncer", icone: "♋", diaInicio: 21, mesInicio: 6, diaFim: 22, mesFim: 7, desc: "Protetor, intuitivo, sentimental e focado nas raíces familiares. Tem uma forte casca para resguardar seu interior." },
        { nome: "Leão", icone: "♌", diaInicio: 23, mesInicio: 7, diaFim: 22, mesFim: 8, desc: "Generoso, caloroso, criativo e carismático. Possui um brilho natural que busca inspirar os outros." },
        { nome: "Virgem", icone: "♍", diaInicio: 23, mesInicio: 8, diaFim: 22, mesFim: 9, desc: "Prático, analítico, detalhista e focado na utilidade. Busca o aperfeiçoamento constante do ambiente e de si." },
        { nome: "Libra", icone: "♎", diaInicio: 23, mesInicio: 9, diaFim: 22, mesFim: 10, desc: "Diplomático, justo, esteta e focado em relacionamentos. Busca o equilíbrio e a harmonia social." },
        { nome: "Escorpião", icone: "♏", diaInicio: 23, mesInicio: 10, diaFim: 21, mesFim: 11, desc: "Intenso, magnético, estratégico e perspicaz. Capaz de passar por grandes transformações de vida." },
        { nome: "Sagitário", icone: "♐", diaInicio: 22, mesInicio: 11, diaFim: 21, mesFim: 12, desc: "Otimista, aventureiro, filósofo e amante da liberdade. Busca expandir seus horizontes mentais e geográficos." }
    ];

    const tabelaPitagorica = {
        'A': 1, 'J': 1, 'S': 1, 'B': 2, 'K': 2, 'T': 2, 'C': 3, 'L': 3, 'U': 3,
        'D': 4, 'M': 4, 'V': 4, 'E': 5, 'N': 5, 'W': 5, 'F': 6, 'O': 6, 'X': 6,
        'G': 7, 'P': 7, 'Y': 7, 'H': 8, 'Q': 8, 'Z': 8, 'I': 9, 'R': 9
    };

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        document.getElementById('result-box').style.display = 'none';
    }

    function reduzirNumero(soma, aceitarMestres = true) {
        while (soma > 9) {
            if (aceitarMestres && (soma === 11 || soma === 22 || soma === 33)) {
                return soma;
            }
            soma = soma.toString().split('').reduce((acc, digito) => acc + parseInt(digito), 0);
        }
        return soma;
    }

    // Identificar o signo a partir do dia e do mês
    function obterSigno(dia, mes) {
        return SIGNOS_DATA.find(s => {
            if (s.mesInicio === mes && dia >= s.diaInicio) return true;
            if (s.mesFim === mes && dia <= s.diaFim) return true;
            return false;
        }) || SIGNOS_DATA[0]; // Retorna Capricórnio caso caia na transição exata de final do ano
    }

    // Ação Principal: Calcular Numerologia + Signo
    function calcularMapaNascimento() {
        const dateInput = document.getElementById('birthdate').value;
        if (!dateInput) return;

        // Desmebra a data para o signo
        const partesData = dateInput.split('-');
        const ano = parseInt(partesData[0]);
        const mes = parseInt(partesData[1]);
        const dia = parseInt(partesData[2]);

        // 1. Cálculo Numerológico
        const digitos = dateInput.replace(/-/g, '');
        let soma = 0;
        for (let i = 0; i < digitos.length; i++) {
            soma += parseInt(digitos[i]);
        }
        const numFinal = reduzirNumero(soma, true);
        const infoNum = INTERPRETACOES_DATA[numFinal];

        // 2. Cálculo Astrológico
        const signoObj = obterSigno(dia, mes);

        // Exibir resultados combinados
        document.getElementById('res-num').innerText = numFinal;
        document.getElementById('res-title').innerText = infoNum.titulo;
        document.getElementById('res-desc').innerText = infoNum.desc;

        document.getElementById('res-signo-icon').innerText = signoObj.icone;
        document.getElementById('res-signo-nome').innerText = `Signo Solar: ${signoObj.nome}`;
        document.getElementById('res-signo-desc').innerText = signoObj.desc;

        document.getElementById('astrology-result').style.display = 'block';
        document.getElementById('result-box').style.display = 'block';
    }

    function calcularNumeroNome() {
        const nomeInput = document.getElementById('fullname').value.toUpperCase();
        if (!nomeInput.trim()) {
            alert("Por favor, digite um nome.");
            return;
        }

        const nomeLimpo = nomeInput.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        let soma = 0;

        for (let i = 0; i < nomeLimpo.length; i++) {
            const letra = nomeLimpo[i];
            if (tabelaPitagorica[letra]) {
                soma += tabelaPitagorica[letra];
            }
        }

        const numFinal = reduzirNumero(soma, false); 
        const infoNum = INTERPRETACOES_NOME[numFinal];

        document.getElementById('res-num').innerText = numFinal;
        document.getElementById('res-title').innerText = infoNum.titulo;
        document.getElementById('res-desc').innerText = infoNum.desc;

        // Oculta a área de signo ao calcular o nome, já que nomes não mudam o signo solar
        document.getElementById('astrology-result').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
    }
</script>

</body>
</html>
