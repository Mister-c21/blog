<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerologia & Astrologia: Redescubra-se</title>
    <style>
        :root {
            --bg-color: #f7f5fa;
            --card-bg: #ffffff;
            --primary-color: #7b2cbf;
            --secondary-color: #9d4edd;
            --astro-color: #c77dff;
            --text-color: #240046;
            --text-muted: #5a5066;
            --border-color: #e0d6ed;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0;
        }

        .app-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 100%;
            min-height: 100vh;
            border-radius: 0;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(123, 44, 191, 0.1);
            border: none;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(123, 44, 191, 0.1);
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .tab-menu {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            background: rgba(123, 44, 191, 0.05);
            padding: 5px;
            border-radius: 10px;
            gap: 5px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            cursor: pointer;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: #fff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: rgba(123, 44, 191, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button.btn-calc {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        button.btn-calc:hover {
            background-color: var(--secondary-color);
        }

        button.btn-calc:active {
            transform: scale(0.98);
        }

        .result-section {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            background: linear-gradient(145deg, #ffffff, #fcfaff);
            border: 1px solid rgba(123, 44, 191, 0.2);
            display: none;
            animation: fadeIn 0.5s ease forwards;
            box-shadow: 0 4px 15px rgba(123, 44, 191, 0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-number {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(123, 44, 191, 0.1);
        }

        .result-astro {
            font-size: 2.5rem;
            color: var(--secondary-color);
            text-shadow: 0 0 15px rgba(157, 78, 221, 0.1);
        }

        .result-title {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-color);
        }

        .result-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-muted);
            text-align: justify;
            margin-bottom: 15px;
        }

        .search-container {
            margin-top: 20px;
            border-top: 1px dashed var(--border-color);
            padding-top: 15px;
        }

        .search-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .search-engines {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .search-btn {
            flex: 1;
            padding: 10px;
            background-color: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--primary-color);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .search-btn:hover {
            background-color: rgba(123, 44, 191, 0.05);
            border-color: var(--primary-color);
        }

        .astro-divider {
            border-top: 1px dashed var(--border-color);
            margin: 20px 0;
            padding-top: 15px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>

            <div class="result-title" id="res-chinese-nome">Signo Chinês: Dragão</div>
            <div class="result-text" id="res-chinese-desc">Carregando...</div>
        </div>

        <div class="search-container">
            <div class="search-title">Saber mais sobre este número em:</div>
            <div class="search-engines">
                <button class="search-btn" onclick="buscarResultado('google')">Google</button>
                <button class="search-btn" onclick="buscarResultado('bing')">Bing</button>
                <button class="search-btn" onclick="buscarResultado('duckduckgo')">DuckDuckGo</button>
            </div>
        </div>
    </div>

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-menu .tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        document.getElementById('result-box').style.display = 'none';
    }

    function reduzirNumero(soma, aceitarMestres = true) {
        while (soma > 9) {
            if (aceitarMestres && (soma === 11 || soma === 22 || soma === 33)) {
                return soma;
            }
            soma = soma.toString().split('').reduce((acc, digito) => acc + parseInt(digito), 0);
        }
        return soma;
    }

    function obterSigno(dia, mes) {
        return SIGNOS_DATA.find(s => {
            if (s.mesInicio === mes && dia >= s.diaInicio) return true;
            if (s.mesFim === mes && dia <= s.diaFim) return true;
            return false;
        }) || SIGNOS_DATA[0];
    }

    function obterSignoChines(ano) {
        const resto = ano % 12;
        return SIGNOS_CHINESES[resto];
    }

    function obterAscendente(signoSolarNome, horaStr) {
        const [horas, minutos] = horaStr.split(':').map(Number);
        const totalHoras = horas + minutos / 60;
        
        let indexSolar = SIGNOS_ORDEM.indexOf(signoSolarNome);
        let diffHoras = totalHoras - 6;
        if (diffHoras < 0) diffHoras += 24;
        
        let passosZodiaco = Math.floor(diffHoras / 2);
        let indexAscendente = (indexSolar + passosZodiaco) % 12;
        
        return SIGNOS_ORDEM[indexAscendente];
    }

        const dia = parseInt(partesData[2]);

        }

        const ascObj = ASCENDENTES_DESC[nomeAscendente];

        document.getElementById('res-num').innerText = numFinal;
        document.getElementById('res-title').innerText = infoNum.titulo;
        document.getElementById('res-desc').innerText = infoNum.desc;

        document.getElementById('res-signo-icon').innerText = signoObj.icone;
        document.getElementById('res-signo-nome').innerText = `Signo Solar: ${signoObj.nome}`;
        document.getElementById('res-signo-desc').innerText = signoObj.desc;

        document.getElementById('res-asc-icon').innerText = ascObj.icone;
        document.getElementById('res-asc-nome').innerText = `Signo Ascendente: ${nomeAscendente}`;
        document.getElementById('res-asc-desc').innerText = ascObj.desc;

        document.getElementById('res-chinese-icon').innerText = signoChinesObj.icone;
        document.getElementById('res-chinese-nome').innerText = `Signo Chinês: ${signoChinesObj.nome}`;
        document.getElementById('res-chinese-desc').innerText = signoChinesObj.desc;

        document.getElementById('astrology-result').style.display = 'block';
        document.getElementById('ascendant-result').style.display = 'block';
        document.getElementById('chinese-result').style.display = 'block';
        document.getElementById('result-box').style.display = 'block';
    }

    function calcularNumeroNome() {
        const nomeInput = document.getElementById('fullname').value.toUpperCase();
        if (!nomeInput.trim()) {
            alert("Por favor, digite um nome.");
            return;
        }

        const nomeLimpo = nomeInput.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        let soma = 0;

        for (let i = 0; i < nomeLimpo.length; i++) {
            const letra = nomeLimpo[i];
            if (tabelaPitagorica[letra]) {
                soma += tabelaPitagorica[letra];
            }
        }

        const numFinal = reduzirNumero(soma, false); 
        const infoNum = INTERPRETACOES_NOME[numFinal];

        document.getElementById('res-num').innerText = numFinal;
        document.getElementById('res-title').innerText = infoNum.titulo;
        document.getElementById('res-desc').innerText = infoNum.desc;

        document.getElementById('astrology-result').style.display = 'none';
        document.getElementById('ascendant-result').style.display = 'none';
        document.getElementById('chinese-result').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
    }

    function calcularNumeroIsolado() {
        const numInput = document.getElementById('singlenumber').value;
        if (!numInput || parseInt(numInput) <= 0) {
            alert("Por favor, digite um número válido.");
            return;
        }

        // Calcula a soma dos dígitos do número inserido diretamente
        let soma = numInput.toString().split('').reduce((acc, digito) => acc + parseInt(digito), 0);
        
        // Reduz aceitando os Números Mestres (11, 22, 33), reutilizando sua base INTERPRETACOES_DATA
        const numFinal = reduzirNumero(soma, true);
        const infoNum = INTERPRETACOES_DATA[numFinal];

        document.getElementById('res-num').innerText = numFinal;
        document.getElementById('res-title').innerText = infoNum ? infoNum.titulo : "Vibração Numérica";
        document.getElementById('res-desc').innerText = infoNum ? infoNum.desc : "Interpretação não encontrada para este número específico.";

        document.getElementById('astrology-result').style.display = 'none';
        document.getElementById('ascendant-result').style.display = 'none';
        document.getElementById('chinese-result').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
    }

    function buscarResultado(motor) {
        const numero = document.getElementById('res-num').innerText;
        const titulo = document.getElementById('res-title').innerText;
        const query = encodeURIComponent(`numerologia numero ${numero} ${titulo}`);
        
        let url = '';
        if (motor === 'google') {
            url = `https://www.google.com/search?q=${query}`;
        } else if (motor === 'bing') {
            url = `https://www.bing.com/search?q=${query}`;
        } else if (motor === 'duckduckgo') {
            url = `https://duckduckgo.com/?q=${query}`;
        }
        
        if (url) {
            window.open(url, '_blank');
        }
    }
</script>
