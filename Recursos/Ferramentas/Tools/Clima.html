<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsão do Tempo Pro</title>
    <style>
        :root {
            --primary-color: #ffffff; 
            --primary-hover: #e6e6e6;
            --text-color: #1d1d1f; /* Escuro para legibilidade no fundo branco */
            --bg-glass: rgba(255, 255, 255, 0.4); /* Vidro claro adaptado */
            --border-glass: rgba(0, 0, 0, 0.08);
            --shadow-glass: rgba(0, 0, 0, 0.05);
            --detail-violet: #8a2be2; /* Violeta para detalhes */
            --detail-violet-hover: #9933ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffffff, #f5f5f7, #ffffff); /* Fundo e body brancos */
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            padding: 20px;
        }

        .weather-container {
            width: 100%;
            max-width: 420px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 var(--shadow-glass);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Barra de Busca */
        .search-group {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-shrink: 0;
        }

        .search-group input {
            flex: 1;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-glass);
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-color);
            outline: none;
            font-size: 0.95rem;
            min-width: 0;
            transition: border-color 0.2s;
        }

        .search-group input:focus {
            border-color: var(--detail-violet); /* Foco em violeta */
        }

        .search-group button {
            background: var(--detail-violet); /* Botão de busca em violeta */
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s;
            box-shadow: 0 4px 12px rgba(138, 43, 226, 0.2);
        }

        .search-group button:hover {
            background: var(--detail-violet-hover);
        }

        .search-group button svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
        }

        /* Painel Principal de Exibição */
        .weather-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: fadeIn 0.4s ease-out;
        }

        .city-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 4px;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .weather-condition {
            font-size: 0.9rem;
            color: rgba(0, 0, 0, 0.5);
            text-transform: capitalize;
            margin-bottom: 16px;
        }

        .weather-icon-box {
            width: 80px;
            height: 80px;
            margin-bottom: 12px;
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .weather-icon-box svg {
            width: 100%;
            height: 100%;
        }

        .temperature {
            font-size: 3.5rem;
            font-weight: 200;
            margin-bottom: 24px;
            font-variant-numeric: tabular-nums;
        }

        /* Grade de Detalhes (Umidade, Vento, etc.) */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            border-top: 1px solid var(--border-glass);
            padding-top: 20px;
        }

        .detail-item {
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            overflow: hidden;
        }

        .detail-item svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: var(--detail-violet); /* Ícones internos em violeta */
            stroke-width: 2;
            flex-shrink: 0;
        }

        .detail-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .detail-label {
            font-size: 0.75rem;
            color: rgba(0, 0, 0, 0.4);
            font-weight: 500;
        }

        .detail-value {
            font-size: 0.95rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Mensagens de Feedback */
        .info-msg {
            text-align: center;
            padding: 40px 20px;
            color: rgba(0, 0, 0, 0.4);
            font-size: 0.95rem;
            line-height: 1.4;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 380px) {
            .weather-container { padding: 16px; }
            .temperature { font-size: 3rem; }
            .details-grid { gap: 8px; }
        }
    </style>
</head>
<body>

    <div class="weather-container">
        <div class="search-group">
            <input type="text" id="city-input" placeholder="Buscar cidade (ex: Sao Paulo)..." autocomplete="off">
            <button onclick="searchWeather()">
                <svg viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>

        <div id="weather-content">
            <div class="info-msg">
                Digite o nome de uma cidade para conferir a previsão do tempo em tempo real.
            </div>
        </div>
    </div>

    <script>
        const cityInput = document.getElementById('city-input');
        const weatherContent = document.getElementById('weather-content');

        const weatherIcons = {
            sunny: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`,
            cloudy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path></svg>`,
            rainy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="16" y1="13" x2="14" y2="21"></line><line x1="8" y1="13" x2="6" y2="21"></line><line x1="12" y1="15" x2="10" y2="23"></line><path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"></path></svg>`,
            stormy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 16.9A5 5 0 0 0 18 7h-1.26a8 8 0 1 0-11.62 8.58"></path><polyline points="13 11 9 17 12 17 11 23 15 17 12 17 13 11"></polyline></svg>`
        };

        function getIconKey(code) {
            const c = parseInt(code);
            if ([113].includes(c)) return 'sunny';
            if ([116, 119, 122, 143, 248, 260].includes(c)) return 'cloudy';
            if ([176, 182, 185, 263, 266, 281, 284, 293, 296, 299, 302, 305, 308, 311, 314, 317, 320, 353, 356, 359, 362, 365].includes(c)) return 'rainy';
            if ([200, 386, 389, 392].includes(c)) return 'stormy';
            return 'cloudy';
        }

        cityInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });

        async function searchWeather() {
            const query = cityInput.value.trim();
            if (!query) return;

            weatherContent.innerHTML = `<div class="info-msg">Buscando informações meteorológicas em tempo real...</div>`;

            try {
                const response = await fetch(`https://wttr.in/${encodeURIComponent(query)}?format=j1`);
                
                if (!response.ok) {
                    throw new Error('Falha na resposta do servidor.');
                }

                const data = await response.json();
                
                const current = data.current_condition[0];
                const area = data.nearest_area[0];
                
                const mappedData = {
                    name: `${area.areaName[0].value}, ${area.country[0].value}`,
                    temp: current.temp_C,
                    cond: current.lang_pt ? current.lang_pt[0].value : current.weatherDesc[0].value,
                    icon: getIconKey(current.weatherCode),
                    humidity: `${current.humidity}%`,
                    wind: `${current.windspeedKmph} km/h`
                };

                renderWeather(mappedData);

            } catch (error) {
                weatherContent.innerHTML = `
                    <div class="info-msg" style="color: #ff4565;">
                        Não foi possível obter os dados meteorológicos.<br>
                        <span style="font-size: 0.8rem; color: rgba(0,0,0,0.4);">Verifique a ortografia da cidade ou sua conexão de rede.</span>
                    </div>
                `;
            }
        }

        function renderWeather(data) {
            weatherContent.innerHTML = '';

            const displayDiv = document.createElement('div');
            displayDiv.className = 'weather-display';

            displayDiv.innerHTML = `
                <h2 class="city-name" title="${data.name}">${data.name}</h2>
                <span class="weather-condition">${data.cond}</span>
                
                <div class="weather-icon-box">
                    ${weatherIcons[data.icon]}
                </div>
                
                <div class="temperature">${data.temp}°C</div>
                
                <div class="details-grid">
                    <div class="detail-item">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                        </svg>
                        <div class="detail-info">
                            <span class="detail-label">Umidade</span>
                            <span class="detail-value">${data.humidity}</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <svg viewBox="0 0 24 24">
                            <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"></path>
                        </svg>
                        <div class="detail-info">
                            <span class="detail-label">Vento</span>
                            <span class="detail-value">${data.wind}</span>
                        </div>
                    </div>
                </div>
            `;

            weatherContent.appendChild(displayDiv);
        }
    </script>
</body>
</html>
