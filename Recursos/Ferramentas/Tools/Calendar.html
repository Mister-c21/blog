<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário Multifuncional</title>
    <style>
        :root {
            --primary-color: #ffffff; /* branco como principal */
            --primary-hover: #e6e6e6;
            --text-color: #1d1d1f; /* Escuro para legibilidade no fundo branco */
            --bg-glass: rgba(255, 255, 255, 0.4); /* Vidro claro adaptado */
            --border-glass: rgba(0, 0, 0, 0.08);
            --shadow-glass: rgba(0, 0, 0, 0.05);
            --detail-violet: #8a2be2; /* Violeta para detalhes */
            --detail-violet-hover: #9933ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffffff, #f5f5f7, #ffffff); /* Fundo e body brancos */
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            padding: 20px;
        }

        .calendar-container {
            width: 100%;
            max-width: 420px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 var(--shadow-glass);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Abas de Navegação Superior */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 10px;
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: rgba(0, 0, 0, 0.4);
            padding: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tab-btn svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            transition: stroke 0.3s ease;
            flex-shrink: 0;
        }

        .tab-btn.active {
            color: var(--detail-violet);
            background: rgba(138, 43, 226, 0.1); /* Detalhe em violeta */
            box-shadow: inset 0 0 10px rgba(138, 43, 226, 0.15);
        }

        /* Views */
        .view-panel {
            display: none;
            width: 100%;
        }

        .view-panel.active {
            display: block;
        }

        /* Cabeçalho do Mês */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        .calendar-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: capitalize;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 5px;
        }

        .nav-btn {
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-glass);
            color: var(--text-color);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .nav-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        /* Grid do Calendário */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            text-align: center;
        }

        .weekday {
            font-size: 0.8rem;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.4);
            padding-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            font-size: 0.95rem;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            position: relative;
        }

        .day:hover:not(.empty) {
            background: rgba(0, 0, 0, 0.04);
            border-color: var(--border-glass);
        }

        .day.today {
            background: rgba(138, 43, 226, 0.15); /* Detalhe em violeta */
            border-color: var(--detail-violet);
            color: var(--detail-violet);
            font-weight: 600;
        }

        .day.selected {
            background: var(--detail-violet); /* Detalhe em violeta */
            color: white;
            font-weight: 600;
        }

        .day .dot {
            width: 5px;
            height: 5px;
            background-color: #ff4565;
            border-radius: 50%;
            position: absolute;
            bottom: 4px;
        }

        .day.empty {
            cursor: default;
        }

        /* Seção de Eventos Rápidos */
        .event-section {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 15px;
        }

        .event-section h3 {
            font-size: 0.95rem;
            margin-bottom: 10px;
            color: rgba(0, 0, 0, 0.6);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .event-input-group {
            display: flex;
            gap: 8px;
        }

        .event-input-group input {
            flex: 1;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--border-glass);
            padding: 8px 12px;
            border-radius: 8px;
            color: var(--text-color);
            outline: none;
            font-size: 0.9rem;
            min-width: 0;
        }

        .event-input-group button {
            background: var(--detail-violet); /* Botão em destaque violeta */
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(138, 43, 226, 0.2);
        }

        .event-input-group button:hover {
            background: var(--detail-violet-hover);
        }

        /* Agenda/Lista Geral de Compromissos */
        .events-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 320px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .events-list::-webkit-scrollbar {
            width: 4px;
        }
        .events-list::-webkit-scrollbar-thumb {
            background: var(--border-glass);
            border-radius: 4px;
        }

        .event-item {
            background: rgba(0, 0, 0, 0.01);
            border: 1px solid var(--border-glass);
            padding: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            overflow: hidden;
        }

        .event-info {
            flex: 1;
            min-width: 0;
        }

        .event-info .event-title {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 2px;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .event-info .event-date {
            font-size: 0.75rem;
            color: rgba(0, 0, 0, 0.4);
        }

        .delete-event-btn {
            background: none;
            border: none;
            color: #ff4565;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: background 0.2s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-event-btn:hover {
            background: rgba(255, 69, 101, 0.1);
        }

        @media (max-width: 380px) {
            .calendar-container { padding: 16px; }
            .calendar-grid { gap: 4px; }
            .day { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="calendar-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchView('calendar', event)">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                Calendário
            </button>
            <button class="tab-btn" onclick="switchView('agenda', event)">
                <svg viewBox="0 0 24 24">
                    <line x1="8" y1="6" x2="21" y2="6"></line>
                    <line x1="8" y1="12" x2="21" y2="12"></line>
                    <line x1="8" y1="18" x2="21" y2="18"></line>
                    <line x1="3" y1="6" x2="3.01" y2="6" stroke-linecap="round" stroke-width="3"></line>
                    <line x1="3" y1="12" x2="3.01" y2="12" stroke-linecap="round" stroke-width="3"></line>
                    <line x1="3" y1="18" x2="3.01" y2="18" stroke-linecap="round" stroke-width="3"></line>
                </svg>
                Agenda
            </button>
        </div>

        <div id="view-calendar" class="view-panel active">
            <div class="calendar-header">
                <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
                <h2 id="month-year-title">Janeiro 2026</h2>
                <button class="nav-btn" onclick="changeMonth(1)">▶</button>
            </div>

            <div class="calendar-grid" id="calendar-days-grid">
                </div>

            <div class="event-section">
                <h3 id="selected-date-title">Selecione um dia para adicionar evento</h3>
                <div class="event-input-group">
                    <input type="text" id="event-input" placeholder="Novo compromisso..." disabled>
                    <button id="add-event-btn" onclick="addEvent()" disabled>Salvar</button>
                </div>
            </div>
        </div>

        <div id="view-agenda" class="view-panel">
            <div class="events-list" id="general-events-list">
                </div>
        </div>
    </div>

    <script>
        const daysGrid = document.getElementById('calendar-days-grid');
        const monthYearTitle = document.getElementById('month-year-title');
        const selectedDateTitle = document.getElementById('selected-date-title');
        const eventInput = document.getElementById('event-input');
        const addEventBtn = document.getElementById('add-event-btn');
        const generalEventsList = document.getElementById('general-events-list');

        let currentDate = new Date();
        let selectedDateStr = null;
        let events = JSON.parse(localStorage.getItem('cal_events')) || {};

        const monthsLabels = [
            "janeiro", "fevereiro", "março", "abril", "maio", "junho",
            "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"
        ];
        const weekdaysLabels = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];

        function init() {
            renderCalendar();
            renderGeneralAgenda();
        }

        function switchView(view, event) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const targetButton = event.target.closest('.tab-btn');
            if (targetButton) targetButton.classList.add('active');

            document.querySelectorAll('.view-panel').forEach(panel => panel.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');

            if(view === 'agenda') renderGeneralAgenda();
        }

        function renderCalendar() {
            daysGrid.innerHTML = '';
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            monthYearTitle.innerText = `${monthsLabels[month]} ${year}`;

            weekdaysLabels.forEach(day => {
                const dayEl = document.createElement('div');
                dayEl.className = 'weekday';
                dayEl.innerText = day;
                daysGrid.appendChild(dayEl);
            });

            const firstDayIndex = new Date(year, month, 1).getDay();
            const lastDay = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'day empty';
                daysGrid.appendChild(emptyCell);
            }

            const today = new Date();
            for (let day = 1; day <= lastDay; day++) {
                const dayCell = document.createElement('div');
                dayCell.className = 'day';
                dayCell.innerText = day;

                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

                if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                    dayCell.classList.add('today');
                }

                if (selectedDateStr === dateKey) {
                    dayCell.classList.add('selected');
                }

                if (events[dateKey] && events[dateKey].length > 0) {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    dayCell.appendChild(dot);
                }

                dayCell.onclick = () => selectDate(dateKey, dayCell);
                daysGrid.appendChild(dayCell);
            }
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function selectDate(dateKey, element) {
            selectedDateStr = dateKey;
            
            document.querySelectorAll('.day').forEach(d => d.classList.remove('selected'));
            element.classList.add('selected');

            const [y, m, d] = dateKey.split('-');
            selectedDateTitle.innerText = `Eventos para ${d}/${m}/${y}`;
            
            eventInput.disabled = false;
            addEventBtn.disabled = false;
            eventInput.focus();
        }

        function addEvent() {
            const text = eventInput.value.trim();
            if (!text || !selectedDateStr) return;

            if (!events[selectedDateStr]) {
                events[selectedDateStr] = [];
            }

            events[selectedDateStr].push(text);
            localStorage.setItem('cal_events', JSON.stringify(events));
            
            eventInput.value = '';
            renderCalendar();
        }

        function deleteEvent(dateKey, index) {
            if (events[dateKey]) {
                events[dateKey].splice(index, 1);
                if (events[dateKey].length === 0) delete events[dateKey];
                
                localStorage.setItem('cal_events', JSON.stringify(events));
                renderCalendar();
                renderGeneralAgenda();
            }
        }

        function renderGeneralAgenda() {
            generalEventsList.innerHTML = '';
            const sortedDates = Object.keys(events).sort();

            if (sortedDates.length === 0) {
                generalEventsList.innerHTML = '<div style="text-align:center; padding:20px; color:rgba(0,0,0,0.4); font-size:0.9rem;">Nenhum compromisso agendado.</div>';
                return;
            }

            sortedDates.forEach(dateKey => {
                const [y, m, d] = dateKey.split('-');
                
                events[dateKey].forEach((eventText, index) => {
                    const item = document.createElement('div');
                    item.className = 'event-item';

                    item.innerHTML = `
                        <div class="event-info">
                            <div class="event-title">${eventText}</div>
                            <div class="event-date">${d}/${m}/${y}</div>
                        </div>
                        <button class="delete-event-btn" onclick="deleteEvent('${dateKey}', ${index})">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px; height:16px;">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                    `;
                    generalEventsList.appendChild(item);
                });
            });
        }

        window.onload = init;
    </script>
</body>
</html>
