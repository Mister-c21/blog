<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Multifuncional Pro</title>
    <style>
        :root {
            --primary-color: #8a2be2; /* blueviolet */
            --primary-hover: #9933ff;
            --text-color: #f8f8ff; /* ghostwhite */
            --bg-glass: rgba(255, 255, 255, 0.06);
            --border-glass: rgba(255, 255, 255, 0.1);
            --shadow-glass: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c1b, #241442, #0f0c1b);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            padding: 20px;
        }

        .calc-container {
            width: 100%;
            max-width: 400px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 var(--shadow-glass);
        }

        /* Abas de Navegação Superior */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 10px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: rgba(248, 248, 255, 0.5);
            padding: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            transition: fill 0.3s ease;
        }

        .tab-btn.active {
            color: var(--text-color);
            background: rgba(138, 43, 226, 0.2);
            box-shadow: inset 0 0 10px rgba(138, 43, 226, 0.3);
        }

        /* Área de Telas */
        .display {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
        }

        .display .history {
            font-size: 0.9rem;
            color: rgba(248, 248, 255, 0.5);
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .display .current {
            font-size: 2rem;
            font-weight: 300;
            white-space: nowrap;
            overflow: hidden;
            color: var(--text-color);
        }

        /* Teclados */
        .keypad {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .keypad.active {
            display: grid;
        }

        button.key {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 16px;
            font-size: 1.1rem;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 500;
        }

        button.key:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
        }

        @media (hover: hover) {
            button.key:hover {
                background: rgba(255, 255, 255, 0.08);
                border-color: rgba(255, 255, 255, 0.2);
            }
        }

        button.key.operator { color: var(--primary-color); font-weight: 600; }
        button.key.action { color: #ff4565; }
        button.key.equal {
            background: var(--primary-color);
            color: var(--text-color);
            grid-column: span 2;
            font-weight: 600;
        }
        @media (hover: hover) { button.key.equal:hover { background: var(--primary-hover); } }

        @media (max-width: 380px) {
            .calc-container { padding: 16px; }
            button.key { padding: 14px; font-size: 1rem; }
            .display .current { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="calc-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchMode('standard', event)">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
                    <line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="2"/>
                    <line x1="9" y1="21" x2="9" y2="9" stroke="currentColor" stroke-width="2"/>
                    <path d="M5 6h2M14 5.5l2 2m0-2l-2 2M5 15h2M5 17h2M14 16h3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                Padrão
            </button>
            <button class="tab-btn" onclick="switchMode('scientific', event)">
                <svg viewBox="0 0 24 24">
                    <path d="M4.5 3h15A1.5 1.5 0 0 1 21 4.5v15a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 19.5v-15A1.5 1.5 0 0 1 4.5 3z" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M7 7h10M7 11h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M8 15l2 2m0-2l-2 2M14 16h2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                Científica
            </button>
        </div>

        <div class="display">
            <div class="history" id="history"></div>
            <div class="current" id="current">0</div>
        </div>

        <div class="keypad active" id="standard-keypad">
            <button class="key action" onclick="clearAll()">C</button>
            <button class="key operator" onclick="appendOperator('/')">÷</button>
            <button class="key operator" onclick="appendOperator('*')">×</button>
            <button class="key action" onclick="backspace()">⌫</button>

            <button class="key" onclick="appendNumber('7')">7</button>
            <button class="key" onclick="appendNumber('8')">8</button>
            <button class="key" onclick="appendNumber('9')">9</button>
            <button class="key operator" onclick="appendOperator('-')">−</button>

            <button class="key" onclick="appendNumber('4')">4</button>
            <button class="key" onclick="appendNumber('5')">5</button>
            <button class="key" onclick="appendNumber('6')">6</button>
            <button class="key operator" onclick="appendOperator('+')">+</button>

            <button class="key" onclick="appendNumber('1')">1</button>
            <button class="key" onclick="appendNumber('2')">2</button>
            <button class="key" onclick="appendNumber('3')">3</button>
            <button class="key equal" onclick="calculate()">=</button>

            <button class="key" onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
            <button class="key" onclick="appendDecimal()">.</button>
        </div>

        <div class="keypad" id="scientific-keypad">
            <button class="key action" onclick="clearAll()">C</button>
            <button class="key operator" onclick="scientificOp('sin')">sin</button>
            <button class="key operator" onclick="scientificOp('cos')">cos</button>
            <button class="key action" onclick="backspace()">⌫</button>

            <button class="key operator" onclick="scientificOp('tan')">tan</button>
            <button class="key operator" onclick="scientificOp('log')">log</button>
            <button class="key operator" onclick="scientificOp('ln')">ln</button>
            <button class="key operator" onclick="appendOperator('**')">xʸ</button>

            <button class="key operator" onclick="scientificOp('sqrt')">√x</button>
            <button class="key operator" onclick="scientificOp('sqr')">x²</button>
            <button class="key" onclick="appendConstant('pi')">π</button>
            <button class="key" onclick="appendConstant('e')">e</button>

            <button class="key" onclick="appendNumber('7')">7</button>
            <button class="key" onclick="appendNumber('8')">8</button>
            <button class="key" onclick="appendNumber('9')">9</button>
            <button class="key operator" onclick="appendOperator('/')">÷</button>

            <button class="key" onclick="appendNumber('4')">4</button>
            <button class="key" onclick="appendNumber('5')">5</button>
            <button class="key" onclick="appendNumber('6')">6</button>
            <button class="key operator" onclick="appendOperator('*')">×</button>

            <button class="key" onclick="appendNumber('1')">1</button>
            <button class="key" onclick="appendNumber('2')">2</button>
            <button class="key" onclick="appendNumber('3')">3</button>
            <button class="key operator" onclick="appendOperator('-')">−</button>

            <button class="key" onclick="appendNumber('0')">0</button>
            <button class="key" onclick="appendDecimal()">.</button>
            <button class="key equal" onclick="calculate()">=</button>
            <button class="key operator" onclick="appendOperator('+')">+</button>
        </div>
    </div>

    <script>
        const currentDisplay = document.getElementById('current');
        const historyDisplay = document.getElementById('history');

        let currentInput = '0';
        let currentMode = 'standard';
        let shouldResetDisplay = false;

        function switchMode(mode, event) {
            currentMode = mode;
            clearAll();

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            // Garante a captura correta do botão mesmo clicando no SVG interno
            const targetButton = event.target.closest('.tab-btn');
            if (targetButton) targetButton.classList.add('active');

            document.querySelectorAll('.keypad').forEach(kp => kp.classList.remove('active'));

            if (mode === 'standard') {
                document.getElementById('standard-keypad').classList.add('active');
            } else if (mode === 'scientific') {
                document.getElementById('scientific-keypad').classList.add('active');
            }
        }

        function appendNumber(number) {
            if (currentInput === '0' || shouldResetDisplay) {
                currentInput = number;
                shouldResetDisplay = false;
            } else {
                currentInput += number;
            }
            updateDisplay();
        }

        function appendDecimal() {
            if (shouldResetDisplay) {
                currentInput = '0.';
                shouldResetDisplay = false;
                updateDisplay();
                return;
            }
            const terms = currentInput.split(/[\+\-\*\/]/);
            const lastTerm = terms[terms.length - 1];
            if (!lastTerm.includes('.')) currentInput += '.';
            updateDisplay();
        }

        function appendOperator(operator) {
            if (shouldResetDisplay) shouldResetDisplay = false;
            
            const lastChar = currentInput.trim().slice(-1);
            if (['+', '-', '*', '/'].includes(lastChar) && operator !== '**') {
                currentInput = currentInput.slice(0, -1) + operator;
            } else if (currentInput.slice(-2) === '**') {
                currentInput = currentInput.slice(0, -2) + operator;
            } else {
                currentInput += operator;
            }
            updateDisplay();
        }

        function appendConstant(constant) {
            const val = constant === 'pi' ? Math.PI.toString() : Math.E.toString();
            if (currentInput === '0' || shouldResetDisplay) {
                currentInput = val;
                shouldResetDisplay = false;
            } else {
                const lastChar = currentInput.slice(-1);
                if (!isNaN(lastChar) || lastChar === '.') currentInput += '*' + val;
                else currentInput += val;
            }
            updateDisplay();
        }

        function scientificOp(operation) {
            try {
                let currentVal = eval(currentInput.replace(/÷/g, '/').replace(/×/g, '*'));
                let result;
                switch (operation) {
                    case 'sin': result = Math.sin(currentVal * Math.PI / 180); break;
                    case 'cos': result = Math.cos(currentVal * Math.PI / 180); break;
                    case 'tan': result = Math.tan(currentVal * Math.PI / 180); break;
                    case 'log': result = Math.log10(currentVal); break;
                    case 'ln':  result = Math.log(currentVal); break;
                    case 'sqrt': result = Math.sqrt(currentVal); break;
                    case 'sqr': result = Math.pow(currentVal, 2); break;
                }
                if (isNaN(result) || !isFinite(result)) throw new Error();
                historyDisplay.innerText = `${operation}(${currentInput})`;
                currentInput = Number(result.toFixed(8)).toString();
                shouldResetDisplay = true;
                updateDisplay();
            } catch (error) { handleError(); }
        }

        function calculate() {
            try {
                let expression = currentInput;
                if (expression.trim() === '') return;

                historyDisplay.innerText = expression + ' =';
                let result = eval(expression);
                if (isNaN(result) || !isFinite(result)) throw new Error();

                currentInput = Number(result.toFixed(8)).toString();
                shouldResetDisplay = true;
                updateDisplay();
            } catch (error) { handleError(); }
        }

        function clearAll() {
            currentInput = '0';
            historyDisplay.innerText = '';
            updateDisplay();
        }

        function backspace() {
            if (shouldResetDisplay) { clearAll(); return; }
            if (currentInput.slice(-2) === '**') currentInput = currentInput.slice(0, -2);
            else currentInput = currentInput.slice(0, -1);
            if (currentInput === '') currentInput = '0';
            updateDisplay();
        }

        function handleError() {
            currentDisplay.innerText = 'Erro';
            currentInput = '0';
            shouldResetDisplay = true;
        }

        function updateDisplay() {
            let formattedDisplay = currentInput
                .replace(/\*\*/g, '^')
                .replace(/\*/g, '×')
                .replace(/\//g, '÷');
            
            currentDisplay.innerText = formattedDisplay;
        }
    </script>
</body>
</html>
