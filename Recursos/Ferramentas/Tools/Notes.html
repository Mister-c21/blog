<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloco de Notas Pro</title>
    <style>
        :root {
            --primary-color: #8a2be2; /* blueviolet */
            --primary-hover: #9933ff;
            --text-color: #f8f8ff; /* ghostwhite */
            --bg-glass: rgba(255, 255, 255, 0.06);
            --border-glass: rgba(255, 255, 255, 0.1);
            --shadow-glass: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c1b, #241442, #0f0c1b);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            padding: 20px;
        }

        .notes-container {
            width: 100%;
            max-width: 420px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 var(--shadow-glass);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Previne vazamento do contêiner */
        }

        /* Abas Superiores */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 10px;
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: rgba(248, 248, 255, 0.5);
            padding: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
        }

        .tab-btn svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            flex-shrink: 0;
        }

        .tab-btn.active {
            color: var(--text-color);
            background: rgba(138, 43, 226, 0.2);
            box-shadow: inset 0 0 10px rgba(138, 43, 226, 0.3);
        }

        /* Painéis de Visualização */
        .view-panel {
            display: none;
            width: 100%;
        }

        .view-panel.active {
            display: block;
        }

        /* Painel Criar Nota: Inputs */
        .note-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .note-form input, .note-form textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text-color);
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .note-form input:focus, .note-form textarea:focus {
            border-color: var(--primary-color);
        }

        .note-form textarea {
            height: 180px;
            resize: none;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .actions-group {
            display: flex;
            gap: 10px;
        }

        .save-btn {
            flex: 2;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .save-btn:hover {
            background: var(--primary-hover);
        }

        .cancel-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            border: 1px solid var(--border-glass);
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Painel Listagem: Lista de Notas */
        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 360px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .notes-list::-webkit-scrollbar {
            width: 4px;
        }
        .notes-list::-webkit-scrollbar-thumb {
            background: var(--border-glass);
            border-radius: 4px;
        }

        .note-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            overflow: hidden; /* Evita estouro interno */
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .note-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(138, 43, 226, 0.4);
        }

        .note-content {
            flex: 1;
            min-width: 0; /* Permite que os textos internos respeitem os limites */
        }

        .note-content h4 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 6px;
            word-break: break-word;
        }

        .note-content p {
            font-size: 0.88rem;
            color: rgba(248, 248, 255, 0.6);
            line-height: 1.4;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .delete-note-btn {
            background: none;
            border: none;
            color: #ff4565;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: background 0.2s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-note-btn:hover {
            background: rgba(255, 69, 101, 0.1);
        }

        @media (max-width: 380px) {
            .notes-container { padding: 16px; }
            .note-form textarea { height: 140px; }
        }
    </style>
</head>
<body>

    <div class="notes-container">
        <div class="tabs">
            <button class="tab-btn active" id="tab-form-btn" onclick="switchView('create', event)">
                <svg viewBox="0 0 24 24">
                    <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
                <span id="tab-text-label">Nova Nota</span>
            </button>
            <button class="tab-btn" onclick="switchView('list', event)">
                <svg viewBox="0 0 24 24">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                Ver Notas
            </button>
        </div>

        <div id="view-create" class="view-panel active">
            <div class="note-form">
                <input type="text" id="note-title" placeholder="Título da anotação..." maxlength="80">
                <textarea id="note-text" placeholder="Escreva sua nota aqui..."></textarea>
                <div class="actions-group">
                    <button class="save-btn" id="main-action-btn" onclick="saveNote()">
                        Salvar Nota
                    </button>
                    <button class="cancel-btn" id="cancel-edit-btn" onclick="resetForm()" style="display: none;">
                        Cancelar
                    </button>
                </div>
            </div>
        </div>

        <div id="view-list" class="view-panel">
            <div class="notes-list" id="html-notes-list">
                </div>
        </div>
    </div>

    <script>
        // Seletores armazenados em cache estável
        const noteTitleInput = document.getElementById('note-title');
        const noteTextInput = document.getElementById('note-text');
        const htmlNotesList = document.getElementById('html-notes-list');
        const mainActionBtn = document.getElementById('main-action-btn');
        const cancelEditBtn = document.getElementById('cancel-edit-btn');
        const tabTextLabel = document.getElementById('tab-text-label');
        const tabFormBtn = document.getElementById('tab-form-btn');

        // Estado do Aplicativo
        let savedNotes = JSON.parse(localStorage.getItem('app_notes')) || [];
        let editingNoteId = null; // Controla se estamos editando uma nota ativa

        function init() {
            renderNotes();
        }

        // Navegação entre abas limpa
        function switchView(view, event) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            let targetButton = event ? event.target.closest('.tab-btn') : null;
            if (!targetButton && view === 'create') targetButton = tabFormBtn;
            if (targetButton) targetButton.classList.add('active');

            document.querySelectorAll('.view-panel').forEach(panel => panel.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');

            if (view === 'list') renderNotes();
        }

        // Criar ou Atualizar uma nota
        function saveNote() {
            const title = noteTitleInput.value.trim();
            const text = noteTextInput.value.trim();

            if (!title && !text) return;

            if (editingNoteId !== null) {
                // Modo Edição: Localiza e altera a nota existente
                savedNotes = savedNotes.map(note => {
                    if (note.id === editingNoteId) {
                        return { ...note, title: title || "Nota sem título", text: text || "" };
                    }
                    return note;
                });
            } else {
                // Modo Criação: Adiciona no início da lista
                const newNote = {
                    id: Date.now(),
                    title: title || "Nota sem título",
                    text: text || ""
                };
                savedNotes.unshift(newNote);
            }

            localStorage.setItem('app_notes', JSON.stringify(savedNotes));
            resetForm();
            switchView('list');
        }

        // Carrega os dados da nota selecionada de volta para o formulário
        function startEdit(noteId, event) {
            // Evita abrir a edição se o clique foi diretamente no botão de deletar
            if (event.target.closest('.delete-note-btn')) return;

            const targetNote = savedNotes.find(note => note.id === noteId);
            if (!targetNote) return;

            editingNoteId = targetNote.id;
            noteTitleInput.value = targetNote.title;
            noteTextInput.value = targetNote.text;

            // Altera interface visual para o estado de "Modo de Edição"
            tabTextLabel.innerText = "Editar Nota";
            mainActionBtn.innerText = "Atualizar Nota";
            cancelEditBtn.style.display = "block";

            switchView('create');
        }

        // Reseta o formulário para o padrão de criação limpa
        function resetForm() {
            editingNoteId = null;
            noteTitleInput.value = '';
            noteTextInput.value = '';
            
            tabTextLabel.innerText = "Nova Nota";
            mainActionBtn.innerText = "Salvar Nota";
            cancelEditBtn.style.display = "none";
        }

        // Deletar Nota limpando referências antigas do DOM
        function deleteNote(noteId) {
            savedNotes = savedNotes.filter(note => note.id !== noteId);
            localStorage.setItem('app_notes', JSON.stringify(savedNotes));
            
            // Se a nota excluída era a que estava sendo editada, reseta o formulário
            if (editingNoteId === noteId) {
                resetForm();
            }
            
            renderNotes();
        }

        // Renderiza a listagem de anotações
        function renderNotes() {
            htmlNotesList.innerHTML = '';

            if (savedNotes.length === 0) {
                htmlNotesList.innerHTML = '<div style="text-align:center; padding:30px; color:rgba(248,248,255,0.4); font-size:0.9rem;">Nenhuma nota salva ainda.</div>';
                return;
            }

            savedNotes.forEach(note => {
                const item = document.createElement('div');
                item.className = 'note-item';
                item.onclick = (e) => startEdit(note.id, e);

                item.innerHTML = `
                    <div class="note-content">
                        <h4>${escapeHTML(note.title)}</h4>
                        <p>${escapeHTML(note.text)}</p>
                    </div>
                    <button class="delete-note-btn" onclick="deleteNote(${note.id})">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px; height:18px;">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                `;
                htmlNotesList.appendChild(item);
            });
        }

        // Filtro sanitizador simples contra XSS nas caixas de texto
        function escapeHTML(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        window.onload = init;
    </script>
</body>
</html>
