<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download App</title>
    <style>
        :root {
            --blueviolet: #8a2be2;
            --ghost: #f8f8ff;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0;
            font-family: sans-serif;
            background-color: var(--ghost);
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.1), rgba(255, 255, 255, 0.1));
            backdrop-filter: blur(10px);
            text-align: center;
            color: var(--blueviolet);
        }

        h1 { font-size: 3rem; margin-bottom: 30px; }

        .btn-download {
            background-color: var(--blueviolet);
            color: var(--ghost);
            padding: 20px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
        }

        .btn-download:hover {
            transform: scale(1.05);
            background-color: var(--blueviolet);
            /* Efeito Glow */
            box-shadow: 0 0 20px var(--blueviolet), 0 0 40px var(--blueviolet);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Baixe nosso App</h1>
        <a href="#" class="btn-download">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Iniciar Download
        </a>
    </div>

</body>
</html>
