<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Jogos - Web Grid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f4f5f6; /* Fundo Ghost White */
        }
        /* Cores customizadas solicitadas */
        .bg-blueviolet { background-color: #8A2BE2; }
        .text-blueviolet { color: #8A2BE2; }
        .border-blueviolet { border-color: #8A2BE2; }
        
        /* Efeito de Vidro Semitransparente (Glassmorphism) */
        .glass-header {
            background: rgba(244, 245, 246, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* Botões circulares em vidro para categorias desativadas */
        .glass-category-btn {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        
        /* Ocultar barras de rolagem nativas de elementos horizontais */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen text-slate-800 antialiased">

    <header class="sticky top-0 z-50 glass-header px-4 md:px-8 py-4 flex flex-col gap-4 shadow-sm">

        <div class="max-w-3xl w-full mx-auto flex items-center justify-between overflow-x-auto no-scrollbar gap-6">
            <div id="tab-container" class="flex gap-3 text-sm font-medium">
                <button class="tab-btn bg-blueviolet text-white px-5 py-2 rounded-full whitespace-nowrap shadow-sm active:scale-95 transition flex items-center gap-2">
                    <i data-lucide="gamepad-2" class="w-4 h-4"></i>
                    All
                </button>
                <button class="tab-btn glass-category-btn text-slate-600 hover:text-blueviolet px-5 py-2 rounded-full whitespace-nowrap active:scale-95 transition flex items-center gap-2">
                    <i data-lucide="package-plus" class="w-4 h-4"></i>
                    Mods
                </button>
                <button class="tab-btn glass-category-btn text-slate-600 hover:text-blueviolet px-5 py-2 rounded-full whitespace-nowrap active:scale-95 transition flex items-center gap-2">
                    <i data-lucide="user-circle" class="w-4 h-4"></i>
                    Contas
                </button>
                <button class="tab-btn glass-category-btn text-slate-600 hover:text-blueviolet px-5 py-2 rounded-full whitespace-nowrap active:scale-95 transition flex items-center gap-2">
                    <i data-lucide="monitor-play" class="w-4 h-4"></i>
                    Jogos
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-3xl w-full mx-auto px-4 md:px-8 py-4">

        <div class="flex flex-col gap-3">
            
            <div class="glass-card rounded-xl p-3 flex items-center justify-between shadow-sm mb-1">
                <div class="relative flex items-center gap-2 bg-white/50 border border-white/60 rounded-lg px-3 py-1.5 text-xs text-slate-600 font-medium">
                    <i data-lucide="filter" class="w-3.5 h-3.5 text-slate-400"></i>
                    <select class="bg-transparent pr-4 outline-none appearance-none cursor-pointer font-medium text-slate-700">
                        <option value="populares">Mais Populares</option>
                        <option value="lancamentos">Lançamentos</option>
                        <option value="ofertas">Ofertas</option>
                    </select>
                    <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-slate-400 absolute right-2 pointer-events-none"></i>
                </div>
                <button class="w-8 h-8 rounded-lg bg-blueviolet text-white flex items-center justify-center shadow-sm active:scale-95 transition hover:opacity-90">
                    <i data-lucide="shopping-cart" class="w-4 h-4"></i>
                </button>
            </div>

            <div class="glass-card rounded-xl p-3 flex gap-4 shadow-sm hover:shadow-md transition duration-300 group cursor-pointer items-center">
                <div class="relative w-16 h-20 bg-slate-100 overflow-hidden rounded-lg flex-shrink-0">
                    <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=400&auto=format&fit=crop" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" alt="Jogo">
                </div>
                <div class="flex flex-col justify-center flex-1 min-w-0">
                    <h3 class="text-base font-semibold text-slate-800 truncate group-hover:text-blueviolet transition leading-tight">Cyber Vanguard</h3>
                    <p class="text-xs text-slate-400 mt-1">Ação · Sci-Fi · Singleplayer</p>
                    <span class="text-sm font-bold text-blueviolet mt-2">R$ 199,90</span>
                </div>
            </div>

            <div class="glass-card rounded-xl p-3 flex gap-4 shadow-sm hover:shadow-md transition duration-300 group cursor-pointer items-center">
                <div class="relative w-16 h-20 bg-slate-100 overflow-hidden rounded-lg flex-shrink-0">
                    <img src="https://images.unsplash.com/photo-1552820728-8b83bb6b773f?q=80&w=400&auto=format&fit=crop" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" alt="Jogo">
                </div>
                <div class="flex flex-col justify-center flex-1 min-w-0">
                    <h3 class="text-base font-semibold text-slate-800 truncate group-hover:text-blueviolet transition leading-tight">Mystic Realms</h3>
                    <p class="text-xs text-slate-400 mt-1">RPG · Fantasia · Online</p>
                    <span class="text-sm font-bold text-blueviolet mt-2">R$ 249,90</span>
                </div>
            </div>

        </div>
    </main>

    <script>
        lucide.createIcons();

        const tabs = document.querySelectorAll('.tab-btn');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => {
                    t.classList.remove('bg-blueviolet', 'text-white', 'shadow-sm');
                    t.classList.add('glass-category-btn', 'text-slate-600', 'hover:text-blueviolet');
                });

                tab.classList.remove('glass-category-btn', 'text-slate-600', 'hover:text-blueviolet');
                tab.classList.add('bg-blueviolet', 'text-white', 'shadow-sm');
            });
        });
    </script>
</body>
</html>
