<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Shop - Web Grid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f4f5f6; /* Fundo Ghost White */
        }
        /* Cores customizadas solicitadas */
        .bg-blueviolet { background-color: #8A2BE2; }
        .text-blueviolet { color: #8A2BE2; }
        .border-blueviolet { border-color: #8A2BE2; }
        
        /* Efeito de Vidro Semitransparente (Glassmorphism) */
        .glass-header {
            background: rgba(244, 245, 246, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* Botões circulares em vidro para categorias desativadas */
        .glass-category-btn {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        
        /* Ocultar barras de rolagem nativas de elementos horizontais */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen text-slate-800 antialiased">

    <header class="sticky top-0 z-50 glass-header px-4 md:px-8 py-4 flex flex-col gap-4 shadow-sm">

        <div class="max-w-7xl w-full mx-auto flex items-center justify-between overflow-x-auto no-scrollbar gap-6">
            <div id="tab-container" class="flex gap-3 text-sm font-medium">
                <button class="tab-btn bg-blueviolet text-white px-5 py-2.5 rounded-full whitespace-nowrap shadow-sm active:scale-95 transition flex items-center gap-2">
                    <i data-lucide="layout-grid" class="w-4 h-4"></i>
                    Todos
                </button>
                <button class="tab-btn glass-category-btn text-slate-600 hover:text-blueviolet px-5 py-2.5 rounded-full whitespace-nowrap active:scale-95 transition flex items-center gap-2">
                    <i data-lucide="tv" class="w-4 h-4"></i>
                    Eletrônicos
                </button>
                <button class="tab-btn glass-category-btn text-slate-600 hover:text-blueviolet px-5 py-2.5 rounded-full whitespace-nowrap active:scale-95 transition flex items-center gap-2">
                    <i data-lucide="sparkles" class="w-4 h-4"></i>
                    Beleza
                </button>
                <button class="tab-btn glass-category-btn text-slate-600 hover:text-blueviolet px-5 py-2.5 rounded-full whitespace-nowrap active:scale-95 transition flex items-center gap-2">
                    <i data-lucide="shirt" class="w-4 h-4"></i>
                    Moda
                </button>
                <button class="tab-btn glass-category-btn text-slate-600 hover:text-blueviolet px-5 py-2.5 rounded-full whitespace-nowrap active:scale-95 transition flex items-center gap-2">
                    <i data-lucide="home" class="w-4 h-4"></i>
                    Casa e Decoração
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl w-full mx-auto px-4 md:px-8 py-6">

        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            
            <div class="glass-card rounded-2xl overflow-hidden flex flex-col shadow-sm hover:shadow-md transition duration-300 group cursor-pointer">
                <div class="relative w-full aspect-square bg-slate-100 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=400&auto=format&fit=crop" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" alt="Produto">
                </div>
                <div class="p-3 flex flex-col flex-1 justify-between">
                    <div>
                        <h3 class="text-sm font-medium text-slate-800 line-clamp-2 leading-tight group-hover:text-blueviolet transition">V060 - Compressor Digital Inteligente Alta Pressão</h3>
                        <div class="flex items-baseline gap-1 mt-2">
                            <span class="text-lg font-bold text-blueviolet">R$ 35,62</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-2xl overflow-hidden flex flex-col shadow-sm hover:shadow-md transition duration-300 group cursor-pointer">
                <div class="relative w-full aspect-square bg-slate-100 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=400&auto=format&fit=crop" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" alt="Produto">
                </div>
                <div class="p-3 flex flex-col flex-1 justify-between">
                    <div>
                        <h3 class="text-sm font-medium text-slate-800 line-clamp-2 leading-tight group-hover:text-blueviolet transition">Blister Quadruplo Pokémon Estampas Ilustradas</h3>
                        <div class="flex items-baseline gap-1 mt-2">
                            <span class="text-lg font-bold text-blueviolet">R$ 44,99</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-2xl overflow-hidden flex flex-col shadow-sm hover:shadow-md transition duration-300 group cursor-pointer">
                <div class="relative w-full aspect-square bg-slate-100 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=400&auto=format&fit=crop" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" alt="Produto">
                </div>
                <div class="p-3 flex flex-col flex-1 justify-between">
                    <div>
                        <h3 class="text-sm font-medium text-slate-800 line-clamp-2 leading-tight group-hover:text-blueviolet transition">Limpa Vidros Manual Magnético Dupla Face Prático</h3>
                        <div class="flex items-baseline gap-1 mt-2">
                            <span class="text-lg font-bold text-blueviolet">R$ 21,59</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-2xl overflow-hidden flex flex-col shadow-sm hover:shadow-md transition duration-300 group cursor-pointer">
                <div class="relative w-full aspect-square bg-slate-100 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1560807707-8cc77767d783?q=80&w=400&auto=format&fit=crop" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" alt="Produto">
                </div>
                <div class="p-3 flex flex-col flex-1 justify-between">
                    <div>
                        <h3 class="text-sm font-medium text-slate-800 line-clamp-2 leading-tight group-hover:text-blueviolet transition">Película 3D Premium de Vidro para Samsung Galaxy S22</h3>
                        <div class="flex items-baseline gap-1 mt-2">
                            <span class="text-lg font-bold text-blueviolet">R$ 9,99</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Inicializa os ícones do Lucide
        lucide.createIcons();

        // Lógica de alternância da TabBar Ativa
        const tabs = document.querySelectorAll('.tab-btn');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                // Remove o estado ativo de todos os botões e volta para o estilo de vidro desativado
                tabs.forEach(t => {
                    t.classList.remove('bg-blueviolet', 'text-white', 'shadow-sm');
                    t.classList.add('glass-category-btn', 'text-slate-600', 'hover:text-blueviolet');
                });

                // Aplica o estado ativo apenas no botão clicado
                tab.classList.remove('glass-category-btn', 'text-slate-600', 'hover:text-blueviolet');
                tab.classList.add('bg-blueviolet', 'text-white', 'shadow-sm');
            });
        });
    </script>
</body>
</html>
