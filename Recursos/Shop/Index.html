<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Orion</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-color: blueviolet;
            --bg-color: ghostwhite;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --border-color: rgba(255, 255, 255, 0.3);
            --inactive-color: #9e9e9e;
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            overflow: hidden;
        }

        .nav-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .icon {
            color: var(--inactive-color);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
        }

        /* Ajuste específico para o SVG gerado pelo Lucide */
        .icon svg {
            width: 32px;
            height: 32px;
            stroke-width: 2;
        }

        .icon.active {
            color: var(--primary-color);
            background: rgba(138, 43, 226, 0.1);
        }

        .icon:hover {
            color: var(--primary-color);
            transform: scale(1.1);
        }

        #content-frame { 
            flex-grow: 1; 
            border: none; 
            width: 100%; 
            height: 100%; 
        }

        /* Mobile: Barra inferior */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .nav-container { 
                position: fixed; 
                bottom: 0; 
                width: 100%; 
                height: 80px; 
            }
            #content-frame { height: calc(100vh - 80px); }
        }

        /* Desktop: Barra lateral */
        @media (min-width: 769px) {
            body { flex-direction: row; }
            .nav-container { 
                flex-direction: column; 
                width: 90px; 
                height: 100vh; 
                padding-top: 20px; 
                gap: 20px; 
            }
        }
    </style>
</head>
<body>

    <nav class="nav-container">
        <i data-lucide="home" class="icon" onclick="navigate(this, '../../index.html', true)"></i>
        <i data-lucide="shopping-bag" class="icon active" onclick="navigate(this, './Normal/Index.html', false)"></i>
        <i data-lucide="layout-grid" class="icon" onclick="navigate(this, 'apps.html', false)"></i>
        <i data-lucide="gamepad-2" class="icon" onclick="navigate(this, 'games.html', false)"></i>
        <i data-lucide="briefcase" class="icon" onclick="navigate(this, 'servicos.html', false)"></i>
    </nav>

    <iframe id="content-frame" src="./Normal/Index.html"></iframe>

    <script>
        // Garante a inicialização após o DOM estar pronto
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });

        function navigate(element, url, isRedirect) {
            if (isRedirect) {
                window.location.href = url;
            } else {
                document.querySelectorAll('.icon').forEach(icon => icon.classList.remove('active'));
                element.classList.add('active');
                document.getElementById('content-frame').src = url;
            }
        }
    </script>
</body>
</html>
