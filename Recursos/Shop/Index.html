<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Jogos - Imagens</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-color: #8a2be2;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f8ff; padding: 20px; }

        .gx-mods-carousel {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 5px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .gx-mods-carousel::-webkit-scrollbar { display: none; }

        .gx-mod-card {
            width: 135px;
            height: 82px;
            position: relative;
            cursor: pointer;
            overflow: hidden; /* Garante que a imagem respeite o corte */
            transition: transform 0.2s ease, filter 0.2s ease;
            clip-path: polygon(12px 0%, 100% 0%, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0% 100%, 0% 12px);
        }
        
        /* A imagem preenche o card */
        .gx-mod-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        /* Overlay leve para manter a consistência visual */
        .gx-mod-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(138, 43, 226, 0.2);
            pointer-events: none;
        }
        
        .gx-mod-card:hover {
            transform: scale(1.04);
            filter: brightness(1.15);
        }
    </style>
</head>
<body>

    <main class="max-w-3xl w-full mx-auto py-8">
        <div class="flex flex-col gap-8">
            
            <section>
                <h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Fangames</h2>
                <div class="gx-mods-carousel">
                    <div class="gx-mod-card">
                        <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=400" alt="Fangame 1">
                    </div>
                    <div class="gx-mod-card">
                        <img src="https://images.unsplash.com/photo-1552820728-8b83bb6b773f?q=80&w=400" alt="Fangame 2">
                    </div>
                </div>
            </section>

            <section>
                <h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Mods</h2>
                <div class="gx-mods-carousel">
                    <div class="gx-mod-card">
                        <img src="https://images.unsplash.com/photo-1589241062272-c8a70003f46f?q=80&w=400" alt="Mod 1">
                    </div>
                    <div class="gx-mod-card">
                        <img src="https://images.unsplash.com/photo-1593341617437-8178d8a5f6b2?q=80&w=400" alt="Mod 2">
                    </div>
                </div>
            </section>

            <section>
                <h2 class="text-lg font-bold text-slate-800 mb-3 px-1">Contas</h2>
                <div class="gx-mods-carousel">
                    <div class="gx-mod-card">
                        <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=400" alt="Conta 1">
                    </div>
                    <div class="gx-mod-card">
                        <img src="https://images.unsplash.com/photo-1560250097-0b93528c31e6?q=80&w=400" alt="Conta 2">
                    </div>
                </div>
            </section>

        </div>
    </main>

</body>
</html>
