<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Jogos - Ícone à Direita</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary-color: #8a2be2; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f8ff; padding: 20px; }

        .gx-mods-carousel {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 5px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .gx-mods-carousel::-webkit-scrollbar { display: none; }

        .gx-mod-card {
            flex: 0 0 180px;
            height: 110px;
            position: relative;
            cursor: pointer;
            overflow: hidden; 
            transition: transform 0.2s ease, filter 0.2s ease;
            clip-path: polygon(15px 0%, 100% 0%, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0% 100%, 0% 15px);
        }
        
        .gx-mod-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .gx-mod-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(138, 43, 226, 0.15);
            pointer-events: none;
        }
        
        .gx-mod-card:hover { transform: scale(1.03); filter: brightness(1.1); }
    </style>
</head>
<body>

    <main class="max-w-3xl w-full mx-auto py-8">
        <div class="flex flex-col gap-8">

                </div>
                <div class="gx-mods-carousel">

                </div>
            </section>

            <section>
                <div class="flex items-center justify-between w-full mb-3 px-1">
                    <h2 class="text-lg font-bold text-slate-800">Mods</h2>
